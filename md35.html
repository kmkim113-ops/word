<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>씨유에탑 중등3-5 영어단어장</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #2563EB;
      --primary-dark: #1D4ED8;
      --primary-light: #EFF6FF;
      --success: #10B981;
      --danger: #EF4444;
      --warn: #F59E0B;
      --gray: #6B7280;
      --border: #E5E7EB;
      --bg: #F9FAFB;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: #f0f2f5;
      color: #1f2937;
      display: flex;
      justify-content: center;
    }
    #app {
      width: 100%;
      max-width: 420px;
      min-height: 100vh;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      position: relative;
      box-shadow: 0 0 10px rgba(0,0,0,0.05);
    }
    .en { font-family: 'Nunito', sans-serif; }
    
    /* Header */
    .header {
      background: #fff;
      padding: 16px;
      border-bottom: 1px solid var(--border);
      text-align: center;
    }
    .header-brand {
      font-size: 18px;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 4px;
    }
    .header-sub {
      font-size: 13px;
      color: var(--gray);
    }

    /* Tabs Nav */
    .nav-tabs {
      display: flex;
      background: #fff;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .nav-tab {
      flex: 1;
      text-align: center;
      padding: 12px 0;
      font-size: 13px;
      font-weight: 500;
      color: var(--gray);
      cursor: pointer;
      border-bottom: 2px solid transparent;
    }
    .nav-tab.active {
      color: var(--primary);
      border-bottom-color: var(--primary);
      font-weight: 700;
    }

    /* Content Views */
    .tab-content { display: none; flex: 1; padding: 16px; }
    .tab-content.active { display: flex; flex-direction: column; }

    /* Range Bar Components */
    .range-bar {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      padding-bottom: 8px;
      margin-bottom: 12px;
    }
    .range-bar::-webkit-scrollbar { display: none; }
    .rbtn {
      white-space: nowrap;
      padding: 6px 12px;
      font-size: 12px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: #fff;
      color: var(--gray);
      cursor: pointer;
    }
    .rbtn.active {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }

    /* Search & Filter Controls */
    .controls { margin-bottom: 12px; }
    .search-input {
      width: 100%;
      padding: 10px 14px;
      border-radius: 8px;
      border: 1px solid var(--border);
      font-size: 14px;
      margin-bottom: 8px;
      outline: none;
    }
    .f-box { display: flex; gap: 6px; }
    .fbtn {
      flex: 1;
      padding: 8px;
      font-size: 12px;
      border: 1px solid var(--border);
      background: #fff;
      border-radius: 6px;
      color: var(--gray);
      cursor: pointer;
    }
    .fbtn.active {
      background: var(--primary-light);
      color: var(--primary);
      border-color: var(--primary);
      font-weight: 700;
    }

    /* Word List Cards */
    .word-list { display: flex; flex-direction: column; gap: 8px; }
    .w-card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      position: relative;
    }
    .w-card.known { opacity: 0.35; }
    .chk-btn {
      width: 24px;
      height: 24px;
      border-radius: 4px;
      border: 1px solid var(--border);
      background: #fff;
      color: var(--border);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
    }
    .w-card.known .chk-btn {
      background: var(--success);
      border-color: var(--success);
      color: #fff;
    }
    .w-info { flex: 1; }
    .w-eng { font-size: 16px; font-weight: 700; margin-bottom: 2px; }
    .w-kor { font-size: 14px; color: var(--gray); }
    .ibtn {
      background: none;
      border: none;
      font-size: 16px;
      cursor: pointer;
      padding: 4px;
    }
    .fav-btn { color: var(--border); }
    .fav-btn.active { color: var(--warn); }

    /* Flashcard View */
    .fc-wrapper {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 20px;
      min-height: 320px;
    }
    .fc-card {
      width: 100%;
      height: 220px;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      position: relative;
      cursor: pointer;
      padding: 20px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.02);
      text-align: center;
    }
    #fcfav {
      position: absolute;
      top: 14px;
      right: 14px;
      font-size: 20px;
      background: none;
      border: none;
      cursor: pointer;
    }
    .fc-eng { font-size: 24px; font-weight: 700; margin-bottom: 12px; }
    .fc-kor { font-size: 18px; color: var(--primary); font-weight: 500; display: none; }
    .fc-kor.visible { display: block; }
    .fc-hint { font-size: 12px; color: var(--gray); position: absolute; bottom: 14px; }
    .fc-nav { display: flex; width: 100%; gap: 10px; }
    .fc-nav-btn {
      flex: 1;
      padding: 12px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }
    .fc-nav-btn.sec { background: var(--gray); }

    /* Quiz / Test General Styles */
    .quiz-box, .setup-box {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
    }
    .q-text { font-size: 20px; font-weight: 700; text-align: center; margin: 20px 0; }
    .q-options { display: flex; flex-direction: column; gap: 10px; }
    .q-opt {
      width: 100%;
      padding: 12px;
      text-align: left;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
    }
    .q-opt.correct { background: var(--success) !important; color: #fff; border-color: var(--success); }
    .q-opt.wrong { background: var(--danger) !important; color: #fff; border-color: var(--danger); }
    
    /* Test Form Components */
    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 13px; font-weight: 700; margin-bottom: 6px; }
    .t-input {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      font-size: 15px;
      outline: none;
    }
    .action-btn {
      width: 100%;
      padding: 14px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }

    /* Score Indicator & Progress Elements */
    .progress-info { display: flex; justify-content: space-between; font-size: 12px; color: var(--gray); margin-bottom: 6px; }
    .progress-container { background: var(--border); height: 6px; border-radius: 3px; margin-bottom: 16px; overflow: hidden; }
    .progress-bar { background: var(--primary); height: 100%; width: 0%; }
    
    /* Result Views */
    .res-box { text-align: center; background: #fff; border: 1px solid var(--border); border-radius: 12px; padding: 24px; }
    .res-emoji { font-size: 48px; margin-bottom: 10px; }
    .res-score { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
    .res-pct { font-size: 15px; color: var(--gray); margin-bottom: 20px; }
    
    .wrong-list { text-align: left; margin: 16px 0; max-height: 200px; overflow-y: auto; border-top: 1px solid var(--border); padding-top: 12px; }
    .wrong-item { font-size: 13px; margin-bottom: 6px; line-height: 1.4; }
    .wrong-w { font-weight: 700; color: var(--danger); }

    .res-btn-box { display: flex; flex-direction: column; gap: 8px; margin-top: 16px; }
    .res-btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }
  </style>
</head>

  <!-- Tab 3: Quiz -->

</div>
