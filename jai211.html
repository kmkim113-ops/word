<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>씨유에탑 고2 자이11회 어휘 단어장</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #2563EB;
      --primary-dark: #1D4ED8;
      --primary-light: #EFF6FF;
      --success: #10B981;
      --danger: #EF4444;
      --warn: #F59E0B;
      --gray: #6B7280;
      --border: #E5E7EB;
      --bg: #F9FAFB;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: #f0f2f5;
      color: #1F2937;
      line-height: 1.5;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
    }
    #app {
      width: 100%;
      max-width: 420px;
      background: #ffffff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      position: relative;
    }
    .header {
      background: #ffffff;
      padding: 16px;
      border-bottom: 1px solid var(--border);
      text-align: center;
    }
    .header-brand {
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 1.25rem;
      color: var(--primary);
    }
    .header-sub {
      font-size: 0.85rem;
      color: var(--gray);
      margin-top: 4px;
    }
    .nav-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      background: #ffffff;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .tab-btn {
      flex: 1;
      background: none;
      border: none;
      padding: 12px 0;
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--gray);
      cursor: pointer;
      text-align: center;
      border-bottom: 2px solid transparent;
    }
    .tab-btn.active {
      color: var(--primary);
      border-bottom-color: var(--primary);
      font-weight: 700;
    }
    .tab-content {
      display: none;
      flex: 1;
      padding: 16px;
      background: var(--bg);
    }
    .tab-content.active {
      display: block;
    }
    
    /* UI Elements */
    .range-bar {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      padding-bottom: 12px;
      margin-bottom: 12px;
      scrollbar-width: none;
    }
    .range-bar::-webkit-scrollbar { display: none; }
    .range-btn {
      flex-shrink: 0;
      background: #ffffff;
      border: 1px solid var(--border);
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      color: var(--gray);
    }
    .range-btn.active {
      background: var(--primary);
      color: #ffffff;
      border-color: var(--primary);
    }
    
    .search-box {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.9rem;
      margin-bottom: 12px;
      font-family: inherit;
    }
    
    .filter-bar {
      display: flex;
      gap: 6px;
      margin-bottom: 16px;
    }
    .filter-btn {
      flex: 1;
      background: #ffffff;
      border: 1px solid var(--border);
      padding: 8px;
      border-radius: 6px;
      font-size: 0.85rem;
      cursor: pointer;
      font-weight: 500;
      color: var(--gray);
    }
    .filter-btn.active {
      background: var(--primary-light);
      color: var(--primary);
      border-color: var(--primary);
    }
    
    /* Word Cards List */
    .word-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .word-card {
      background: #ffffff;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: opacity 0.2s;
    }
    .word-card.known {
      opacity: 0.35;
    }
    .card-chk {
      width: 20px;
      height: 20px;
      border: 2px solid var(--border);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: white;
      font-size: 0.75rem;
      font-weight: bold;
    }
    .card-chk.checked {
      background: var(--success);
      border-color: var(--success);
    }
    .card-info {
      flex: 1;
    }
    .card-eng {
      font-family: 'Nunito', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      color: #111827;
    }
    .card-kor {
      font-size: 0.9rem;
      color: var(--gray);
      margin-top: 4px;
    }
    .ibtn {
      background: none;
      border: none;
      font-size: 1.2rem;
      cursor: pointer;
      padding: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .fav-btn { color: #D1D5DB; }
    .fav-btn.active { color: var(--warn); }
    
    /* Flashcard Tab */
    .fc-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 10px 0;
    }
    .fc-card {
      width: 100%;
      height: 240px;
      background: #ffffff;
      border-radius: 12px;
      border: 1px solid var(--border);
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      position: relative;
      cursor: pointer;
      padding: 24px;
      text-align: center;
    }
    .fc-fav {
      position: absolute;
      top: 16px;
      right: 16px;
      font-size: 1.5rem;
    }
    .fc-eng {
      font-family: 'Nunito', sans-serif;
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--primary);
    }
    .fc-kor {
      font-size: 1.3rem;
      font-weight: 500;
      color: #374151;
      margin-top: 16px;
      display: none;
    }
    .fc-tip {
      position: absolute;
      bottom: 16px;
      font-size: 0.75rem;
      color: var(--gray);
    }
    .fc-nav {
      width: 100%;
      display: flex;
      gap: 12px;
      margin-top: 20px;
    }
    .fc-nav-btn {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: var(--primary);
      color: #ffffff;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
    }
    .fc-nav-btn.sec {
      background: #E5E7EB;
      color: #374151;
    }
    .fc-progress {
      font-size: 0.85rem;
      color: var(--gray);
      margin-top: 12px;
    }
    
    /* Quiz & Test Common */
    .quiz-container, .test-container {
      background: #ffffff;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      text-align: center;
    }
    .q-progress {
      display: flex;
      justify-content: space-between;
      font-size: 0.8rem;
      color: var(--gray);
      margin-bottom: 12px;
    }
    .p-bar-outer {
      width: 100%;
      height: 6px;
      background: #E5E7EB;
      border-radius: 3px;
      margin-bottom: 20px;
      overflow: hidden;
    }
    .p-bar-inner {
      height: 100%;
      background: var(--primary);
      width: 0%;
      transition: width 0.2s;
    }
    .q-eng {
      font-family: 'Nunito', sans-serif;
      font-size: 1.8rem;
      font-weight: 700;
      color: #111827;
      margin-bottom: 24px;
    }
    .q-options {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .q-opt-btn {
      width: 100%;
      padding: 14px;
      border: 1px solid var(--border);
      background: #ffffff;
      border-radius: 8px;
      font-size: 0.95rem;
      cursor: pointer;
      text-align: left;
      font-weight: 500;
    }
    .q-opt-btn.correct {
      background: #D1FAE5;
      border-color: var(--success);
      color: #065F46;
    }
    .q-opt-btn.wrong {
      background: #FEE2E2;
      border-color: var(--danger);
      color: #991B1B;
    }
    
    /* Test Setup */
    .setup-title {
      font-size: 1.15rem;
      font-weight: 700;
      margin-bottom: 16px;
      color: #111827;
    }
    .input-grp {
      text-align: left;
      margin-bottom: 16px;
    }
    .input-grp label {
      display: block;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--gray);
      margin-bottom: 6px;
    }
    .text-input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 0.9rem;
      font-family: inherit;
    }
    .btn-start {
      width: 100%;
      background: var(--primary);
      color: #ffffff;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 10px;
    }
    
    /* Test Testing */
    .ans-input {
      width: 100%;
      padding: 12px;
      border: 2px solid var(--border);
      border-radius: 8px;
      font-size: 1.1rem;
      text-align: center;
      margin-bottom: 16px;
      font-family: inherit;
    }
    .ans-input:focus {
      outline: none;
      border-color: var(--primary);
    }
    .btn-next {
      width: 100%;
      background: var(--primary);
      color: #ffffff;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
    }
    
    /* Result Page */
    .res-emoji {
      font-size: 3.5rem;
      margin-bottom: 12px;
    }
    .res-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: #111827;
      margin-bottom: 4px;
    }
    .res-score {
      font-size: 1.2rem;
      font-weight: 600;
      color: var(--primary);
      margin-bottom: 20px;
    }
    .res-actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 24px;
    }
    .btn-kakao {
      background: #25D366;
      color: white;
      border: none;
      padding: 12px;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
    }
    .btn-retry {
      background: #E5E7EB;
      color: #374151;
      border: none;
      padding: 12px;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
    }
    .wrong-list-title {
      text-align: left;
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--danger);
      margin-bottom: 8px;
    }
    .wrong-item {
      text-align: left;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px;
      margin-bottom: 8px;
      font-size: 0.85rem;
    }
    .wrong-w {
      font-weight: 700;
      color: #111827;
    }
    .wrong-details {
      margin-top: 4px;
      color: var(--gray);
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="header">
      <div class="header-brand en">씨유에탑 ✦ 영어단어장</div>
      <div class="header-sub">고2 자이11회 어휘 · 총 382단어</div>
    </div>
    <div class="nav-tabs">
      <button class="tab-btn active" id="tb-list" onclick="switchTab('list')">단어목록</button>
      <button class="tab-btn" id="tb-flash" onclick="switchTab('flash')">플래시카드</button>
      <button class="tab-btn" id="tb-quiz" onclick="switchTab('quiz')">퀴즈모드</button>
      <button class="tab-btn" id="tb-test" onclick="switchTab('test')">📝 테스트</button>
    </div>
    
    <!-- Tab 1: List -->
    <div class="tab-content active" id="tab-list">
      <div class="range-bar" id="lrbar"></div>
      <input type="text" class="search-box" id="lsearch" placeholder="영어 또는 한글 검색..." oninput="renderList()">
      <div class="filter-bar">
        <button class="filter-btn active" id="lf-all" onclick="setListFilter('all')">전체</button>
        <button class="filter-btn" id="lf-not" onclick="setListFilter('not')">모름</button>
        <button class="filter-btn" id="lf-fav" onclick="setListFilter('fav')">⭐즐겨찾기</button>
      </div>
      <div class="word-list" id="wlist"></div>
    </div>
    
    <!-- Tab 2: Flashcard -->
    <div class="tab-content" id="tab-flash">
      <div class="range-bar" id="fcrbar"></div>
      <div class="fc-container">
        <div class="fc-card" id="fccard">
          <button class="ibtn fav-btn fc-fav" id="fcfav">★</button>
          <div class="fc-eng" id="fcword">-</div>
          <div class="fc-kor" id="fcmean">-</div>
          <div class="fc-tip">화면을 탭하면 뜻이 나타납니다</div>
        </div>
        <div class="fc-progress" id="fcprog">- / -</div>
        <div class="fc-nav">
          <button class="fc-nav-btn sec" onclick="fcPrev()">◀ 이전</button>
          <button class="fc-nav-btn" style="background:var(--warn);" onclick="speakFc()">🔊</button>
          <button class="fc-nav-btn" onclick="fcNext()">다음 ▶</button>
        </div>
      </div>
    </div>
    
    <!-- Tab 3: Quiz -->
    <div class="tab-content" id="tab-quiz">
      <div id="q-area"></div>
    </div>
    
    <!-- Tab 4: Test -->
    <div class="tab-content" id="tab-test">
      <div id="t-area"></div>
    </div>
  </div>

          '</div>' +
          '<button class="ibtn" data-w="' + esc(w.word) + '" onclick="speak(this.dataset.w)">🔊</button>' +
          '<button class="ibtn fav-btn ' + favClass + '" onclick="toggleFav(this)" data-w="' + esc(w.word) + '" data-m="' + esc(w.meaning) + '">★</button>' +
        '</div>';
      });

      container.innerHTML = html || '<div style="text-align:center; padding: 40px; color: var(--gray);">조건에 맞는 단어가 없습니다.</div>';
    }

    window.toggleKnown = function(el) {
      var w = el.dataset.w;
      var m = el.dataset.m;
      var state = getWordState(w, m);
      var next = state.status === 'known' ? 'unknown' : 'known';
      updateWordState(w, m, { status: next });
      var card = el.closest(".word-card");
      if (next === 'known') {
        card.classList.add("known");
        el.classList.add("checked");
        el.textContent = "✓";
      } else {
        card.classList.remove("known");
        el.classList.remove("checked");
        el.textContent = "";
      }
    };

    window.toggleFav = function(el) {
      var w = el.dataset.w;
      var m = el.dataset.m;
      var state = getWordState(w, m);
      var nextFav = !state.fav;
      updateWordState(w, m, { fav: nextFav });
      el.classList.toggle("active", nextFav);
    };

    // Flashcard Core
    function initFC() {
      var range = ranges[fri];
      fcWords = rawWords.slice(range.s, range.e);
      fcIndex = 0;
      fcFlipped = false;
      showFC();
    }
    function showFC() {
      if (fcWords.length === 0) {
        document.getElementById("fcword").textContent = "단어가 없습니다";
        document.getElementById("fcmean").textContent = "";
        document.getElementById("fcprog").textContent = "0 / 0";
        return;
      }
      var w = fcWords[fcIndex];
      var state = getWordState(w.word, w.meaning);
      
      document.getElementById("fcword").textContent = w.word;
      document.getElementById("fcmean").textContent = w.meaning;
      document.getElementById("fcmean").style.display = fcFlipped ? "block" : "none";
      document.getElementById("fcprog").textContent = (fcIndex + 1) + " / " + fcWords.length;
      
      var favBtn = document.getElementById("fcfav");
      favBtn.classList.toggle("active", state.fav);
      favBtn.setAttribute("data-w", w.word);
      favBtn.setAttribute("data-m", w.meaning);
    }
    function fcFlip() {
      if (fcWords.length === 0 || fcFlipped) return;
      fcFlipped = true;
      document.getElementById("fcmean").style.display = "block";
      speakFc();
    }
    window.fcNext = function() {
      if (fcWords.length === 0) return;
      fcIndex = (fcIndex + 1) % fcWords.length;
      fcFlipped = false;
      showFC();
    };
    window.fcPrev = function() {
      if (fcWords.length === 0) return;
      fcIndex = (fcIndex - 1 + fcWords.length) % fcWords.length;
      fcFlipped = false;
      showFC();
    };

    // Flashcard Touch Support
    (function(){
      var card = document.getElementById("fccard");
      card.addEventListener("click", function(e) {
        if (e.target.id === "fcfav") return;
        fcFlip();
      });
      card.addEventListener("touchstart", function(e) {
        fcTX = e.touches[0].clientX;
      }, {passive:true});
      card.addEventListener("touchend", function(e) {
        var dx = e.changedTouches[0].clientX - fcTX;
        if (Math.abs(dx) > 50) { if (dx < 0) fcNext(); else fcPrev(); }
      }, {passive:true});

      document.getElementById("fcfav").addEventListener("click", function(e) {
        var w = this.dataset.w;
        var m = this.dataset.m;
        var state = getWordState(w, m);
        var nextFav = !state.fav;
        updateWordState(w, m, { fav: nextFav });
        this.classList.toggle("active", nextFav);
      });
    })();

    // Helper Shuffle
    function shuffle(arr) {
      var a = arr.slice();
      for (var i = a.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var temp = a[i]; a[i] = a[j]; a[j] = temp;
      }
      return a;
    }

    // Quiz Tab
    var qWords = [];
    var qIndex = 0;
    var qScore = 0;
    var qLocked = false;

    function initQuiz() {
      qWords = shuffle(rawWords).slice(0, 10);
      if (qWords.length === 0) return;
      qIndex = 0;
      qScore = 0;
      qLocked = false;
      renderQuizQuestion();
    }

    function renderQuizQuestion() {
      var container = document.getElementById("q-area");
      if (qIndex >= qWords.length) {
        renderQuizResult();
        return;
      }
      var w = qWords[qIndex];
      var progress = Math.round((qIndex / qWords.length) * 100);

      // Distractors
      var pool = rawWords.filter(function(x) { return x.meaning !== w.meaning; });
      var shfPool = shuffle(pool).slice(0, 3);
      var choices = shfPool.map(function(x) { return x.meaning; });
      choices.push(w.meaning);
      choices = shuffle(choices);

      var html = '<div class="quiz-container">' +
        '<div class="q-progress">' +
          '<span>퀴즈 모드</span>' +
          '<span>' + (qIndex + 1) + ' / ' + qWords.length + '</span>' +
        '</div>' +
        '<div class="p-bar-outer"><div class="p-bar-inner" style="width:' + progress + '%"></div></div>' +
        '<div class="q-eng en">' + esc(w.word) + '</div>' +
        '<div class="q-options">';

      choices.forEach(function(c) {
        var isCorrect = c === w.meaning ? "1" : "0";
        html += '<button class="q-opt-btn" data-cor="' + isCorrect + '" onclick="qAns(this)">' + esc(c) + '</button>';
      });

      html += '</div></div>';
      container.innerHTML = html;
      qLocked = false;
    }

    window.qAns = function(btn) {
      if (qLocked) return;
      qLocked = true;
      var isCor = btn.dataset.cor === "1";
      if (isCor) {
        btn.classList.add("correct");
        qScore++;
        speak(qWords[qIndex].word);
      } else {
        btn.classList.add("wrong");
        // Show correct
        var btns = document.querySelectorAll(".q-opt-btn");
        for (var i = 0; i < btns.length; i++) {
          if (btns[i].dataset.cor === "1") {
            btns[i].classList.add("correct");
          }
        }
      }
      setTimeout(function() {
        qIndex++;
        renderQuizQuestion();
      }, 1000);
    };

    function renderQuizResult() {
      var container = document.getElementById("q-area");
      var pct = Math.round((qScore / qWords.length) * 100);
      var emo = pct === 100 ? "🏆" : pct >= 80 ? "🎉" : pct >= 60 ? "👍" : "💪";
      
      container.innerHTML = '<div class="quiz-container">' +
        '<div class="res-emoji">' + emo + '</div>' +
        '<div class="res-title">퀴즈 완료!</div>' +
        '<div class="res-score">' + qScore + ' / ' + qWords.length + ' (' + pct + '점)</div>' +
        '<div class="res-actions">' +
          '<button class="btn-retry" onclick="initQuiz()">↩ 다시 풀기</button>' +
        '</div>' +
      '</div>';
    }

    // Test Tab
    var tRangeIndex = 0;
    var tName = "";
    var tWords = [];
    var tIndex = 0;
    var tScore = 0;
    var tUserAnswers = [];

    function renderSetup() {
      var container = document.getElementById("t-area");
      var storedName = localStorage.getItem("cutop_name") || "";
      
      var html = '<div class="test-container">' +
        '<div class="setup-title">📝 실력 테스트 설정</div>' +
        '<div class="input-grp">' +
          '<label>이름 입력</label>' +
          '<input type="text" class="text-input" id="t-name" value="' + esc(storedName) + '" placeholder="이름을 입력하세요">' +
        '</div>' +
        '<div class="input-grp">' +
          '<label>출제 범위</label>' +
          '<div class="range-bar" id="trbar"></div>' +
        '</div>' +
        '<button class="btn-start" onclick="startTest()">테스트 시작 ▶</button>' +
      '</div>';

      container.innerHTML = html;
      renderRangeBar("trbar", tRangeIndex, "setTR");
    }

    window.setTR = function(idx) {
      tRangeIndex = idx;
      renderRangeBar("trbar", tRangeIndex, "setTR");
    };

    window.startTest = function() {
      var nameVal = document.getElementById("t-name").value.trim();
      if (!nameVal) {
        alert("이름을 입력해주세요.");
        return;
      }
      tName = nameVal;
      localStorage.setItem("cutop_name", tName);

      var range = ranges[tRangeIndex];
      var subset = rawWords.slice(range.s, range.e);
      tWords = shuffle(subset).slice(0, 50);

      tIndex = 0;
      tScore = 0;
      tUserAnswers = [];

      renderTestQuestion();
    };

    function renderTestQuestion() {
      var container = document.getElementById("t-area");
      if (tIndex >= tWords.length) {
        renderTestResult();
        return;
      }
      var w = tWords[tIndex];
      var progress = Math.round((tIndex / tWords.length) * 100);

      container.innerHTML = '<div class="test-container">' +
        '<div class="q-progress">' +
          '<span>테스트 진행 중</span>' +
          '<span>✅ 맞춤수: ' + tScore + '</span>' +
          '<span>' + (tIndex + 1) + ' / ' + tWords.length + '</span>' +
        '</div>' +
        '<div class="p-bar-outer"><div class="p-bar-inner" style="width:' + progress + '%"></div></div>' +
        '<div class="q-eng en">' + esc(w.word) + '</div>' +
        '<input type="text" class="ans-input" id="t-ans" placeholder="뜻을 한글로 입력하세요" autocomplete="off" onkeypress="handleTestKey(event)">' +
        '<button class="btn-next" onclick="submitTestAns()">다음 ↵</button>' +
      '</div>';

      document.getElementById("t-ans").focus();
      speak(w.word);
    }

    window.handleTestKey = function(e) {
      if (e.key === 'Enter') {
        submitTestAns();
      }
    };

    function isSim(input, correct) {
      var norm = function(s) {
        return s.replace(/\s/g, "").replace(/[~\-·,]/g, "").toLowerCase();
      };
      var a = norm(input), c = norm(correct);
      if (a === c) return true;
      if (a.length >= 2 && c.indexOf(a) >= 0) return true;
      var core = c.replace(/하다|되다|시키다|이다/g, "").trim();
      if (core.length >= 2 && a.indexOf(core) >= 0) return true;
      return false;
    }

    window.submitTestAns = function() {
      var input = document.getElementById("t-ans").value.trim();
      var w = tWords[tIndex];
      var ok = isSim(input, w.meaning);

      if (ok) tScore++;
      tUserAnswers.push({ word: w.word, meaning: w.meaning, input: input, ok: ok });

      tIndex++;
      renderTestQuestion();
    };

    function renderTestResult() {
      var container = document.getElementById("t-area");
      var pct = Math.round((tScore / tWords.length) * 100);
      var emo = pct === 100 ? "🏆" : pct >= 80 ? "🎉" : pct >= 60 ? "👍" : "💪";
      
      var wrongs = tUserAnswers.filter(function(x) { return !x.ok; });

      var html = '<div class="test-container">' +
        '<div class="res-emoji">' + emo + '</div>' +
        '<div class="res-title">테스트 종료!</div>' +
        '<div class="res-score">' + tScore + ' / ' + tWords.length + ' (' + pct + '점)</div>' +
        '<div class="res-actions">' +
          '<button class="btn-kakao" onclick="copyResultText()">📋 카톡으로 결과 복사</button>' +
          '<button class="btn-retry" onclick="renderSetup()">↩ 다시 테스트</button>' +
        '</div>';

      if (wrongs.length > 0) {
        html += '<div class="wrong-list-title">❌ 오답 다시보기 (' + wrongs.length + '개)</div>';
        wrongs.forEach(function(w) {
          html += '<div class="wrong-item">' +
            '<div class="wrong-w en">' + esc(w.word) + '</div>' +
            '<div class="wrong-details">입력: <span style="color:var(--danger)">' + esc(w.input || '(없음)') + '</span> / 정답: <span style="color:var(--success)">' + esc(w.meaning) + '</span></div>' +
          '</div>';
        });
      }

      html += '</div>';
      container.innerHTML = html;
    }

    window.copyResultText = function() {
      var pct = Math.round((tScore / tWords.length) * 100);
      var d = new Date();
      var dateStr = d.getFullYear() + "-" + (d.getMonth() + 1) + "-" + d.getDate();
      
      var wrongs = tUserAnswers.filter(function(x) { return !x.ok; });
      var rights = tUserAnswers.filter(function(x) { return x.ok; });

      var txt = "[씨유에탑 고2 자이11회 어휘] 테스트 결과\n" +
        "날짜: " + dateStr + "\n" +
        "이름: " + tName + "\n" +
        "점수: " + tScore + "/" + tWords.length + " (" + pct + "점)\n" +
        "─────────────────\n";

      if (wrongs.length > 0) {
        txt += "❌ 틀린 단어 (" + wrongs.length + "개)\n";
        wrongs.forEach(function(w) {
          txt += "  " + w.word + " → 입력:" + (w.input || "(없음)") + " / 정답:" + w.meaning + "\n";
        });
      } else {
        txt += "❌ 틀린 단어 (0개) - 퍼펙트! 🎉\n";
      }

      txt += "─────────────────\n";
      txt += "✅ 맞은 단어: ";
      if (rights.length > 0) {
        txt += rights.map(function(x) { return x.word; }).join(", ");
      } else {
        txt += "(없음)";
      }

      var dummy = document.createElement("textarea");
      document.body.appendChild(dummy);
      dummy.value = txt;
      dummy.select();
      document.execCommand("copy");
      document.body.removeChild(dummy);

      alert("테스트 결과가 클립보드에 복사되었습니다! 카톡에 붙여넣어 공유하세요.");
    };

    // App Initialization
    window.onload = function() {
      renderRangeBar("lrbar", lri, "setLR");
      renderList();
    };
  </script>
</body>
</html>
