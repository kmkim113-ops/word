<title>씨유에탑 영어단어장 — 고2-6</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --primary:#2563EB;--primary-dark:#1D4ED8;--primary-light:#EFF6FF;
  --success:#10B981;--danger:#EF4444;--warn:#F59E0B;
  --gray:#6B7280;--border:#E5E7EB;--bg:#F9FAFB;
}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:#111;max-width:420px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;}
/* HEADER */
.hdr{background:var(--primary);color:#fff;padding:14px 16px 10px;text-align:center;flex-shrink:0;}
.hdr-title{font-family:'Nunito',sans-serif;font-size:18px;font-weight:800;letter-spacing:1px;}
.hdr-sub{font-size:12px;opacity:.85;margin-top:2px;}
/* TAB BAR */
.tbar{display:flex;background:#fff;border-bottom:1.5px solid var(--border);flex-shrink:0;}
.tbtn{flex:1;padding:10px 4px 8px;font-size:11px;font-weight:700;color:var(--gray);border:none;background:none;cursor:pointer;border-bottom:2.5px solid transparent;font-family:'Noto Sans KR',sans-serif;}
.tbtn.on{color:var(--primary);border-bottom-color:var(--primary);}
/* PANE */
.pane{display:none;flex:1;overflow-y:auto;padding:12px;flex-direction:column;}
.pane.on{display:flex;}
/* RANGE BAR */
.rbar{display:flex;gap:6px;overflow-x:auto;padding:0 0 8px 0;margin-bottom:8px;-webkit-overflow-scrolling:touch;scrollbar-width:none;flex-shrink:0;}
.rbar::-webkit-scrollbar{display:none;}
.rbtn{flex-shrink:0;padding:6px 12px;border-radius:20px;border:1.5px solid var(--border);background:#fff;font-size:12px;font-weight:600;color:var(--gray);cursor:pointer;white-space:nowrap;font-family:'Nunito',sans-serif;}
.rbtn.on{background:var(--primary);border-color:var(--primary);color:#fff;}
/* SEARCH & FILTER */
.srow{display:flex;gap:6px;margin-bottom:8px;flex-shrink:0;}
.sinp{flex:1;padding:8px 10px;border-radius:10px;border:1.5px solid var(--border);font-size:13px;font-family:'Noto Sans KR',sans-serif;outline:none;}
.sinp:focus{border-color:var(--primary);}
.frow{display:flex;gap:6px;margin-bottom:10px;flex-shrink:0;}
.fbtn{flex:1;padding:6px 4px;border-radius:8px;border:1.5px solid var(--border);background:#fff;font-size:11px;font-weight:600;color:var(--gray);cursor:pointer;font-family:'Noto Sans KR',sans-serif;}
.fbtn.on{background:var(--primary-light);border-color:var(--primary);color:var(--primary);}
/* WORD CARD */
#wlist{display:flex;flex-direction:column;gap:6px;}
.wcard{display:flex;align-items:center;background:#fff;border-radius:12px;border:1.5px solid var(--border);padding:10px 8px;gap:6px;transition:opacity .2s;}
.wcard.known{opacity:.35;}
.chk{width:30px;height:30px;border-radius:50%;border:2px solid var(--border);background:#fff;font-size:14px;cursor:pointer;flex-shrink:0;color:var(--success);font-weight:700;}
.chk.on{background:var(--success);border-color:var(--success);color:#fff;}
.wbody{flex:1;min-width:0;}
.wword{font-family:'Nunito',sans-serif;font-size:15px;font-weight:700;color:#111;}
.wmean{font-size:12px;color:var(--gray);margin-top:2px;}
.wacts{display:flex;flex-direction:column;gap:4px;flex-shrink:0;}
.ibtn{background:none;border:none;font-size:16px;cursor:pointer;padding:2px;}
.favbtn.on{color:#F59E0B;}
/* FLASH CARD */
.fctop{flex-shrink:0;}
#fccard{background:#fff;border-radius:18px;border:1.5px solid var(--border);min-height:200px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;cursor:pointer;user-select:none;position:relative;margin-bottom:12px;flex-shrink:0;}
#fcctr{font-family:'Nunito',sans-serif;font-size:12px;color:var(--gray);position:absolute;top:12px;left:16px;}
#fcfavbtn{position:absolute;top:8px;right:8px;background:none;border:none;font-size:20px;cursor:pointer;color:var(--gray);}
#fcfavbtn.on{color:#F59E0B;}
#fcword{font-family:'Nunito',sans-serif;font-size:26px;font-weight:800;text-align:center;margin-bottom:8px;}
#fcmean{font-size:16px;color:var(--gray);text-align:center;}
#fctap{font-size:12px;color:var(--gray);margin-top:8px;}
.fcnav{display:flex;gap:8px;flex-shrink:0;}
.fcbtn{flex:1;padding:12px;border-radius:12px;border:none;background:var(--primary);color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}
.fcbtn.sec{background:var(--border);color:#333;}
/* QUIZ */
#qbox{display:flex;flex-direction:column;gap:8px;}
.qword{font-family:'Nunito',sans-serif;font-size:26px;font-weight:800;text-align:center;margin:16px 0;}
.qopt{padding:12px 14px;border-radius:12px;border:1.5px solid var(--border);background:#fff;font-size:14px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;text-align:left;}
.qopt.cor{background:#ECFDF5;border-color:var(--success);color:var(--success);}
.qopt.wrng{background:#FEF2F2;border-color:var(--danger);color:var(--danger);}
.qprog{font-size:12px;color:var(--gray);text-align:right;margin-bottom:8px;font-family:'Nunito',sans-serif;}
.qresult{text-align:center;padding:20px;}
.qscore{font-size:32px;font-weight:800;color:var(--primary);font-family:'Nunito',sans-serif;}
/* TEST */
.tinp-row{display:flex;gap:8px;flex-shrink:0;}
.tinp{flex:1;padding:10px;border-radius:10px;border:1.5px solid var(--border);font-size:14px;font-family:'Noto Sans KR',sans-serif;outline:none;}
.tinp:focus{border-color:var(--primary);}
.tprog{height:6px;background:var(--border);border-radius:3px;margin-bottom:8px;flex-shrink:0;}
.tprog-bar{height:6px;background:var(--primary);border-radius:3px;transition:width .3s;}
.tctr{font-size:12px;color:var(--gray);font-family:'Nunito',sans-serif;margin-bottom:8px;flex-shrink:0;}
.tword{font-family:'Nunito',sans-serif;font-size:28px;font-weight:800;text-align:center;margin:16px 0;flex-shrink:0;}
.tbtn2{padding:10px;border-radius:10px;border:none;background:var(--primary);color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}
.tbtn2.sec{background:var(--border);color:#333;}
.tbtn2.grn{background:#25D366;}
.tresult{display:flex;flex-direction:column;gap:8px;}
.twrong-item{padding:8px 10px;background:#FEF2F2;border-radius:8px;border:1px solid var(--danger);font-size:12px;}
.setup-box{display:flex;flex-direction:column;gap:10px;}
.setup-label{font-size:13px;font-weight:600;color:#333;margin-bottom:2px;}
.setup-inp{padding:10px;border-radius:10px;border:1.5px solid var(--border);font-size:14px;font-family:'Noto Sans KR',sans-serif;outline:none;width:100%;}
.setup-inp:focus{border-color:var(--primary);}
</style>

<div class="hdr">
  <div class="hdr-title">씨유에탑 ✦ 영어단어장</div>
  <div class="hdr-sub">고2-6 · 총 999단어</div>
</div>
<div class="tbar">
  <button class="tbtn on" id="tb-w" onclick="showTab('w')">📋 단어목록</button>
  <button class="tbtn" id="tb-fc" onclick="showTab('fc')">🃏 플래시카드</button>
  <button class="tbtn" id="tb-q" onclick="showTab('q')">❓ 퀴즈</button>
  <button class="tbtn" id="tb-t" onclick="showTab('t')">📝 테스트</button>
</div>

<!-- TAB 1: 단어목록 -->
<div class="pane on" id="pane-w">
  <div class="rbar" id="wrbar"></div>
  <div class="srow">
    <input class="sinp" id="wsearch" type="text" placeholder="단어 또는 뜻 검색..." oninput="renderList()">
  </div>
  <div class="frow">
    <button class="fbtn on" id="fb-all" onclick="setWF('all',this)">전체</button>
    <button class="fbtn" id="fb-unk" onclick="setWF('unk',this)">모름</button>
    <button class="fbtn" id="fb-fav" onclick="setWF('fav',this)">⭐즐겨찾기</button>
  </div>
  <div id="wlist"></div>
</div>

<!-- TAB 2: 플래시카드 -->
<div class="pane" id="pane-fc" style="gap:8px;">
  <div class="rbar" id="fcrbar"></div>
  <div id="fccard">
    <span id="fcctr">1/1</span>
    <button id="fcfavbtn">☆</button>
    <div id="fcword">단어</div>
    <div id="fcmean" style="display:none;">뜻</div>
    <div id="fctap">탭하여 뜻 보기</div>
  </div>
  <div class="fcnav">
    <button class="fcbtn sec" onclick="fcPrev()">◀ 이전</button>
    <button class="fcbtn" style="background:var(--warn);" onclick="speakFc()">🔊</button>
    <button class="fcbtn" onclick="fcNext()">다음 ▶</button>
  </div>
</div>

<!-- TAB 3: 퀴즈 -->
<div class="pane" id="pane-q">
  <div id="qbox"></div>
</div>

<!-- TAB 4: 테스트 -->
<div class="pane" id="pane-t">
  <div id="tinner"></div>
</div>

  {word:'primate', meaning:'영장류'},
  {word:'initially', meaning:'처음에는'},
  {word:'hunger-blocking', meaning:'배고픔을 막는'},
  {word:'prey', meaning:'먹이'},
  {word:'distribute', meaning:'퍼뜨리다, 분배하다'},
  {word:'disperse', meaning:'퍼뜨리다'},
];

var STORE_KEY = 'cutop_go2_6';
var store = {};
try { store = JSON.parse(localStorage.getItem(STORE_KEY) || '{}'); } catch(e){}
function saveStore(){ try{ localStorage.setItem(STORE_KEY, JSON.stringify(store)); }catch(e){} }
function getS(w){ var k = w.word+'|'+w.meaning; return store[k] || {status:'',fav:false}; }
function setS(w, obj){ var k = w.word+'|'+w.meaning; store[k] = obj; saveStore(); }

function esc(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function speak(t){
  if(!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  var u = new SpeechSynthesisUtterance(t);
  u.lang='en-US'; u.rate=0.85;
  window.speechSynthesis.speak(u);
}
function speakFc(){ speak(document.getElementById('fcword').textContent); }

function buildRanges(ws){
  var r=[{label:'전체',s:0,e:ws.length}];
  for(var i=0;i<ws.length;i+=50){
    var e=Math.min(i+50,ws.length);
    r.push({label:(i+1)+'~'+e,s:i,e:e});
  }
  return r;
}
var RANGES = buildRanges(rawWords);
function renderRangeBar(barId,ri,fn){
  var bar=document.getElementById(barId);
  var h=[];
  for(var i=0;i<RANGES.length;i++){
    var cls='rbtn'+(i===ri?' on':'');
    h.push('<button class="'+cls+'" data-i="'+i+'" onclick="'+fn+'(this)">'+RANGES[i].label+'</button>');
  }
  bar.innerHTML=h.join('');
}
function wordsForRange(ri){ var r=RANGES[ri]; return rawWords.slice(r.s,r.e); }

/* ===== TAB 1 ===== */
var wri=0, wfilter='all';
function setWR(btn){ wri=parseInt(btn.dataset.i); renderList(); }
function setWF(f,btn){
  wfilter=f;
  var bs=document.querySelectorAll('.fbtn');
  for(var i=0;i<bs.length;i++) bs[i].classList.remove('on');
  btn.classList.add('on');
  renderList();
}
function renderList(){
  renderRangeBar('wrbar',wri,'setWR');
  var pool=wordsForRange(wri);
  var q=(document.getElementById('wsearch').value||'').toLowerCase();
  var list=[];
  for(var i=0;i<pool.length;i++){
    var w=pool[i], s=getS(w);
    if(wfilter==='unk' && s.status==='known') continue;
    if(wfilter==='fav' && !s.fav) continue;
    if(q && w.word.toLowerCase().indexOf(q)<0 && w.meaning.indexOf(q)<0) continue;
    list.push(w);
  }
  var h=[];
  for(var i=0;i<list.length;i++){
    var w=list[i], s=getS(w);
    var known=s.status==='known', fav=s.fav;
    h.push('<div class="wcard'+(known?' known':'')+'" >');
    h.push('<button class="chk'+(known?' on':'')+'" data-wi="'+i+'" onclick="toggleKnown(this)">'+(known?'✔':'')+'</button>');
    h.push('<div class="wbody">');
    h.push('<div class="wword">'+esc(w.word)+'</div>');
    h.push('<div class="wmean">'+esc(w.meaning)+'</div>');
    h.push('</div>');
    h.push('<div class="wacts">');
    h.push('<button class="ibtn" data-w="'+esc(w.word)+'" onclick="speak(this.dataset.w)">🔊</button>');
    h.push('<button class="ibtn favbtn'+(fav?' on':'')+'" data-wi="'+i+'" onclick="toggleFav(this)">'+(fav?'★':'☆')+'</button>');
    h.push('</div>');
    h.push('</div>');
  }
  document.getElementById('wlist').innerHTML=h.join('');
  window._wlist=list;
}
function toggleKnown(btn){
  var i=parseInt(btn.dataset.wi), w=window._wlist[i];
  var s=getS(w);
  s.status=(s.status==='known'?'':' known');
  if(s.status===' known') s.status='known';
  else s.status='';
  setS(w,s); renderList();
}
function toggleFav(btn){
  var i=parseInt(btn.dataset.wi), w=window._wlist[i];
  var s=getS(w); s.fav=!s.fav; setS(w,s); renderList();
}

/* ===== TAB 2 FLASHCARD ===== */
var fri=0, fcPool=[], fcIdx=0, fcFlipped=false, fcTX=0, fcEvReg=false;
function setFCR(btn){ fri=parseInt(btn.dataset.i); fcInit(); }
function fcRegisterEvents(){
  if(fcEvReg) return;
  fcEvReg=true;
  var card=document.getElementById('fccard');
  card.addEventListener('click',function(e){
    if(e.target.id==='fcfavbtn') return;
    fcFlip();
  });
  card.addEventListener('touchstart',function(e){ fcTX=e.touches[0].clientX; },{passive:true});
  card.addEventListener('touchend',function(e){
    var dx=e.changedTouches[0].clientX-fcTX;
    if(Math.abs(dx)>50){ if(dx<0) fcNext(); else fcPrev(); }
  },{passive:true});
  document.getElementById('fcfavbtn').addEventListener('click',function(){
    if(!fcPool.length) return;
    var w=fcPool[fcIdx], s=getS(w); s.fav=!s.fav; setS(w,s);
    this.textContent=s.fav?'★':'☆';
    this.className='on'+(s.fav?' on':'');
    var el=document.getElementById('fcfavbtn');
    if(s.fav){ el.textContent='★'; el.className='on'; }
    else { el.textContent='☆'; el.className=''; }
  });
}
function fcInit(){
  renderRangeBar('fcrbar',fri,'setFCR');
  fcPool=wordsForRange(fri);
  if(fcIdx>=fcPool.length) fcIdx=0;
  fcRegisterEvents();
  fcShow();
}
function fcShow(){
  if(!fcPool.length) return;
  fcFlipped=false;
  var w=fcPool[fcIdx];
  document.getElementById('fcword').textContent=w.word;
  document.getElementById('fcmean').textContent=w.meaning;
  document.getElementById('fcmean').style.display='none';
  document.getElementById('fctap').style.display='block';
  document.getElementById('fcctr').textContent=(fcIdx+1)+'/'+fcPool.length;
  var s=getS(w);
  var fbtn=document.getElementById('fcfavbtn');
  fbtn.textContent=s.fav?'★':'☆';
  if(s.fav) fbtn.classList.add('on'); else fbtn.classList.remove('on');
}
function fcFlip(){
  if(fcFlipped) return;
  if(!fcPool.length) return;
  fcFlipped=true;
  document.getElementById('fcmean').style.display='block';
  document.getElementById('fctap').style.display='none';
  speak(fcPool[fcIdx].word);
}
function fcNext(){ if(!fcPool.length) return; fcIdx=(fcIdx+1)%fcPool.length; fcShow(); }
function fcPrev(){ if(!fcPool.length) return; fcIdx=(fcIdx-1+fcPool.length)%fcPool.length; fcShow(); }

/* ===== TAB 3 QUIZ ===== */
var qWords=[], qIdx=0, qScore=0, qLocked=false;
function qInit(){
  var pool=rawWords.slice();
  shuffle(pool);
  qWords=pool.slice(0,10);
  qIdx=0; qScore=0;
  qRender();
}
function qRender(){
  if(qIdx>=qWords.length){ qResult(); return; }
  var w=qWords[qIdx];
  var opts=[w];
  var pool2=rawWords.filter(function(x){ return x.word!==w.word; });
  shuffle(pool2);
  for(var i=0;i<3;i++) opts.push(pool2[i]);
  shuffle(opts);
  qLocked=false;
  var h=[];
  h.push('<div class="qprog">'+( qIdx+1)+'/'+qWords.length+' &nbsp; ✅ '+qScore+'</div>');
  h.push('<div class="qword">'+esc(w.word)+'</div>');
  for(var i=0;i<opts.length;i++){
    var isCor=(opts[i].word===w.word)?'1':'0';
    h.push('<button class="qopt" data-cor="'+isCor+'" onclick="qAns(this)">'+esc(opts[i].meaning)+'</button>');
  }
  document.getElementById('qbox').innerHTML=h.join('');
}
function qAns(btn){
  if(qLocked) return;
  qLocked=true;
  var cor=btn.dataset.cor==='1';
  if(cor){ btn.classList.add('cor'); qScore++; speak(qWords[qIdx].word); }
  else{
    btn.classList.add('wrng');
    var all=document.querySelectorAll('.qopt');
    for(var i=0;i<all.length;i++){ if(all[i].dataset.cor==='1') all[i].classList.add('cor'); }
  }
  setTimeout(function(){ qIdx++; qRender(); },1000);
}
function qResult(){
  var pct=Math.round(qScore/qWords.length*100);
  var em=pct===100?'🏆':pct>=80?'🎉':pct>=60?'👍':'💪';
  var h=[];
  h.push('<div class="qresult">');
  h.push('<div style="font-size:48px;">'+em+'</div>');
  h.push('<div class="qscore">'+qScore+' / '+qWords.length+'</div>');
  h.push('<div style="font-size:20px;font-weight:700;color:var(--gray);">'+pct+'점</div>');
  h.push('<button style="margin-top:16px;padding:12px 24px;border-radius:12px;border:none;background:var(--primary);color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:\'Noto Sans KR\',sans-serif;" onclick="qInit()">다시 풀기</button>');
  h.push('</div>');
  document.getElementById('qbox').innerHTML=h.join('');
}

/* ===== TAB 4 TEST ===== */
var tri=0, tName='', tCount=20, tPool=[], tIdx=0, tRight=0, tWrong=[];
function setTR(btn){ tri=parseInt(btn.dataset.i); }
function tSetup(){
  var h=[];
  h.push('<div class="setup-box">');
  h.push('<div>');
  h.push('<div class="setup-label">이름</div>');
  h.push('<input class="setup-inp" id="tname" type="text" placeholder="이름을 입력하세요" value="'+esc(tName)+'">');
  h.push('</div>');
  h.push('<div>');
  h.push('<div class="setup-label">문제 수 (최대 50)</div>');
  h.push('<input class="setup-inp" id="tcount" type="number" min="1" max="50" value="'+tCount+'">');
  h.push('</div>');
  h.push('<div>');
  h.push('<div class="setup-label">범위</div>');
  h.push('<div class="rbar" id="trbar"></div>');
  h.push('</div>');
  h.push('<button class="tbtn2" onclick="tStart()">테스트 시작</button>');
  h.push('</div>');
  document.getElementById('tinner').innerHTML=h.join('');
  renderRangeBar('trbar',tri,'setTR');
}
function tStart(){
  var nm=(document.getElementById('tname').value||'').trim();
  if(!nm){ alert('이름을 입력하세요'); return; }
  tName=nm;
  var cnt=parseInt(document.getElementById('tcount').value)||20;
  if(cnt<1) cnt=1; if(cnt>50) cnt=50;
  tCount=cnt;
  var pool=wordsForRange(tri).slice();
  shuffle(pool);
  tPool=pool.slice(0,tCount);
  tIdx=0; tRight=0; tWrong=[];
  tRender();
}
function tRender(){
  if(tIdx>=tPool.length){ tResult(); return; }
  var w=tPool[tIdx];
  var pct=Math.round(tIdx/tPool.length*100);
  var h=[];
  h.push('<div class="tprog"><div class="tprog-bar" style="width:'+pct+'%"></div></div>');
  h.push('<div class="tctr">'+( tIdx+1)+'/'+tPool.length+' &nbsp; ✅ '+tRight+'</div>');
  h.push('<div class="tword">'+esc(w.word)+'</div>');
  h.push('<div class="tinp-row">');
  h.push('<input class="tinp" id="tans" type="text" placeholder="한글 뜻을 입력하세요" autocomplete="off">');
  h.push('<button class="tbtn2" onclick="tSubmit()">확인</button>');
  h.push('</div>');
  h.push('<div id="tfb" style="min-height:24px;margin-top:8px;font-size:13px;font-weight:600;"></div>');
  document.getElementById('tinner').innerHTML=h.join('');
  var inp=document.getElementById('tans');
  inp.addEventListener('keydown',function(e){ if(e.key==='Enter') tSubmit(); });
  inp.focus();
  speak(w.word);
}
function isSim(input,correct){
  var norm=function(s){ return s.replace(/\s/g,'').replace(/[~\-·,]/g,'').toLowerCase(); };
  var a=norm(input), c=norm(correct);
  if(a===c) return true;
  if(a.length>=2 && c.indexOf(a)>=0) return true;
  var core=c.replace(/하다|되다|시키다|이다/g,'').trim();
  if(core.length>=2 && a.indexOf(core)>=0) return true;
  return false;
}
function tSubmit(){
  var inp=document.getElementById('tans');
  if(!inp) return;
  var val=(inp.value||'').trim();
  var w=tPool[tIdx];
  var ok=isSim(val,w.meaning);
  if(ok){ tRight++; }
  else { tWrong.push({word:w.word,input:val,correct:w.meaning}); }
  var fb=document.getElementById('tfb');
  if(fb){
    if(ok){ fb.style.color='var(--success)'; fb.textContent='✅ 정답!'; }
    else { fb.style.color='var(--danger)'; fb.textContent='❌ 정답: '+w.meaning; }
  }
  inp.disabled=true;
  var btn=document.querySelector('#tinner .tbtn2');
  if(btn){ btn.textContent='다음'; btn.onclick=tNext; }
  setTimeout(tNext,1200);
}
function tNext(){
  tIdx++;
  tRender();
}
function tResult(){
  var pct=Math.round(tRight/tPool.length*100);
  var em=pct===100?'🏆':pct>=80?'🎉':pct>=60?'👍':'💪';
  var now=new Date();
  var dateStr=now.getFullYear()+'. '+(now.getMonth()+1)+'. '+now.getDate()+'.';
  var corrects=[];
  for(var i=0;i<tPool.length;i++){
    var found=false;
    for(var j=0;j<tWrong.length;j++){ if(tWrong[j].word===tPool[i].word){ found=true; break; } }
    if(!found) corrects.push(tPool[i].word);
  }
  var copyText='[씨유에탑 고2-6] 테스트 결과\n날짜: '+dateStr+'\n이름: '+tName+'\n점수: '+tRight+'/'+tPool.length+' ('+pct+'점)\n─────────────────\n';
  if(tWrong.length>0){
    copyText+='❌ 틀린 단어 ('+tWrong.length+'개)\n';
    for(var i=0;i<tWrong.length;i++){
      copyText+='  '+tWrong[i].word+' → 입력:'+tWrong[i].input+' / 정답:'+tWrong[i].correct+'\n';
    }
  }
  copyText+='─────────────────\n✅ 맞은 단어: '+corrects.join(', ');
  var h=[];
  h.push('<div class="tresult">');
  h.push('<div style="text-align:center;padding:16px 0;">');
  h.push('<div style="font-size:48px;">'+em+'</div>');
  h.push('<div style="font-size:28px;font-weight:800;color:var(--primary);font-family:\'Nunito\',sans-serif;">'+tRight+'/'+tPool.length+'</div>');
  h.push('<div style="font-size:18px;font-weight:700;color:var(--gray);">'+pct+'점</div>');
  h.push('</div>');
  if(tWrong.length>0){
    h.push('<div style="font-weight:700;margin-bottom:6px;">❌ 틀린 단어 ('+tWrong.length+'개)</div>');
    for(var i=0;i<tWrong.length;i++){
      h.push('<div class="twrong-item">');
      h.push('<strong>'+esc(tWrong[i].word)+'</strong> → 입력: '+esc(tWrong[i].input)+' / 정답: '+esc(tWrong[i].correct));
      h.push('</div>');
    }
  }
  h.push('<button class="tbtn2 grn" data-txt="'+esc(copyText)+'" onclick="tCopy(this)" style="margin-top:8px;">📋 카톡으로 결과 복사</button>');
  h.push('<button class="tbtn2 sec" onclick="tSetup()" style="margin-top:4px;">↩ 다시 테스트</button>');
  h.push('</div>');
  document.getElementById('tinner').innerHTML=h.join('');
}
function tCopy(btn){
  var txt=btn.dataset.txt.replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&quot;/g,'"');
  if(navigator.clipboard){ navigator.clipboard.writeText(txt).then(function(){ alert('복사되었습니다!'); }); }
  else{ var ta=document.createElement('textarea'); ta.value=txt; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); alert('복사되었습니다!'); }
}

/* ===== UTILS ===== */
function shuffle(a){ for(var i=a.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var t=a[i]; a[i]=a[j]; a[j]=t; } }

/* ===== TAB SWITCH ===== */
var TABS=['w','fc','q','t'];
function showTab(id){
  for(var i=0;i<TABS.length;i++){
    var t=TABS[i];
    document.getElementById('pane-'+t).classList.toggle('on',t===id);
    document.getElementById('tb-'+t).classList.toggle('on',t===id);
  }
  if(id==='w'){ renderRangeBar('wrbar',wri,'setWR'); renderList(); }
  if(id==='fc'){ fcInit(); }
  if(id==='q'){ qInit(); }
  if(id==='t'){ tSetup(); }
}

/* INIT */
renderList();
</script>
</body>
</html>
