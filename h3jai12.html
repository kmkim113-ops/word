<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>씨유에탑 영어단어장</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #2563EB;
      --primary-dark: #1D4ED8;
      --primary-light: #EFF6FF;
      --success: #10B981;
      --danger: #EF4444;
      --warn: #F59E0B;
      --gray: #6B7280;
      --border: #E5E7EB;
      --bg: #F9FAFB;
    }
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: #ECEFF1;
      color: #1F2937;
      display: flex;
      justify-content: center;
      min-height: 100vh;
    }
    .en {
      font-family: 'Nunito', sans-serif;
    }
    #app {
      width: 100%;
      max-width: 420px;
      background: #FFFFFF;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06);
    }
    /* Header */
    .header {
      background: #FFFFFF;
      padding: 16px;
      border-bottom: 1px solid var(--border);
      text-align: center;
    }
    .header-brand {
      font-size: 20px;
      font-weight: 700;
      color: var(--primary);
    }
    .header-sub {
      font-size: 13px;
      color: var(--gray);
      margin-top: 4px;
    }
    /* Nav Tabs */
    .nav-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      background: #FFFFFF;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .nav-tab {
      flex: 1;
      text-align: center;
      padding: 12px 0;
      font-size: 14px;
      font-weight: 500;
      color: var(--gray);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }
    .nav-tab.active {
      color: var(--primary);
      border-bottom-color: var(--primary);
      font-weight: 700;
    }
    /* Content Area */
    .content-area {
      flex: 1;
      background: var(--bg);
      padding: 16px;
      padding-bottom: 80px;
    }
    .tab-content {
      display: none;
    }
    .tab-content.active {
      display: block;
    }
    /* Range Selection Bar */
    .range-bar {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      padding-bottom: 12px;
      margin-bottom: 12px;
      -webkit-overflow-scrolling: touch;
    }
    .range-bar::-webkit-scrollbar {
      height: 4px;
    }
    .range-bar::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 2px;
    }
    .range-btn {
      flex-shrink: 0;
      padding: 6px 12px;
      background: #FFFFFF;
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 12px;
      color: #4B5563;
      cursor: pointer;
    }
    .range-btn.active {
      background: var(--primary);
      color: #FFFFFF;
      border-color: var(--primary);
    }
    /* Search & Filter Row */
    .search-row {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }
    .search-input {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      outline: none;
    }
    .filter-row {
      display: flex;
      gap: 6px;
      margin-bottom: 12px;
    }
    .filter-btn {
      flex: 1;
      padding: 8px 0;
      background: #FFFFFF;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      color: var(--gray);
      cursor: pointer;
      text-align: center;
    }
    .filter-btn.active {
      background: var(--primary-light);
      color: var(--primary);
      border-color: var(--primary);
    }
    /* Word Cards (List Tab) */
    .word-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .word-card {
      background: #FFFFFF;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: opacity 0.2s;
    }
    .word-card.known {
      opacity: 0.35;
    }
    .card-left {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 1;
      min-width: 0;
    }
    .chk-btn {
      width: 20px;
      height: 20px;
      border: 2px solid var(--border);
      border-radius: 4px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      color: #FFFFFF;
      user-select: none;
    }
    .chk-btn.checked {
      background: var(--success);
      border-color: var(--success);
    }
    .word-info {
      display: flex;
      flex-direction: column;
      min-width: 0;
    }
    .word-eng {
      font-size: 16px;
      font-weight: 700;
      color: #111827;
      word-break: break-all;
    }
    .word-kor {
      font-size: 14px;
      color: #4B5563;
      margin-top: 2px;
      word-break: break-all;
    }
    .card-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .ibtn {
      background: none;
      border: none;
      font-size: 18px;
      cursor: pointer;
      padding: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
    }
    .ibtn.fav {
      color: var(--warn);
    }
    .ibtn.fav.off {
      color: #D1D5DB;
    }
    /* Flashcard Tab */
    .fc-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      margin-top: 10px;
    }
    .fc-card {
      width: 100%;
      height: 240px;
      background: #FFFFFF;
      border: 1px solid var(--border);
      border-radius: 16px;
      perspective: 1000px;
      cursor: pointer;
      position: relative;
      user-select: none;
    }
    .fc-inner {
      width: 100%;
      height: 100%;
      position: relative;
      text-align: center;
      transition: transform 0.4s;
      transform-style: preserve-3d;
    }
    .fc-card.flipped .fc-inner {
      transform: rotateY(180deg);
    }
    .fc-face {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }
    .fc-front {
      background: #FFFFFF;
      color: #111827;
    }
    .fc-back {
      background: var(--primary-light);
      color: var(--primary-dark);
      transform: rotateY(180deg);
    }
    .fc-fav-btn {
      position: absolute;
      top: 14px;
      right: 14px;
      font-size: 22px;
      background: none;
      border: none;
      cursor: pointer;
      color: #D1D5DB;
      z-index: 5;
    }
    .fc-fav-btn.fav {
      color: var(--warn);
    }
    .fc-eng {
      font-size: 26px;
      font-weight: 700;
      word-break: break-all;
    }
    .fc-hint {
      font-size: 12px;
      color: var(--gray);
      margin-top: 8px;
    }
    .fc-kor {
      font-size: 22px;
      font-weight: 600;
      word-break: break-all;
    }
    .fc-counter {
      font-size: 14px;
      color: var(--gray);
      font-weight: 500;
    }
    .fc-nav {
      display: flex;
      width: 100%;
      gap: 12px;
    }
    .fc-nav-btn {
      flex: 1;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 700;
      color: #FFFFFF;
      background: var(--primary);
      cursor: pointer;
      text-align: center;
      box-shadow: 0 2px 4px rgba(37,99,235,0.2);
    }
    .fc-nav-btn.sec {
      background: #FFFFFF;
      color: var(--gray);
      border: 1px solid var(--border);
      box-shadow: none;
    }
    /* Quiz & Test styles */
    .quiz-box {
      background: #FFFFFF;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
    }
    .q-progress-bar {
      height: 6px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden;
      margin-bottom: 12px;
    }
    .q-progress-fill {
      height: 100%;
      background: var(--primary);
      width: 0%;
      transition: width 0.3s;
    }
    .q-meta {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      color: var(--gray);
      margin-bottom: 14px;
      font-weight: 500;
    }
    .q-stem {
      font-size: 22px;
      font-weight: 700;
      text-align: center;
      margin: 20px 0;
      color: #111827;
      word-break: break-all;
    }
    .q-options {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .q-opt {
      padding: 12px 16px;
      background: #F3F4F6;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      color: #374151;
      cursor: pointer;
      text-align: left;
      transition: all 0.2s;
    }
    .q-opt.correct {
      background: #D1FAE5;
      border-color: var(--success);
      color: #065F46;
    }
    .q-opt.wrong {
      background: #FEE2E2;
      border-color: var(--danger);
      color: #991B1B;
    }
    /* Setup Panel (Test) */
    .setup-box {
      background: #FFFFFF;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
    }
    .setup-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 16px;
      color: #111827;
    }
    .form-group {
      margin-bottom: 16px;
    }
    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      color: #4B5563;
      margin-bottom: 6px;
    }
    .text-input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 14px;
      outline: none;
    }
    .action-btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 700;
      color: #FFFFFF;
      background: var(--primary);
      cursor: pointer;
      text-align: center;
    }
    /* Write Test styles */
    .test-input-row {
      margin-top: 20px;
    }
    /* Result styles */
    .res-box {
      background: #FFFFFF;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      text-align: center;
    }
    .res-emoji {
      font-size: 48px;
      margin-bottom: 10px;
    }
    .res-score {
      font-size: 32px;
      font-weight: 700;
      color: #111827;
    }
    .res-pct {
      font-size: 16px;
      color: var(--gray);
      margin-top: 4px;
      margin-bottom: 20px;
    }
    .res-wrongs {
      text-align: left;
      border-top: 1px solid var(--border);
      padding-top: 16px;
      margin-bottom: 20px;
      max-height: 250px;
      overflow-y: auto;
    }
    .res-w-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--danger);
      margin-bottom: 10px;
    }
    .res-w-item {
      font-size: 13px;
      padding: 6px 0;
      border-bottom: 1px dashed var(--border);
      color: #4B5563;
    }
    .res-w-eng {
      font-weight: 700;
      color: #111827;
    }
    .res-btns {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .res-btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      color: #FFFFFF;
      cursor: pointer;
    }
    .res-btn.copy {
      background: #25D366;
    }
    .res-btn.retry {
      background: var(--primary);
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="header">
      <div class="header-brand en">씨유에탑 ✦ 영어단어장</div>
      <div class="header-sub">고3 자이 12회 · 총 534단어</div>
    </div>
    
    <div class="nav-tabs">
      <div id="tb-list" class="nav-tab active" onclick="switchTab('list')">단어목록</div>
      <div id="tb-flash" class="nav-tab" onclick="switchTab('flash')">플래시카드</div>
      <div id="tb-quiz" class="nav-tab" onclick="switchTab('quiz')">퀴즈모드</div>
      <div id="tb-test" class="nav-tab" onclick="switchTab('test')">📝 테스트</div>
    </div>
    
    <div class="content-area">
      <!-- Tab 1: List -->
      <div id="tab-list" class="tab-content active">
        <div id="lrbar" class="range-bar"></div>
        <div class="search-row">
          <input type="text" id="lsearch" class="search-input" placeholder="영어 또는 한글 뜻 검색..." oninput="renderList()">
        </div>
        <div class="filter-row">
          <div id="lf-all" class="filter-btn active" onclick="setListFilter('all')">전체</div>
          <div id="lf-unknown" class="filter-btn" onclick="setListFilter('unknown')">모름</div>
          <div id="lf-fav" class="filter-btn" onclick="setListFilter('fav')">⭐즐겨찾기</div>
        </div>
        <div id="wlist" class="word-list"></div>
      </div>
      
      <!-- Tab 2: Flashcard -->
      <div id="tab-flash" class="tab-content">
        <div id="fcrbar" class="range-bar"></div>
        <div class="fc-container">
          <div id="fccard" class="fc-card">
            <button id="fcfav" class="fc-fav-btn" onclick="toggleFcFav(event)">★</button>
            <div class="fc-inner">
              <div class="fc-face fc-front">
                <div id="fcword" class="fc-eng en"></div>
                <div class="fc-hint">카드를 터치하면 뜻이 보입니다</div>
              </div>
              <div class="fc-face fc-back">
                <div id="fcmean" class="fc-kor"></div>
              </div>
            </div>
          </div>
          <div id="fccount" class="fc-counter en">0 / 0</div>
          <div class="fc-nav">
            <button class="fc-nav-btn sec" onclick="fcPrev()">◀ 이전</button>
            <button class="fc-nav-btn" style="background:var(--warn);" onclick="speakFc()">🔊</button>
            <button class="fc-nav-btn" onclick="fcNext()">다음 ▶</button>
          </div>
        </div>
      </div>
      
      <!-- Tab 3: Quiz -->
      <div id="tab-quiz" class="tab-content">
        <div id="quiz-area"></div>
      </div>
      
      <!-- Tab 4: Test -->
      <div id="tab-test" class="tab-content">
        <div id="test-area"></div>
      </div>
    </div>
  </div>

  <script>

      var r = [{ label: "전체", s: 0, e: ws.length }];
      for (var i = 0; i < ws.length; i += 50) {
        r.push({ label: (i+1) + "-" + Math.min(i+50, ws.length), s: i, e: Math.min(i+50, ws.length) });
      }
      return r;
    }

    var ranges = buildRanges(rawWords);
    var lri = 0; // List range index
    var fri = 0; // Flashcard range index
    var lfilter = "all"; // 'all', 'unknown', 'fav'

    // Flashcard Index tracking
    var fcIndex = 0;
    var fcWords = [];
    var fcFlipped = false;
    var fcTX = 0;

    // Quiz tracking
    var qIndex = 0;
    var qWords = [];
    var qScore = 0;
    var qLocked = false;
    var qHistory = [];

    // Test tracking
    var tName = "";
    var tRangeIndex = 0;
    var tWords = [];
    var tIndex = 0;
    var tScore = 0;
    var tHistory = [];

    function init() {
      loadState();
      switchTab("list");
    }

    function switchTab(t) {
      ["list","flash","quiz","test"].forEach(function(n) {
        document.getElementById("tb-"+n).classList.toggle("active", n===t);
        document.getElementById("tab-"+n).classList.toggle("active", n===t);
      });
      if (t==="list")  { renderRangeBar("lrbar", lri, "setLR"); renderList(); }
      if (t==="flash") { renderRangeBar("fcrbar", fri, "setFR"); initFC(); }
      if (t==="quiz")  { initQuiz(); }
      if (t==="test")  { renderSetup(); }
    }

    function renderRangeBar(containerId, activeIdx, fnName) {
      var bar = document.getElementById(containerId);
      var html = "";
      for (var i = 0; i < ranges.length; i++) {
        var act = (i === activeIdx) ? " active" : "";
        html += '<button class="range-btn' + act + '" onclick="' + fnName + '(' + i + ')">' + ranges[i].label + '</button>';
      }
      bar.innerHTML = html;
    }

    function setLR(idx) {
      lri = idx;
      renderRangeBar("lrbar", lri, "setLR");
      renderList();
    }

    function setFR(idx) {
      fri = idx;
      renderRangeBar("fcrbar", fri, "setFR");
      initFC();
    }

    function setListFilter(f) {
      lfilter = f;
      ["all","unknown","fav"].forEach(function(n) {
        document.getElementById("lf-"+n).classList.toggle("active", n===f);
      });
      renderList();
    }

    function esc(s) {
      return String(s)
        .replace(/&/g,"&amp;")
        .replace(/</g,"&lt;")
        .replace(/>/g,"&gt;")
        .replace(/"/g,"&quot;");
    }

    function speak(t) {
      if (!("speechSynthesis" in window)) return;
      window.speechSynthesis.cancel();
      var u = new SpeechSynthesisUtterance(t);
      u.lang = "en-US";
      u.rate = 0.85;
      window.speechSynthesis.speak(u);
    }

    function speakFc() {
      speak(document.getElementById("fcword").textContent);
    }

    function renderList() {
      var query = document.getElementById("lsearch").value.toLowerCase().replace(/\s+/g,"");
      var range = ranges[lri];
      var listDiv = document.getElementById("wlist");
      var html = "";

      for (var i = range.s; i < range.e; i++) {
        var w = rawWords[i];
        var state = getState(w);

        // Filters
        if (lfilter === "unknown" && state.status === "known") continue;
        if (lfilter === "fav" && !state.fav) continue;

        // Search Match
        if (query) {
          var we = w.word.toLowerCase().replace(/\s+/g,"");
          var wm = w.meaning.toLowerCase().replace(/\s+/g,"");
          if (we.indexOf(query) === -1 && wm.indexOf(query) === -1) continue;
        }

        var isK = state.status === "known";
        var isF = state.fav;
        var cardClass = isK ? "word-card known" : "word-card";
        var chkClass = isK ? "chk-btn checked" : "chk-btn";
        var chkText = isK ? "✓" : "";
        var favClass = isF ? "ibtn fav" : "ibtn fav off";

        html += '<div class="' + cardClass + '">' +
                  '<div class="card-left">' +
                    '<div class="' + chkClass + '" onclick="toggleKnown(' + i + ')">' + chkText + '</div>' +
                    '<div class="word-info">' +
                      '<div class="word-eng en">' + esc(w.word) + '</div>' +
                      '<div class="word-kor">' + esc(w.meaning) + '</div>' +
                    '</div>' +
                  '</div>' +
                  '<div class="card-right">' +
                    '<button class="ibtn" data-w="' + esc(w.word) + '" onclick="speak(this.dataset.w)">🔊</button>' +
                    '<button class="' + favClass + '" onclick="toggleFav(' + i + ')">★</button>' +
                  '</div>' +
                '</div>';
      }
      listDiv.innerHTML = html || '<div style="text-align:center;color:var(--gray);padding:40px 0;">조건에 맞는 단어가 없습니다.</div>';
    }

    function toggleKnown(idx) {
      var w = rawWords[idx];
      var state = getState(w);
      var nextVal = (state.status === "known") ? "unknown" : "known";
      updateState(w, "status", nextVal);
      renderList();
    }

    // Toggle Favorite from List
    function toggleFav(idx) {
      var w = rawWords[idx];
      var state = getState(w);
      updateState(w, "fav", !state.fav);
      renderList();
    }

    // Flashcard Section
    function initFC() {
      var r = ranges[fri];
      fcWords = rawWords.slice(r.s, r.e);
      fcIndex = 0;
      fcFlipped = false;
      document.getElementById("fccard").classList.remove("flipped");
      showFC();
    }

    function showFC() {
      if (fcWords.length === 0) {
        document.getElementById("fcword").textContent = "단어 없음";
        document.getElementById("fcmean").textContent = "범위에 단어가 없습니다.";
        document.getElementById("fccount").textContent = "0 / 0";
        document.getElementById("fcfav").className = "fc-fav-btn";
        return;
      }
      var w = fcWords[fcIndex];
      var state = getState(w);
      document.getElementById("fcword").textContent = w.word;
      document.getElementById("fcmean").textContent = w.meaning;
      document.getElementById("fccount").textContent = (fcIndex + 1) + " / " + fcWords.length;

      var favBtn = document.getElementById("fcfav");
      if (state.fav) {
        favBtn.className = "fc-fav-btn fav";
      } else {
        favBtn.className = "fc-fav-btn";
      }
    }

    function fcFlip() {
      if (fcWords.length === 0) return;
      var card = document.getElementById("fccard");
      fcFlipped = !fcFlipped;
      card.classList.toggle("flipped", fcFlipped);
      if (fcFlipped) {
        speakFc();
      }
    }

    function fcPrev() {
      if (fcWords.length <= 1) return;
      fcIndex = (fcIndex - 1 + fcWords.length) % fcWords.length;
      fcFlipped = false;
      document.getElementById("fccard").classList.remove("flipped");
      showFC();
    }

    function fcNext() {
      if (fcWords.length <= 1) return;
      fcIndex = (fcIndex + 1) % fcWords.length;
      fcFlipped = false;
      document.getElementById("fccard").classList.remove("flipped");
      showFC();
    }

    function toggleFcFav(e) {
      if (e) e.stopPropagation();
      if (fcWords.length === 0) return;
      var w = fcWords[fcIndex];
      var state = getState(w);
      updateState(w, "fav", !state.fav);
      var favBtn = document.getElementById("fcfav");
      if (!state.fav) {
        favBtn.className = "fc-fav-btn fav";
      } else {
        favBtn.className = "fc-fav-btn";
      }
    }

    // Touch Swipe Support for FC
    (function(){
      var card = document.getElementById("fccard");
      card.addEventListener("click", function(e) {
        if (e.target.id === "fcfav") return;
        fcFlip();
      });
      card.addEventListener("touchstart", function(e) {
        fcTX = e.touches[0].clientX;
      }, {passive:true});
      card.addEventListener("touchend", function(e) {
        var dx = e.changedTouches[0].clientX - fcTX;
        if (Math.abs(dx) > 50) {
          if (dx < 0) fcNext(); else fcPrev();
        }
      }, {passive:true});
    })();

    // Shuffle helper
    function shuffle(arr) {
      var a = arr.slice();
      for (var i = a.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var temp = a[i];
        a[i] = a[j];
        a[j] = temp;
      }
      return a;
    }

    // Quiz Section
    function initQuiz() {
      qIndex = 0;
      qScore = 0;
      qLocked = false;
      qHistory = [];
      var pool = shuffle(rawWords);
      var size = Math.min(10, pool.length);
      qWords = pool.slice(0, size);
      showQuiz();
    }

    function showQuiz() {
      var area = document.getElementById("quiz-area");
      if (qWords.length === 0) {
        area.innerHTML = '<div class="quiz-box">문제 풀에 단어가 충분하지 않습니다.</div>';
        return;
      }
      if (qIndex >= qWords.length) {
        showQuizResult();
        return;
      }
      var w = qWords[qIndex];
      var pct = (qIndex / qWords.length) * 100;

      // Generate choices
      var choices = [w.meaning];
      var others = rawWords.filter(function(x) { return x.meaning !== w.meaning; });
      others = shuffle(others);
      for (var i = 0; i < 3; i++) {
        if (others[i]) {
          choices.push(others[i].meaning);
        }
      }
      choices = shuffle(choices);

      var optHtml = "";
      for (var j = 0; j < choices.length; j++) {
        var isCor = (choices[j] === w.meaning) ? "1" : "0";
        optHtml += '<button class="q-opt" data-cor="' + isCor + '" onclick="qAns(this)">' + esc(choices[j]) + '</button>';
      }

      area.innerHTML = 
        '<div class="quiz-box">' +
          '<div class="q-progress-bar"><div class="q-progress-fill" style="width:' + pct + '%"></div></div>' +
          '<div class="q-meta">' +
            '<span>질문 ' + (qIndex + 1) + ' / ' + qWords.length + '</span>' +
            '<span>정답: ' + qScore + '</span>' +
          '</div>' +
          '<div class="q-stem en">' + esc(w.word) + '</div>' +
          '<div id="qopts" class="q-options">' + optHtml + '</div>' +
        '</div>';
    }

    function qAns(btn) {
      if (qLocked) return;
      qLocked = true;
      var isCorrect = btn.getAttribute("data-cor") === "1";
      var currentWord = qWords[qIndex];

      if (isCorrect) {
        btn.classList.add("correct");
        qScore++;
        speak(currentWord.word);
      } else {
        btn.classList.add("wrong");
        // Highlight correct
        var opts = document.getElementById("qopts").getElementsByClassName("q-opt");
        for (var i = 0; i < opts.length; i++) {
          if (opts[i].getAttribute("data-cor") === "1") {
            opts[i].classList.add("correct");
          }
        }
      }

      setTimeout(function() {
        qIndex++;
        qLocked = false;
        showQuiz();
      }, 1000);
    }

    function showQuizResult() {
      var pct = Math.round((qScore / qWords.length) * 100);
      var emoji = "💪";
      if (pct === 100) emoji = "🏆";
      else if (pct >= 80) emoji = "🎉";
      else if (pct >= 60) emoji = "👍";

      var area = document.getElementById("quiz-area");
      area.innerHTML = 
        '<div class="res-box">' +
          '<div class="res-emoji">' + emoji + '</div>' +
          '<div class="res-score">' + qScore + ' / ' + qWords.length + '</div>' +
          '<div class="res-pct">' + pct + '점</div>' +
          '<div class="res-btns">' +
            '<button class="res-btn retry" onclick="initQuiz()">↩ 다시 풀기</button>' +
          '</div>' +
        '</div>';
    }

    // Setup Test Section
    function renderSetup() {
      var area = document.getElementById("test-area");
      var rangeHtml = "";
      for (var i = 0; i < ranges.length; i++) {
        var act = (i === tRangeIndex) ? " active" : "";
        rangeHtml += '<button class="range-btn' + act + '" onclick="setTR(' + i + ')">' + ranges[i].label + '</button>';
      }

      area.innerHTML = 
        '<div class="setup-box">' +
          '<div class="setup-title">📝 테스트 설정</div>' +
          '<div class="form-group">' +
            '<label class="form-label">이름 입력</label>' +
            '<input type="text" id="tname" class="text-input" placeholder="이름을 입력하세요" value="' + esc(tName) + '">' +
          '</div>' +
          '<div class="form-group">' +
            '<label class="form-label">출제 범위</label>' +
            '<div class="range-bar">' + rangeHtml + '</div>' +
          '</div>' +
          '<button class="action-btn" onclick="startTest()">테스트 시작 ▶</button>' +
        '</div>';
    }

    function setTR(idx) {
      tRangeIndex = idx;
      renderSetup();
    }

    function startTest() {
      var nameVal = document.getElementById("tname").value.trim();
      if (!nameVal) {
        alert("이름을 입력해주세요.");
        return;
      }
      tName = nameVal;
      var range = ranges[tRangeIndex];
      var pool = rawWords.slice(range.s, range.e);
      if (pool.length === 0) {
        alert("선택한 범위에 단어가 없습니다.");
        return;
      }
      tWords = shuffle(pool).slice(0, 50); // Max 50
      tIndex = 0;
      tScore = 0;
      tHistory = [];
      showTest();
    }

    function showTest() {
      var area = document.getElementById("test-area");
      if (tIndex >= tWords.length) {
        showTestResult();
        return;
      }
      var w = tWords[tIndex];
      var pct = (tIndex / tWords.length) * 100;

      area.innerHTML = 
        '<div class="quiz-box">' +
          '<div class="q-progress-bar"><div class="q-progress-fill" style="width:' + pct + '%"></div></div>' +
          '<div class="q-meta">' +
            '<span>문제 ' + (tIndex + 1) + ' / ' + tWords.length + '</span>' +
            '<span>✅ 맞춤수: ' + tScore + '</span>' +
          '</div>' +
          '<div class="q-stem en">' + esc(w.word) + '</div>' +
          '<div class="test-input-row">' +
            '<input type="text" id="tinput" class="text-input" autocomplete="off" placeholder="뜻을 입력하고 Enter를 누르세요" onkeydown="testKey(event)">' +
          '</div>' +
        '</div>';

      document.getElementById("tinput").focus();
      speak(w.word);
    }

    function testKey(e) {
      if (e.keyCode === 13) {
        submitTestAns();
      }
    }

    function isSim(input, correct) {
      var norm = function(s) {
        return s.replace(/\s/g,"").replace(/[~\-·,]/g,"").toLowerCase();
      };
      var a = norm(input), c = norm(correct);
      if (a === c) return true;
      if (a.length >= 2 && c.indexOf(a) >= 0) return true;
      var core = c.replace(/하다|되다|시키다|이다/g,"").trim();
      if (core.length >= 2 && a.indexOf(core) >= 0) return true;
      return false;
    }

    function submitTestAns() {
      var inputEl = document.getElementById("tinput");
      var ans = inputEl.value.trim();
      var w = tWords[tIndex];
      var isCor = isSim(ans, w.meaning);

      if (isCor) {
        tScore++;
      }
      tHistory.push({
        word: w.word,
        correctMeaning: w.meaning,
        input: ans,
        isCorrect: isCor
      });

      tIndex++;
      showTest();
    }

    function showTestResult() {
      var pct = Math.round((tScore / tWords.length) * 100);
      var emoji = "💪";
      if (pct === 100) emoji = "🏆";
      else if (pct >= 80) emoji = "🎉";
      else if (pct >= 60) emoji = "👍";

      var wrongs = tHistory.filter(function(h) { return !h.isCorrect; });
      var wrongsHtml = "";
      if (wrongs.length > 0) {
        wrongsHtml += '<div class="res-w-title">❌ 틀린 단어 (' + wrongs.length + '개)</div>';
        for (var i = 0; i < wrongs.length; i++) {
          wrongsHtml += '<div class="res-w-item">' +
            '<span class="res-w-eng en">' + esc(wrongs[i].word) + '</span> ' +
            '→ 입력: <span style="color:var(--danger)">' + esc(wrongs[i].input || "(없음)") + '</span> / ' +
            '정답: <span style="color:var(--success)">' + esc(wrongs[i].correctMeaning) + '</span>' +
          '</div>';
        }
      } else {
        wrongsHtml = '<div style="color:var(--success);font-weight:700;margin-bottom:15px;">🎉 축하합니다! 다 맞았습니다!</div>';
      }

      var area = document.getElementById("test-area");
      area.innerHTML = 
        '<div class="res-box">' +
          '<div class="res-emoji">' + emoji + '</div>' +
          '<div class="res-score">' + tScore + ' / ' + tWords.length + '</div>' +
          '<div class="res-pct">' + pct + '점</div>' +
          '<div class="res-wrongs">' + wrongsHtml + '</div>' +
          '<div class="res-btns">' +
            '<button class="res-btn copy" onclick="copyResult()">📋 카톡으로 결과 복사</button>' +
            '<button class="res-btn retry" onclick="renderSetup()">↩ 다시 테스트</button>' +
          '</div>' +
        '</div>';
    }

    function copyResult() {
      var today = new Date();
      var dateStr = today.getFullYear() + "-" + 
                    String(today.getMonth() + 1).padStart(2, '0') + "-" + 
                    String(today.getDate()).padStart(2, '0');

      var text = "[씨유에탑 고3 자이 12회] 테스트 결과\n" +
                 "날짜: " + dateStr + "\n" +
                 "이름: " + tName + "\n" +
                 "점수: " + tScore + "/" + tWords.length + " (" + Math.round((tScore / tWords.length) * 100) + "점)\n" +
                 "─────────────────\n";

      var wrongs = tHistory.filter(function(h) { return !h.isCorrect; });
      text += "❌ 틀린 단어 (" + wrongs.length + "개)\n";
      for (var i = 0; i < wrongs.length; i++) {
        text += "  " + wrongs[i].word + " → 입력:" + (wrongs[i].input || "없음") + " / 정답:" + wrongs[i].correctMeaning + "\n";
      }
      text += "─────────────────\n";

      var corrects = tHistory.filter(function(h) { return h.isCorrect; });
      text += "✅ 맞은 단어: ";
      var corrWords = [];
      for (var j = 0; j < corrects.length; j++) {
        corrWords.push(corrects[j].word);
      }
      text += corrWords.join(", ");

      // Temporary textarea to copy
      var tArea = document.createElement("textarea");
      tArea.value = text;
      document.body.appendChild(tArea);
      tArea.select();
      document.execCommand("copy");
      document.body.removeChild(tArea);
      alert("결과가 클립보드에 복사되었습니다! 카톡에 붙여넣으세요.");
    }

    window.onload = init;
  </script>
</body>
</html>
