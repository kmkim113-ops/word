      --warn: #F59E0B;
      --gray: #6B7280;
      --border: #E5E7EB;
      --bg: #F9FAFB;
    }

      background: #f0f2f5;
      color: #1f2937;
      display: flex;
      justify-content: center;
    }
    #app-container {
      width: 100%;
      max-width: 420px;
      min-height: 100vh;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      box-shadow: 0 0 10px rgba(0,0,0,0.05);
      position: relative;
    }
    .header {
      background: #ffffff;
      padding: 16px;
      border-bottom: 1px solid var(--border);
      text-align: center;
    }
    .header-brand {
      font-family: 'Nunito', sans-serif;
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 4px;
    }
    .header-sub {
      font-size: 0.85rem;
      color: var(--gray);
    }
    .nav-tabs {
      display: flex;
      background: #ffffff;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .nav-tab {
      flex: 1;
      text-align: center;
      padding: 12px 0;
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--gray);
      background: none;
      border: none;
      outline: none;
      cursor: pointer;
      border-bottom: 2px solid transparent;
    }
    .nav-tab.active {
      color: var(--primary);
      border-bottom-color: var(--primary);
      font-weight: 700;
    }
    .tab-content {
      flex: 1;
      padding: 16px;
      display: none;
    }
    .tab-content.active {
      display: flex;
      flex-direction: column;
    }
    .range-bar {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      padding-bottom: 8px;
      margin-bottom: 12px;
    }
    .range-bar::-webkit-scrollbar { display: none; }
    .range-btn {
      flex: 0 0 auto;
      padding: 6px 12px;
      font-size: 0.8rem;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: #ffffff;
      color: var(--gray);
      cursor: pointer;
    }
    .range-btn.active {
      background: var(--primary);
      color: #ffffff;
      border-color: var(--primary);
    }
    .search-box {
      position: relative;
      margin-bottom: 12px;
    }
    .search-input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.9rem;
      outline: none;
    }
    .filter-bar {
      display: flex;
      gap: 6px;
      margin-bottom: 12px;
    }
    .filter-btn {
      flex: 1;
      padding: 8px 0;
      font-size: 0.85rem;
      border: 1px solid var(--border);
      background: #ffffff;
      border-radius: 6px;
      cursor: pointer;
      color: var(--gray);
    }
    .filter-btn.active {
      background: var(--primary-light);
      color: var(--primary);
      border-color: var(--primary);
      font-weight: 500;
    }
    .word-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .word-card {
      background: #ffffff;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: opacity 0.2s;
    }
    .word-card.known { opacity: 0.35; }
    .chk-btn {
      width: 22px;
      height: 22px;
      border-radius: 4px;
      border: 2px solid var(--border);
      background: #ffffff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      color: #ffffff;
    }
    .word-card.known .chk-btn {
      background: var(--success);
      border-color: var(--success);
    }
    .word-card.known .chk-btn::after { content: "✓"; }
    .word-info { flex: 1; }
    .w-eng { font-family: 'Nunito', sans-serif; font-size: 1.1rem; font-weight: 700; margin-bottom: 2px; color: #111827; }
    .w-kor { font-size: 0.9rem; color: var(--gray); }
    .ibtn {
      background: none;
      border: none;
      font-size: 1.2rem;
      cursor: pointer;
      padding: 4px;
      outline: none;
    }
    .fav-btn { color: var(--border); }
    .fav-btn.active { color: var(--warn); }

      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 320px;
    }
    .fc-card {
      width: 100%;
      height: 240px;
      background: #ffffff;
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.02);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      padding: 20px;
      cursor: pointer;
      text-align: center;
    }
    .fc-fav { position: absolute; top: 16px; right: 16px; font-size: 1.4rem; background: none; border: none; cursor: pointer; color: var(--border); }
    .fc-fav.active { color: var(--warn); }
    .fc-eng { font-family: 'Nunito', sans-serif; font-size: 1.8rem; font-weight: 700; color: #111827; margin-bottom: 12px; }
    .fc-kor { font-size: 1.25rem; color: var(--primary); font-weight: 500; min-height: 1.5em; }
    .fc-hint { font-size: 0.8rem; color: var(--gray); position: absolute; bottom: 16px; }
    .fc-nav { display: flex; width: 100%; gap: 10px; margin-top: 20px; }
    .fc-nav-btn {
      flex: 1;
      padding: 12px 0;
      font-size: 0.95rem;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      background: var(--primary);
      color: #ffffff;
      cursor: pointer;

    .fc-nav-btn.sec { background: #ffffff; color: var(--gray); border: 1px solid var(--border); }
    .qz-card {

      text-align: left;
      font-size: 0.95rem;
      background: #ffffff;
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      outline: none;
      transition: background 0.1s;

    <div class="tab-content" id="tab-flash">

      <div class="fc-container">
        <div class="fc-card" id="fccard">

          <div class="fc-hint" id="fchint">탭하여 뜻 보기</div>

        <div class="fc-nav">
          <button class="fc-nav-btn sec" onclick="fcPrev()">◀ 이전</button>
          <button class="fc-nav-btn" style="background:var(--warn);" onclick="speakFc()">🔊</button>
          <button class="fc-nav-btn" onclick="fcNext()">다음 ▶</button>
        </div>
      </div>
    </div>

    <div class="tab-content" id="tab-quiz">
      <div id="qz-body"></div>
    </div>

    <div class="tab-content" id="tab-test">
      <div id="t-body"></div>
    </div>
  </div>

    var sKey = "cutop_go1_zistory_2_all";
    var state = JSON.parse(localStorage.getItem(sKey) || "{}");

    function saveState() {
      localStorage.setItem(sKey, JSON.stringify(state));
    }

    function getWordState(w) {
      var k = w.word + "|" + w.meaning;
      return state[k] || { status: "", fav: false };
    }

    function setWordState(w, prop, val) {
      var k = w.word + "|" + w.meaning;
      if (!state[k]) state[k] = { status: "", fav: false };
      state[k][prop] = val;
      saveState();
    }

    function buildRanges(ws) {
      var r = [{ label: "전체", s: 0, e: ws.length }];
      for (var i = 0; i < ws.length; i += 50) {
        r.push({ label: (i+1) + "-" + Math.min(i+50, ws.length), s: i, e: Math.min(i+50, ws.length) });
      }
      return r;
    }
    var ranges = buildRanges(rawWords);

    var lri = 0, fri = 0, tri_idx = 0;
    var lf = "all";

    function esc(s) {
      return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
    }

    function speak(t) {
      if (!("speechSynthesis" in window)) return;
      window.speechSynthesis.cancel();
      var u = new SpeechSynthesisUtterance(t);
      u.lang = "en-US";
      u.rate = 0.85;
      window.speechSynthesis.speak(u);
    }
    function speakFc() {
      speak(document.getElementById("fcword").textContent);
    }

    function renderRangeBar(id, cur, fnStr) {
      var html = "";
      ranges.forEach(function(r, i) {
        var act = (i === cur) ? " active" : "";
        html += '<button class="range-btn' + act + '" onclick="' + fnStr + '(' + i + ')">' + r.label + '</button>';
      });
      document.getElementById(id).innerHTML = html;
    }

    function setLR(i) { lri = i; renderRangeBar("lrbar", lri, "setLR"); renderList(); }
    function setFR(i) { fri = i; renderRangeBar("fcrbar", fri, "setFR"); initFC(); }

    function setLF(type) {
      ["all","unknown","fav"].forEach(function(t){
        document.getElementById("lf-"+t).classList.toggle("active", t===type);
      });
      lf = type;
      renderList();
    }

    function toggleKnown(idx) {
      var w = rawWords[idx];
      var s = getWordState(w);
      var nxt = (s.status === "known") ? "" : "known";
      setWordState(w, "status", nxt);
      renderList();
    }

    function toggleFav(idx, e, fromTab) {
      if (e) e.stopPropagation();
      var w = rawWords[idx];
      var s = getWordState(w);
      setWordState(w, "fav", !s.fav);
      if (fromTab === 'list') renderList();
      if (fromTab === 'fc') updateFCCard();
    }

    function renderList() {
      var q = document.getElementById("lsearch").value.toLowerCase().trim();
      var r = ranges[lri];
      var html = "";
      
      for (var i = r.s; i < r.e; i++) {
        var w = rawWords[i];
        var s = getWordState(w);
        
        if (lf === "unknown" && s.status === "known") continue;
        if (lf === "fav" && !s.fav) continue;
        
        if (q && w.word.toLowerCase().indexOf(q) === -1 && w.meaning.toLowerCase().indexOf(q) === -1) continue;
        
        var cls = (s.status === "known") ? " word-card known" : " word-card";
        var fCls = s.fav ? " active" : "";
        
        html += '<div class="' + cls + '">' +
          '<button class="chk-btn" onclick="toggleKnown(' + i + ')"></button>' +
          '<div class="word-info">' +
            '<div class="w-eng">' + esc(w.word) + '</div>' +
            '<div class="w-kor">' + esc(w.meaning) + '</div>' +
          '</div>' +
          '<button class="ibtn" data-w="' + esc(w.word) + '" onclick="speak(this.dataset.w)">🔊</button>' +
          '<button class="ibtn fav-btn' + fCls + '" onclick="toggleFav(' + i + ', event, \'list\')">★</button>' +
        '</div>';
      }
      document.getElementById("wlist-box").innerHTML = html;
    }

    // 플래시카드 로직
    var fcArr = [], fci = 0, fcFlipped = false, fcTX = 0;
    function initFC() {
      var r = ranges[fri];
      fcArr = [];
      for (var i = r.s; i < r.e; i++) {
        fcArr.push({ idx: i, word: rawWords[i] });
      }
      fci = 0;
      fcFlipped = false;
      updateFCCard();
    }

    function updateFCCard() {
      if (fcArr.length === 0) {
        document.getElementById("fcword").textContent = "단어가 없습니다";
        document.getElementById("fcmean").textContent = "";
        document.getElementById("fcfav").style.display = "none";
        return;
      }
      document.getElementById("fcfav").style.display = "block";
      var item = fcArr[fci];
      var s = getWordState(item.word);
      
      document.getElementById("fcword").textContent = item.word.word;
      document.getElementById("fcfav").className = "fc-fav" + (s.fav ? " active" : "");
      document.getElementById("fcfav").setAttribute("onclick", "toggleFav(" + item.idx + ", event, 'fc')");
      
      if (fcFlipped) {
        document.getElementById("fcmean").textContent = item.word.meaning;
        document.getElementById("fcmean").style.visibility = "visible";
        document.getElementById("fchint").textContent = "클릭 시 다음 단어";
      } else {
        document.getElementById("fcmean").textContent = "";
        document.getElementById("fcmean").style.visibility = "hidden";
        document.getElementById("fchint").textContent = "탭하여 뜻 보기";
      }
    }

    function fcFlip() {
      if (fcArr.length === 0) return;
      if (!fcFlipped) {
        fcFlipped = true;
        updateFCCard();
        speakFc();
      } else {
        fcNext();
      }
    }

    function fcNext() { if (fcArr.length === 0) return; fci = (fci + 1) % fcArr.length; fcFlipped = false; updateFCCard(); }
    function fcPrev() { if (fcArr.length === 0) return; fci = (fci - 1 + fcArr.length) % fcArr.length; fcFlipped = false; updateFCCard(); }

    // 퀴즈 모드 로직
    var qArr = [], qi = 0, qScore = 0, qLocked = false;
    function shuffle(arr) {
      for (var i = arr.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp;
      }
      return arr;
    }

    function initQuiz() {
      var pool = rawWords.slice();
      shuffle(pool);
      qArr = pool.slice(0, Math.min(10, pool.length));
      qi = 0;
      qScore = 0;
      qLocked = false;
      renderQuizQuestion();
    }

    function renderQuizQuestion() {
      if (qi >= qArr.length) {
        renderQuizResult();
        return;
      }
      qLocked = false;
      var cur = qArr[qi];
      
      var opts = [cur.meaning];
      var pool = rawWords.filter(function(w){ return w.meaning !== cur.meaning; });
      shuffle(pool);
      for(var i=0; i<Math.min(3, pool.length); i++) {
        opts.push(pool[i].meaning);
      }
      while(opts.length < 4) { opts.push("-"); }
      shuffle(opts);

      var html = '<div class="qz-card">' +
        '<div class="qz-progress">' + (qi+1) + ' / ' + qArr.length + '</div>' +
        '<div class="qz-eng">' + esc(cur.word) + '</div>' +
      '</div>' +
      '<div class="qz-options">';
      
      opts.forEach(function(o) {
        var isCor = (o === cur.meaning) ? "1" : "0";
        html += '<button class="qz-opt" data-cor="' + isCor + '" onclick="qAns(this)">' + esc(o) + '</button>';
      });
      html += '</div>';
      
      document.getElementById("tab-quiz").innerHTML = '<div id="qz-body">' + html + '</div>';
      speak(cur.word);
    }

    function qAns(btn) {
      if (qLocked) return;
      qLocked = true;
      var isCor = btn.dataset.cor === "1";
      if (isCor) {
        btn.classList.add("correct");
        qScore++;
        speak(qArr[qi].word);
      } else {
        btn.classList.add("wrong");
        var opts = document.querySelectorAll(".qz-opt");
        for(var i=0; i<opts.length; i++) {
          if (opts[i].dataset.cor === "1") opts[i].classList.add("correct");
        }
      }
      setTimeout(function(){
        qi++;
        renderQuizQuestion();
      }, 1000);
    }

    function renderQuizResult() {
      var pct = Math.round((qScore / qArr.length) * 100);
      var emo = pct === 100 ? "🏆" : pct >= 80 ? "🎉" : pct >= 60 ? "👍" : "💪";
      var html = '<div class="res-card">' +
        '<div class="res-emoji">' + emo + '</div>' +
        '<div class="res-score">' + qScore + ' / ' + qArr.length + '</div>' +
        '<div class="res-pct">' + pct + '점</div>' +
        '<button class="btn-block" onclick="initQuiz()">↩ 다시 풀기</button>' +
      '</div>';
      document.getElementById("tab-quiz").innerHTML = html;
    }

    // 테스트 모드 로직
    var tName = "", tArr = [], ti = 0, tScore = 0, tWrongs = [], tCorrects = [];
    function renderSetup() {
      var html = '<div class="t-setup-box">' +
        '<label class="t-label">학생 이름 입력</label>' +
        '<input type="text" class="t-input" id="tname-input" placeholder="이름을 입력하세요" value="' + esc(tName) + '">' +
        '<label class="t-label">테스트 범위 선택</label>' +
        '<div class="range-bar" id="trbar"></div>' +
        '<button class="btn-block" style="margin-top:10px;" onclick="startTest()">테스트 시작 ▶</button>' +
      '</div>';
      document.getElementById("tab-test").innerHTML = '<div id="t-body">' + html + '</div>';
      renderRangeBar("trbar", tri_idx, "setTR");
    }

    function setTR(i) { tri_idx = i; renderRangeBar("trbar", tri_idx, "setTR"); }

    function startTest() {
      var nm = document.getElementById("tname-input").value.trim();
      if (!nm) { alert("이름을 입력해주세요."); return; }
      tName = nm;
      
      var r = ranges[tri_idx];
      var pool = [];
      for (var i = r.s; i < r.e; i++) { pool.push(rawWords[i]); }
      shuffle(pool);
      
      tArr = pool.slice(0, Math.min(50, pool.length));
      ti = 0;
      tScore = 0;
      tWrongs = [];
      tCorrects = [];
      
      renderTestQuestion();
    }

    function renderTestQuestion() {
      if (ti >= tArr.length) {
        renderTestResult();
        return;
      }
      var cur = tArr[ti];
      var pct = Math.round((ti / tArr.length) * 100);
      
      var html = '<div class="t-header">' +
        '<div>문제: ' + (ti+1) + ' / ' + tArr.length + '</div>' +
        '<div>✅ 맞춤수: ' + tScore + '</div>' +
      '</div>' +
      '<div class="t-pbar-bg"><div class="t-pbar-fg" style="width:' + pct + '%;"></div></div>' +
      '<div class="t-card">' +
        '<div class="t-eng">' + esc(cur.word) + '</div>' +
        '<input type="text" class="t-ans-input" id="tans" autocomplete="off" placeholder="뜻을 입력하고 Enter" onkeypress="tKey(event)">' +
      '</div>' +
      '<button class="btn-block" onclick="submitTestAns()">다음</button>';
      
      document.getElementById("tab-test").innerHTML = html;
      document.getElementById("tans").focus();
      speak(cur.word);
    }

    function tKey(e) { if (e.keyCode === 13) submitTestAns(); }

    function isSim(input, correct) {
      var norm = function(s) {
        return s.replace(/\s/g,"").replace(/[~\-·,]/g,"").toLowerCase();
      };
      var a = norm(input), c = norm(correct);
      if (a === c) return true;
      if (a.length >= 2 && c.indexOf(a) >= 0) return true;
      var core = c.replace(/하다|되다|시키다|이다/g,"").trim();
      if (core.length >= 2 && a.indexOf(core) >= 0) return true;
      return false;
    }

    function submitTestAns() {
      var ans = document.getElementById("tans").value.trim();
      var cur = tArr[ti];
      if (isSim(ans, cur.meaning)) {
        tScore++;
        tCorrects.push(cur.word);
      } else {
        tWrongs.push({ word: cur.word, input: ans || "(미입력)", correct: cur.meaning });
      }
      ti++;
      renderTestQuestion();
    }

    function renderTestResult() {
      var pct = Math.round((tScore / tArr.length) * 100);
      var emo = pct === 100 ? "🏆" : pct >= 80 ? "🎉" : pct >= 60 ? "👍" : "💪";
      
      var html = '<div class="res-card">' +
        '<div class="res-emoji">' + emo + '</div>' +
        '<div class="res-score">' + tScore + ' / ' + tArr.length + '</div>' +
        '<div class="res-pct">' + pct + '점</div>';
        
      if (tWrongs.length > 0) {
        html += '<div class="t-wrong-list">';
        tWrongs.forEach(function(w) {
          html += '<div class="t-wrong-item">' +
            '<span class="t-wrong-eng">' + esc(w.word) + '</span>' +
            '<div class="t-wrong-dtl">입력: ' + esc(w.input) + ' / 정답: ' + esc(w.correct) + '</div>' +
          '</div>';
        });
        html += '</div>';
      }
      
      html += '<button class="btn-block" style="background:#25D366;" onclick="copyResult()">📋 카톡으로 결과 복사</button>' +
        '<button class="btn-block" onclick="renderSetup()">↩ 다시 테스트</button>' +
      '</div>';
      
      document.getElementById("tab-test").innerHTML = html;
    }

    function copyResult() {
      var d = new Date();
      var dStr = d.getFullYear() + "-" + (d.getMonth()+1) + "-" + d.getDate();
      var pct = Math.round((tScore / tArr.length) * 100);
      
      var txt = "[씨유에탑 고1 자이스토리 2회] 테스트 결과\n" +
        "날짜: " + dStr + "\n" +
        "이름: " + tName + "\n" +
        "점수: " + tScore + "/" + tArr.length + " (" + pct + "점)\n" +
        "─────────────────\n" +
        "❌ 틀린 단어 (" + tWrongs.length + "개)\n";
        
      tWrongs.forEach(function(w) {
        txt += "  " + w.word + " → 입력:" + w.input + " / 정답:" + w.correct + "\n";
      });
      txt += "─────────────────\n" +
        "✅ 맞은 단어: " + tCorrects.join(", ");
        
      var ta = document.createElement("textarea");
      ta.value = txt;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand("copy");
      document.body.removeChild(ta);
      alert("결과가 클립보드에 복사되었습니다!");
    }

    function switchTab(t) {
      ["list","flash","quiz","test"].forEach(function(n) {
        document.getElementById("tb-"+n).classList.toggle("active", n===t);
        document.getElementById("tab-"+n).classList.toggle("active", n===t);
      });
      if (t==="list")  { renderRangeBar("lrbar", lri, "setLR"); renderList(); }
      if (t==="flash") { renderRangeBar("fcrbar", fri, "setFR"); initFC(); }
      if (t==="quiz")  { initQuiz(); }
      if (t==="test")  { renderSetup(); }
    }

    // 초기화 및 플래시카드 리스너 바인딩
    (function(){
      renderRangeBar("lrbar", lri, "setLR");
      renderList();
      
      var card = document.getElementById("fccard");
      card.addEventListener("click", function(e) {
        if (e.target.id === "fcfav") return;
        fcFlip();
      });
      card.addEventListener("touchstart", function(e) {
        fcTX = e.touches[0].clientX;
      }, {passive:true});
      card.addEventListener("touchend", function(e) {
        var dx = e.changedTouches[0].clientX - fcTX;
        if (Math.abs(dx) > 50) { if (dx < 0) fcNext(); else fcPrev(); }
      }, {passive:true});
    })();
  </script>
</body>
</html>
