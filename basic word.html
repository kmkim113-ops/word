<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>씨유에탑 수능기본 1</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #2563EB;
  --primary-dark: #1D4ED8;
  --primary-light: #EFF6FF;
  --success: #10B981;
  --danger: #EF4444;
  --warn: #F59E0B;
  --gray: #6B7280;
  --border: #E5E7EB;
  --bg: #F9FAFB;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--bg);
  max-width: 420px;
  margin: 0 auto;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}
.en { font-family: 'Nunito', sans-serif; }

/* HEADER */
.header {
  background: linear-gradient(135deg, #1e3a8a 0%, #2563EB 100%);
  color: white;
  padding: 14px 16px 12px;
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 2px 8px rgba(37,99,235,.3);
}
.header-brand { font-size: 11px; opacity: .8; letter-spacing: 1px; font-family: 'Nunito', sans-serif; font-weight: 600; }
.header-title { font-size: 15px; font-weight: 700; margin-top: 2px; }
.header-sub { font-size: 11px; opacity: .75; margin-top: 1px; font-family: 'Nunito', sans-serif; }

/* TABS */
.tabs {
  display: flex;
  background: white;
  border-bottom: 2px solid var(--border);
  position: sticky; top: 70px; z-index: 99;
}
.tab {
  flex: 1; padding: 10px 4px; font-size: 11px; font-weight: 600;
  text-align: center; cursor: pointer; color: var(--gray);
  border-bottom: 2px solid transparent; margin-bottom: -2px;
  transition: all .2s;
}
.tab.active { color: var(--primary); border-bottom-color: var(--primary); }

/* RANGE BAR */
.range-bar {
  background: white;
  padding: 10px 12px 8px;
  border-bottom: 1px solid var(--border);
  overflow-x: auto;
}
.range-label { font-size: 11px; color: var(--gray); margin-bottom: 6px; font-weight: 600; }
.range-chips { display: flex; gap: 6px; flex-wrap: nowrap; }
.range-chip {
  flex-shrink: 0;
  padding: 4px 10px; border-radius: 20px; font-size: 11px;
  border: 1.5px solid var(--border); cursor: pointer;
  font-family: 'Nunito', sans-serif; font-weight: 600;
  background: white; color: var(--gray); transition: all .15s;
}
.range-chip.active { background: var(--primary); border-color: var(--primary); color: white; }

/* SEARCH & FILTER */
.search-area {
  background: white;
  padding: 8px 12px;
  border-bottom: 1px solid var(--border);
  display: flex; gap: 8px; align-items: center;
}
.search-input {
  flex: 1; border: 1.5px solid var(--border); border-radius: 20px;
  padding: 7px 14px; font-size: 13px; outline: none;
  font-family: 'Noto Sans KR', sans-serif;
}
.search-input:focus { border-color: var(--primary); }
.filter-btn {
  padding: 6px 10px; border-radius: 16px; font-size: 11px; font-weight: 700;
  border: 1.5px solid var(--border); background: white; cursor: pointer;
  white-space: nowrap; color: var(--gray); transition: all .15s;
}
.filter-btn.active { background: var(--primary-light); border-color: var(--primary); color: var(--primary); }

/* WORD LIST */
.word-list { flex: 1; overflow-y: auto; padding: 8px 10px; }
.word-card {
  background: white; border-radius: 12px; padding: 12px 14px;
  margin-bottom: 8px; display: flex; align-items: center; gap: 10px;
  box-shadow: 0 1px 4px rgba(0,0,0,.06); border: 1.5px solid transparent;
  transition: all .2s;
}
.word-card.known { opacity: .4; }
.check-btn {
  width: 26px; height: 26px; border-radius: 50%; border: 2px solid var(--border);
  background: white; cursor: pointer; display: flex; align-items: center;
  justify-content: center; flex-shrink: 0; font-size: 13px;
  transition: all .2s;
}
.check-btn.checked { background: var(--success); border-color: var(--success); }
.word-info { flex: 1; min-width: 0; }
.word-en { font-size: 15px; font-weight: 700; color: #1e293b; font-family: 'Nunito', sans-serif; }
.word-ph { font-size: 11px; color: var(--gray); margin-top: 1px; font-family: 'Nunito', sans-serif; }
.word-ko { font-size: 13px; color: #374151; margin-top: 3px; }
.word-pos {
  display: inline-block; font-size: 10px; padding: 1px 6px; border-radius: 8px;
  background: var(--primary-light); color: var(--primary); font-weight: 700;
  margin-left: 4px; font-family: 'Nunito', sans-serif;
}
.word-actions { display: flex; gap: 6px; flex-shrink: 0; }
.icon-btn {
  width: 30px; height: 30px; border: none; background: none; cursor: pointer;
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  font-size: 16px; transition: background .15s;
}
.icon-btn:hover { background: var(--bg); }
.fav-btn.faved { color: #F59E0B; }

/* SCREEN PANELS */
.screen { display: none; flex: 1; flex-direction: column; }
.screen.active { display: flex; }

/* FLASHCARD */
.fc-wrap {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  justify-content: center; padding: 20px 16px;
}
.fc-counter { font-size: 12px; color: var(--gray); margin-bottom: 16px; font-family: 'Nunito', sans-serif; font-weight: 600; }
.fc-card {
  width: 100%; background: white; border-radius: 20px;
  padding: 40px 24px; text-align: center; min-height: 240px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  box-shadow: 0 4px 20px rgba(0,0,0,.1); cursor: pointer;
  transition: transform .1s;
  position: relative;
}
.fc-card:active { transform: scale(.98); }
.fc-word { font-size: 28px; font-weight: 800; color: #1e293b; font-family: 'Nunito', sans-serif; }
.fc-ph { font-size: 14px; color: var(--gray); margin-top: 8px; font-family: 'Nunito', sans-serif; }
.fc-meaning { font-size: 22px; font-weight: 700; color: var(--primary); margin-top: 16px; display: none; }
.fc-tap-hint { font-size: 12px; color: #cbd5e1; margin-top: 20px; }
.fc-fav {
  position: absolute; top: 14px; right: 14px;
  font-size: 20px; cursor: pointer; background: none; border: none; color: #cbd5e1;
}
.fc-fav.faved { color: var(--warn); }
.fc-nav { display: flex; gap: 12px; margin-top: 20px; align-items: center; }
.fc-nav-btn {
  padding: 12px 24px; border-radius: 12px; font-size: 14px; font-weight: 700;
  border: none; cursor: pointer; background: var(--primary); color: white;
  font-family: 'Nunito', sans-serif; transition: background .15s;
}
.fc-nav-btn:hover { background: var(--primary-dark); }
.fc-nav-btn.secondary { background: var(--border); color: #374151; }
.fc-range-bar {
  background: white;
  padding: 10px 12px 8px;
  border-bottom: 1px solid var(--border);
  overflow-x: auto;
}

/* QUIZ */
.quiz-wrap { flex: 1; padding: 16px; overflow-y: auto; }
.quiz-start {
  text-align: center; padding: 40px 20px;
}
.quiz-start h2 { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
.quiz-start p { color: var(--gray); margin-bottom: 24px; font-size: 14px; }
.btn-primary {
  display: block; width: 100%; padding: 14px; border-radius: 12px;
  background: var(--primary); color: white; font-size: 16px; font-weight: 700;
  border: none; cursor: pointer; font-family: 'Noto Sans KR', sans-serif;
  transition: background .15s;
}
.btn-primary:hover { background: var(--primary-dark); }
.quiz-question {
  background: white; border-radius: 16px; padding: 24px 18px;
  margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,.06);
}
.quiz-num { font-size: 12px; color: var(--gray); margin-bottom: 8px; font-family: 'Nunito', sans-serif; font-weight: 700; }
.quiz-word { font-size: 24px; font-weight: 800; color: #1e293b; font-family: 'Nunito', sans-serif; text-align: center; }
.quiz-ph { font-size: 13px; color: var(--gray); text-align: center; margin-top: 4px; font-family: 'Nunito', sans-serif; }
.quiz-choices { margin-top: 16px; display: flex; flex-direction: column; gap: 8px; }
.quiz-choice {
  padding: 13px 16px; border-radius: 10px; border: 2px solid var(--border);
  font-size: 14px; cursor: pointer; background: white; text-align: left;
  transition: all .15s; font-family: 'Noto Sans KR', sans-serif;
}
.quiz-choice.correct { border-color: var(--success); background: #ecfdf5; color: #065f46; }
.quiz-choice.wrong { border-color: var(--danger); background: #fef2f2; color: #991b1b; }
.quiz-result-box {
  background: white; border-radius: 16px; padding: 30px 20px;
  text-align: center; box-shadow: 0 4px 16px rgba(0,0,0,.08);
}
.quiz-result-emoji { font-size: 48px; margin-bottom: 12px; }
.quiz-result-score { font-size: 32px; font-weight: 800; color: var(--primary); font-family: 'Nunito', sans-serif; }
.quiz-result-msg { font-size: 14px; color: var(--gray); margin: 8px 0 20px; }

/* TEST MODE */
.test-setup {
  padding: 20px 16px; flex: 1; overflow-y: auto;
}
.test-setup h2 { font-size: 18px; font-weight: 700; margin-bottom: 20px; color: #1e293b; }
.form-group { margin-bottom: 16px; }
.form-label { font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 6px; display: block; }
.form-input {
  width: 100%; padding: 11px 14px; border: 1.5px solid var(--border);
  border-radius: 10px; font-size: 14px; outline: none;
  font-family: 'Noto Sans KR', sans-serif;
}
.form-input:focus { border-color: var(--primary); }
.form-select {
  width: 100%; padding: 11px 14px; border: 1.5px solid var(--border);
  border-radius: 10px; font-size: 14px; outline: none; background: white;
  font-family: 'Noto Sans KR', sans-serif; cursor: pointer;
}

/* TEST PROGRESS */
.test-progress-bar-wrap { padding: 0 16px 4px; background: white; border-bottom: 1px solid var(--border); }
.test-progress-bar {
  height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; margin-bottom: 4px;
}
.test-progress-fill { height: 100%; background: var(--primary); border-radius: 3px; transition: width .3s; }
.test-meta { display: flex; justify-content: space-between; font-size: 11px; color: var(--gray); padding: 4px 0 8px; font-family: 'Nunito', sans-serif; font-weight: 600; }
.test-q-wrap { flex: 1; padding: 16px; overflow-y: auto; }
.test-card {
  background: white; border-radius: 16px; padding: 28px 20px;
  box-shadow: 0 2px 10px rgba(0,0,0,.07); margin-bottom: 16px;
}
.test-q-word { font-size: 26px; font-weight: 800; text-align: center; font-family: 'Nunito', sans-serif; color: #1e293b; }
.test-q-ph { font-size: 13px; color: var(--gray); text-align: center; margin-top: 6px; font-family: 'Nunito', sans-serif; }
.test-q-hint { font-size: 12px; color: #94a3b8; text-align: center; margin-top: 20px; }
.test-input-wrap { padding: 0 16px 16px; }
.test-input {
  width: 100%; padding: 14px 16px; border: 2px solid var(--border);
  border-radius: 12px; font-size: 16px; outline: none;
  font-family: 'Noto Sans KR', sans-serif; transition: border .2s;
}
.test-input:focus { border-color: var(--primary); }

/* RESULT */
.test-result { flex: 1; padding: 16px; overflow-y: auto; }
.result-hero {
  background: linear-gradient(135deg, #1e3a8a, #2563EB);
  border-radius: 20px; padding: 30px 20px; text-align: center; color: white; margin-bottom: 16px;
}
.result-emoji { font-size: 48px; margin-bottom: 8px; }
.result-name { font-size: 14px; opacity: .85; margin-bottom: 4px; }
.result-score { font-size: 36px; font-weight: 800; font-family: 'Nunito', sans-serif; }
.result-pct { font-size: 16px; opacity: .85; font-family: 'Nunito', sans-serif; margin-top: 4px; }
.wrong-list { background: white; border-radius: 16px; padding: 16px; box-shadow: 0 2px 8px rgba(0,0,0,.06); margin-bottom: 12px; }
.wrong-list h3 { font-size: 14px; font-weight: 700; margin-bottom: 12px; color: var(--danger); }
.wrong-item { padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
.wrong-item:last-child { border-bottom: none; }
.wrong-word { font-weight: 700; font-family: 'Nunito', sans-serif; font-size: 14px; }
.wrong-detail { color: var(--gray); margin-top: 2px; font-size: 12px; }
.wrong-detail span { color: var(--danger); font-weight: 600; }
.wrong-detail .correct-ans { color: var(--success); font-weight: 600; }
.correct-list { background: white; border-radius: 16px; padding: 16px; box-shadow: 0 2px 8px rgba(0,0,0,.06); margin-bottom: 12px; }
.correct-list h3 { font-size: 14px; font-weight: 700; margin-bottom: 8px; color: var(--success); }
.correct-words { font-size: 12px; color: var(--gray); line-height: 1.8; font-family: 'Nunito', sans-serif; }
.btn-kakao {
  display: block; width: 100%; padding: 14px; border-radius: 12px;
  background: #25D366; color: white; font-size: 15px; font-weight: 700;
  border: none; cursor: pointer; font-family: 'Noto Sans KR', sans-serif;
  margin-bottom: 10px;
}
.btn-retry {
  display: block; width: 100%; padding: 14px; border-radius: 12px;
  background: var(--border); color: #374151; font-size: 15px; font-weight: 700;
  border: none; cursor: pointer; font-family: 'Noto Sans KR', sans-serif;
}
</style>
</head>
<body>

<div class="header">
  <div class="header-brand">씨유에탑 ✦ 영어단어장</div>
  <div class="header-title">수능기본 1</div>
  <div class="header-sub en">총 1,000단어 · 파트 1/2</div>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('list')">📋 단어목록</div>
  <div class="tab" onclick="switchTab('flash')">🃏 플래시카드</div>
  <div class="tab" onclick="switchTab('quiz')">🎯 퀴즈</div>
  <div class="tab" onclick="switchTab('test')">📝 테스트</div>
</div>

<!-- ===== TAB1: 단어목록 ===== -->
<div id="screen-list" class="screen active" style="flex-direction:column;">
  <div class="range-bar">
    <div class="range-label">📌 범위 선택</div>
    <div class="range-chips" id="range-chips-list"></div>
  </div>
  <div class="search-area">
    <input class="search-input" id="search-input" type="text" placeholder="🔍 영어 / 한글 검색...">
    <button class="filter-btn active" id="filter-all" onclick="setFilter('all')">전체</button>
    <button class="filter-btn" id="filter-unknown" onclick="setFilter('unknown')">모름</button>
    <button class="filter-btn" id="filter-fav" onclick="setFilter('fav')">⭐</button>
  </div>
  <div class="word-list" id="word-list"></div>
</div>

<!-- ===== TAB2: 플래시카드 ===== -->
<div id="screen-flash" class="screen" style="flex-direction:column;">
  <div class="fc-range-bar">
    <div class="range-label" style="padding:0 2px 6px;font-size:11px;color:var(--gray);font-weight:600;">📌 범위 선택</div>
    <div class="range-chips" id="range-chips-flash"></div>
  </div>
  <div class="fc-wrap">
    <div class="fc-counter en" id="fc-counter">1 / 50</div>
    <div class="fc-card" id="fc-card" onclick="fcFlip()">
      <button class="fc-fav" id="fc-fav-btn" onclick="event.stopPropagation();fcToggleFav()">★</button>
      <div class="fc-word en" id="fc-word">Loading...</div>
      <div class="fc-ph en" id="fc-ph"></div>
      <div class="fc-meaning" id="fc-meaning"></div>
      <div class="fc-tap-hint" id="fc-hint">탭하여 뜻 확인</div>
    </div>
    <div class="fc-nav">
      <button class="fc-nav-btn secondary" onclick="fcPrev()">◀ 이전</button>
      <button class="fc-nav-btn" style="background:var(--warn);padding:12px 16px;" onclick="speak(document.getElementById('fc-word').textContent)">🔊</button>
      <button class="fc-nav-btn" onclick="fcNext()">다음 ▶</button>
    </div>
  </div>
</div>

<!-- ===== TAB3: 퀴즈 ===== -->
<div id="screen-quiz" class="screen" style="flex-direction:column;">
  <div class="quiz-wrap" id="quiz-wrap">
    <div class="quiz-start" id="quiz-start">
      <div style="font-size:48px;margin-bottom:12px;">🎯</div>
      <h2>퀴즈 모드</h2>
      <p>10문제 4지선다 랜덤 퀴즈</p>
      <button class="btn-primary" onclick="startQuiz()">퀴즈 시작</button>
    </div>
    <div id="quiz-question-area" style="display:none;"></div>
    <div id="quiz-result-area" style="display:none;"></div>
  </div>
</div>

<!-- ===== TAB4: 테스트 ===== -->
<div id="screen-test" class="screen" style="flex-direction:column;">

  <!-- 설정 화면 -->
  <div id="test-setup" class="test-setup">
    <h2>📝 테스트 설정</h2>
    <div class="form-group">
      <label class="form-label">이름 입력 (필수)</label>
      <input class="form-input" id="test-name" type="text" placeholder="이름을 입력하세요">
    </div>
    <div class="form-group">
      <label class="form-label">문제 수 (고정)</label>
      <input class="form-input" value="50문제" disabled style="background:#f1f5f9;color:var(--gray);">
    </div>
    <div class="form-group">
      <label class="form-label">범위 선택</label>
      <select class="form-select" id="test-range">
        <option value="all">전체 (1~1000번)</option>
        <option value="0">1~50번</option>
        <option value="1">51~100번</option>
        <option value="2">101~150번</option>
        <option value="3">151~200번</option>
        <option value="4">201~250번</option>
        <option value="5">251~300번</option>
        <option value="6">301~350번</option>
        <option value="7">351~400번</option>
        <option value="8">401~450번</option>
        <option value="9">451~500번</option>
        <option value="10">501~550번</option>
        <option value="11">551~600번</option>
        <option value="12">601~650번</option>
        <option value="13">651~700번</option>
        <option value="14">701~750번</option>
        <option value="15">751~800번</option>
        <option value="16">801~850번</option>
        <option value="17">851~900번</option>
        <option value="18">901~950번</option>
        <option value="19">951~1000번</option>
      </select>
    </div>
    <button class="btn-primary" onclick="startTest()">테스트 시작</button>
  </div>

  <!-- 진행 화면 -->
  <div id="test-running" style="display:none;flex:1;flex-direction:column;display:none;">
    <div class="test-progress-bar-wrap">
      <div class="test-progress-bar"><div class="test-progress-fill" id="test-prog-fill" style="width:0%"></div></div>
      <div class="test-meta">
        <span id="test-prog-text">1 / 50</span>
        <span>✅ <span id="test-correct-cnt">0</span>개 정답</span>
      </div>
    </div>
    <div class="test-q-wrap">
      <div class="test-card">
        <div class="test-q-word en" id="test-q-word"></div>
        <div class="test-q-ph en" id="test-q-ph"></div>
        <div class="test-q-hint">한글 뜻을 입력하세요</div>
      </div>
    </div>
    <div class="test-input-wrap">
      <input class="test-input" id="test-answer-input" type="text" placeholder="뜻을 입력하고 Enter..." onkeydown="testKeyDown(event)">
    </div>
  </div>

  <!-- 결과 화면 -->
  <div id="test-result" class="test-result" style="display:none;"></div>

// ── localStorage ──
function loadStorage() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); } catch { return {}; }
}
function saveStorage(data) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch {}
}
let store = loadStorage();

function getKey(w) { return w.word + '|' + w.meaning; }
function isKnown(w) { return (store[getKey(w)] || {}).status === 'known'; }
function isFav(w) { return !!(store[getKey(w)] || {}).fav; }
function toggleKnown(w) {
  const k = getKey(w); store[k] = store[k] || {};
  store[k].status = store[k].status === 'known' ? '' : 'known';
  saveStorage(store);
}
function toggleFav(w) {
  const k = getKey(w); store[k] = store[k] || {};
  store[k].fav = !store[k].fav;
  saveStorage(store);
}

// ── TTS ──
function speak(text) {
  if (!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US'; u.rate = 0.85;
  window.speechSynthesis.speak(u);
}

// ── TABS ──
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.classList.toggle('active', ['list','flash','quiz','test'][i] === tab);
  });
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + tab).classList.add('active');
  if (tab === 'list') renderList();
  if (tab === 'flash') renderFlash();
}

// ── RANGE ──
let listRange = 'all', flashRange = 0;

function buildRangeChips(containerId, current, onSelect) {
  const el = document.getElementById(containerId);
  let html = '<div class="range-chip ' + (current==='all'?'active':'') + '" onclick="(' + onSelect.toString() + ')(\'all\')">전체</div>';
  RANGES.forEach((r,i) => {
    html += '<div class="range-chip ' + (current===i?'active':'') + '" onclick="(' + onSelect.toString() + ')(' + i + ')">' + r.label + '</div>';
  });
  el.innerHTML = html;
}

function getFilteredWords(range) {
  if (range === 'all') return WORDS;
  const r = RANGES[range];
  return WORDS.slice(r.start, r.end);
}

// ── LIST ──
let listFilter = 'all', listSearch = '';

function renderList() {
  buildRangeChips('range-chips-list', listRange, function(r) {
    listRange = r;
    renderList();
  });
  document.getElementById('search-input').oninput = e => { listSearch = e.target.value; renderList(); };
  let words = getFilteredWords(listRange);
  if (listSearch) {
    const q = listSearch.toLowerCase();
    words = words.filter(w => w.word.toLowerCase().includes(q) || w.meaning.includes(q));
  }
  if (listFilter === 'unknown') words = words.filter(w => !isKnown(w));
  if (listFilter === 'fav') words = words.filter(w => isFav(w));
  
  const container = document.getElementById('word-list');
  container.innerHTML = words.map((w,i) => {
    const known = isKnown(w), fav = isFav(w);
    const posColor = {n:'#dbeafe',v:'#dcfce7',a:'#fef9c3',ad:'#fce7f3',prep:'#f3e8ff',conj:'#ffe4e6'};
    const posLabel = {n:'명사',v:'동사',a:'형용사',ad:'부사',prep:'전치사',conj:'접속사'};
    return `<div class="word-card ${known?'known':''}" id="wc_${getKey(w).replace(/[^a-z0-9]/gi,'_')}">
      <button class="check-btn ${known?'checked':''}" onclick="toggleWordKnown(this,'${getKey(w)}')">${known?'✔':''}</button>
      <div class="word-info">
        <div class="word-en">${w.word}<span class="word-pos" style="background:${posColor[w.pos]||'#f1f5f9'}">${posLabel[w.pos]||w.pos}</span></div>
        <div class="word-ph">${w.phonetic}</div>
        <div class="word-ko">${w.meaning}</div>
      </div>
      <div class="word-actions">
        <button class="icon-btn" onclick="speak('${w.word.replace(/'/g,"\'")}')">🔊</button>
        <button class="icon-btn fav-btn ${fav?'faved':''}" onclick="toggleWordFav(this,'${getKey(w)}')">${fav?'★':'☆'}</button>
      </div>
    </div>`;
  }).join('');
}

function toggleWordKnown(btn, key) {
  const w = WORDS.find(x => getKey(x) === key);
  if (!w) return;
  toggleKnown(w);
  const known = isKnown(w);
  btn.className = 'check-btn' + (known ? ' checked' : '');
  btn.textContent = known ? '✔' : '';
  btn.closest('.word-card').className = 'word-card' + (known ? ' known' : '');
}

function toggleWordFav(btn, key) {
  const w = WORDS.find(x => getKey(x) === key);
  if (!w) return;
  toggleFav(w);
  const fav = isFav(w);
  btn.className = 'icon-btn fav-btn' + (fav ? ' faved' : '');
  btn.textContent = fav ? '★' : '☆';
}

function setFilter(f) {
  listFilter = f;
  ['all','unknown','fav'].forEach(x => {
    document.getElementById('filter-' + x).classList.toggle('active', x === f);
  });
  renderList();
}

// ── FLASHCARD ──
let fcWords = [], fcIdx = 0, fcFlipped = false;
let fcTouchStartX = 0;

function renderFlash() {
  buildRangeChips('range-chips-flash', flashRange, function(r) {
    flashRange = r;
    fcWords = getFilteredWords(flashRange);
    fcIdx = 0;
    renderFlashCard();
  });
  fcWords = getFilteredWords(flashRange);
  renderFlashCard();
  
  const card = document.getElementById('fc-card');
  card.ontouchstart = e => { fcTouchStartX = e.touches[0].clientX; };
  card.ontouchend = e => {
    const dx = e.changedTouches[0].clientX - fcTouchStartX;
    if (Math.abs(dx) > 60) { dx < 0 ? fcNext() : fcPrev(); }
    else fcFlip();
  };
}

function renderFlashCard() {
  if (!fcWords.length) return;
  const w = fcWords[fcIdx];
  fcFlipped = false;
  document.getElementById('fc-word').textContent = w.word;
  document.getElementById('fc-ph').textContent = w.phonetic;
  document.getElementById('fc-meaning').style.display = 'none';
  document.getElementById('fc-meaning').textContent = w.meaning;
  document.getElementById('fc-hint').style.display = 'block';
  document.getElementById('fc-counter').textContent = (fcIdx+1) + ' / ' + fcWords.length;
  const favBtn = document.getElementById('fc-fav-btn');
  favBtn.textContent = isFav(w) ? '★' : '☆';
  favBtn.className = 'fc-fav' + (isFav(w) ? ' faved' : '');
}

function fcFlip() {
  if (fcFlipped) return;
  fcFlipped = true;
  const w = fcWords[fcIdx];
  document.getElementById('fc-meaning').style.display = 'block';
  document.getElementById('fc-hint').style.display = 'none';
  speak(w.word);
}

function fcNext() {
  if (fcIdx < fcWords.length - 1) { fcIdx++; renderFlashCard(); }
}
function fcPrev() {
  if (fcIdx > 0) { fcIdx--; renderFlashCard(); }
}
function fcToggleFav() {
  const w = fcWords[fcIdx];
  toggleFav(w);
  const fav = isFav(w);
  const btn = document.getElementById('fc-fav-btn');
  btn.textContent = fav ? '★' : '☆';
  btn.className = 'fc-fav' + (fav ? ' faved' : '');
}

// ── QUIZ ──
let quizData = [], quizIdx = 0, quizScore = 0, quizAnswered = false;

function startQuiz() {
  const pool = [...WORDS].sort(() => Math.random() - .5).slice(0, 10);
  quizData = pool;
  quizIdx = 0; quizScore = 0;
  document.getElementById('quiz-start').style.display = 'none';
  document.getElementById('quiz-result-area').style.display = 'none';
  renderQuizQuestion();
}

function renderQuizQuestion() {
  quizAnswered = false;
  const w = quizData[quizIdx];
  const others = WORDS.filter(x => x.meaning !== w.meaning).sort(() => Math.random()-.5).slice(0,3);
  const choices = [w, ...others].sort(() => Math.random()-.5);
  
  document.getElementById('quiz-question-area').style.display = 'block';
  document.getElementById('quiz-question-area').innerHTML = `
    <div class="quiz-question">
      <div class="quiz-num">${quizIdx+1} / 10</div>
      <div class="quiz-word en">${w.word}</div>
      <div class="quiz-ph en">${w.phonetic}</div>
      <div class="quiz-choices">
        ${choices.map(c => `<button class="quiz-choice" onclick="selectQuiz(this,'${c.meaning}','${w.meaning}','${w.word.replace(/'/g,"\'")}')">${c.meaning}</button>`).join('')}
      </div>
    </div>`;
}

function selectQuiz(btn, chosen, correct, word) {
  if (quizAnswered) return;
  quizAnswered = true;
  const isCorrect = chosen === correct;
  if (isCorrect) { quizScore++; speak(word); }
  document.querySelectorAll('.quiz-choice').forEach(b => {
    if (b.textContent === correct) b.classList.add('correct');
    else if (b === btn && !isCorrect) b.classList.add('wrong');
  });
  setTimeout(() => {
    quizIdx++;
    if (quizIdx < 10) renderQuizQuestion();
    else showQuizResult();
  }, 1200);
}

function showQuizResult() {
  document.getElementById('quiz-question-area').style.display = 'none';
  const pct = Math.round(quizScore/10*100);
  const emoji = pct===100?'🏆':pct>=80?'🎉':pct>=60?'👍':'💪';
  const msg = pct===100?'완벽해요!':pct>=80?'훌륭해요!':pct>=60?'잘 하고 있어요!':'더 연습해봐요!';
  document.getElementById('quiz-result-area').style.display = 'block';
  document.getElementById('quiz-result-area').innerHTML = `
    <div class="quiz-result-box">
      <div class="quiz-result-emoji">${emoji}</div>
      <div class="quiz-result-score en">${quizScore} / 10</div>
      <div class="quiz-result-msg">${msg}</div>
      <button class="btn-primary" onclick="startQuiz()">다시 풀기</button>
    </div>`;
}

// ── TEST ──
let testWords = [], testIdx = 0, testCorrect = 0, testWrong = [], testRight = [], testName = '';

function startTest() {
  const name = document.getElementById('test-name').value.trim();
  if (!name) { alert('이름을 입력해주세요!'); return; }
  testName = name;
  const rangeVal = document.getElementById('test-range').value;
  let pool = rangeVal === 'all' ? [...WORDS] : [...WORDS.slice(RANGES[+rangeVal].start, RANGES[+rangeVal].end)];
  pool = pool.sort(() => Math.random()-.5).slice(0, 50);
  testWords = pool;
  testIdx = 0; testCorrect = 0; testWrong = []; testRight = [];
  
  document.getElementById('test-setup').style.display = 'none';
  document.getElementById('test-result').style.display = 'none';
  const running = document.getElementById('test-running');
  running.style.display = 'flex';
  running.style.flexDirection = 'column';
  renderTestQuestion();
}

function renderTestQuestion() {
  const w = testWords[testIdx];
  document.getElementById('test-prog-fill').style.width = (testIdx/50*100) + '%';
  document.getElementById('test-prog-text').textContent = (testIdx+1) + ' / 50';
  document.getElementById('test-correct-cnt').textContent = testCorrect;
  document.getElementById('test-q-word').textContent = w.word;
  document.getElementById('test-q-ph').textContent = w.phonetic;
  document.getElementById('test-answer-input').value = '';
  document.getElementById('test-answer-input').focus();
  setTimeout(() => speak(w.word), 200);
}

function isSimilar(input, correct) {
  const normalize = s => s.replace(/\s/g,'').replace(/[~\-·,]/g,'').toLowerCase();
  const a = normalize(input), c = normalize(correct);
  if (a === c) return true;
  if (a.length >= 2 && c.includes(a)) return true;
  const core = c.replace(/하다|되다|시키다|이다/g,'').trim();
  if (core.length >= 2 && a.includes(core)) return true;
  return false;
}

function testKeyDown(e) {
  if (e.key !== 'Enter') return;
  const input = document.getElementById('test-answer-input').value.trim();
  if (!input) return;
  const w = testWords[testIdx];
  const correct = isSimilar(input, w.meaning);
  if (correct) { testCorrect++; testRight.push(w); }
  else { testWrong.push({word:w, input:input}); }
  testIdx++;
  if (testIdx < 50) renderTestQuestion();
  else showTestResult();
}

function showTestResult() {
  document.getElementById('test-running').style.display = 'none';
  const pct = Math.round(testCorrect/50*100);
  const emoji = pct===100?'🏆':pct>=80?'🎉':pct>=60?'👍':'💪';
  const now = new Date();
  const dateStr = now.getFullYear() + '. ' + (now.getMonth()+1) + '. ' + now.getDate() + '.';
  
  const wrongHTML = testWrong.length ? testWrong.map(x => `
    <div class="wrong-item">
      <div class="wrong-word en">${x.word.word}</div>
      <div class="wrong-detail">입력: <span>${x.input}</span> / 정답: <span class="correct-ans">${x.word.meaning}</span></div>
    </div>`).join('') : '<div style="color:var(--success);font-weight:600;text-align:center;padding:10px">🎉 모두 정답!</div>';
  
  const rightWords = testRight.map(x => x.word).join(', ');
  
  document.getElementById('test-result').innerHTML = `
    <div class="result-hero">
      <div class="result-emoji">${emoji}</div>
      <div class="result-name">${testName}</div>
      <div class="result-score en">${testCorrect} / 50</div>
      <div class="result-pct en">${pct}점</div>
    </div>
    <div class="wrong-list">
      <h3>❌ 틀린 단어 (${testWrong.length}개)</h3>
      ${wrongHTML}
    </div>
    <div class="correct-list">
      <h3>✅ 맞은 단어 (${testRight.length}개)</h3>
      <div class="correct-words en">${rightWords}</div>
    </div>
    <button class="btn-kakao" onclick="copyResult('${testName}','${testCorrect}','${pct}','${dateStr}')">📋 카톡으로 결과 복사</button>
    <button class="btn-retry" onclick="retryTest()">↩ 다시 테스트</button>
  `;
  document.getElementById('test-result').style.display = 'block';
  
  window._testResultData = {name:testName, score:testCorrect, pct, date:dateStr, wrong:testWrong, right:testRight};
}

function copyResult(name, score, pct, date) {
  const d = window._testResultData;
  const wrongLines = d.wrong.map(x => `  ${x.word.word} → 입력:${x.input} / 정답:${x.word.meaning}`).join('\n');
  const rightWords = d.right.map(x => x.word).join(', ');
  const text = `[씨유에탑 수능기본1] 테스트 결과
날짜: ${date}
이름: ${name}
점수: ${score}/50 (${pct}점)
─────────────────
❌ 틀린 단어 (${d.wrong.length}개)
${wrongLines}
─────────────────
✅ 맞은 단어: ${rightWords}`;
  navigator.clipboard.writeText(text).then(() => alert('📋 복사 완료! 카톡에 붙여넣기 하세요.')).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
    alert('📋 복사 완료!');
  });
}

function retryTest() {
  document.getElementById('test-result').style.display = 'none';
  document.getElementById('test-setup').style.display = 'block';
}

// INIT
renderList();
renderFlash();
</script>
</body>
</html>
