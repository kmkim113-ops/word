<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>고2 자이 3회 단어장</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #2563EB;
      --primary-dark: #1D4ED8;
      --primary-light: #EFF6FF;
      --success: #10B981;
      --danger: #EF4444;
      --warn: #F59E0B;
      --gray: #6B7280;
      --border: #E5E7EB;
      --bg: #F9FAFB;
    }
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: 'Noto Sans KR', 'Nunito', sans-serif;
      background: var(--bg);
      color: #111827;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
    }
    #app-container {
      width: 100%;
      max-width: 420px;
      background: #ffffff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
      box-shadow: 0 0 10px rgba(0,0,0,0.05);
    }
    .header {
      background: #ffffff;
      padding: 16px;
      border-bottom: 1px solid var(--border);
      text-align: center;
    }
    .header-brand {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 4px;
    }
    .header-sub {
      font-size: 0.85rem;
      color: var(--gray);
    }
    .tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      background: #ffffff;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .tab-btn {
      flex: 1;
      border: none;
      background: none;
      padding: 12px 0;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--gray);
      cursor: pointer;
      text-align: center;
      transition: color 0.2s, border-color 0.2s;
      border-bottom: 2px solid transparent;
    }
    .tab-btn.active {
      color: var(--primary);
      border-bottom: 2px solid var(--primary);
      font-weight: 700;
    }
    .content {
      flex: 1;
      padding: 16px;
      overflow-y: auto;
    }
    .tab-panel {
      display: none;
    }
    .tab-panel.active {
      display: block;
    }
    
    /* 공통 컴포넌트 */
    .range-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 12px;
    }
    .range-btn {
      padding: 6px 12px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: #ffffff;
      font-size: 0.75rem;
      color: var(--gray);
      cursor: pointer;
    }
    .range-btn.active {
      background: var(--primary-light);
      color: var(--primary);
      border-color: var(--primary);
      font-weight: 700;
    }
    
    /* 단어 목록 탭 */
    .search-box {
      margin-bottom: 12px;
    }
    .search-input {
      width: 100%;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      font-size: 0.9rem;
      outline: none;
    }
    .search-input:focus {
      border-color: var(--primary);
    }
    .filter-bar {
      display: flex;
      gap: 6px;
      margin-bottom: 16px;
    }
    .filter-btn {
      flex: 1;
      padding: 8px 0;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: #ffffff;
      font-size: 0.8rem;
      color: var(--gray);
      cursor: pointer;
    }
    .filter-btn.active {
      background: var(--primary);
      color: #ffffff;
      border-color: var(--primary);
    }
    .word-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .word-card {
      background: #ffffff;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: opacity 0.2s;
    }
    .word-card.known {
      opacity: 0.35;
    }
    .chk-btn {
      width: 20px;
      height: 20px;
      border-radius: 4px;
      border: 2px solid var(--border);
      background: #ffffff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      color: transparent;
      user-select: none;
    }
    .word-card.known .chk-btn {
      border-color: var(--success);
      background: var(--success);
      color: #ffffff;
    }
    .word-info {
      flex: 1;
    }
    .word-eng {
      font-family: 'Nunito', sans-serif;
      font-size: 1.05rem;
      font-weight: 700;
      margin-bottom: 2px;
    }
    .word-kor {
      font-size: 0.85rem;
      color: var(--gray);
    }
    .ibtn {
      border: none;
      background: none;
      cursor: pointer;
      font-size: 1.2rem;
      padding: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .fav-btn {
      color: #D1D5DB;
    }
    .fav-btn.active {
      color: var(--warn);
    }
    
    /* 플래시카드 탭 */
    .fc-container {
      perspective: 1000px;
      margin: 20px 0;
    }
    .fc-card {
      width: 100%;
      height: 220px;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.4s;
      cursor: pointer;
    }
    .fc-card.flipped {
      transform: rotateY(180deg);
    }
    .fc-side {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      border-radius: 12px;
      border: 1px solid var(--border);
      box-shadow: 0 4px 6px rgba(0,0,0,0.05);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }
    .fc-front {
      background: #ffffff;
    }
    .fc-back {
      background: var(--primary-light);
      transform: rotateY(180deg);
    }
    .fc-fav-pos {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 10;
    }
    .fc-eng {
      font-family: 'Nunito', sans-serif;
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--primary);
    }
    .fc-kor {
      font-size: 1.3rem;
      font-weight: 500;
      color: #111827;
      word-break: keep-all;
    }
    .fc-nav {
      display: flex;
      gap: 10px;
      margin-top: 16px;
    }
    .fc-nav-btn {
      flex: 1;
      padding: 12px 0;
      border-radius: 8px;
      border: none;
      background: var(--primary);
      color: #ffffff;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
    }
    .fc-nav-btn.sec {
      background: var(--border);
      color: #111827;
    }
    .fc-indicator {
      text-align: center;
      font-size: 0.85rem;
      color: var(--gray);
      margin-top: 10px;
    }
    
    /* 퀴즈 탭 */
    .qz-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    .qz-progress {
      font-size: 0.85rem;
      color: var(--gray);
    }
    .qz-card {
      background: #ffffff;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 30px 20px;
      text-align: center;
      margin-bottom: 20px;
    }
    .qz-eng {
      font-family: 'Nunito', sans-serif;
      font-size: 1.6rem;
      font-weight: 700;
    }
    .qz-options {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .qz-opt {
      width: 100%;
      padding: 14px 16px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: #ffffff;
      font-size: 0.95rem;
      text-align: left;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }
    .qz-opt.correct {
      background: var(--success);
      color: #ffffff;
      border-color: var(--success);
    }
    .qz-opt.incorrect {
      background: var(--danger);
      color: #ffffff;
      border-color: var(--danger);
    }
    
    /* 테스트 탭 */
    .test-setup {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .test-form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .test-form-label {
      font-size: 0.9rem;
      font-weight: 700;
    }
    .test-input {
      width: 100%;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      font-size: 0.9rem;
      outline: none;
    }
    .test-input:focus {
      border-color: var(--primary);
    }
    .test-start-btn {
      width: 100%;
      padding: 12px 0;
      border-radius: 8px;
      border: none;
      background: var(--primary);
      color: #ffffff;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
    }
    .test-active {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .test-stats {
      display: flex;
      justify-content: space-between;
      font-size: 0.85rem;
      color: var(--gray);
    }
    .pbar-bg {
      width: 100%;
      height: 6px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden;
    }
    .pbar-fg {
      height: 100%;
      background: var(--primary);
      width: 0%;
      transition: width 0.2s;
    }
    .test-qcard {
      background: #ffffff;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 40px 20px;
      text-align: center;
    }
    .test-qword {
      font-family: 'Nunito', sans-serif;
      font-size: 1.8rem;
      font-weight: 700;
    }
    .test-ans-box {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    
    /* 결과 화면 공통 */
    .res-container {
      text-align: center;
      padding: 24px 0;
    }
    .res-emoji {
      font-size: 4rem;
      margin-bottom: 12px;
    }
    .res-title {
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .res-score {
      font-size: 1.1rem;
      color: var(--primary);
      font-weight: 700;
      margin-bottom: 24px;
    }
    .res-btn {
      width: 100%;
      padding: 12px 0;
      border-radius: 8px;
      border: none;
      background: var(--primary);
      color: #ffffff;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 12px;
    }
    .wrong-header {
      text-align: left;
      font-size: 0.95rem;
      font-weight: 700;
      margin: 20px 0 10px 0;
      border-left: 4px solid var(--danger);
      padding-left: 8px;
    }
    .wrong-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      text-align: left;
      margin-bottom: 20px;
    }
    .wrong-item {
      background: #FFF5F5;
      border: 1px solid #FED7D7;
      border-radius: 6px;
      padding: 10px 12px;
      font-size: 0.85rem;
    }
    .wrong-eng {
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      color: var(--danger);
      margin-bottom: 2px;
    }
    .wrong-detail {
      color: var(--gray);
    }
  </style>
</head>
<body>
  <div id="app-container">
    <div class="header">
      <div class="header-brand en">씨유에탑 ✦ 영어단어장</div>
      <div class="header-sub">고2 자이 3회 · 총 339단어</div>
    </div>
    
    <div class="tabs">
      <button class="tab-btn active" id="tb-list" onclick="switchTab('list')">단어목록</button>
      <button class="tab-btn" id="tb-flash" onclick="switchTab('flash')">플래시카드</button>
      <button class="tab-btn" id="tb-quiz" onclick="switchTab('quiz')">퀴즈모드</button>
      <button class="tab-btn" id="tb-test" onclick="switchTab('test')">📝 테스트</button>
    </div>
    
    <div class="content">
      <!-- 탭 1: 단어목록 -->
      <div id="tab-list" class="tab-panel active">
        <div id="lrbar" class="range-bar"></div>
        <div class="search-box">
          <input type="text" id="search-input" class="search-input" placeholder="영어 또는 한글 뜻 검색" oninput="renderList()">
        </div>
        <div class="filter-bar">
          <button class="filter-btn active" id="flt-all" onclick="setFilter('all')">전체</button>
          <button class="filter-btn" id="flt-not" onclick="setFilter('not')">모름</button>
          <button class="filter-btn" id="flt-fav" onclick="setFilter('fav')">⭐즐겨찾기</button>
        </div>
        <div id="word-list-cnt" class="word-list"></div>
      </div>
      
      <!-- 탭 2: 플래시카드 -->
      <div id="tab-flash" class="tab-panel">
        <div id="fcrbar" class="range-bar"></div>
        <div class="fc-container">
          <div id="fccard" class="fc-card">
            <div class="fc-side fc-front">
              <button id="fcfav" class="ibtn fav-btn fc-fav-pos">★</button>
              <div id="fcword" class="fc-eng">word</div>
            </div>
            <div class="fc-side fc-back">
              <div id="fcmean" class="fc-kor">뜻</div>
            </div>
          </div>
        </div>
        <div class="fc-indicator" id="fc-ind">0 / 0</div>
        <div class="fc-nav">
          <button class="fc-nav-btn sec" onclick="fcPrev()">◀ 이전</button>
          <button class="fc-nav-btn" style="background:var(--warn);" onclick="speakFc()">🔊</button>
          <button class="fc-nav-btn" onclick="fcNext()">다음 ▶</button>
        </div>
      </div>
      
      <!-- 탭 3: 퀴즈모드 -->
      <div id="tab-quiz" class="tab-panel">
        <div id="quiz-screen"></div>
      </div>
      
      <!-- 탭 4: 테스트 -->
      <div id="tab-test" class="tab-panel">
        <div id="test-screen"></div>
      </div>
    </div>
  </div>

    var storageKey = "cutop_go2_jai_3";

    // 로컬 스토리지 데이터 로드
    var progress = {};
    try {
      var saved = localStorage.getItem(storageKey);
      if (saved) progress = JSON.parse(saved);
    } catch(e) {}

    function saveProgress() {
      try {
        localStorage.setItem(storageKey, JSON.stringify(progress));
      } catch(e) {}
    }

    function getStoreKey(w) {
      return w.word + "|" + w.meaning;
    }

    function esc(s) {
      return String(s)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    // 범위바 데이터 빌드
    function buildRanges(ws) {
      var r = [{ label: "전체", s: 0, e: ws.length }];
      for (var i = 0; i < ws.length; i += 50) {
        r.push({ label: (i+1) + "-" + Math.min(i+50, ws.length), s: i, e: Math.min(i+50, ws.length) });
      }
      return r;
    }
    var ranges = buildRanges(rawWords);

    function renderRangeBar(containerId, activeIdx, clickFuncStr) {
      var html = "";
      ranges.forEach(function(r, idx) {
        var activeClass = (idx === activeIdx) ? "active" : "";
        html += '<button class="range-btn ' + activeClass + '" onclick="' + clickFuncStr + '(' + idx + ')">' + r.label + '</button>';
      });
      document.getElementById(containerId).innerHTML = html;
    }

    function setLR(idx) {
      lri = idx;
      renderRangeBar("lrbar", lri, "setLR");
      renderList();
    }

    function setFR(idx) {
      fri = idx;
      renderRangeBar("fcrbar", fri, "setFR");
      initFC();
    }

    // TTS 구현
    function speak(t) {
      if (!("speechSynthesis" in window)) return;
      window.speechSynthesis.cancel();
      var u = new SpeechSynthesisUtterance(t);
      u.lang = "en-US";
      u.rate = 0.85;
      window.speechSynthesis.speak(u);
    }
    function speakFc() {
      speak(document.getElementById("fcword").textContent);
    }

    // 탭 전환
    function switchTab(t) {
      ["list", "flash", "quiz", "test"].forEach(function(n) {
        document.getElementById("tb-"+n).classList.toggle("active", n===t);
        document.getElementById("tab-"+n).classList.toggle("active", n===t);
      });
      if (t==="list")  { renderRangeBar("lrbar", lri, "setLR"); renderList(); }
      if (t==="flash") { renderRangeBar("fcrbar", fri, "setFR"); initFC(); }
      if (t==="quiz")  { initQuiz(); }
      if (t==="test")  { renderSetup(); }
    }

    // 단어목록 탭 관련
    function setFilter(type) {
      currentFilter = type;
      ["all", "not", "fav"].forEach(function(f) {
        document.getElementById("flt-"+f).classList.toggle("active", f===type);
      });
      renderList();
    }

    function toggleKnown(wordStr, meaningStr) {
      var k = wordStr + "|" + meaningStr;
      if (!progress[k]) progress[k] = {};
      progress[k].status = (progress[k].status === "known") ? "" : "known";
      saveProgress();
      renderList();
    }

    function toggleFav(wordStr, meaningStr, element) {
      var k = wordStr + "|" + meaningStr;
      if (!progress[k]) progress[k] = {};
      progress[k].fav = !progress[k].fav;
      saveProgress();
      if (element) {
        element.classList.toggle("active", progress[k].fav);
      } else {
        renderList();
      }
    }

    function renderList() {
      var searchVal = document.getElementById("search-input").value.toLowerCase().trim();
      var range = ranges[lri];
      var listSlice = rawWords.slice(range.s, range.e);
      var html = "";

      listSlice.forEach(function(w) {
        var k = getStoreKey(w);
        var state = progress[k] || {};
        var isKnown = (state.status === "known");
        var isFav = !!state.fav;

        // 필터링 적용
        if (currentFilter === "not" && isKnown) return;
        if (currentFilter === "fav" && !isFav) return;

        // 검색 적용
        if (searchVal) {
          var engMatch = w.word.toLowerCase().indexOf(searchVal) >= 0;
          var korMatch = w.meaning.toLowerCase().indexOf(searchVal) >= 0;
          if (!engMatch && !korMatch) return;
        }

        var cardClass = isKnown ? "word-card known" : "word-card";
        var favClass = isFav ? "ibtn fav-btn active" : "ibtn fav-btn";

        html += '<div class="' + cardClass + '">';
        html += '  <div class="chk-btn" onclick="toggleKnown(\'' + esc(w.word) + '\', \'' + esc(w.meaning) + '\')">✓</div>';
        html += '  <div class="word-info" onclick="speak(\'' + esc(w.word) + '\')">';
        html += '    <div class="word-eng">' + esc(w.word) + '</div>';
        html += '    <div class="word-kor">' + esc(w.meaning) + '</div>';
        html += '  </div>';
        html += '  <button class="ibtn" data-w="' + esc(w.word) + '" onclick="speak(this.dataset.w)">🔊</button>';
        html += '  <button class="' + favClass + '" onclick="toggleFav(\'' + esc(w.word) + '\', \'' + esc(w.meaning) + '\', this)">★</button>';
        html += '</div>';
      });

      document.getElementById("word-list-cnt").innerHTML = html || '<div style="text-align:center; color:var(--gray); padding: 40px 0;">조건에 맞는 단어가 없습니다.</div>';
    }

    // 플래시카드 탭 관련
    var fcIndex = 0;
    var fcList = [];
    var fcFlipped = false;

    function initFC() {
      var range = ranges[fri];
      fcList = rawWords.slice(range.s, range.e);
      fcIndex = 0;
      fcFlipped = false;
      document.getElementById("fccard").classList.remove("flipped");
      showFCCard();
    }

    function showFCCard() {
      if (fcList.length === 0) {
        document.getElementById("fcword").textContent = "단어 없음";
        document.getElementById("fcmean").textContent = "이 범위에 단어가 없습니다.";
        document.getElementById("fc-ind").textContent = "0 / 0";
        return;
      }
      var w = fcList[fcIndex];
      var k = getStoreKey(w);
      var isFav = progress[k] && progress[k].fav;
      
      document.getElementById("fcword").textContent = w.word;
      document.getElementById("fcmean").textContent = w.meaning;
      document.getElementById("fc-ind").textContent = (fcIndex + 1) + " / " + fcList.length;

      var favBtn = document.getElementById("fcfav");
      favBtn.className = isFav ? "ibtn fav-btn fc-fav-pos active" : "ibtn fav-btn fc-fav-pos";
      favBtn.onclick = function(e) {
        e.stopPropagation();
        toggleFav(w.word, w.meaning, favBtn);
      };
    }

    function fcFlip() {
      if (fcList.length === 0) return;
      if (fcFlipped) return;
      fcFlipped = true;
      document.getElementById("fccard").classList.add("flipped");
      speak(fcList[fcIndex].word);
    }

    function fcNext() {
      if (fcList.length <= 1) return;
      fcIndex = (fcIndex + 1) % fcList.length;
      resetFCard();
    }

    function fcPrev() {
      if (fcList.length <= 1) return;
      fcIndex = (fcIndex - 1 + fcList.length) % fcList.length;
      resetFCard();
    }

    function resetFCard() {
      fcFlipped = false;
      document.getElementById("fccard").classList.remove("flipped");
      setTimeout(showFCCard, 150);
    }

    // 플래시카드 스와이프 및 클릭 이벤트 등록
    var fcTX = 0;
    (function(){
      var card = document.getElementById("fccard");
      card.addEventListener("click", function(e) {
        if (e.target.id === "fcfav") return;
        fcFlip();
      });
      card.addEventListener("touchstart", function(e) {
        fcTX = e.touches[0].clientX;
      }, {passive:true});
      card.addEventListener("touchend", function(e) {
        var dx = e.changedTouches[0].clientX - fcTX;
        if (Math.abs(dx) > 50) {
          if (dx < 0) fcNext(); else fcPrev();
        }
      }, {passive:true});
    })();

    // 퀴즈 탭 관련
    var qIndex = 0;
    var qScore = 0;
    var qWords = [];
    var qLocked = false;

    function shuffle(arr) {
      var a = arr.slice();
      for (var i = a.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var t = a[i]; a[i] = a[j]; a[j] = t;
      }
      return a;
    }

    function initQuiz() {
      qScore = 0;
      qIndex = 0;
      qLocked = false;
      var pool = shuffle(rawWords);
      qWords = pool.slice(0, Math.min(10, pool.length));
      showQuiz();
    }

    function showQuiz() {
      if (qWords.length === 0) return;
      var screen = document.getElementById("quiz-screen");
      if (qIndex >= qWords.length) {
        var pct = Math.round((qScore / qWords.length) * 100);
        var emoji = "💪";
        if (pct === 100) emoji = "🏆";
        else if (pct >= 80) emoji = "🎉";
        else if (pct >= 60) emoji = "👍";

        var html = '<div class="res-container">';
        html += '  <div class="res-emoji">' + emoji + '</div>';
        html += '  <div class="res-title">퀴즈 완료!</div>';
        html += '  <div class="res-score">' + qScore + ' / ' + qWords.length + ' 문제 맞춤 (' + pct + '점)</div>';
        html += '  <button class="res-btn" onclick="initQuiz()">↩ 다시 풀기</button>';
        html += '</div>';
        screen.innerHTML = html;
        return;
      }

      var cur = qWords[qIndex];
      // 오답 풀 구성
      var wrongPool = rawWords.filter(function(w) { return w.meaning !== cur.meaning; });
      wrongPool = shuffle(wrongPool).slice(0, 3);
      var opts = wrongPool.map(function(w) { return { meaning: w.meaning, correct: false }; });
      opts.push({ meaning: cur.meaning, correct: true });
      opts = shuffle(opts);

      var qHtml = '<div class="qz-header">';
      qHtml += '  <span class="qz-progress">문제 ' + (qIndex + 1) + ' / ' + qWords.length + '</span>';
      qHtml += '  <span class="qz-progress">✅ 맞춤: ' + qScore + '</span>';
      qHtml += '</div>';
      qHtml += '<div class="qz-card">';
      qHtml += '  <div class="qz-eng">' + esc(cur.word) + '</div>';
      qHtml += '</div>';
      qHtml += '<div class="qz-options">';
      opts.forEach(function(o) {
        var corVal = o.correct ? "1" : "0";
        qHtml += '  <button class="qz-opt" data-cor="' + corVal + '" onclick="qAns(this)">' + esc(o.meaning) + '</button>';
      });
      qHtml += '</div>';

      screen.innerHTML = qHtml;
      qLocked = false;
    }

    function qAns(btn) {
      if (qLocked) return;
      qLocked = true;
      var isCor = btn.dataset.cor === "1";
      if (isCor) {
        btn.classList.add("correct");
        qScore++;
        speak(qWords[qIndex].word);
      } else {
        btn.classList.add("incorrect");
        // 정답 버튼 강조 표시
        var btns = document.querySelectorAll(".qz-opt");
        for (var i = 0; i < btns.length; i++) {
          if (btns[i].dataset.cor === "1") {
            btns[i].classList.add("correct");
          }
        }
      }
      setTimeout(function() {
        qIndex++;
        showQuiz();
      }, 1000);
    }

    // 테스트 📝 탭 관련
    var tIndex = 0;
    var tScore = 0;
    var tWords = [];
    var tWrong = [];
    var tCorrectList = [];
    var tUserName = "";
    var tSelectedRangeIdx = 0;

    function renderSetup() {
      var screen = document.getElementById("test-screen");
      var rHtml = "";
      ranges.forEach(function(r, idx) {
        var activeClass = (idx === tSelectedRangeIdx) ? "active" : "";
        rHtml += '<button class="range-btn ' + activeClass + '" onclick="setTR(' + idx + ')">' + r.label + '</button>';
      });

      var html = '<div class="test-setup">';
      html += '  <div class="test-form-group">';
      html += '    <label class="test-form-label">이름 입력</label>';
      html += '    <input type="text" id="t-name" class="test-input" placeholder="이름을 입력하세요" value="' + esc(tUserName) + '">';
      html += '  </div>';
      html += '  <div class="test-form-group">';
      html += '    <label class="test-form-label">출제 범위 선택</label>';
      html += '    <div class="range-bar">' + rHtml + '</div>';
      html += '  </div>';
      html += '  <button class="test-start-btn" onclick="startTest()">테스트 시작 ▶</button>';
      html += '</div>';
      
      screen.innerHTML = html;
    }

    function setTR(idx) {
      tSelectedRangeIdx = idx;
      renderSetup();
    }

    function startTest() {
      var nameVal = document.getElementById("t-name").value.trim();
      if (!nameVal) {
        alert("이름을 입력해주세요.");
        return;
      }
      tUserName = nameVal;
      
      var range = ranges[tSelectedRangeIdx];
      var pool = rawWords.slice(range.s, range.e);
      tWords = shuffle(pool).slice(0, Math.min(50, pool.length));
      
      tIndex = 0;
      tScore = 0;
      tWrong = [];
      tCorrectList = [];
      
      showTest();
    }

    function showTest() {
      var screen = document.getElementById("test-screen");
      if (tWords.length === 0) {
        screen.innerHTML = '<div style="text-align:center; padding:40px 0;">해당 범위에 단어가 없습니다.</div>';
        return;
      }

      if (tIndex >= tWords.length) {
        showTestResult();
        return;
      }

      var cur = tWords[tIndex];
      var progressPct = Math.round((tIndex / tWords.length) * 100);

      var html = '<div class="test-active">';
      html += '  <div class="test-stats">';
      html += '    <span>문제 ' + (tIndex + 1) + ' / ' + tWords.length + '</span>';
      html += '    <span>✅ 맞춤수: ' + tScore + '</span>';
      html += '  </div>';
      html += '  <div class="pbar-bg"><div class="pbar-fg" style="width:' + progressPct + '%"></div></div>';
      html += '  <div class="test-qcard">';
      html += '    <div class="test-qword">' + esc(cur.word) + '</div>';
      html += '  </div>';
      html += '  <div class="test-ans-box">';
      html += '    <input type="text" id="t-ans" class="test-input" placeholder="한글 뜻을 입력하세요" autocomplete="off" onkeydown="testKey(event)">';
      html += '    <button class="test-start-btn" onclick="submitTestAns()">다음</button>';
      html += '  </div>';
      html += '</div>';

      screen.innerHTML = html;
      document.getElementById("t-ans").focus();
      speak(cur.word);
    }

    function testKey(e) {
      if (e.keyCode === 13) {
        submitTestAns();
      }
    }

    function isSim(input, correct) {
      var norm = function(s) {
        return s.replace(/\s/g, "").replace(/[~\-·,]/g, "").toLowerCase();
      };
      var a = norm(input), c = norm(correct);
      if (a === c) return true;
      if (a.length >= 2 && c.indexOf(a) >= 0) return true;
      var core = c.replace(/하다|되다|시키다|이다/g, "").trim();
      if (core.length >= 2 && a.indexOf(core) >= 0) return true;
      return false;
    }

    function submitTestAns() {
      var ansInput = document.getElementById("t-ans");
      var ansVal = ansInput.value.trim();
      var cur = tWords[tIndex];

      if (isSim(ansVal, cur.meaning)) {
        tScore++;
        tCorrectList.push(cur.word);
      } else {
        tWrong.push({
          word: cur.word,
          input: ansVal || "(미입력)",
          correct: cur.meaning
        });
      }

      tIndex++;
      showTest();
    }

    function showTestResult() {
      var screen = document.getElementById("test-screen");
      var pct = Math.round((tScore / tWords.length) * 100);
      var emoji = "💪";
      if (pct === 100) emoji = "🏆";
      else if (pct >= 80) emoji = "🎉";
      else if (pct >= 60) emoji = "👍";

      var html = '<div class="res-container">';
      html += '  <div class="res-emoji">' + emoji + '</div>';
      html += '  <div class="res-title">' + esc(tUserName) + ' 학생의 결과</div>';
      html += '  <div class="res-score">' + tScore + ' / ' + tWords.length + ' 문제 맞춤 (' + pct + '점)</div>';
      
      html += '  <button class="res-btn" style="background:#25D366; margin-bottom: 8px;" onclick="copyResult()">📋 카톡으로 결과 복사</button>';
      html += '  <button class="res-btn" style="background:var(--gray);" onclick="renderSetup()">↩ 다시 테스트</button>';

      if (tWrong.length > 0) {
        html += '  <div class="wrong-header">틀린 단어 (' + tWrong.length + '개)</div>';
        html += '  <div class="wrong-list">';
        tWrong.forEach(function(w) {
          html += '    <div class="wrong-item">';
          html += '      <div class="wrong-eng">' + esc(w.word) + '</div>';
          html += '      <div class="wrong-detail">입력: ' + esc(w.input) + ' / 정답: ' + esc(w.correct) + '</div>';
          html += '    </div>';
        });
        html += '  </div>';
      }
      html += '</div>';

      screen.innerHTML = html;
    }

    function copyResult() {
      var today = new Date();
      var dateStr = today.getFullYear() + "-" + (today.getMonth() + 1) + "-" + today.getDate();
      var pct = Math.round((tScore / tWords.length) * 100);

      var text = "[씨유에탑 고2 자이 3회] 테스트 결과\n";
      text += "날짜: " + dateStr + "\n";
      text += "이름: " + tUserName + "\n";
      text += "점수: " + tScore + "/" + tWords.length + " (" + pct + "점)\n";
      text += "─────────────────\n";
      if (tWrong.length > 0) {
        text += "❌ 틀린 단어 (" + tWrong.length + "개)\n";
        tWrong.forEach(function(w) {
          text += "  " + w.word + " → 입력:" + w.input + " / 정답:" + w.correct + "\n";
        });
      } else {
        text += "❌ 틀린 단어 없음\n";
      }
      text += "─────────────────\n";
      text += "✅ 맞은 단어: " + tCorrectList.join(", ");

      // 클립보드 복사
      var tArea = document.createElement("textarea");
      tArea.value = text;
      document.body.appendChild(tArea);
      tArea.select();
      try {
        document.execCommand("copy");
        alert("테스트 결과가 클립보드에 복사되었습니다. 카카오톡에 붙여넣기 하세요!");
      } catch (e) {
        alert("복사 실패. 브라우저 보안 설정을 확인해 주세요.");
      }
      document.body.removeChild(tArea);
    }

    // 초기 실행
    setLR(0);
  </script>
</body>
</html>
