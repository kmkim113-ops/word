<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>씨유에탑 영어단어장</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #2563EB;
      --primary-dark: #1D4ED8;
      --primary-light: #EFF6FF;
      --success: #10B981;
      --danger: #EF4444;
      --warn: #F59E0B;
      --gray: #6B7280;
      --border: #E5E7EB;
      --bg: #F9FAFB;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: #f0f2f5;
      color: #1f2937;
      display: flex;
      justify-content: center;
    }
    .en { font-family: 'Nunito', sans-serif; }
    #app {
      width: 100%;
      max-width: 420px;
      min-height: 100vh;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      position: relative;
      box-shadow: 0 0 10px rgba(0,0,0,0.05);
    }
    .header {
      background: #ffffff;
      padding: 16px;
      border-bottom: 1px solid var(--border);
      text-align: center;
    }
    .header-brand {
      font-size: 18px;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 4px;
    }
    .header-sub {
      font-size: 13px;
      color: var(--gray);
    }
    .nav-tabs {
      display: flex;
      background: #ffffff;
      border-bottom: 1px solid var(--border);
    }
    .tab-btn {
      flex: 1;
      padding: 12px 0;
      border: none;
      background: none;
      font-size: 14px;
      font-weight: 500;
      color: var(--gray);
      cursor: pointer;
      text-align: center;
    }
    .tab-btn.active {
      color: var(--primary);
      border-bottom: 3px solid var(--primary);
      font-weight: 700;
    }
    .tab-content {
      flex: 1;
      display: none;
      padding: 16px;
      overflow-y: auto;
    }
    .tab-content.active {
      display: flex;
      flex-direction: column;
    }
    .range-bar {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      padding-bottom: 8px;
      margin-bottom: 12px;
    }
    .range-bar::-webkit-scrollbar { display: none; }
    .range-btn {
      flex-shrink: 0;
      padding: 6px 12px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: #ffffff;
      font-size: 12px;
      cursor: pointer;
    }
    .range-btn.active {
      background: var(--primary);
      color: #ffffff;
      border-color: var(--primary);
    }
    .search-box {
      width: 100%;
      padding: 10px 14px;
      border-radius: 8px;
      border: 1px solid var(--border);
      font-size: 14px;
      margin-bottom: 12px;
      outline: none;
    }
    .filter-bar {
      display: flex;
      gap: 6px;
      margin-bottom: 12px;
    }
    .filter-btn {
      flex: 1;
      padding: 8px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: #ffffff;
      font-size: 13px;
      cursor: pointer;
    }
    .filter-btn.active {
      background: var(--primary-light);
      color: var(--primary);
      border-color: var(--primary);
      font-weight: 700;
    }
    .word-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .word-card {
      background: #ffffff;
      border-radius: 8px;
      border: 1px solid var(--border);
      padding: 12px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .word-card.known {
      opacity: 0.35;
    }
    .chk-btn {
      width: 24px;
      height: 24px;
      border-radius: 4px;
      border: 1px solid var(--border);
      background: #ffffff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
    }
    .word-card.known .chk-btn {
      background: var(--success);
      color: white;
      border-color: var(--success);
    }
    .word-info {
      flex: 1;
    }
    .word-eng {
      font-size: 16px;
      font-weight: 700;
      color: #111827;
      margin-bottom: 2px;
    }
    .word-kor {
      font-size: 14px;
      color: #4b5563;
    }
    .ibtn {
      background: none;
      border: none;
      font-size: 18px;
      cursor: pointer;
      padding: 4px;
    }
    .fav-btn {
      color: #d1d5db;
    }
    .fav-btn.active {
      color: var(--warn);
    }
    .fc-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 20px;
    }
    .fc-card {
      width: 100%;
      height: 240px;
      background: #ffffff;
      border-radius: 12px;
      border: 1px solid var(--border);
      box-shadow: 0 4px 6px rgba(0,0,0,0.02);
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      cursor: pointer;
      text-align: center;
    }
    .fc-fav {
      position: absolute;
      top: 14px;
      right: 14px;
      font-size: 22px;
      background: none;
      border: none;
      cursor: pointer;
      color: #d1d5db;
    }
    .fc-fav.active {
      color: var(--warn);
    }
    .fc-eng {
      font-size: 28px;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 12px;
    }
    .fc-kor {
      font-size: 18px;
      color: var(--gray);
    }
    .fc-nav {
      display: flex;
      width: 100%;
      gap: 10px;
    }
    .fc-nav-btn {
      flex: 1;
      padding: 12px;
      border-radius: 8px;
      border: none;
      background: var(--primary);
      color: #ffffff;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }
    .fc-nav-btn.sec {
      background: var(--gray);
    }
    .qz-container, .ts-container {
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    .qz-card {
      background: #ffffff;
      border-radius: 12px;
      border: 1px solid var(--border);
      padding: 24px 16px;
      text-align: center;
      margin-bottom: 16px;
    }
    .qz-word {
      font-size: 26px;
      font-weight: 700;
      color: #111827;
    }
    .qz-options {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .qz-opt {
      width: 100%;
      padding: 14px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: #ffffff;
      text-align: left;
      font-size: 15px;
      cursor: pointer;
    }
    .qz-opt.correct {
      background: var(--success);
      color: white;
      border-color: var(--success);
    }
    .qz-opt.wrong {
      background: var(--danger);
      color: white;
      border-color: var(--danger);
    }
    .res-card {
      background: #ffffff;
      border-radius: 12px;
      border: 1px solid var(--border);
      padding: 30px 20px;
      text-align: center;
    }
    .res-emoji { font-size: 48px; margin-bottom: 10px; }
    .res-score { font-size: 24px; font-weight: 700; margin-bottom: 4px; }
    .res-pct { font-size: 16px; color: var(--gray); margin-bottom: 20px; }
    .btn-block {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: none;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      color: white;
      background: var(--primary);
    }
    .form-group {
      margin-bottom: 16px;
    }
    .form-group label {
      display: block;
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .form-control {
      width: 100%;
      padding: 10px 12px;
      border-radius: 6px;
      border: 1px solid var(--border);
      font-size: 14px;
      outline: none;
    }
    .ts-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      font-size: 13px;
      color: var(--gray);
    }
    .pbar-bg {
      width: 100%;
      height: 6px;
      background: var(--border);
      border-radius: 3px;
      margin-bottom: 20px;
    }
    .pbar-fill {
      height: 100%;
      background: var(--primary);
      border-radius: 3px;
      width: 0%;
    }
    .ts-box {
      background: #ffffff;
      border-radius: 12px;
      border: 1px solid var(--border);
      padding: 30px 20px;
      text-align: center;
      margin-bottom: 20px;
    }
    .ts-word {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 20px;
    }
    .wrong-list {
      text-align: left;
      margin-top: 20px;
      max-height: 200px;
      overflow-y: auto;
      border-top: 1px solid var(--border);
      padding-top: 10px;
    }
    .wrong-item {
      font-size: 13px;
      margin-bottom: 6px;
      color: var(--danger);
    }
  </style>
</head>
<body>

<div id="app">
  <div class="header">
    <div class="header-brand en">씨유에탑 ✦ 영어단어장</div>
    <div class="header-sub">중등3_2 · 총 1000단어</div>
  </div>

  <div class="nav-tabs">
    <button class="tab-btn active" id="tb-list" onclick="switchTab('list')">단어목록</button>
    <button class="tab-btn" id="tb-flash" onclick="switchTab('flash')">플래시카드</button>
    <button class="tab-btn" id="tb-quiz" onclick="switchTab('quiz')">퀴즈모드</button>
    <button class="tab-btn" id="tb-test" onclick="switchTab('test')">📝 테스트</button>
  </div>

  <!-- 탭 1: 단어목록 -->
  <div class="tab-content active" id="tab-list">
    <div class="range-bar" id="lrbar"></div>
    <input type="text" class="search-box" id="lsearch" placeholder="영어 또는 한글 검색..." oninput="renderList()">
    <div class="filter-bar">
      <button class="filter-btn active" id="lf-all" onclick="setLFilter('all')">전체</button>
      <button class="filter-btn" id="lf-not" onclick="setLFilter('not')">모름</button>
      <button class="filter-btn" id="lf-fav" onclick="setLFilter('fav')">⭐즐겨찾기</button>
    </div>
    <div class="word-list" id="lwlist"></div>
  </div>

  <!-- 탭 2: 플래시카드 -->
  <div class="tab-content" id="tab-flash">
    <div class="range-bar" id="fcrbar"></div>
    <div class="fc-container">
      <div class="fc-card" id="fccard">
        <button class="fc-fav" id="fcfav">★</button>
        <div class="fc-eng en" id="fcword"></div>
        <div class="fc-kor" id="fcmean"></div>
      </div>
      <div class="fc-nav">
        <button class="fc-nav-btn sec" onclick="fcPrev()">◀ 이전</button>
        <button class="fc-nav-btn" style="background:var(--warn);" onclick="speakFc()">🔊</button>
        <button class="fc-nav-btn" onclick="fcNext()">다음 ▶</button>
      </div>
    </div>
  </div>

  <!-- 탭 3: 퀴즈모드 -->
  <div class="tab-content" id="tab-quiz">
    <div class="qz-container" id="qzmain"></div>
  </div>

  <!-- 탭 4: 테스트 -->
  <div class="tab-content" id="tab-test">
    <div class="ts-container" id="tsmain"></div>
  </div>
</div>

    window.speechSynthesis.cancel();
    var u = new SpeechSynthesisUtterance(t);
    u.lang = "en-US";
    u.rate = 0.85;
    window.speechSynthesis.speak(u);
  }
  function speakFc() {
    speak(document.getElementById("fcword").textContent);
  }

  function renderRangeBar(id, curIdx, clickFnStr) {
    var el = document.getElementById(id);
    var h = "";
    ranges.forEach(function(r, idx) {
      var act = idx === curIdx ? " active" : "";
      h += '<button class="range-btn' + act + '" onclick="' + clickFnStr + '(' + idx + ')">' + esc(r.label) + '</button>';
    });
    el.innerHTML = h;
  }

  function setLR(idx) { lri = idx; renderRangeBar("lrbar", lri, "setLR"); renderList(); }
  function setFR(idx) { fri = idx; renderRangeBar("fcrbar", fri, "setFR"); initFC(); }

  function setLFilter(f) {
    ["all","not","fav"].forEach(function(n) {
      document.getElementById("lf-"+n).classList.toggle("active", n===f);
    });
    lfilter = f;
    renderList();
  }

  function toggleKnown(idx) {
    var w = rawWords[idx];
    var p = getProg(w);
    var n = p.status === "known" ? "" : "known";
    setProg(w, "status", n);
    document.getElementById("wcard-"+idx).classList.toggle("known", n==="known");
  }

  function toggleFav(idx, isList) {
    var w = rawWords[idx];
    var p = getProg(w);
    var n = !p.fav;
    setProg(w, "fav", n);
    if (isList) {
      document.getElementById("fav-"+idx).classList.toggle("active", n);
    } else {
      document.getElementById("fcfav").classList.toggle("active", n);
    }
  }

  function renderList() {
    var q = document.getElementById("lsearch").value.toLowerCase().trim();
    var r = ranges[lri];
    var listEl = document.getElementById("lwlist");
    var h = "";

    for (var i = r.s; i < r.e; i++) {
      var w = rawWords[i];
      var p = getProg(w);

      if (lfilter === "not" && p.status === "known") continue;
      if (lfilter === "fav" && !p.fav) continue;

      if (q) {
        if (w.word.toLowerCase().indexOf(q) === -1 && w.meaning.toLowerCase().indexOf(q) === -1) continue;
      }

      var cls = p.status === "known" ? " word-card known" : " word-card";
      var fcls = p.fav ? " ibtn fav-btn active" : " ibtn fav-btn";

      h += '<div class="' + cls + '" id="wcard-' + i + '">' +
           '  <button class="chk-btn" onclick="toggleKnown(' + i + ')">✔</button>' +
           '  <div class="word-info">' +
           '    <div class="word-eng en">' + esc(w.word) + '</div>' +
           '    <div class="word-kor">' + esc(w.meaning) + '</div>' +
           '  </div>' +
           '  <button class="ibtn" data-w="' + esc(w.word) + '" onclick="speak(this.dataset.w)">🔊</button>' +
           '  <button class="' + fcls + '" id="fav-' + i + '" onclick="toggleFav(' + i + ', true)">★</button>' +
           '</div>';
    }
    listEl.innerHTML = h;
  }

  var fcWords = [];
  var fci = 0;
  var fcFlipped = false;
  var fcTX = 0;

  function initFC() {
    var r = ranges[fri];
    fcWords = [];
    for (var i = r.s; i < r.e; i++) {
      fcWords.push({ idx: i, word: rawWords[i].word, meaning: rawWords[i].meaning });
    }
    fci = 0;
    renderFC();
  }

  function renderFC() {
    if (fcWords.length === 0) {
      document.getElementById("fcword").textContent = "단어가 없습니다";
      document.getElementById("fcmean").textContent = "";
      document.getElementById("fcfav").style.display = "none";
      return;
    }
    document.getElementById("fcfav").style.display = "block";
    var item = fcWords[fci];
    var p = getProg(rawWords[item.idx]);
    
    document.getElementById("fcword").textContent = item.word;
    document.getElementById("fcmean").textContent = "";
    document.getElementById("fcfav").classList.toggle("active", p.fav);
    fcFlipped = false;
  }

  function fcFlip() {
    if (fcFlipped || fcWords.length === 0) return;
    fcFlipped = true;
    document.getElementById("fcmean").textContent = fcWords[fci].meaning;
    speak(fcWords[fci].word);
  }

  function fcNext() {
    if (fcWords.length === 0) return;
    fci = (fci + 1) % fcWords.length;
    renderFC();
  }

  function fcPrev() {
    if (fcWords.length === 0) return;
    fci = (fci - 1 + fcWords.length) % fcWords.length;
    renderFC();
  }

  function shuffle(arr) {
    var a = arr.slice();
    for (var i = a.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var t = a[i]; a[i] = a[j]; a[j] = t;
    }
    return a;
  }

  var qWords = [];
  var qci = 0;
  var qScore = 0;
  var qLocked = false;

  function initQuiz() {
    var pool = shuffle(rawWords);
    qWords = pool.slice(0, Math.min(10, pool.length));
    qci = 0;
    qScore = 0;
    renderQuiz();
  }

  function renderQuiz() {
    var container = document.getElementById("qzmain");
    if (qci >= qWords.length) {
      var pct = Math.round((qScore / qWords.length) * 100);
      var emo = pct === 100 ? "🏆" : pct >= 80 ? "🎉" : pct >= 60 ? "👍" : "💪";
      container.innerHTML = '<div class="res-card">' +
                            '  <div class="res-emoji">' + emo + '</div>' +
                            '  <div class="res-score">' + qScore + ' / ' + qWords.length + '</div>' +
                            '  <div class="res-pct">' + pct + '점</div>' +
                            '  <button class="btn-block" onclick="initQuiz()">↩ 다시 풀기</button>' +
                            '</div>';
      return;
    }
    qLocked = false;
    var correctWord = qWords[qci];
    var options = [correctWord.meaning];
    var wrongPool = rawWords.filter(function(w) { return w.meaning !== correctWord.meaning; });
    var sw = shuffle(wrongPool).slice(0, 3);
    sw.forEach(function(w) { options.push(w.meaning); });
    options = shuffle(options);

    var h = '<div class="ts-header"><span>퀴즈 모드</span><span>' + (qci+1) + '/' + qWords.length + '</span></div>' +
            '<div class="qz-card"><div class="qz-word en">' + esc(correctWord.word) + '</div></div>' +
            '<div class="qz-options">';
    options.forEach(function(opt) {
      var isCor = opt === correctWord.meaning ? "1" : "0";
      h += '<button class="qz-opt" data-cor="' + isCor + '" onclick="qAns(this)">' + esc(opt) + '</button>';
    });
    h += '</div>';
    container.innerHTML = h;
  }

  function qAns(btn) {
    if (qLocked) return;
    qLocked = true;
    var isCor = btn.dataset.cor === "1";
    if (isCor) {
      btn.className = "qz-opt correct";
      qScore++;
      speak(qWords[qci].word);
    } else {
      btn.className = "qz-opt wrong";
      var opts = document.getElementsByClassName("qz-opt");
      for (var i = 0; i < opts.length; i++) {
        if (opts[i].dataset.cor === "1") opts[i].className = "qz-opt correct";
      }
    }
    setTimeout(function() {
      qci++;
      renderQuiz();
    }, 1000);
  }

  var tRangeIdx = 0;
  var tWords = [];
  var tci = 0;
  var tScore = 0;
  var tWrong = [];
  var tRight = [];
  var tName = "";

  function renderSetup() {
    var container = document.getElementById("tsmain");
    var h = '<div class="form-group">' +
            '  <label>이름 입력</label>' +
            '  <input type="text" class="form-control" id="tname" placeholder="이름을 입력하세요" value="' + esc(tName) + '">' +
            '</div>' +
            '<div class="form-group">' +
            '  <label>테스트 범위</label>' +
            '  <div class="range-bar" id="trbar"></div>' +
            '</div>' +
            '<button class="btn-block" style="margin-top:10px;" onclick="startTest()">테스트 시작 ▶</button>';
    container.innerHTML = h;
    renderRangeBar("trbar", tRangeIdx, "setTIndex");
  }

  function setTIndex(idx) { tRangeIdx = idx; renderRangeBar("trbar", tRangeIdx, "setTIndex"); }

  function startTest() {
    var nameInput = document.getElementById("tname").value.trim();
    if (!nameInput) { alert("이름을 입력해주세요."); return; }
    tName = nameInput;

    var r = ranges[tRangeIdx];
    var pool = [];
    for (var i = r.s; i < r.e; i++) pool.push(rawWords[i]);
    pool = shuffle(pool);

    tWords = pool.slice(0, Math.min(50, pool.length));
    tci = 0;
    tScore = 0;
    tWrong = [];
    tRight = [];

    renderTestProgress();
  }

  function renderTestProgress() {
    var container = document.getElementById("tsmain");
    if (tci >= tWords.length) {
      renderTestResult();
      return;
    }
    var curWord = tWords[tci];
    var pct = Math.round((tci / tWords.length) * 100);

    var h = '<div class="ts-header">' +
            '  <span>현재문제: ' + (tci+1) + '/' + tWords.length + '</span>' +
            '  <span>✅ 맞춤수: ' + tScore + '</span>' +
            '</div>' +
            '<div class="pbar-bg"><div class="pbar-fill" style="width:' + pct + '%;"></div></div>' +
            '<div class="ts-box">' +
            '  <div class="ts-word en">' + esc(curWord.word) + '</div>' +
            '  <input type="text" class="form-control" id="tans" placeholder="뜻을 입력하고 Enter" autocomplete="off" onkeydown="testKey(event)">' +
            '</div>' +
            '<button class="btn-block" onclick="submitTestAns()">다음 문제 ➔</button>';
    container.innerHTML = h;
    document.getElementById("tans").focus();
    speak(curWord.word);
  }

  function testKey(e) { if (e.keyCode === 13) submitTestAns(); }

  function isSim(input, correct) {
    var norm = function(s) {
      return s.replace(/\s/g,"").replace(/[~\-·,]/g,"").toLowerCase();
    };
    var a = norm(input), c = norm(correct);
    if (a === c) return true;
    if (a.length >= 2 && c.indexOf(a) >= 0) return true;
    var core = c.replace(/하다|되다|시키다|이다/g,"").trim();
    if (core.length >= 2 && a.indexOf(core) >= 0) return true;
    return false;
  }

  function submitTestAns() {
    var ansInput = document.getElementById("tans").value.trim();
    var curWord = tWords[tci];
    var ok = isSim(ansInput, curWord.meaning);

    if (ok) {
      tScore++;
      tRight.push(curWord.word);
    } else {
      tWrong.push({ word: curWord.word, input: ansInput || "(빈칸)", correct: curWord.meaning });
    }
    tci++;
    renderTestProgress();
  }

  function renderTestResult() {
    var container = document.getElementById("tsmain");
    var pct = Math.round((tScore / tWords.length) * 100);
    var emo = pct === 100 ? "🏆" : pct >= 80 ? "🎉" : pct >= 60 ? "👍" : "💪";

    var h = '<div class="res-card">' +
            '  <div class="res-emoji">' + emo + '</div>' +
            '  <div class="res-score">' + tScore + ' / ' + tWords.length + '</div>' +
            '  <div class="res-pct">' + pct + '점</div>' +
            '  <button class="btn-block" style="background:#25D366; margin-bottom:10px;" onclick="copyKakao()">📋 카톡으로 결과 복사</button>' +
            '  <button class="btn-block sec" onclick="renderSetup()">↩ 다시 테스트</button>';

    if (tWrong.length > 0) {
      h += '<div class="wrong-list">';
      tWrong.forEach(function(item) {
        h += '<div class="wrong-item">❌ ' + esc(item.word) + ' → 입력:' + esc(item.input) + ' / 정답:' + esc(item.correct) + '</div>';
      });
      h += '</div>';
    }
    h += '</div>';
    container.innerHTML = h;
  }

  function copyKakao() {
    var dt = new Date();
    var dtStr = dt.getFullYear() + "-" + (dt.getMonth()+1) + "-" + dt.getDate();
    var pct = Math.round((tScore / tWords.length) * 100);

    var txt = "[씨유에탑 중등3_2] 테스트 결과\n" +
              "날짜: " + dtStr + "\n" +
              "이름: " + tName + "\n" +
              "점수: " + tScore + "/" + tWords.length + " (" + pct + "점)\n" +
              "─────────────────\n" +
              "❌ 틀린 단어 (" + tWrong.length + "개)\n";
    
    tWrong.forEach(function(item) {
      txt += "  " + item.word + " → 입력:" + item.input + " / 정답:" + item.correct + "\n";
    });

    txt += "─────────────────\n" +
           "✅ 맞은 단어: " + tRight.join(", ");

    var ta = document.createElement("textarea");
    ta.value = txt;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand("copy");
    document.body.removeChild(ta);
    alert("결과가 복사되었습니다. 카톡에 붙여넣으세요!");
  }

  function switchTab(t) {
    ["list","flash","quiz","test"].forEach(function(n) {
      document.getElementById("tb-"+n).classList.toggle("active", n===t);
      document.getElementById("tab-"+n).classList.toggle("active", n===t);
    });
    if (t==="list")  { renderRangeBar("lrbar", lri, "setLR"); renderList(); }
    if (t==="flash") { renderRangeBar("fcrbar", fri, "setFR"); initFC(); }
    if (t==="quiz")  { initQuiz(); }
    if (t==="test")  { renderSetup(); }
  }

  loadProg();
  renderRangeBar("lrbar", lri, "setLR");
  renderList();

  (function(){
    var card = document.getElementById("fccard");
    card.addEventListener("click", function(e) {
      if (e.target.id === "fcfav") {
        toggleFav(fcWords[fci].idx, false);
        return;
      }
      fcFlip();
    });
    card.addEventListener("touchstart", function(e) {
      fcTX = e.touches[0].clientX;
    }, {passive:true});
    card.addEventListener("touchend", function(e) {
      var dx = e.changedTouches[0].clientX - fcTX;
      if (Math.abs(dx) > 50) { if (dx < 0) fcNext(); else fcPrev(); }
    }, {passive:true});
  })();
</script>

</body>
</html>
