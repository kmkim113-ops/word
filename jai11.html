<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>씨유에탑 영어단어장 — 고1 자이스토리 1회</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
:root {
  --primary: #2563EB;
  --primary-dark: #1D4ED8;
  --primary-light: #EFF6FF;
  --success: #10B981;
  --danger: #EF4444;
  --warn: #F59E0B;
  --gray: #6B7280;
  --border: #E5E7EB;
  --bg: #F9FAFB;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: #111827; max-width: 420px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; }
header { background: var(--primary); color: #fff; padding: 14px 16px 10px; text-align: center; flex-shrink: 0; }
header .htop { font-family: 'Nunito', sans-serif; font-size: 13px; font-weight: 800; letter-spacing: 1px; opacity: 0.9; }
header .hsub { font-size: 12px; opacity: 0.8; margin-top: 2px; }
.tabs { display: flex; background: #fff; border-bottom: 2px solid var(--border); flex-shrink: 0; }
.tab { flex: 1; padding: 10px 4px; text-align: center; font-size: 11px; font-weight: 600; color: var(--gray); cursor: pointer; border: none; background: none; font-family: 'Noto Sans KR', sans-serif; }
.tab.on { color: var(--primary); border-bottom: 2px solid var(--primary); margin-bottom: -2px; }
.pane { display: none; flex: 1; overflow-y: auto; padding: 12px; flex-direction: column; }
.pane.on { display: flex; }
.rbar { display: flex; gap: 6px; overflow-x: auto; padding: 0 0 8px 0; margin-bottom: 8px; -webkit-overflow-scrolling: touch; scrollbar-width: none; flex-shrink: 0; }
.rbar::-webkit-scrollbar { display: none; }
.rbtn { flex-shrink: 0; padding: 6px 12px; border-radius: 20px; border: 1.5px solid var(--border); background: #fff; font-size: 12px; font-weight: 600; color: var(--gray); cursor: pointer; white-space: nowrap; font-family: 'Nunito', sans-serif; }
.rbtn.on { background: var(--primary); border-color: var(--primary); color: #fff; }
/* Tab 1 */
.search-wrap { display: flex; gap: 8px; margin-bottom: 8px; flex-shrink: 0; }
.search-wrap input { flex: 1; padding: 8px 12px; border: 1.5px solid var(--border); border-radius: 20px; font-size: 13px; font-family: 'Noto Sans KR', sans-serif; outline: none; }
.search-wrap input:focus { border-color: var(--primary); }
.filter-row { display: flex; gap: 6px; margin-bottom: 10px; flex-shrink: 0; }
.fbtn { padding: 5px 12px; border-radius: 20px; border: 1.5px solid var(--border); background: #fff; font-size: 12px; font-weight: 600; color: var(--gray); cursor: pointer; white-space: nowrap; font-family: 'Noto Sans KR', sans-serif; }
.fbtn.on { background: var(--primary); border-color: var(--primary); color: #fff; }
#wlist { display: flex; flex-direction: column; gap: 8px; }
.wcard { display: flex; align-items: center; background: #fff; border-radius: 12px; padding: 10px 10px 10px 6px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); gap: 6px; transition: opacity 0.2s; }
.wcard.known { opacity: 0.35; }
.chk { width: 32px; height: 32px; border-radius: 50%; border: 2px solid var(--border); background: #fff; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; color: var(--gray); font-family: 'Nunito', sans-serif; }
.chk.on { background: var(--success); border-color: var(--success); color: #fff; }
.wbody { flex: 1; min-width: 0; }
.wword { font-family: 'Nunito', sans-serif; font-size: 15px; font-weight: 700; color: #111; word-break: break-all; }
.wmean { font-size: 12px; color: var(--gray); margin-top: 2px; }
.wacts { display: flex; flex-direction: column; gap: 4px; flex-shrink: 0; }
.ibtn { width: 30px; height: 30px; border-radius: 50%; border: 1.5px solid var(--border); background: #fff; font-size: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.favbtn.on { color: var(--warn); border-color: var(--warn); background: #fffbeb; }
/* Tab 2 */
.fc-wrap { display: flex; flex-direction: column; height: 100%; }
#fccard { background: #fff; border-radius: 18px; box-shadow: 0 4px 16px rgba(0,0,0,0.1); min-height: 220px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; position: relative; padding: 24px 20px; margin-bottom: 12px; user-select: none; flex-shrink: 0; }
#fcctr { position: absolute; top: 12px; right: 14px; font-family: 'Nunito', sans-serif; font-size: 12px; color: var(--gray); font-weight: 700; }
#fcfavbtn { position: absolute; top: 10px; left: 12px; background: none; border: none; font-size: 20px; cursor: pointer; color: var(--gray); }
#fcfavbtn.on { color: var(--warn); }
#fcword { font-family: 'Nunito', sans-serif; font-size: 26px; font-weight: 800; color: #111; text-align: center; word-break: break-all; }
#fcmean { font-size: 16px; color: var(--primary); text-align: center; margin-top: 12px; font-weight: 600; }
#fctap { font-size: 12px; color: var(--gray); margin-top: 14px; }
.fcnav { display: flex; gap: 8px; flex-shrink: 0; }
.fcbtn { flex: 1; padding: 12px; border-radius: 12px; border: none; background: var(--primary); color: #fff; font-size: 14px; font-weight: 700; cursor: pointer; font-family: 'Nunito', sans-serif; }
.fcbtn.sec { background: var(--border); color: #374151; }
/* Tab 3 */
#qbox { display: flex; flex-direction: column; gap: 10px; }
.qcard { background: #fff; border-radius: 14px; padding: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
.qnum { font-size: 11px; color: var(--gray); font-family: 'Nunito', sans-serif; font-weight: 700; margin-bottom: 6px; }
.qword { font-family: 'Nunito', sans-serif; font-size: 20px; font-weight: 800; color: #111; margin-bottom: 12px; }
.qopts { display: flex; flex-direction: column; gap: 8px; }
.qopt { padding: 10px 14px; border-radius: 10px; border: 1.5px solid var(--border); background: #fff; font-size: 13px; cursor: pointer; text-align: left; font-family: 'Noto Sans KR', sans-serif; }
.qopt.correct { background: #dcfce7; border-color: var(--success); color: #065f46; }
.qopt.wrong { background: #fee2e2; border-color: var(--danger); color: #991b1b; }
#qresult { display: none; background: #fff; border-radius: 14px; padding: 20px; text-align: center; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
.qscore-big { font-family: 'Nunito', sans-serif; font-size: 48px; font-weight: 800; color: var(--primary); }
.qscore-sub { font-size: 14px; color: var(--gray); margin-top: 4px; }
.qbtn { margin-top: 14px; padding: 12px 24px; border-radius: 12px; border: none; background: var(--primary); color: #fff; font-size: 14px; font-weight: 700; cursor: pointer; font-family: 'Nunito', sans-serif; }
/* Tab 4 */
#tsetup, #trun, #tres { display: none; flex-direction: column; gap: 10px; }
#tsetup.on, #trun.on, #tres.on { display: flex; }
.tcard { background: #fff; border-radius: 14px; padding: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
.tlabel { font-size: 12px; font-weight: 700; color: var(--gray); margin-bottom: 6px; }
.tinput { width: 100%; padding: 10px 14px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 14px; font-family: 'Noto Sans KR', sans-serif; outline: none; }
.tinput:focus { border-color: var(--primary); }
.tstart-btn { padding: 14px; border-radius: 12px; border: none; background: var(--primary); color: #fff; font-size: 15px; font-weight: 700; cursor: pointer; font-family: 'Nunito', sans-serif; }
.tprog-bar { width: 100%; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; margin-bottom: 6px; }
.tprog-fill { height: 100%; background: var(--primary); border-radius: 3px; transition: width 0.3s; }
.tprog-info { display: flex; justify-content: space-between; font-size: 12px; color: var(--gray); font-family: 'Nunito', sans-serif; font-weight: 700; margin-bottom: 12px; }
.tword-disp { font-family: 'Nunito', sans-serif; font-size: 28px; font-weight: 800; color: #111; text-align: center; margin: 20px 0; }
.tansbtn { padding: 12px; border-radius: 12px; border: none; background: var(--primary); color: #fff; font-size: 14px; font-weight: 700; cursor: pointer; font-family: 'Nunito', sans-serif; margin-top: 8px; }
.twrong-list { display: flex; flex-direction: column; gap: 6px; margin-top: 10px; }
.twrong-item { background: #fee2e2; border-radius: 10px; padding: 8px 12px; font-size: 12px; }
.twrong-word { font-family: 'Nunito', sans-serif; font-weight: 700; }
.tcopy-btn { padding: 12px; border-radius: 12px; border: none; background: #25D366; color: #fff; font-size: 14px; font-weight: 700; cursor: pointer; font-family: 'Nunito', sans-serif; }
.tretry-btn { padding: 12px; border-radius: 12px; border: none; background: var(--primary); color: #fff; font-size: 14px; font-weight: 700; cursor: pointer; font-family: 'Nunito', sans-serif; }
.tres-score { font-family: 'Nunito', sans-serif; font-size: 40px; font-weight: 800; color: var(--primary); text-align: center; }
.tres-pct { font-size: 14px; color: var(--gray); text-align: center; margin-top: 4px; }
.tcorrect-list { font-size: 12px; color: #065f46; background: #dcfce7; border-radius: 10px; padding: 10px 12px; line-height: 1.8; }

</head>
<body>
<header>
  <div class="htop">씨유에탑 ✦ 영어단어장</div>
  <div class="hsub">고1 자이스토리 1회 · 총 412단어</div>
</header>
<div class="tabs">
  <button class="tab on" id="tb-w" onclick="showTab('w')">📚 단어</button>
  <button class="tab" id="tb-fc" onclick="showTab('fc')">🃏 플래시</button>
  <button class="tab" id="tb-q" onclick="showTab('q')">❓ 퀴즈</button>
  <button class="tab" id="tb-t" onclick="showTab('t')">📝 테스트</button>
</div>
<!-- Tab 1 -->
<div class="pane on" id="pane-w">
  <div class="rbar" id="wrbar"></div>
  <div class="search-wrap">
    <input type="text" id="wsearch" placeholder="단어 또는 뜻 검색..." oninput="renderList()">
  </div>
  <div class="filter-row">
    <button class="fbtn on" id="flt-all" onclick="setFilter('all')">전체</button>
    <button class="fbtn" id="flt-unk" onclick="setFilter('unk')">모름</button>
    <button class="fbtn" id="flt-fav" onclick="setFilter('fav')">⭐즐겨찾기</button>
  </div>
  <div id="wlist"></div>
</div>
<!-- Tab 2 -->
<div class="pane" id="pane-fc">
  <div class="rbar" id="fcrbar"></div>
  <div class="fc-wrap">
    <div id="fccard">
      <span id="fcctr"></span>
      <button id="fcfavbtn" onclick="fcToggleFav()">☆</button>
      <div id="fcword"></div>
      <div id="fcmean"></div>
      <div id="fctap">탭하여 뜻 보기</div>
    </div>
    <div class="fcnav">
      <button class="fcbtn sec" onclick="fcPrev()">◀ 이전</button>
      <button class="fcbtn" style="background:var(--warn);" onclick="speakFc()">🔊</button>
      <button class="fcbtn" onclick="fcNext()">다음 ▶</button>
    </div>
  </div>
</div>
<!-- Tab 3 -->
<div class="pane" id="pane-q">
  <div id="qbox"></div>
  <div id="qresult">
    <div id="qemoji" style="font-size:48px;"></div>
    <div class="qscore-big" id="qscorebig"></div>
    <div class="qscore-sub" id="qscoresub"></div>
    <button class="qbtn" onclick="qInit()">🔄 다시 풀기</button>
  </div>
</div>
<!-- Tab 4 -->
<div class="pane" id="pane-t">
  <div id="tsetup" class="on">
    <div class="tcard">
      <div class="tlabel">이름</div>
      <input class="tinput" type="text" id="tname" placeholder="이름을 입력하세요">
    </div>
    <div class="tcard">
      <div class="tlabel">문제 수 (최대 50)</div>
      <input class="tinput" type="number" id="tcount" value="20" min="1" max="50">
    </div>
    <div class="tcard">
      <div class="tlabel">범위</div>
      <div class="rbar" id="trbar"></div>
    </div>
    <button class="tstart-btn" onclick="tStart()">테스트 시작 ▶</button>
  </div>
  <div id="trun">
    <div class="tprog-bar"><div class="tprog-fill" id="tpfill"></div></div>
    <div class="tprog-info"><span id="tpnum"></span><span id="tpcor"></span></div>
    <div class="tcard" style="text-align:center;">
      <div class="tword-disp" id="tworddisp"></div>
      <input class="tinput" type="text" id="tans" placeholder="한글 뜻을 입력하세요" autocomplete="off">
      <button class="tansbtn" onclick="tSubmit()" style="width:100%;">확인</button>
    </div>
  </div>
  <div id="tres">
    <div class="tcard" style="text-align:center;">
      <div id="testemoji" style="font-size:48px; margin-bottom:6px;"></div>
      <div class="tres-score" id="tresscore"></div>
      <div class="tres-pct" id="trespct"></div>
    </div>
    <div class="tcard" id="twrongcard" style="display:none;">
      <div class="tlabel">❌ 틀린 단어</div>
      <div class="twrong-list" id="twronglist"></div>
    </div>
    <div class="tcard" id="tcorcard" style="display:none;">
      <div class="tlabel">✅ 맞은 단어</div>
      <div class="tcorrect-list" id="tcorlist"></div>
    </div>
    <button class="tcopy-btn" onclick="tCopy()">📋 카톡으로 결과 복사</button>
    <button class="tretry-btn" onclick="tRetry()">↩ 다시 테스트</button>
  </div>
</div>

var STORE_KEY = 'cutop_go1_xstory_1';
var store = {};
try { store = JSON.parse(localStorage.getItem(STORE_KEY)) || {}; } catch(e) { store = {}; }
function save() { try { localStorage.setItem(STORE_KEY, JSON.stringify(store)); } catch(e) {} }
function getS(w) { var k = w.word + '|' + w.meaning; if (!store[k]) store[k] = {status:'', fav:false}; return store[k]; }

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function speak(t) {
  if (!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  var u = new SpeechSynthesisUtterance(t);
  u.lang = 'en-US';
  u.rate = 0.85;
  window.speechSynthesis.speak(u);
}
function speakFc() { speak(document.getElementById('fcword').textContent); }

function buildRanges(ws) {
  var r = [{label:'전체', s:0, e:ws.length}];
  for (var i = 0; i < ws.length; i += 50) {
    var e = Math.min(i + 50, ws.length);
    r.push({label:(i+1)+'~'+e, s:i, e:e});
  }
  return r;
}
var RANGES = buildRanges(rawWords);

function renderRangeBar(barId, ri, fn) {
  var bar = document.getElementById(barId);
  if (!bar) return;
  var h = [];
  for (var i = 0; i < RANGES.length; i++) {
    var cls = 'rbtn' + (i === ri ? ' on' : '');
    h.push('<button class="' + cls + '" data-i="' + i + '" onclick="' + fn + '(this)">' + RANGES[i].label + '</button>');
  }
  bar.innerHTML = h.join('');
}

function wordsForRange(ri) {
  var r = RANGES[ri];
  return rawWords.slice(r.s, r.e);
}

// ===== Tab 1 =====
var wri = 0;
var wFilter = 'all';

function setWR(btn) { wri = parseInt(btn.dataset.i); renderList(); }
function setFilter(f) {
  wFilter = f;
  document.getElementById('flt-all').className = 'fbtn' + (f === 'all' ? ' on' : '');
  document.getElementById('flt-unk').className = 'fbtn' + (f === 'unk' ? ' on' : '');
  document.getElementById('flt-fav').className = 'fbtn' + (f === 'fav' ? ' on' : '');
  renderList();
}

function renderList() {
  renderRangeBar('wrbar', wri, 'setWR');
  var pool = wordsForRange(wri);
  var q = document.getElementById('wsearch').value.toLowerCase().replace(/\s/g,'');
  var list = [];
  for (var i = 0; i < pool.length; i++) {
    var w = pool[i], s = getS(w);
    if (wFilter === 'unk' && s.status === 'known') continue;
    if (wFilter === 'fav' && !s.fav) continue;
    if (q) {
      var wl = w.word.toLowerCase().replace(/\s/g,'');
      var ml = w.meaning.replace(/\s/g,'');
      if (wl.indexOf(q) < 0 && ml.indexOf(q) < 0) continue;
    }
    list.push(w);
  }
  var h = [];
  for (var i = 0; i < list.length; i++) {
    var w = list[i], s = getS(w);
    var known = s.status === 'known', fav = s.fav;
    h.push('<div class="wcard' + (known ? ' known' : '') + '">');
    h.push('<button class="chk' + (known ? ' on' : '') + '" data-wi="' + i + '" onclick="toggleKnown(this)">' + (known ? '✔' : '') + '</button>');
    h.push('<div class="wbody">');
    h.push('<div class="wword">' + esc(w.word) + '</div>');
    h.push('<div class="wmean">' + esc(w.meaning) + '</div>');
    h.push('</div>');
    h.push('<div class="wacts">');
    h.push('<button class="ibtn" data-w="' + esc(w.word) + '" onclick="speak(this.dataset.w)">🔊</button>');
    h.push('<button class="ibtn favbtn' + (fav ? ' on' : '') + '" data-wi="' + i + '" onclick="toggleFav(this)">' + (fav ? '★' : '☆') + '</button>');
    h.push('</div>');
    h.push('</div>');
  }
  document.getElementById('wlist').innerHTML = h.join('');
  window._wlist = list;
}

function toggleKnown(btn) {
  var i = parseInt(btn.dataset.wi);
  var w = window._wlist[i];
  var s = getS(w);
  s.status = s.status === 'known' ? '' : 'known';
  save();
  renderList();
}

function toggleFav(btn) {
  var i = parseInt(btn.dataset.wi);
  var w = window._wlist[i];
  var s = getS(w);
  s.fav = !s.fav;
  save();
  renderList();
}

// ===== Tab 2 =====
var fcPool = [];
var fcIdx = 0;
var fcFlipped = false;
var fcTX = 0;
var fcEvReg = false;
var fri = 0;

function setFCR(btn) { fri = parseInt(btn.dataset.i); fcInit(); }

function fcRegisterEvents() {
  if (fcEvReg) return;
  fcEvReg = true;
  var card = document.getElementById('fccard');
  card.addEventListener('click', function(e) {
    if (e.target.id === 'fcfavbtn') return;
    fcFlip();
  });
  card.addEventListener('touchstart', function(e) {
    fcTX = e.touches[0].clientX;
  }, {passive:true});
  card.addEventListener('touchend', function(e) {
    var dx = e.changedTouches[0].clientX - fcTX;
    if (Math.abs(dx) > 50) { if (dx < 0) fcNext(); else fcPrev(); }
  }, {passive:true});
}

function fcInit() {
  renderRangeBar('fcrbar', fri, 'setFCR');
  fcPool = wordsForRange(fri);
  if (fcIdx >= fcPool.length) fcIdx = 0;
  fcRegisterEvents();
  fcShow();
}

function fcShow() {
  if (!fcPool.length) return;
  fcFlipped = false;
  var w = fcPool[fcIdx];
  document.getElementById('fcword').textContent = w.word;
  document.getElementById('fcmean').textContent = w.meaning;
  document.getElementById('fcmean').style.display = 'none';
  document.getElementById('fctap').style.display = 'block';
  document.getElementById('fcctr').textContent = (fcIdx+1) + '/' + fcPool.length;
  var s = getS(w);
  var fb = document.getElementById('fcfavbtn');
  fb.textContent = s.fav ? '★' : '☆';
  fb.className = s.fav ? 'on' : '';
}

function fcFlip() {
  if (fcFlipped) return;
  if (!fcPool.length) return;
  fcFlipped = true;
  document.getElementById('fcmean').style.display = 'block';
  document.getElementById('fctap').style.display = 'none';
  speak(fcPool[fcIdx].word);
}

function fcNext() {
  if (!fcPool.length) return;
  fcIdx = (fcIdx + 1) % fcPool.length;
  fcShow();
}

function fcPrev() {
  if (!fcPool.length) return;
  fcIdx = (fcIdx - 1 + fcPool.length) % fcPool.length;
  fcShow();
}

function fcToggleFav() {
  if (!fcPool.length) return;
  var w = fcPool[fcIdx];
  var s = getS(w);
  s.fav = !s.fav;
  save();
  var fb = document.getElementById('fcfavbtn');
  fb.textContent = s.fav ? '★' : '☆';
  fb.className = s.fav ? 'on' : '';
}

var qItems = [];
var qScore = 0;
var qLocked = false;

function shuffle(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i+1));
    var t = a[i]; a[i] = a[j]; a[j] = t;
  }
  return a;
}

function qInit() {
  qLocked = false;
  qScore = 0;
  document.getElementById('qresult').style.display = 'none';
  var pool = shuffle(rawWords).slice(0, 10);
  qItems = pool;
  var h = [];
  for (var i = 0; i < pool.length; i++) {
    var w = pool[i];
    var opts = [w.meaning];
    var others = shuffle(rawWords.filter(function(x){ return x.meaning !== w.meaning; })).slice(0,3);
    for (var j = 0; j < others.length; j++) opts.push(others[j].meaning);
    opts = shuffle(opts);
    h.push('<div class="qcard" id="qcard' + i + '">');
    h.push('<div class="qnum">Q' + (i+1) + ' / 10</div>');
    h.push('<div class="qword">' + esc(w.word) + '</div>');
    h.push('<div class="qopts" id="qopts' + i + '">');
    for (var k = 0; k < opts.length; k++) {
      var isC = opts[k] === w.meaning ? '1' : '0';
      h.push('<button class="qopt" data-cor="' + isC + '" data-qi="' + i + '" onclick="qAnswer(this)">' + esc(opts[k]) + '</button>');
    }
    h.push('</div></div>');
  }
  document.getElementById('qbox').innerHTML = h.join('');
}

function qAnswer(btn) {
  if (qLocked) return;
  var qi = parseInt(btn.dataset.qi);
  var cor = btn.dataset.cor === '1';
  var opts = document.getElementById('qopts' + qi).querySelectorAll('.qopt');
  for (var i = 0; i < opts.length; i++) {
    opts[i].onclick = null;
    if (opts[i].dataset.cor === '1') opts[i].className = 'qopt correct';
  }
  if (!cor) btn.className = 'qopt wrong';
  else { qScore++; speak(qItems[qi].word); }
  // check done
  var answered = document.querySelectorAll('.qopt.correct, .qopt.wrong').length;
  // count questions answered
  var cards = document.querySelectorAll('.qcard');
  var done = true;
  for (var i = 0; i < cards.length; i++) {
    var hasCor = cards[i].querySelectorAll('.qopt.correct').length > 0;
    if (!hasCor) { done = false; break; }
  }
  if (done) {
    setTimeout(function() {
      var pct = Math.round(qScore / 10 * 100);
      document.getElementById('qemoji').textContent = pct === 100 ? '🏆' : pct >= 80 ? '🎉' : pct >= 60 ? '👍' : '💪';
      document.getElementById('qscorebig').textContent = qScore + ' / 10';
      document.getElementById('qscoresub').textContent = pct + '점';
      document.getElementById('qresult').style.display = 'block';
      document.getElementById('qresult').scrollIntoView({behavior:'smooth'});
    }, 800);
  }
}

// ===== Tab 4 =====
var tri = 0;
var tPool = [];
var tIdx = 0;
var tCorCount = 0;
var tResults = [];
var tName = '';
var tTotal = 0;

function setTR(btn) { tri = parseInt(btn.dataset.i); renderRangeBar('trbar', tri, 'setTR'); }

function tSetup() {
  renderRangeBar('trbar', tri, 'setTR');
  document.getElementById('tsetup').className = 'on';
  document.getElementById('trun').className = '';
  document.getElementById('tres').className = '';
}

function tStart() {
  var name = document.getElementById('tname').value.trim();
  if (!name) { alert('이름을 입력해 주세요.'); return; }
  var cnt = parseInt(document.getElementById('tcount').value) || 20;
  if (cnt < 1) cnt = 1;
  if (cnt > 50) cnt = 50;
  tName = name;
  var base = wordsForRange(tri);
  tPool = shuffle(base).slice(0, cnt);
  tTotal = tPool.length;
  tIdx = 0;
  tCorCount = 0;
  tResults = [];
  document.getElementById('tsetup').className = '';
  document.getElementById('trun').className = 'on';
  document.getElementById('tres').className = '';
  tShowQ();
}

function tShowQ() {
  if (tIdx >= tPool.length) { tShowResult(); return; }
  var w = tPool[tIdx];
  var pct = Math.round(tIdx / tTotal * 100);
  document.getElementById('tpfill').style.width = pct + '%';
  document.getElementById('tpnum').textContent = (tIdx+1) + ' / ' + tTotal;
  document.getElementById('tpcor').textContent = '✅ ' + tCorCount;
  document.getElementById('tworddisp').textContent = w.word;
  document.getElementById('tans').value = '';
  document.getElementById('tans').focus();
  speak(w.word);
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    var trun = document.getElementById('trun');
    if (trun && trun.className === 'on') tSubmit();
  }
});

function isSim(input, correct) {
  var norm = function(s) { return s.replace(/\s/g,'').replace(/[~\-·,]/g,'').toLowerCase(); };
  var a = norm(input), c = norm(correct);
  if (a === c) return true;
  if (a.length >= 2 && c.indexOf(a) >= 0) return true;
  var core = c.replace(/하다|되다|시키다|이다/g,'').trim();
  if (core.length >= 2 && a.indexOf(core) >= 0) return true;
  return false;
}

function tSubmit() {
  var input = document.getElementById('tans').value.trim();
  var w = tPool[tIdx];
  var ok = isSim(input, w.meaning);
  if (ok) tCorCount++;
  tResults.push({word: w.word, meaning: w.meaning, input: input, ok: ok});
  tIdx++;
  tShowQ();
}

function tShowResult() {
  document.getElementById('trun').className = '';
  document.getElementById('tres').className = 'on';
  var pct = Math.round(tCorCount / tTotal * 100);
  var emoji = pct === 100 ? '🏆' : pct >= 80 ? '🎉' : pct >= 60 ? '👍' : '💪';
  document.getElementById('testemoji').textContent = emoji;
  document.getElementById('tresscore').textContent = tCorCount + ' / ' + tTotal;
  document.getElementById('trespct').textContent = pct + '점';
  var wrong = tResults.filter(function(r){ return !r.ok; });
  var corr = tResults.filter(function(r){ return r.ok; });
  var wcard = document.getElementById('twrongcard');
  var ccard = document.getElementById('tcorcard');
  if (wrong.length > 0) {
    wcard.style.display = 'block';
    var h = [];
    for (var i = 0; i < wrong.length; i++) {
      var r = wrong[i];
      h.push('<div class="twrong-item">');
      h.push('<span class="twrong-word">' + esc(r.word) + '</span>');
      h.push(' → 입력:<b>' + esc(r.input || '(없음)') + '</b> / 정답:<b>' + esc(r.meaning) + '</b>');
      h.push('</div>');
    }
    document.getElementById('twronglist').innerHTML = h.join('');
  } else {
    wcard.style.display = 'none';
  }
  if (corr.length > 0) {
    ccard.style.display = 'block';
    var cwords = corr.map(function(r){ return r.word; }).join(', ');
    document.getElementById('tcorlist').textContent = cwords;
  } else {
    ccard.style.display = 'none';
  }
}

function tCopy() {
  var now = new Date();
  var dateStr = now.getFullYear() + '. ' + (now.getMonth()+1) + '. ' + now.getDate() + '.';
  var pct = Math.round(tCorCount / tTotal * 100);
  var wrong = tResults.filter(function(r){ return !r.ok; });
  var corr = tResults.filter(function(r){ return r.ok; });
  var lines = [];
  lines.push('[씨유에탑 고1 자이스토리 1회] 테스트 결과');
  lines.push('날짜: ' + dateStr);
  lines.push('이름: ' + tName);
  lines.push('점수: ' + tCorCount + '/' + tTotal + ' (' + pct + '점)');
  lines.push('─────────────────');
  lines.push('❌ 틀린 단어 (' + wrong.length + '개)');
  for (var i = 0; i < wrong.length; i++) {
    var r = wrong[i];
    lines.push('  ' + r.word + ' → 입력:' + (r.input || '(없음)') + ' / 정답:' + r.meaning);
  }
  lines.push('─────────────────');
  lines.push('✅ 맞은 단어: ' + corr.map(function(r){ return r.word; }).join(', '));
  var text = lines.join('\n');
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(function(){
      alert('클립보드에 복사되었습니다!');
    });
  } else {
    var ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    alert('클립보드에 복사되었습니다!');
  }
}

function tRetry() {
  document.getElementById('tres').className = '';
  document.getElementById('tsetup').className = 'on';
}

// ===== Tab switching =====
var TABS = ['w','fc','q','t'];
function showTab(id) {
  for (var i = 0; i < TABS.length; i++) {
    var t = TABS[i];
    document.getElementById('pane-' + t).classList.toggle('on', t === id);
    document.getElementById('tb-' + t).classList.toggle('on', t === id);
  }
  if (id === 'w')  { renderRangeBar('wrbar', wri, 'setWR'); renderList(); }
  if (id === 'fc') { fcInit(); }
  if (id === 'q')  { qInit(); }
  if (id === 't')  { tSetup(); }
}

// Init
renderList();
</script>
