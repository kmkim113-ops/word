      cursor: pointer;

    .rng-btn.active {

      border-color: var(--primary);

      padding: 8px 12px;
      border-radius: 8px;

      color: var(--gray);
      font-size: 0.8rem;
      font-weight: 700;

      color: #ffffff;

      display: flex;

      display: flex;
      justify-content: center;
      align-items: center;

      align-items: center;
      justify-content: center;
      flex: 1;

      margin-top: 10px;

      width: 100%;
      height: 260px;
      perspective: 1000px;
      cursor: pointer;
    }
    .fc-inner {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .fc-inner.flipped {
      transform: rotateY(180deg);
    }
    .fc-side {
      width: 100%;
      height: 100%;
      position: absolute;
      backface-visibility: hidden;
      border-radius: 16px;
      border: 1px solid var(--border);
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
      background: #ffffff;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }
    .fc-back {
      transform: rotateY(180deg);
      background: var(--primary-light);
    }
    .fc-fav-pos {
      position: absolute;
      top: 16px;
      right: 16px;
      z-index: 10;

      font-weight: 700;
      color: #1e293b;
      text-align: center;

      gap: 8px;
      margin-top: 12px;

      border: none;
      background: var(--primary);
      color: #ffffff;
      font-weight: 700;
      font-size: 0.95rem;
      cursor: pointer;

      text-align: center;

    </div>
  </div>

  </div>

  <!-- Tab 4: Test -->

  <!-- Footer Branding -->

    &copy; 씨유에탑 어휘 학습 시스템. All Rights Reserved.
  </div>
</div>

// Escape Utility
function esc(s) {
  return String(s)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

// Range Builder (50 words block)
function buildRanges(ws) {
  var r = [{ label: "전체", s: 0, e: ws.length }];
  for (var i = 0; i < ws.length; i += 50) {
    r.push({ label: (i+1) + "-" + Math.min(i+50, ws.length), s: i, e: Math.min(i+50, ws.length) });
  }
  return r;
}
var ranges = buildRanges(rawWords);

// State Management
var lri = 0; // List Range Index
var fri = 0; // Flashcard Range Index
var lFilter = "all"; // all, unknown, fav

// LocalStorage Helper
function getDB() {
  var data = localStorage.getItem(storeKey);
  if(!data) return {};
  try { return JSON.parse(data); } catch(e) { return {}; }
}
function saveDB(db) {
  localStorage.setItem(storeKey, JSON.stringify(db));
}
function getWordState(w) {
  var db = getDB();
  var key = w.word + "|" + w.meaning;
  return db[key] || { status: "", fav: false };
}
function updateWordState(w, status, fav) {
  var db = getDB();
  var key = w.word + "|" + w.meaning;
  if(!db[key]) db[key] = { status: "", fav: false };
  if(status !== undefined) db[key].status = status;
  if(fav !== undefined) db[key].fav = fav;
  saveDB(db);
}

// Tab Switching
function switchTab(t) {
  ["list", "flash", "quiz", "test"].forEach(function(n) {
    var btn = document.getElementById("tb-" + n);
    var pane = document.getElementById("tab-" + n);
    if(btn) btn.classList.toggle("active", n === t);
    if(pane) pane.classList.toggle("active", n === t);
  });
  if (t === "list")  { renderRangeBar("lrbar", lri, "setLR"); renderList(); }
  if (t === "flash") { renderRangeBar("fcrbar", fri, "setFR"); initFC(); }
  if (t === "quiz")  { initQuiz(); }
  if (t === "test")  { renderSetup(); }
}

// Range Bar Renderer
function renderRangeBar(targetId, activeIdx, fnName) {
  var bar = document.getElementById(targetId);
  if(!bar) return;
  var html = "";
  ranges.forEach(function(r, idx) {
    var act = (idx === activeIdx) ? " active" : "";
    html += '<button class="rng-btn' + act + '" onclick="' + fnName + '(' + idx + ')">' + r.label + '</button>';
  });
  bar.innerHTML = html;
}

function setLR(idx) { lri = idx; renderRangeBar("lrbar", lri, "setLR"); renderList(); }
function setFR(idx) { fri = idx; renderRangeBar("fcrbar", fri, "setFR"); initFC(); }
function setLFilter(type) {
  lFilter = type;
  ["all", "unknown", "fav"].forEach(function(f) {
    document.getElementById("lf-" + f).classList.toggle("active", f === type);
  });
  renderList();
}

// TTS Logic
function speak(t) {
  if (!("speechSynthesis" in window)) return;
  window.speechSynthesis.cancel();
  var u = new SpeechSynthesisUtterance(t);
  u.lang = "en-US";
  u.rate = 0.85;
  window.speechSynthesis.speak(u);
}
function speakFc() {
  speak(document.getElementById("fcword").textContent);
}

// ---------------------- [TAB 1] LIST ----------------------
function renderList() {
  var container = document.getElementById("wListContainer");
  if(!container) return;
  
  var searchVal = document.getElementById("lstSearch").value.toLowerCase().trim();
  var r = ranges[lri];
  var sliced = rawWords.slice(r.s, r.e);
  
  var html = "";
  sliced.forEach(function(w, originalIdx) {
    var realIdx = r.s + originalIdx; 
    var state = getWordState(w);
    
    // Search Filter
    if(searchVal) {
      var matchesEn = w.word.toLowerCase().indexOf(searchVal) >= 0;
      var matchesKo = w.meaning.toLowerCase().indexOf(searchVal) >= 0;
      if(!matchesEn && !matchesKo) return;
    }
    
    // Filter buttons
    if(lFilter === "unknown" && state.status === "known") return;
    if(lFilter === "fav" && !state.fav) return;
    
    var cardClass = (state.status === "known") ? "w-card known" : "w-card";
    var starClass = state.fav ? "ibtn star active" : "ibtn star";
    var chkText = (state.status === "known") ? "✓" : "";
    
    html += '<div class="' + cardClass + '" id="wc-' + realIdx + '">';
    html += '  <div class="chk-btn" onclick="toggleKnown(' + realIdx + ')">' + chkText + '</div>';
    html += '  <div class="w-info">';
    html += '    <div class="w-en">' + esc(w.word) + '</div>';
    html += '    <div class="w-ko">' + esc(w.meaning) + '</div>';
    html += '  </div>';
    html += '  <button class="ibtn" data-w="' + esc(w.word) + '" onclick="speak(this.dataset.w)">🔊</button>';
    html += '  <button class="' + starClass + '" onclick="toggleFav(' + realIdx + ')">★</button>';
    html += '</div>';
  });
  
  container.innerHTML = html || '<div style="text-align:center; padding:30px; color:var(--gray);">조건에 맞는 단어가 없습니다.</div>';
}

function toggleKnown(idx) {
  var w = rawWords[idx];
  var state = getWordState(w);
  var nextStatus = (state.status === "known") ? "" : "known";
  updateWordState(w, nextStatus, undefined);
  
  var el = document.getElementById("wc-" + idx);
  if(el) {
    el.classList.toggle("known", nextStatus === "known");
    el.querySelector(".chk-btn").textContent = (nextStatus === "known") ? "✓" : "";
  }
}

function toggleFav(idx) {
  var w = rawWords[idx];
  var state = getWordState(w);
  var nextFav = !state.fav;
  updateWordState(w, undefined, nextFav);
  
  var el = document.getElementById("wc-" + idx);
  if(el) {
    var sbtn = el.querySelector(".star");
    if(sbtn) sbtn.classList.toggle("active", nextFav);
  }
}

// ---------------------- [TAB 2] FLASHCARD ----------------------
var fcIndex = 0;
var fcFlipped = false;
var fcTX = 0;
var fcRangeWords = [];

function initFC() {
  var r = ranges[fri];
  fcRangeWords = rawWords.slice(r.s, r.e);
  fcIndex = 0;
  fcFlipped = false;
  
  var inner = document.getElementById("fccard");
  if(inner) inner.classList.remove("flipped");
  
  showFcCard();
}

function showFcCard() {
  if(fcRangeWords.length === 0) {
    document.getElementById("fcword").textContent = "단어 없음";
    document.getElementById("fcmean").textContent = "해당 범위의 단어가 없습니다.";
    return;
  }
  var w = fcRangeWords[fcIndex];
  var state = getWordState(w);
  
  document.getElementById("fcword").textContent = w.word;
  document.getElementById("fcmean").textContent = w.meaning;
  
  var fbtn = document.getElementById("fcfav");
  if(fbtn) {
    fbtn.classList.toggle("active", state.fav);
    // Bind current target index
    var globalIdx = ranges[fri].s + fcIndex;
    fbtn.onclick = function(e) {
      e.stopPropagation();
      toggleFcFav(globalIdx);
    };
  }
}

function toggleFcFav(globalIdx) {
  var w = rawWords[globalIdx];
  var state = getWordState(w);
  var nextFav = !state.fav;
  updateWordState(w, undefined, nextFav);
  var fbtn = document.getElementById("fcfav");
  if(fbtn) fbtn.classList.toggle("active", nextFav);
}

function fcFlip() {
  if (fcFlipped) return;
  fcFlipped = true;
  var inner = document.getElementById("fccard");
  inner.classList.add("flipped");
  speakFc();
}

function fcNext() {
  if(fcRangeWords.length === 0) return;
  fcFlipped = false;
  document.getElementById("fccard").classList.remove("flipped");
  setTimeout(function() {
    fcIndex = (fcIndex + 1) % fcRangeWords.length;
    showFcCard();
  }, 150);
}

function fcPrev() {
  if(fcRangeWords.length === 0) return;
  fcFlipped = false;
  document.getElementById("fccard").classList.remove("flipped");
  setTimeout(function() {
    fcIndex = (fcIndex - 1 + fcRangeWords.length) % fcRangeWords.length;
    showFcCard();
  }, 150);
}

// Flashcard Events Setup
(function(){
  var card = document.getElementById("fccard");
  if(card) {
    card.addEventListener("click", function(e) {
      if (e.target.id === "fcfav") return;
      fcFlip();
    });
    card.addEventListener("touchstart", function(e) {
      fcTX = e.touches[0].clientX;
    }, {passive:true});
    card.addEventListener("touchend", function(e) {
      var dx = e.changedTouches[0].clientX - fcTX;
      if (Math.abs(dx) > 50) {
        if (dx < 0) fcNext(); else fcPrev();
      }
    }, {passive:true});
  }
})();

// ---------------------- [TAB 3] QUIZ MODE ----------------------
var qList = [];
var qCur = 0;
var qScore = 0;
var qLocked = false;

function initQuiz() {
  qScore = 0;
  qCur = 0;
  qLocked = false;
  
  // Shuffle & pick 10
  var pool = rawWords.slice();
  shuffle(pool);
  qList = pool.slice(0, Math.min(10, pool.length));
  
  renderQuizQuestion();
}

function renderQuizQuestion() {
  var container = document.getElementById("qzBox");
  if(!container) return;
  
  if(qCur >= qList.length) {
    renderQuizResult();
    return;
  }
  
  var currentWord = qList[qCur];
  var progress = ((qCur) / qList.length) * 100;
  
  // Options Pool
  var options = [currentWord.meaning];
  var wrongPool = rawWords.filter(function(w) { return w.meaning !== currentWord.meaning; });
  shuffle(wrongPool);
  
  for(var i=0; i<3; i++) {
    if(wrongPool[i]) options.push(wrongPool[i].meaning);
  }
  shuffle(options);
  
  var html = "";
  html += '<div class="quiz-card">';
  html += '  <div class="qz-pbar-bg"><div class="qz-pbar-fg" style="width:' + progress + '%"></div></div>';
  html += '  <div class="qz-qcnt">문제 ' + (qCur+1) + ' / ' + qList.length + '</div>';
  html += '  <div class="qz-qword">' + esc(currentWord.word) + '</div>';
  html += '  <div class="qz-opts">';
  
  options.forEach(function(opt) {
    var isCorrect = (opt === currentWord.meaning) ? "1" : "0";
    html += '    <button class="qz-opt" data-cor="' + isCorrect + '" onclick="qAns(this)">' + esc(opt) + '</button>';
  });
  
  html += '  </div>';
  html += '</div>';
  
  container.innerHTML = html;
  speak(currentWord.word);
}

function qAns(btn) {
  if(qLocked) return;
  qLocked = true;
  
  var isCor = btn.getAttribute("data-cor") === "1";
  var opts = document.querySelectorAll(".qz-opt");
  
  opts.forEach(function(o) {
    if(o.getAttribute("data-cor") === "1") {
      o.classList.add("correct");
    } else if(o === btn) {
      o.classList.add("incorrect");
    }
  });
  
  if(isCor) {
    qScore++;
    speak(qList[qCur].word);
  }
  
  setTimeout(function() {
    qCur++;
    qLocked = false;
    renderQuizQuestion();
  }, 1000);
}

function renderQuizResult() {
  var container = document.getElementById("qzBox");
  if(!container) return;
  
  var pct = Math.round((qScore / qList.length) * 100);
  var emoji = "💪";
  if(pct === 100) emoji = "🏆";
  else if(pct >= 80) emoji = "🎉";
  else if(pct >= 60) emoji = "👍";
  
  var html = "";
  html += '<div class="res-card">';
  html += '  <div class="res-emoji">' + emoji + '</div>';
  html += '  <div class="res-score">' + qScore + ' / ' + qList.length + '</div>';
  html += '  <div class="res-pct">맞춤 확률: ' + pct + '%</div>';
  html += '  <button class="res-btn" onclick="initQuiz()">↩ 다시 풀기</button>';
  html += '</div>';
  
  container.innerHTML = html;
}

// ---------------------- [TAB 4] TEST MODE ----------------------
var tName = "";
var tRangeIdx = 0;
var tWords = [];
var tCur = 0;
var tOkCount = 0;
var tAnswers = []; // { word, user, correct, correctBool }

function renderSetup() {
  var container = document.getElementById("tstBox");
  if(!container) return;
  
  var html = "";
  html += '<div class="tst-box">';
  html += '  <div class="tst-label">✏️ 응시자 이름</div>';
  html += '  <input type="text" id="tNameInput" class="tst-input" placeholder="이름을 입력하세요" value="' + esc(tName) + '">';
  html += '  <div class="tst-label">🎯 테스트 범위 선택</div>';
  html += '  <div class="range-bar" id="tstRbar"></div>';
  html += '  <button class="res-btn" style="margin-top:12px;" onclick="startTest()">테스트 시작 ▶</button>';
  html += '</div>';
  
  container.innerHTML = html;
  
  renderRangeBar("tstRbar", tRangeIdx, "setTRange");
}

function setTRange(idx) {
  tRangeIdx = idx;
  renderRangeBar("tstRbar", tRangeIdx, "setTRange");
}

function startTest() {
  var nameInp = document.getElementById("tNameInput");
  if(nameInp) tName = nameInp.value.trim();
  
  if(!tName) {
    alert("이름을 입력해주세요!");
    return;
  }
  
  // Pick Range
  var r = ranges[tRangeIdx];
  var pool = rawWords.slice(r.s, r.e);
  shuffle(pool);
  
  // Max 50
  tWords = pool.slice(0, Math.min(50, pool.length));
  tCur = 0;
  tOkCount = 0;
  tAnswers = [];
  
  renderTestQuestion();
}

function renderTestQuestion() {
  var container = document.getElementById("tstBox");
  if(!container) return;
  
  if(tCur >= tWords.length) {
    renderTestResult();
    return;
  }
  
  var currentWord = tWords[tCur];
  var progress = (tCur / tWords.length) * 100;
  
  var html = "";
  html += '<div class="tst-q-container">';
  html += '  <div class="qz-pbar-bg"><div class="qz-pbar-fg" style="width:' + progress + '%"></div></div>';
  html += '  <div class="tst-pstat">';
  html += '    <span>문제 ' + (tCur+1) + ' / ' + tWords.length + '</span>';
  html += '    <span class="tst-okcnt">✅ 맞춤수: ' + tOkCount + '</span>';
  html += '  </div>';
  html += '  <div class="tst-qword">' + esc(currentWord.word) + '</div>';
  html += '  <input type="text" id="tAnsInput" class="tst-input" placeholder="뜻을 입력하고 Enter를 누르세요" autocomplete="off" onkeydown="handleTestKey(event)">';
  html += '  <button class="res-btn" style="margin-top:16px;" onclick="submitTestAns()">다음 ↵</button>';
  html += '</div>';
  
  container.innerHTML = html;
  
  var inp = document.getElementById("tAnsInput");
  if(inp) inp.focus();
  
  speak(currentWord.word);
}

function handleTestKey(e) {
  if (e.keyCode === 13) {
    submitTestAns();
  }
}

function isSim(input, correct) {
  var norm = function(s) {
    return s.replace(/\s/g,"").replace(/[~\-·,]/g,"").toLowerCase();
  };
  var a = norm(input), c = norm(correct);
  if (a === c) return true;
  if (a.length >= 2 && c.indexOf(a) >= 0) return true;
  var core = c.replace(/하다|되다|시키다|이다/g,"").trim();
  if (core.length >= 2 && a.indexOf(core) >= 0) return true;
  return false;
}

function submitTestAns() {
  var inp = document.getElementById("tAnsInput");
  if(!inp) return;
  
  var uAns = inp.value.trim();
  var currentWord = tWords[tCur];
  var isCorrect = isSim(uAns, currentWord.meaning);
  
  if(isCorrect) tOkCount++;
  
  tAnswers.push({
    word: currentWord.word,
    user: uAns || "(빈 칸)",
    correct: currentWord.meaning,
    correctBool: isCorrect
  });
  
  tCur++;
  renderTestQuestion();
}

function renderTestResult() {
  var container = document.getElementById("tstBox");
  if(!container) return;
  
  var pct = Math.round((tOkCount / tWords.length) * 100);
  var emoji = "💪";
  if(pct === 100) emoji = "🏆";
  else if(pct >= 80) emoji = "🎉";
  else if(pct >= 60) emoji = "👍";
  
  var wrongWords = tAnswers.filter(function(a) { return !a.correctBool; });
  
  var html = "";
  html += '<div class="res-card">';
  html += '  <div class="res-emoji">' + emoji + '</div>';
  html += '  <div class="res-score">' + tOkCount + ' / ' + tWords.length + '</div>';
  html += '  <div class="res-pct">점수: ' + pct + '점 (응시자: ' + esc(tName) + ')</div>';
  
  if(wrongWords.length > 0) {
    html += '  <div style="width:100%; text-align:left; font-weight:700; font-size:0.9rem; margin-top:16px; color:var(--danger);">❌ 틀린 단어 (' + wrongWords.length + '개)</div>';
    html += '  <div class="tst-res-list">';
    wrongWords.forEach(function(item) {
      html += '    <div class="tst-res-item">';
      html += '      <span class="tst-ri-eng">' + esc(item.word) + '</span>';
      html += '      <span class="tst-ri-det">입력: ' + esc(item.user) + ' / 정답: ' + esc(item.correct) + '</span>';
      html += '    </div>';
    });
    html += '  </div>';
  } else {
    html += '  <div style="width:100%; text-align:center; font-weight:700; font-size:1rem; margin-top:16px; color:var(--success);">🎉 완벽합니다! 모두 맞췄습니다!</div>';
  }
  
  html += '  <button class="res-btn" style="background:#25D366; margin-top:16px;" onclick="copyKakaoResult()">📋 카톡으로 결과 복사</button>';
  html += '  <button class="res-btn" style="background:var(--gray); margin-top:8px;" onclick="renderSetup()">↩ 다시 테스트</button>';
  html += '</div>';
  
  container.innerHTML = html;
}

function copyKakaoResult() {
  var today = new Date();
  var dateStr = today.getFullYear() + "-" + (today.getMonth()+1) + "-" + today.getDate();
  var pct = Math.round((tOkCount / tWords.length) * 100);
  
  var wrongWords = tAnswers.filter(function(a) { return !a.correctBool; });
  var correctWords = tAnswers.filter(function(a) { return a.correctBool; });
  
  var txt = "[씨유에탑 고1 자이 7회 어휘] 테스트 결과\n";
  txt += "날짜: " + dateStr + "\n";
  txt += "이름: " + tName + "\n";
  txt += "점수: " + tOkCount + "/" + tWords.length + " (" + pct + "점)\n";
  txt += "─────────────────\n";
  
  if(wrongWords.length > 0) {
    txt += "❌ 틀린 단어 (" + wrongWords.length + "개)\n";
    wrongWords.forEach(function(item) {
      txt += "  " + item.word + " → 입력:" + item.user + " / 정답:" + item.correct + "\n";
    });
  } else {
    txt += "❌ 틀린 단어 없음\n";
  }
  
  txt += "─────────────────\n";
  
  var cList = [];
  correctWords.forEach(function(item) { cList.push(item.word); });
  txt += "✅ 맞은 단어: " + (cList.join(", ") || "없음");
  
  var temp = document.createElement("textarea");
  document.body.appendChild(temp);
  temp.value = txt;
  temp.select();
  document.execCommand("copy");
  document.body.removeChild(temp);
  
  alert("결과가 클립보드에 복사되었습니다! 카톡창에 붙여넣기 하세요.");
}

// ---------------------- SHARED UTILITY ----------------------
function shuffle(arr) {
  for (var i = arr.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = arr[i];
    arr[i] = arr[j];
    arr[j] = tmp;
  }
  return arr;
}

// Initialize on Load
window.onload = function() {
  switchTab("list");
};
