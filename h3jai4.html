      position: relative;

    .header {

      padding: 16px;
      border-bottom: 1px solid var(--border);

    }
    .header-brand {
      font-size: 20px;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 4px;
    }
    .header-sub {
      font-size: 13px;
      color: var(--gray);
    }
    .nav-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      background: #ffffff;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .tab-btn {
      flex: 1;
      padding: 12px 0;
      border: none;
      background: none;
      font-size: 13px;
      font-weight: 500;
      color: var(--gray);
      cursor: pointer;
      text-align: center;
      border-bottom: 2px solid transparent;
    }
    .tab-btn.active {
      color: var(--primary);
      font-weight: 700;
      border-bottom-color: var(--primary);
    }
    .tab-content {
      flex: 1;
      padding: 16px;
      background: var(--bg);
      display: none;
    }
    .tab-content.active {
      display: block;
    }

      display: flex;
      gap: 6px;
      overflow-x: auto;
      padding-bottom: 8px;
      margin-bottom: 12px;
    }
    .range-bar::-webkit-scrollbar { display: none; }
    .range-btn {
      flex-shrink: 0;
      padding: 6px 12px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: #ffffff;
      font-size: 12px;
      color: var(--gray);
      cursor: pointer;
    }
    .range-btn.active {
      background: var(--primary);
      color: #ffffff;
      border-color: var(--primary);
    }

      width: 100%;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      margin-bottom: 12px;
      outline: none;
    }
    .filter-bar {
      display: flex;
      gap: 6px;
      margin-bottom: 12px;
    }
    .filter-btn {
      flex: 1;
      padding: 8px 0;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: #ffffff;
      font-size: 12px;
      color: var(--gray);
      cursor: pointer;
    }
    .filter-btn.active {
      background: var(--primary-light);
      color: var(--primary);
      border-color: var(--primary);
      font-weight: 600;
    }
    .word-list {

      flex-direction: column;
      gap: 8px;
    }
    .word-card {
      background: #ffffff;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .word-card.known {
      opacity: 0.35;
    }
    .chk-btn {
      border: 1px solid var(--border);
      background: #ffffff;
      border-radius: 4px;
      width: 22px;
      height: 22px;
      cursor: pointer;
      color: transparent;
      font-size: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .chk-btn.active {
      background: var(--success);
      border-color: var(--success);
      color: #ffffff;
    }
    .word-info {
      flex: 1;
    }
    .w-eng {
      font-size: 16px;
      font-weight: 700;
      color: #111827;
      margin-bottom: 2px;
    }
    .w-kor {
      font-size: 14px;
      color: var(--gray);
    }

      background: none;
      border: none;
      font-size: 18px;
      cursor: pointer;
      padding: 4px;
      color: var(--gray);
    }
    .ibtn.fav-active {
      color: var(--warn);
    }

      border: 1px solid var(--border);
      border-radius: 12px;
      height: 240px;

      padding: 20px;
      margin-bottom: 16px;

    .fc-fav-pos {

      top: 12px;
      right: 12px;
    }
    .fc-text-eng {

      font-weight: 700;
      color: #111827;
      text-align: center;

    .fc-text-kor {

      text-align: center;

      text-align: left;

</div>

  function esc(s) {
    return String(s)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  function speak(t) {
    if (!("speechSynthesis" in window)) return;
    window.speechSynthesis.cancel();
    var u = new SpeechSynthesisUtterance(t);
    u.lang = "en-US";
    u.rate = 0.85;
    window.speechSynthesis.speak(u);
  }

  function speakFc() {
    speak(document.getElementById("fcword").textContent);
  }

  function isSim(input, correct) {
    var norm = function(s) {
      return s.replace(/\s/g,"").replace(/[~\-·,]/g,"").toLowerCase();
    };
    var a = norm(input), c = norm(correct);
    if (a === c) return true;
    if (a.length >= 2 && c.indexOf(a) >= 0) return true;
    var core = c.replace(/하다|되다|시키다|이다/g,"").trim();
    if (core.length >= 2 && a.indexOf(core) >= 0) return true;
    return false;
  }

  function loadProg() {
    var d = localStorage.getItem(storeKey);
    if (d) {
      try { progressData = JSON.parse(d); } catch(e) { progressData = {}; }
    } else {
      progressData = {};
    }
  }

  function saveProg() {
    localStorage.setItem(storeKey, JSON.stringify(progressData));
  }

  function getProg(w) {
    var k = w.word + "|" + w.meaning;
    return progressData[k] || { status: "", fav: false };
  }

  function setProg(w, field, val) {
    var k = w.word + "|" + w.meaning;
    if (!progressData[k]) progressData[k] = { status: "", fav: false };
    progressData[k][field] = val;
    saveProg();
  }

  function buildRanges(ws) {
    var r = [{ label: "전체", s: 0, e: ws.length }];
    for (var i = 0; i < ws.length; i += 50) {
      r.push({ label: (i+1) + "-" + Math.min(i+50, ws.length), s: i, e: Math.min(i+50, ws.length) });
    }
    return r;
  }
  var ranges = buildRanges(rawWords);

  function switchTab(t) {
    ["list","flash","quiz","test"].forEach(function(n) {
      document.getElementById("tb-"+n).classList.toggle("active", n===t);
      document.getElementById("tab-"+n).classList.toggle("active", n===t);
    });
    if (t==="list")  { renderRangeBar("lrbar", lri, "setLR"); renderList(); }
    if (t==="flash") { renderRangeBar("fcrbar", fri, "setFR"); initFC(); }
    if (t==="quiz")  { initQuiz(); }
    if (t==="test")  { renderSetup(); }
  }

  function renderRangeBar(id, idx, funcName) {
    var h = "";
    ranges.forEach(function(r, i) {
      var cls = (i === idx) ? "range-btn active" : "range-btn";
      h += '<button class="' + cls + '" onclick="' + funcName + '(' + i + ')">' + r.label + '</button>';
    });
    document.getElementById(id).innerHTML = h;
  }

  function toggleKnown(i) {
    var w = rawWords[i];
    var p = getProg(w);
    var nv = (p.status === "known") ? "" : "known";
    setProg(w, "status", nv);

    var w = rawWords[i];

  function renderList() {
    var r = ranges[lri];
    var q = document.getElementById("lsearch").value.toLowerCase().trim();
    var h = "";
    
    for (var i = r.s; i < r.e; i++) {
      var w = rawWords[i];
      var p = getProg(w);
      
      if (currentLFilter === "not" && p.status === "known") continue;
      if (currentLFilter === "fav" && !p.fav) continue;
      
      if (q) {
        if (w.word.toLowerCase().indexOf(q) === -1 && w.meaning.toLowerCase().indexOf(q) === -1) continue;
      }
      
      var cardCls = (p.status === "known") ? "word-card known" : "word-card";
      var chkCls = (p.status === "known") ? "chk-btn active" : "chk-btn";
      var favCls = p.fav ? "ibtn fav-active" : "ibtn";
      
      h += '<div class="' + cardCls + '">';
      h += '  <button class="' + chkCls + '" onclick="toggleKnown(' + i + ')">✔</button>';
      h += '  <div class="word-info">';
      h += '    <div class="w-eng en">' + esc(w.word) + '</div>';
      h += '    <div class="w-kor">' + esc(w.meaning) + '</div>';
      h += '  </div>';
      h += '  <button class="ibtn" data-w="' + esc(w.word) + '" onclick="speak(this.dataset.w)">🔊</button>';
      h += '  <button class="' + favCls + '" onclick="toggleListFav(' + i + ')">★</button>';
      h += '</div>';
    }
    document.getElementById("list-container").innerHTML = h;
  }

  function shuffle(arr) {
    var a = arr.slice();
    for (var i = a.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var t = a[i]; a[i] = a[j]; a[j] = t;
    }
    return a;
  }

  function initQuiz() {
    if (rawWords.length < 4) {
      document.getElementById("quiz-body").innerHTML = "퀴즈를 진행하려면 최소 4개의 단어가 필요합니다.";
      return;
    }
    var shuffled = shuffle(rawWords);
    quizPool = shuffled.slice(0, Math.min(10, shuffled.length));
    quizIndex = 0;
    quizScore = 0;
    qLocked = false;
    showQuiz();
  }

  function showQuiz() {
    if (quizIndex >= quizPool.length) {
      showQuizResult();
      return;
    }
    qLocked = false;
    var cur = quizPool[quizIndex];
    
    var opts = [cur.meaning];
    var pool = rawWords.filter(function(x) { return x.meaning !== cur.meaning; });
    var shufPool = shuffle(pool);
    for (var i = 0; i < 3; i++) {
      if (shufPool[i]) opts.push(shufPool[i].meaning);
    }
    opts = shuffle(opts);

    var h = '';
    h += '<div class="quiz-box">';
    h += '  <div class="quiz-q en">' + esc(cur.word) + '</div>';
    h += '  <div class="quiz-options">';
    opts.forEach(function(o) {
      var isCor = (o === cur.meaning) ? "1" : "0";
      h += '    <button class="quiz-opt" data-cor="' + isCor + '" onclick="qAns(this)">' + esc(o) + '</button>';
    });
    h += '  </div>';
    h += '</div>';
    document.getElementById("quiz-body").innerHTML = h;
  }

  function qAns(btn) {
    if (qLocked) return;
    qLocked = true;
    var isCor = btn.getAttribute("data-cor") === "1";
    var cur = quizPool[quizIndex];
    
    if (isCor) {
      btn.classList.add("correct");
      quizScore++;
      speak(cur.word);
    } else {
      btn.classList.add("wrong");
      var opts = document.querySelectorAll(".quiz-opt");
      for (var i = 0; i < opts.length; i++) {
        if (opts[i].getAttribute("data-cor") === "1") {
          opts[i].classList.add("correct");
        }
      }
    }
    setTimeout(function() {
      quizIndex++;
      showQuiz();
    }, 1000);
  }

  function showQuizResult() {
    var pct = Math.round((quizScore / quizPool.length) * 100);
    var emo = "💪";
    if (pct === 100) emo = "🏆";
    else if (pct >= 80) emo = "🎉";
    else if (pct >= 60) emo = "👍";

    var h = '';
    h += '<div class="result-box">';
    h += '  <div class="res-emoji">' + emo + '</div>';
    h += '  <div class="res-score">' + quizScore + ' / ' + quizPool.length + '</div>';
    h += '  <div class="res-pct">' + pct + '점</div>';
    h += '  <button class="btn-block" onclick="initQuiz()">↩ 다시 풀기</button>';
    h += '</div>';
    document.getElementById("quiz-body").innerHTML = h;
  }

    var r = ranges[tri];
    var subPool = rawWords.slice(r.s, r.e);
    if (subPool.length === 0) { alert("선택된 범위에 단어가 없습니다."); return; }

    testWords = shuffle(subPool).slice(0, Math.min(50, subPool.length));
    testIndex = 0;
    testScore = 0;
    testWrongList = [];
    testCorrectList = [];

    showTestQuestion();
  }

  function showTestQuestion() {
    if (testIndex >= testWords.length) {
      showTestResult();
      return;
    }
    var cur = testWords[testIndex];
    var pct = (testIndex / testWords.length) * 100;

    var h = '';
    h += '<div class="p-bar-container"><div class="p-bar-fill" style="width:' + pct + '%;"></div></div>';
    h += '<div class="test-stat">';
    h += '  <div>문항: ' + (testIndex + 1) + ' / ' + testWords.length + '</div>';
    h += '  <div>✅ 맞춤수: ' + testScore + '</div>';
    h += '</div>';
    h += '<div class="test-q-box">';
    h += '  <div class="test-word en">' + esc(cur.word) + '</div>';
    h += '  <input type="text" class="form-input" id="tans" autocomplete="off" placeholder="뜻을 입력하고 Enter" onkeydown="handleTestKey(event)">';
    h += '</div>';
    h += '<button class="btn-block" onclick="submitTestAns()">다음 문제</button>';

    document.getElementById("test-body").innerHTML = h;
    document.getElementById("tans").focus();
    speak(cur.word);
  }

  function handleTestKey(e) {
    if (e.keyCode === 13) {
      submitTestAns();
    }
  }

  function submitTestAns() {
    var ansInput = document.getElementById("tans").value.trim();
    var cur = testWords[testIndex];
    var correct = isSim(ansInput, cur.meaning);

    if (correct) {
      testScore++;
      testCorrectList.push(cur.word);
    } else {
      testWrongList.push({ word: cur.word, input: ansInput || "(미입력)", correct: cur.meaning });
    }

    testIndex++;
    showTestQuestion();
  }

  function showTestResult() {
    var pct = Math.round((testScore / testWords.length) * 100);
    var emo = "💪";
    if (pct === 100) emo = "🏆";
    else if (pct >= 80) emo = "🎉";
    else if (pct >= 60) emo = "👍";

    var h = '';
    h += '<div class="result-box">';
    h += '  <div class="res-emoji">' + emo + '</div>';
    h += '  <div class="res-score">' + testScore + ' / ' + testWords.length + '</div>';
    h += '  <div class="res-pct">' + pct + '점</div>';
    h += '  <button class="btn-block" style="background:#25D366; margin-bottom:8px;" onclick="copyResult()">📋 카톡으로 결과 복사</button>';
    h += '  <button class="btn-block" dashed style="background:var(--gray);" onclick="renderSetup()">↩ 다시 테스트</button>';

    if (testWrongList.length > 0) {
      h += '  <div class="wrong-list">';
      h += '    <div class="wrong-title">❌ 틀린 단어 (' + testWrongList.length + '개)</div>';
      testWrongList.forEach(function(item) {
        h += '    <div class="wrong-item"><b>' + esc(item.word) + '</b><br>입력: <span style="color:var(--danger);">' + esc(item.input) + '</span> / 정답: <span style="color:var(--success);">' + esc(item.correct) + '</span></div>';
      });
      h += '  </div>';
    }
    h += '</div>';

    document.getElementById("test-body").innerHTML = h;
  }

  function copyResult() {
    var pct = Math.round((testScore / testWords.length) * 100);
    var d = new Date();
    var dateStr = d.getFullYear() + "-" + (d.getMonth() + 1) + "-" + d.getDate();

    var t = "";
    t += "[씨유에탑 " + seriesName + "] 테스트 결과\n";
    t += "날짜: " + dateStr + "\n";
    t += "이름: " + testerName + "\n";
    t += "점수: " + testScore + "/" + testWords.length + " (" + pct + "점)\n";
    t += "─────────────────\n";
    t += "❌ 틀린 단어 (" + testWrongList.length + "개)\n";
    testWrongList.forEach(function(item) {
      t += "  " + item.word + " → 입력:" + item.input + " / 정답:" + item.correct + "\n";
    });
    t += "─────────────────\n";
    t += "✅ 맞은 단어: " + testCorrectList.join(", ");

    var ta = document.createElement("textarea");
    ta.value = t;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand("copy");
    document.body.removeChild(ta);
    alert("결과가 클립보드에 복사되었습니다. 카톡 창에 붙여넣기 하세요!");
  }

  (function(){
    var card = document.getElementById("fccard");
    card.addEventListener("click", function(e) {
      if (e.target.id === "fcfav") return;
      fcFlip();
    });
    card.addEventListener("touchstart", function(e) {
      fcTX = e.touches[0].clientX;
    }, {passive:true});
    card.addEventListener("touchend", function(e) {
      var dx = e.changedTouches[0].clientX - fcTX;
      if (Math.abs(dx) > 50) { if (dx < 0) fcNext(); else fcPrev(); }
    }, {passive:true});
  })();

  document.getElementById("header-meta").textContent = seriesName + " · 총 " + rawWords.length + "단어";
  loadProg();
  switchTab("list");
</script>

</body>
</html>
