<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>씨유에탑 고2-2 영어단어장</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
<style>
:root{--primary:#2563EB;--primary-dark:#1D4ED8;--primary-light:#EFF6FF;--success:#10B981;--danger:#EF4444;--warn:#F59E0B;--gray:#6B7280;--border:#E5E7EB;--bg:#F9FAFB;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);display:flex;justify-content:center;}
.app{width:100%;max-width:420px;min-height:100vh;background:#fff;display:flex;flex-direction:column;box-shadow:0 0 20px rgba(0,0,0,.08);}
/* Header */
.hdr{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;padding:16px;text-align:center;}
.hdr-brand{font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;letter-spacing:1px;opacity:.9;}
.hdr-sub{font-size:15px;font-weight:700;margin-top:2px;}
/* Tabs */
.tabs{display:flex;border-bottom:2px solid var(--border);background:#fff;position:sticky;top:0;z-index:100;}
.tab{flex:1;padding:10px 2px;text-align:center;font-size:11px;font-weight:700;color:var(--gray);cursor:pointer;border:none;background:none;border-bottom:3px solid transparent;margin-bottom:-2px;}
.tab.on{color:var(--primary);border-bottom-color:var(--primary);}
/* Panes */
.pane{display:none;flex-direction:column;padding:12px;overflow-y:auto;flex:1;}
.pane.on{display:flex;}
/* Range bar */
.rbar{display:flex;gap:6px;overflow-x:auto;padding-bottom:8px;margin-bottom:8px;-webkit-overflow-scrolling:touch;scrollbar-width:none;flex-shrink:0;}
.rbar::-webkit-scrollbar{display:none;}
.rbtn{flex-shrink:0;padding:6px 12px;border-radius:20px;border:1.5px solid var(--border);background:#fff;font-size:12px;font-weight:600;color:var(--gray);cursor:pointer;white-space:nowrap;font-family:'Nunito',sans-serif;}
.rbtn.on{background:var(--primary);border-color:var(--primary);color:#fff;}
/* Search & filter */
.search{width:100%;padding:9px 13px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;font-family:'Noto Sans KR',sans-serif;outline:none;margin-bottom:10px;flex-shrink:0;}
.search:focus{border-color:var(--primary);}
.fbar{display:flex;gap:6px;margin-bottom:10px;flex-shrink:0;}
.fbtn{padding:5px 14px;border-radius:20px;border:1.5px solid var(--border);background:#fff;font-size:12px;font-weight:600;color:var(--gray);cursor:pointer;}
.fbtn.on{background:var(--primary);border-color:var(--primary);color:#fff;}
/* Word list */
.wlist{flex:1;overflow-y:auto;}
.wcard{display:flex;align-items:center;gap:8px;padding:11px 12px;border:1.5px solid var(--border);border-radius:12px;margin-bottom:8px;background:#fff;transition:opacity .2s;}
.wcard.known{opacity:.35;}
.chk{width:28px;height:28px;min-width:28px;border-radius:50%;border:2px solid var(--border);background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;color:transparent;flex-shrink:0;}
.chk.on{background:var(--success);border-color:var(--success);color:#fff;}
.wbody{flex:1;min-width:0;overflow:hidden;}
.wword{font-family:'Nunito',sans-serif;font-size:15px;font-weight:700;color:#1f2937;}
.wmean{font-size:13px;color:#4B5563;margin-top:3px;word-break:keep-all;}
.wacts{display:flex;gap:4px;flex-shrink:0;}
.ibtn{width:30px;height:30px;border-radius:50%;border:none;background:none;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;}
.ibtn:hover{background:var(--bg);}
.favbtn.on{color:#F59E0B;}
/* Flash card */
.fcwrap{flex:1;display:flex;align-items:center;justify-content:center;padding:8px 0;}
#fccard{width:100%;min-height:220px;background:linear-gradient(135deg,var(--primary-light),#fff);border:2px solid var(--primary);border-radius:20px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;position:relative;padding:24px 16px;user-select:none;}
.fcctr{position:absolute;top:12px;left:14px;font-size:12px;color:var(--gray);font-family:'Nunito',sans-serif;font-weight:700;}
.fcfavbtn{position:absolute;top:10px;right:12px;font-size:20px;background:none;border:none;cursor:pointer;color:#ccc;}
.fcfavbtn.on{color:#F59E0B;}
#fcword{font-family:'Nunito',sans-serif;font-size:30px;font-weight:800;color:var(--primary);text-align:center;word-break:break-all;}
#fctap{font-size:13px;color:var(--gray);margin-top:12px;}
#fcmean{font-size:20px;color:#1f2937;font-weight:700;margin-top:12px;text-align:center;display:none;word-break:keep-all;}
.fcnav{display:flex;gap:8px;margin-top:10px;flex-shrink:0;}
.fcbtn{flex:1;padding:11px;border-radius:12px;border:none;background:var(--primary);color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;}
.fcbtn.sec{background:var(--bg);color:var(--gray);border:1.5px solid var(--border);}
/* Quiz */
.qwrap{flex:1;}
.qnum{font-size:13px;color:var(--gray);font-family:'Nunito',sans-serif;font-weight:700;margin-bottom:6px;}
.qword{font-family:'Nunito',sans-serif;font-size:32px;font-weight:800;color:var(--primary);margin-bottom:20px;text-align:center;}
.qopts{display:flex;flex-direction:column;gap:10px;}
.qopt{padding:14px 16px;border:2px solid var(--border);border-radius:12px;background:#fff;font-size:15px;cursor:pointer;text-align:left;font-family:'Noto Sans KR',sans-serif;}
.qopt.cor{background:#D1FAE5;border-color:var(--success);}
.qopt.wrg{background:#FEE2E2;border-color:var(--danger);}
.qres{text-align:center;padding:20px 0;}
.qscore{font-size:38px;font-weight:800;color:var(--primary);font-family:'Nunito',sans-serif;}
.qemoji{font-size:40px;margin:10px 0;}
/* Test */
.tform h3{font-size:16px;font-weight:700;margin-bottom:14px;}
.trow{margin-bottom:12px;}
.trow label{display:block;font-size:13px;font-weight:600;color:var(--gray);margin-bottom:5px;}
.tinput{width:100%;padding:10px 13px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;font-family:'Noto Sans KR',sans-serif;outline:none;}
.tinput:focus{border-color:var(--primary);}
.pbwrap{margin-bottom:14px;}
.pb{height:8px;background:var(--border);border-radius:4px;overflow:hidden;}
.pbfill{height:100%;background:var(--primary);border-radius:4px;transition:width .3s;}
.pbinfo{display:flex;justify-content:space-between;font-size:12px;color:var(--gray);margin-top:4px;font-family:'Nunito',sans-serif;font-weight:700;}
.tword{font-family:'Nunito',sans-serif;font-size:34px;font-weight:800;color:var(--primary);text-align:center;margin:18px 0 6px;}
.thint{text-align:center;font-size:13px;color:var(--gray);margin-bottom:14px;}
.tres h3{font-size:16px;font-weight:700;text-align:center;margin-bottom:14px;}
.rscwrap{text-align:center;margin-bottom:16px;}
.rscbig{font-size:38px;font-weight:800;color:var(--primary);font-family:'Nunito',sans-serif;}
.wlerr h4{font-size:14px;font-weight:700;color:var(--danger);margin-bottom:8px;}
.wlitem{padding:8px 12px;border-left:3px solid var(--danger);background:#FFF5F5;border-radius:6px;margin-bottom:6px;font-size:13px;}
.wlitem .wi{font-family:'Nunito',sans-serif;font-weight:700;color:var(--primary);}
.wlitem .wd{color:var(--gray);margin-top:2px;}
.rbtns{display:flex;gap:8px;margin-top:16px;}
.btn-p{flex:1;padding:12px;background:var(--primary);color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}
.btn-g{flex:1;padding:12px;background:#25D366;color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;}
.btn-s{flex:1;padding:12px;background:var(--bg);color:var(--gray);border:1.5px solid var(--border);border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;}
.empty{text-align:center;color:var(--gray);padding:40px 0;font-size:14px;}
</style>
</head>
<body>
<div class="app">

<div class="hdr">
  <div class="hdr-brand">씨유에탑 ✦ 영어단어장</div>
  <div class="hdr-sub">고2-2 · 총 1000단어</div>
</div>

<div class="tabs">
  <button class="tab on" id="tb-w" onclick="showTab('w')">📋 단어</button>
  <button class="tab" id="tb-fc" onclick="showTab('fc')">🃏 플래시</button>
  <button class="tab" id="tb-q" onclick="showTab('q')">🎯 퀴즈</button>
  <button class="tab" id="tb-t" onclick="showTab('t')">📝 테스트</button>
</div>

<!-- TAB1 -->
<div class="pane on" id="pane-w">
  <div class="rbar" id="wrbar"></div>
  <input class="search" id="wsearch" type="text" placeholder="🔍 단어 또는 뜻 검색..." oninput="renderList()">
  <div class="fbar">
    <button class="fbtn on" data-f="all" onclick="setFilter(this)">전체</button>
    <button class="fbtn" data-f="unk" onclick="setFilter(this)">모름</button>
    <button class="fbtn" data-f="fav" onclick="setFilter(this)">⭐즐겨찾기</button>
  </div>
  <div class="wlist" id="wlist"></div>
</div>

<!-- TAB2 -->
<div class="pane" id="pane-fc">
  <div class="rbar" id="fcrbar"></div>
  <div class="fcwrap">
    <div id="fccard">
      <span class="fcctr" id="fcctr">0/0</span>
      <button class="fcfavbtn" id="fcfavbtn" onclick="fcToggleFav()">☆</button>
      <div id="fcword"></div>
      <div id="fctap">탭하여 뜻 보기</div>
      <div id="fcmean"></div>
    </div>
  </div>
  <div class="fcnav">
    <button class="fcbtn sec" onclick="fcPrev()">◀ 이전</button>
    <button class="fcbtn" style="background:var(--warn);" onclick="speakFc()">🔊</button>
    <button class="fcbtn" onclick="fcNext()">다음 ▶</button>
  </div>
</div>

<!-- TAB3 -->
<div class="pane" id="pane-q">
  <div class="qwrap" id="qarea"></div>
</div>

<!-- TAB4 -->
<div class="pane" id="pane-t">
  <div id="tarea"></div>
</div>

</div>

var SERIES = '고2-2';
var STOREKEY = 'cutop_go22';

// ── 스토어 ──
var store = {};
try { store = JSON.parse(localStorage.getItem(STOREKEY) || '{}'); } catch(e) {}
function saveStore() { try { localStorage.setItem(STOREKEY, JSON.stringify(store)); } catch(e) {} }
function getS(w) { return store[w.word + '|' + w.meaning] || {status:'', fav:false}; }
function setS(w, status, fav) { store[w.word + '|' + w.meaning] = {status:status, fav:fav}; saveStore(); }

// ── 공통 유틸 ──
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function speak(t) {
  if (!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  var u = new SpeechSynthesisUtterance(t);
  u.lang = 'en-US'; u.rate = 0.85;
  window.speechSynthesis.speak(u);
}
function speakFc() { speak(document.getElementById('fcword').textContent); }
function shuffle(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var t = a[i]; a[i] = a[j]; a[j] = t;
  }
  return a;
}

// ── 범위 ──
function buildRanges(ws) {
  var r = [{label:'전체', s:0, e:ws.length}];
  for (var i = 0; i < ws.length; i += 50) {
    var e = Math.min(i + 50, ws.length);
    r.push({label:(i+1)+'~'+e, s:i, e:e});
  }
  return r;
}
var RANGES = buildRanges(rawWords);

function renderRangeBar(barId, ri, fn) {
  var bar = document.getElementById(barId);
  var h = [];
  for (var i = 0; i < RANGES.length; i++) {
    var cls = 'rbtn' + (i === ri ? ' on' : '');
    h.push('<button class="' + cls + '" data-i="' + i + '" onclick="' + fn + '(this)">' + RANGES[i].label + '</button>');
  }
  bar.innerHTML = h.join('');
}
function wordsForRange(ri) {
  var r = RANGES[ri];
  return rawWords.slice(r.s, r.e);
}

// ── 탭 전환 ──
var TABS = ['w','fc','q','t'];
function showTab(id) {
  for (var i = 0; i < TABS.length; i++) {
    var t = TABS[i];
    document.getElementById('pane-' + t).classList.toggle('on', t === id);
    document.getElementById('tb-' + t).classList.toggle('on', t === id);
  }
  if (id === 'w')  { renderRangeBar('wrbar', wri, 'setWR'); renderList(); }
  if (id === 'fc') { fcInit(); }
  if (id === 'q')  { qInit(); }
  if (id === 't')  { tSetup(); }
}

// ── TAB1: 단어목록 ──
var wri = 0, wFilter = 'all';
function setWR(btn) {
  wri = parseInt(btn.dataset.i);
  renderRangeBar('wrbar', wri, 'setWR');
  renderList();
}
function setFilter(btn) {
  wFilter = btn.dataset.f;
  var btns = document.querySelectorAll('.fbar .fbtn');
  for (var i = 0; i < btns.length; i++) btns[i].classList.remove('on');
  btn.classList.add('on');
  renderList();
}
function renderList() {
  renderRangeBar('wrbar', wri, 'setWR');
  var q = (document.getElementById('wsearch').value || '').toLowerCase();
  var pool = wordsForRange(wri);
  var list = [];
  for (var i = 0; i < pool.length; i++) {
    var w = pool[i];
    var s = getS(w);
    if (wFilter === 'unk' && s.status === 'known') continue;
    if (wFilter === 'fav' && !s.fav) continue;
    if (q && w.word.toLowerCase().indexOf(q) < 0 && w.meaning.indexOf(q) < 0) continue;
    list.push(w);
  }
  var h = [];
  if (!list.length) {
    h.push('<div class="empty">표시할 단어가 없습니다</div>');
  }
  for (var i = 0; i < list.length; i++) {
    var w = list[i];
    var s = getS(w);
    var known = s.status === 'known';
    var fav = s.fav;
    h.push('<div class="wcard' + (known ? ' known' : '') + '">');
    h.push('<button class="chk' + (known ? ' on' : '') + '" data-wi="' + i + '" onclick="toggleKnown(this)">' + (known ? '✔' : '') + '</button>');
    h.push('<div class="wbody">');
    h.push('<div class="wword">' + esc(w.word) + '</div>');
    h.push('<div class="wmean">' + esc(w.meaning) + '</div>');
    h.push('</div>');
    h.push('<div class="wacts">');
    h.push('<button class="ibtn" data-w="' + esc(w.word) + '" onclick="speak(this.dataset.w)">🔊</button>');
    h.push('<button class="ibtn favbtn' + (fav ? ' on' : '') + '" data-wi="' + i + '" onclick="toggleFav(this)">' + (fav ? '★' : '☆') + '</button>');
    h.push('</div>');
    h.push('</div>');
  }
  document.getElementById('wlist').innerHTML = h.join('');
  // 실제 단어 참조를 위한 캐시
  window._wlist = list;
}
function toggleKnown(btn) {
  var wi = parseInt(btn.dataset.wi);
  var w = window._wlist[wi];
  var s = getS(w);
  setS(w, s.status === 'known' ? '' : 'known', s.fav);
  renderList();
}
function toggleFav(btn) {
  var wi = parseInt(btn.dataset.wi);
  var w = window._wlist[wi];
  var s = getS(w);
  setS(w, s.status, !s.fav);
  renderList();
}

// ── TAB2: 플래시카드 ──
var fri = 0, fcPool = [], fcIdx = 0, fcFlipped = false, fcTX = 0;
var fcEvReg = false;
function fcRegisterEvents() {
  if (fcEvReg) return;
  fcEvReg = true;
  var card = document.getElementById('fccard');
  card.addEventListener('click', function(e) {
    if (e.target.id === 'fcfavbtn') return;
    fcFlip();
  });
  card.addEventListener('touchstart', function(e) {
    fcTX = e.touches[0].clientX;
  }, {passive:true});
  card.addEventListener('touchend', function(e) {
    var dx = e.changedTouches[0].clientX - fcTX;
    if (Math.abs(dx) > 50) { if (dx < 0) fcNext(); else fcPrev(); }
  }, {passive:true});
}
function fcInit() {
  renderRangeBar('fcrbar', fri, 'setFCR');
  fcPool = wordsForRange(fri);
  if (fcIdx >= fcPool.length) fcIdx = 0;
  fcRegisterEvents();
  fcShow();
}
function setFCR(btn) {
  fri = parseInt(btn.dataset.i);
  renderRangeBar('fcrbar', fri, 'setFCR');
  fcPool = wordsForRange(fri);
  fcIdx = 0;
  fcShow();
}
function fcShow() {
  if (!fcPool.length) {
    document.getElementById('fcword').textContent = '단어 없음';
    return;
  }
  fcFlipped = false;
  var w = fcPool[fcIdx];
  var s = getS(w);
  document.getElementById('fcword').textContent = w.word;
  document.getElementById('fcmean').textContent = w.meaning;
  document.getElementById('fcmean').style.display = 'none';
  document.getElementById('fctap').style.display = '';
  document.getElementById('fcctr').textContent = (fcIdx + 1) + '/' + fcPool.length;
  var fb = document.getElementById('fcfavbtn');
  fb.textContent = s.fav ? '★' : '☆';
  fb.className = 'fcfavbtn' + (s.fav ? ' on' : '');
}
function fcFlip() {
  if (fcFlipped) return;
  if (!fcPool.length) return;
  fcFlipped = true;
  document.getElementById('fcmean').style.display = 'block';
  document.getElementById('fctap').style.display = 'none';
  speak(fcPool[fcIdx].word);
}
function fcNext() {
  if (!fcPool.length) return;
  fcIdx = (fcIdx + 1) % fcPool.length;
  fcShow();
}
function fcPrev() {
  if (!fcPool.length) return;
  fcIdx = (fcIdx - 1 + fcPool.length) % fcPool.length;
  fcShow();
}
function fcToggleFav() {
  if (!fcPool.length) return;
  var w = fcPool[fcIdx];
  var s = getS(w);
  setS(w, s.status, !s.fav);
  var fb = document.getElementById('fcfavbtn');
  fb.textContent = !s.fav ? '★' : '☆';
  fb.className = 'fcfavbtn' + (!s.fav ? ' on' : '');
}

// ── TAB3: 퀴즈 ──
var qPool = [], qIdx = 0, qScore = 0, qLocked = false;
function qInit() {
  qPool = shuffle(rawWords).slice(0, 10);
  qIdx = 0; qScore = 0;
  qShow();
}
function qShow() {
  if (qIdx >= qPool.length) { qResult(); return; }
  var w = qPool[qIdx];
  var wrongs = shuffle(rawWords.filter(function(x) { return x.word !== w.word; })).slice(0, 3);
  var opts = shuffle([w].concat(wrongs));
  var h = [];
  h.push('<div class="qnum">' + (qIdx + 1) + '/' + qPool.length + ' &nbsp; 맞춤: ' + qScore + '</div>');
  h.push('<div class="qword">' + esc(w.word) + '</div>');
  h.push('<div class="qopts">');
  for (var i = 0; i < opts.length; i++) {
    var cor = opts[i].word === w.word ? '1' : '0';
    h.push('<button class="qopt" data-cor="' + cor + '" data-w="' + esc(w.word) + '" onclick="qAns(this)">' + esc(opts[i].meaning) + '</button>');
  }
  h.push('</div>');
  document.getElementById('qarea').innerHTML = h.join('');
  qLocked = false;
}
function qAns(btn) {
  if (qLocked) return;
  qLocked = true;
  var cor = btn.dataset.cor === '1';
  var all = document.querySelectorAll('.qopt');
  for (var i = 0; i < all.length; i++) {
    if (all[i].dataset.cor === '1') all[i].classList.add('cor');
  }
  if (cor) { qScore++; speak(btn.dataset.w); }
  else { btn.classList.add('wrg'); }
  setTimeout(function() { qIdx++; qShow(); }, 1200);
}
function qResult() {
  var pct = Math.round(qScore / qPool.length * 100);
  var em = pct === 100 ? '🏆' : pct >= 80 ? '🎉' : pct >= 60 ? '👍' : '💪';
  var h = [];
  h.push('<div class="qres">');
  h.push('<div class="qemoji">' + em + '</div>');
  h.push('<div class="qscore">' + qScore + '/' + qPool.length + '</div>');
  h.push('<div style="color:var(--gray);font-size:16px;margin-top:4px;">' + pct + '점</div>');
  h.push('<br><button class="btn-p" onclick="qInit()">↩ 다시 풀기</button>');
  h.push('</div>');
  document.getElementById('qarea').innerHTML = h.join('');
}

// ── TAB4: 테스트 ──
var tri = 0, tName = '', tCnt = 50, tPool = [], tIdx = 0, tScore = 0, tWrong = [];
function tSetup() {
  var h = [];
  h.push('<div class="tform">');
  h.push('<h3>📝 테스트 설정</h3>');
  h.push('<div class="trow"><label>이름</label><input class="tinput" id="tname" type="text" placeholder="이름을 입력하세요" value="' + esc(tName) + '"></div>');
  h.push('<div class="trow"><label>문제 수 (최대 50)</label><input class="tinput" id="tcnt" type="number" min="1" max="50" value="' + tCnt + '"></div>');
  h.push('<div class="trow"><label>범위</label><div class="rbar" id="trbar"></div></div>');
  h.push('<button class="btn-p" style="width:100%;padding:14px;" onclick="tBegin()">테스트 시작 ▶</button>');
  h.push('</div>');
  document.getElementById('tarea').innerHTML = h.join('');
  renderRangeBar('trbar', tri, 'setTR');
}
function setTR(btn) {
  tri = parseInt(btn.dataset.i);
  renderRangeBar('trbar', tri, 'setTR');
}
function tBegin() {
  tName = (document.getElementById('tname').value || '').trim();
  if (!tName) { alert('이름을 입력해주세요!'); return; }
  tCnt = parseInt(document.getElementById('tcnt').value) || 50;
  if (tCnt < 1) tCnt = 1;
  var pool = wordsForRange(tri);
  tPool = shuffle(pool).slice(0, Math.min(tCnt, pool.length, 50));
  tIdx = 0; tScore = 0; tWrong = [];
  tShowQ();
}
function isSim(input, correct) {
  var norm = function(s) { return s.replace(/\s/g,'').replace(/[~\-·,]/g,'').toLowerCase(); };
  var a = norm(input), c = norm(correct);
  if (a === c) return true;
  if (a.length >= 2 && c.indexOf(a) >= 0) return true;
  var core = c.replace(/하다|되다|시키다|이다/g,'').trim();
  if (core.length >= 2 && a.indexOf(core) >= 0) return true;
  return false;
}
function tShowQ() {
  if (tIdx >= tPool.length) { tResult(); return; }
  var w = tPool[tIdx];
  var pct = Math.round(tIdx / tPool.length * 100);
  var h = [];
  h.push('<div class="pbwrap">');
  h.push('<div class="pb"><div class="pbfill" style="width:' + pct + '%"></div></div>');
  h.push('<div class="pbinfo"><span>' + (tIdx + 1) + '/' + tPool.length + '</span><span>맞춤: ' + tScore + '</span></div>');
  h.push('</div>');
  h.push('<div class="tword">' + esc(w.word) + '</div>');
  h.push('<div class="thint">한글 뜻을 입력하세요</div>');
  h.push('<input class="tinput" id="tans" type="text" placeholder="뜻 입력..." autocomplete="off">');
  h.push('<button class="btn-p" style="width:100%;padding:12px;margin-top:8px;" onclick="tNext()">확인 / 다음 ▶</button>');
  document.getElementById('tarea').innerHTML = h.join('');
  var inp = document.getElementById('tans');
  inp.addEventListener('keydown', function(e) { if (e.key === 'Enter') tNext(); });
  inp.focus();
  speak(w.word);
}
function tNext() {
  var inp = document.getElementById('tans');
  var val = (inp ? inp.value : '').trim();
  var w = tPool[tIdx];
  if (isSim(val, w.meaning)) { tScore++; }
  else { tWrong.push({word:w.word, input:val, correct:w.meaning}); }
  tIdx++;
  tShowQ();
}
function tResult() {
  var pct = Math.round(tScore / tPool.length * 100);
  var em = pct === 100 ? '🏆' : pct >= 80 ? '🎉' : pct >= 60 ? '👍' : '💪';
  var h = [];
  h.push('<div class="tres">');
  h.push('<h3>테스트 완료!</h3>');
  h.push('<div class="rscwrap">');
  h.push('<div style="font-size:36px;">' + em + '</div>');
  h.push('<div class="rscbig">' + tScore + '/' + tPool.length + '</div>');
  h.push('<div style="color:var(--gray);font-size:16px;">' + pct + '점</div>');
  h.push('</div>');
  if (tWrong.length) {
    h.push('<div class="wlerr"><h4>❌ 틀린 단어 (' + tWrong.length + '개)</h4>');
    for (var i = 0; i < tWrong.length; i++) {
      var wr = tWrong[i];
      h.push('<div class="wlitem">');
      h.push('<div class="wi">' + esc(wr.word) + '</div>');
      h.push('<div class="wd">입력: ' + esc(wr.input || '(없음)') + ' / 정답: ' + esc(wr.correct) + '</div>');
      h.push('</div>');
    }
    h.push('</div>');
  }
  h.push('<div class="rbtns">');
  h.push('<button class="btn-g" onclick="tCopy()">📋 카톡으로 결과 복사</button>');
  h.push('<button class="btn-s" onclick="tSetup()">↩ 다시 테스트</button>');
  h.push('</div>');
  h.push('</div>');
  document.getElementById('tarea').innerHTML = h.join('');
}
function tCopy() {
  var now = new Date();
  var ds = now.getFullYear() + '. ' + (now.getMonth()+1) + '. ' + now.getDate() + '.';
  var pct = Math.round(tScore / tPool.length * 100);
  var txt = '[씨유에탑 ' + SERIES + '] 테스트 결과\n';
  txt += '날짜: ' + ds + '\n';
  txt += '이름: ' + tName + '\n';
  txt += '점수: ' + tScore + '/' + tPool.length + ' (' + pct + '점)\n';
  txt += '─────────────────\n';
  if (tWrong.length) {
    txt += '❌ 틀린 단어 (' + tWrong.length + '개)\n';
    for (var i = 0; i < tWrong.length; i++) {
      var wr = tWrong[i];
      txt += '  ' + wr.word + ' → 입력:' + (wr.input || '없음') + ' / 정답:' + wr.correct + '\n';
    }
    txt += '─────────────────\n';
  }
  var ok = tPool.filter(function(w) {
    for (var i = 0; i < tWrong.length; i++) { if (tWrong[i].word === w.word) return false; }
    return true;
  });
  txt += '✅ 맞은 단어: ' + ok.map(function(w) { return w.word; }).join(', ');
  if (navigator.clipboard) {
    navigator.clipboard.writeText(txt).then(function() { alert('복사되었습니다! 카카오톡에 붙여넣기 하세요.'); });
  } else {
    var ta = document.createElement('textarea');
    ta.value = txt;
    document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
    alert('복사되었습니다! 카카오톡에 붙여넣기 하세요.');
  }
}

// ── 초기화 ──
renderRangeBar('wrbar', wri, 'setWR');
renderList();
</script>
</body>
</html>
