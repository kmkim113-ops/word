<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>씨유에탑 ✦ 첫단추 12. 실용자료</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #2563EB;
      --primary-dark: #1D4ED8;
      --primary-light: #EFF6FF;
      --success: #10B981;
      --danger: #EF4444;
      --warn: #F59E0B;
      --gray: #6B7280;
      --border: #E5E7EB;
      --bg: #F9FAFB;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: #f0f2f5;
      color: #1f2937;
      display: flex;
      justify-content: center;
    }
    #app {
      width: 100%;
      max-width: 420px;
      min-height: 100vh;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      position: relative;
      box-shadow: 0 0 10px rgba(0,0,0,0.05);
    }
    .en { font-family: 'Nunito', sans-serif; }
    .header {
      background: #ffffff;
      padding: 16px;
      text-align: center;
      border-bottom: 1px solid var(--border);
    }
    .header-brand {
      font-size: 18px;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 4px;
    }
    .header-sub {
      font-size: 13px;
      color: var(--gray);
    }
    .nav-tabs {
      display: flex;
      background: #ffffff;
      border-bottom: 1px solid var(--border);
    }
    .nav-tab {
      flex: 1;
      text-align: center;
      padding: 12px 0;
      font-size: 13px;
      font-weight: 500;
      color: var(--gray);
      background: none;
      border: none;
      cursor: pointer;
      border-bottom: 2px solid transparent;
    }
    .nav-tab.active {
      color: var(--primary);
      border-bottom-color: var(--primary);
      font-weight: 700;
    }
    .content {
      flex: 1;
      padding: 16px;
      overflow-y: auto;
      padding-bottom: 40px;
    }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }
    
    .range-bar {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      padding-bottom: 8px;
      margin-bottom: 12px;
    }
    .range-bar::-webkit-scrollbar { display: none; }
    .rbtn {
      white-space: nowrap;
      padding: 6px 12px;
      border-radius: 20px;
      background: #ffffff;
      border: 1px solid var(--border);
      font-size: 12px;
      cursor: pointer;
      color: var(--gray);
    }
    .rbtn.active {
      background: var(--primary);
      color: #ffffff;
      border-color: var(--primary);
    }
    
    .search-box {
      width: 100%;
      padding: 10px 14px;
      border-radius: 8px;
      border: 1px solid var(--border);
      font-size: 14px;
      margin-bottom: 12px;
      outline: none;
    }
    .search-box:focus { border-color: var(--primary); }
    
    .filter-bar {
      display: flex;
      gap: 6px;
      margin-bottom: 12px;
    }
    .fbtn {
      flex: 1;
      padding: 8px;
      border-radius: 6px;
      background: #ffffff;
      border: 1px solid var(--border);
      font-size: 12px;
      cursor: pointer;
      color: var(--gray);
    }
    .fbtn.active {
      background: var(--primary-light);
      color: var(--primary);
      border-color: var(--primary);
      font-weight: 600;
    }
    
    .word-card {
      background: #ffffff;
      border-radius: 8px;
      padding: 14px;
      margin-bottom: 10px;
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      transition: opacity 0.2s;
    }
    .word-card.known { opacity: 0.35; }
    .w-chk {
      width: 20px;
      height: 20px;
      border-radius: 4px;
      border: 2px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      margin-right: 12px;
      font-size: 12px;
      color: #ffffff;
    }
    .word-card.known .w-chk {
      background: var(--success);
      border-color: var(--success);
    }
    .w-body { flex: 1; }
    .w-eng { font-size: 16px; font-weight: 700; color: #111827; margin-bottom: 2px; }
    .w-kor { font-size: 14px; color: var(--gray); }
    .ibtn {
      background: none;
      border: none;
      font-size: 18px;
      cursor: pointer;
      padding: 4px;
      margin-left: 8px;
    }
    .btn-fav { color: #d1d5db; }
    .btn-fav.active { color: var(--warn); }
    
    .fc-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: 20px;
    }
    .fc-card {
      width: 100%;
      height: 240px;
      background: #ffffff;
      border-radius: 12px;
      border: 1px solid var(--border);
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      cursor: pointer;
      text-align: center;
    }
    .fc-fav-pos { position: absolute; top: 14px; right: 14px; font-size: 22px; }
    .fc-w { font-size: 24px; font-weight: 700; color: #111827; margin-bottom: 12px; }
    .fc-m { font-size: 18px; color: var(--primary); font-weight: 500; min-height: 27px; }
    .fc-hint { font-size: 12px; color: #9ca3af; position: absolute; bottom: 14px; }
    .fc-nav { display: flex; width: 100%; gap: 10px; margin-top: 20px; }
    .fc-nav-btn {
      flex: 1;
      padding: 12px;
      border-radius: 8px;
      border: none;
      background: var(--primary);
      color: #ffffff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }
    .fc-nav-btn.sec { background: #e5e7eb; color: #4b5563; }
    
    .q-progress { font-size: 13px; color: var(--gray); text-align: right; margin-bottom: 8px; }
    .q-card { background: #ffffff; border-radius: 12px; padding: 20px; border: 1px solid var(--border); text-align: center; margin-bottom: 16px; }
    .q-w { font-size: 22px; font-weight: 700; }
    .q-options { display: flex; flex-direction: column; gap: 10px; }
    .q-opt {
      width: 100%;
      padding: 14px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: #ffffff;
      text-align: left;
      font-size: 15px;
      cursor: pointer;
      outline: none;
    }
    .q-opt.correct { background: var(--success) !important; color: #ffffff; border-color: var(--success); }
    .q-opt.wrong { background: var(--danger) !important; color: #ffffff; border-color: var(--danger); }
    
    .setup-box { background: #ffffff; border-radius: 12px; padding: 20px; border: 1px solid var(--border); }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 6px; }
    .form-input { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid var(--border); font-size: 14px; outline: none; }
    .btn-block { width: 100%; padding: 12px; border-radius: 8px; border: none; background: var(--primary); color: #ffffff; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 10px; }
    
    .t-header { display: flex; justify-content: space-between; font-size: 13px; color: var(--gray); margin-bottom: 6px; }
    .p-bar-bg { width: 100%; height: 6px; background: #e5e7eb; border-radius: 3px; margin-bottom: 20px; }
    .p-bar-fg { height: 100%; background: var(--primary); width: 0%; border-radius: 3px; transition: width 0.2s; }
    .t-word-box { background: #ffffff; border-radius: 12px; padding: 30px 20px; border: 1px solid var(--border); text-align: center; margin-bottom: 16px; }
    .t-w { font-size: 26px; font-weight: 700; }
    
    .res-box { background: #ffffff; border-radius: 12px; padding: 20px; border: 1px solid var(--border); text-align: center; }
    .res-emoji { font-size: 48px; margin-bottom: 10px; }
    .res-score { font-size: 24px; font-weight: 700; margin-bottom: 4px; }
    .res-pct { font-size: 14px; color: var(--gray); margin-bottom: 20px; }
    .err-title { text-align: left; font-size: 14px; font-weight: 700; color: var(--danger); margin: 16px 0 8px 0; border-top: 1px dashed var(--border); padding-top: 14px; }
    .err-list { text-align: left; max-height: 180px; overflow-y: auto; font-size: 13px; }
    .err-item { padding: 6px 0; border-bottom: 1px solid #f3f4f6; }
    .err-w { font-weight: 700; }
  </style>
</head>
<body>

<div id="app">
  <div class="header">
    <div class="header-brand en">씨유에탑 ✦ 영어단어장</div>
    <div class="header-sub">첫단추 12. 실용자료 · 총 96단어</div>
  </div>

  <div class="nav-tabs">
    <button id="tb-list" class="nav-tab active" onclick="switchTab('list')">단어목록</button>
    <button id="tb-flash" class="nav-tab" onclick="switchTab('flash')">플래시카드</button>
    <button id="tb-quiz" class="nav-tab" onclick="switchTab('quiz')">퀴즈모드</button>
    <button id="tb-test" class="nav-tab" onclick="switchTab('test')">📝 테스트</button>
  </div>

  <div class="content">
    <!-- 탭 1: 단어목록 -->
    <div id="tab-list" class="tab-panel active">
      <div id="lrbar" class="range-bar"></div>
      <input type="text" id="lsearch" class="search-box" placeholder="영어 또는 한글 검색..." oninput="renderList()">
      <div class="filter-bar">
        <button id="f-all" class="fbtn active" onclick="setFilter('all')">전체</button>
        <button id="f-not" class="fbtn" onclick="setFilter('not')">모름</button>
        <button id="f-fav" class="fbtn" onclick="setFilter('fav')">⭐즐겨찾기</button>
      </div>
      <div id="list-container"></div>
    </div>

    <!-- 탭 2: 플래시카드 -->
    <div id="tab-flash" class="tab-panel">
      <div id="fcrbar" class="range-bar"></div>
      <div class="fc-container">
        <div id="fccard" class="fc-card">
          <button id="fcfav" class="ibtn btn-fav fc-fav-pos">★</button>
          <div id="fcword" class="fc-w en"></div>
          <div id="fcmean" class="fc-m"></div>
          <div class="fc-hint">카드 터치 시 뜻 공개</div>
        </div>
        <div class="fc-nav">
          <button class="fc-nav-btn sec" onclick="fcPrev()">◀ 이전</button>
          <button class="fc-nav-btn" style="background:var(--warn);" onclick="speakFc()">🔊</button>
          <button class="fc-nav-btn" onclick="fcNext()">다음 ▶</button>
        </div>
      </div>
    </div>

    <!-- 탭 3: 퀴즈모드 -->
    <div id="tab-quiz" class="tab-panel">
      <div id="quiz-game">
        <div id="qprogress" class="q-progress"></div>
        <div class="q-card">
          <div id="qword" class="q-w en"></div>
        </div>
        <div id="qoptions" class="q-options"></div>
      </div>
      <div id="quiz-result" class="res-box" style="display:none;">
        <div id="qres-emoji" class="res-emoji"></div>
        <div id="qres-score" class="res-score"></div>
        <div id="qres-pct" class="res-pct"></div>
        <button class="btn-block" onclick="initQuiz()">↩ 다시 풀기</button>
      </div>
    </div>

    <!-- 탭 4: 테스트 -->
    <div id="tab-test" class="tab-panel">
      <div id="test-setup"></div>
      <div id="test-play" style="display:none;">
        <div class="t-header">
          <span id="tprogress"></span>
          <span id="tcorrect-cnt" style="color:var(--success);"></span>
        </div>
        <div class="p-bar-bg"><div id="tpbar" class="p-bar-fg"></div></div>
        <div class="t-word-box">
          <div id="tword" class="t-w en"></div>
        </div>
        <input type="text" id="tinput" class="search-box" style="font-size:16px; padding:12px; margin-bottom:16px;" placeholder="한글 뜻을 입력하세요" autocomplete="off">
        <button class="btn-block" onclick="submitTest()">입력 완료 (Enter)</button>
      </div>
      <div id="test-result" class="res-box" style="display:none;">
        <div id="tres-emoji" class="res-emoji"></div>
        <div id="tres-score" class="res-score"></div>
        <div id="tres-pct" class="res-pct"></div>
        <button class="btn-block" style="background:#25D366; margin-bottom:10px;" onclick="copyTestResult()">📋 카톡으로 결과 복사</button>
        <button class="btn-block" onclick="renderSetup()">↩ 다시 테스트</button>
        <div id="terr-section" style="display:none;">
          <div class="err-title">❌ 틀린 단어 목록</div>
          <div id="terr-list" class="err-list"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
var rawWords = [
  { "word": "temporary", "meaning": "임시의, 일시적인" },
  { "word": "assistant", "meaning": "보조원, 조수" },

  { "word": "essential", "meaning": "필수적인" },

  { "word": "require", "meaning": "필요하다, 요구하다" },
  { "word": "additional", "meaning": "추가의" },
  { "word": "vacancy", "meaning": "공석, 결원" },
  { "word": "specific", "meaning": "구체적인" },
  { "word": "position", "meaning": "(일)자리, 직책" },
  { "word": "apply", "meaning": "지원하다, 신청하다" },
  { "word": "consider", "meaning": "고려하다" },
  { "word": "references", "meaning": "증빙 서류" },
  { "word": "transcript", "meaning": "(학교의) 성적증명서" },
  { "word": "department", "meaning": "부서" },
  { "word": "human resources", "meaning": "(회사의) 인사부; 인적 자원" },
  { "word": "P.O. Box", "meaning": "사서함(= post-office box)" },
  { "word": "informal", "meaning": "편안한; 격식에 얽매이지 않는" },
  { "word": "exhibition", "meaning": "전시회" },
  { "word": "opportunity", "meaning": "기회" },
  { "word": "face to face", "meaning": "직면한, 서로 얼굴을 맞대고" },
  { "word": "exotic", "meaning": "이국적인" },
  { "word": "insect", "meaning": "곤충" },
  { "word": "Despite", "meaning": "~에도 불구하고" },
  { "word": "reputation", "meaning": "명성, 평판" },

  { "word": "keeper", "meaning": "(동물의) 사육사" },

  { "word": "restrict", "meaning": "제한하다, 한정하다" },

  { "word": "resident", "meaning": "주민" },
  { "word": "private", "meaning": "사립의" },
  { "word": "co-educational", "meaning": "남녀 공학의" },
  { "word": "day school", "meaning": "통학 학교(기숙학교와 대조적으로 학생들이 집에서 다니는 사립학교)" },
  { "word": "mission", "meaning": "임무" },

  { "word": "superior", "meaning": "우수한" },

  { "word": "reason", "meaning": "추론하다; 논하다" },
  { "word": "critically", "meaning": "비판[비평]적으로; 혹평하여" },
  { "word": "effectively", "meaning": "효과적으로" },
  { "word": "enthusiastically", "meaning": "열정적으로" },
  { "word": "throughout life", "meaning": "평생, 일생 동안" },
  { "word": "locate", "meaning": "위치시키다" },
  { "word": "ratio", "meaning": "비율" },
  { "word": "staff", "meaning": "직원" },
  { "word": "percentage", "meaning": "비율; 퍼센트" },
  { "word": "academic year", "meaning": "학년(도)" },
  { "word": "take A away (to B)", "meaning": "A를 (B로) 멀리 데리고 가다" },
  { "word": "imaginary", "meaning": "가상의" },
  { "word": "turn", "meaning": "차례; 돌다" },
  { "word": "make-believe", "meaning": "상상, 환상" },
  { "word": "distinct", "meaning": "뚜렷한" },
  { "word": "feature", "meaning": "특징" },
  { "word": "landmark", "meaning": "랜드마크(멀리서 보고 위치 파악에 도움이 되는 대형 건물 같은 것)" },
  { "word": "then", "meaning": "그다음; 그때" },
  { "word": "short story", "meaning": "단편 소설" },
  { "word": "set", "meaning": "(연극·소설·영화의) 배경을 설정하다" },
  { "word": "include", "meaning": "포함하다" },
  { "word": "illustration", "meaning": "삽화" },
  { "word": "winner", "meaning": "우승자" },
  { "word": "select", "meaning": "선정하다" },
  { "word": "guest", "meaning": "초대받은 사람, 손님" },
  { "word": "judge", "meaning": "심사위원; 판사" },
  { "word": "entry", "meaning": "출품작; 입장" },
  { "word": "publish", "meaning": "실다; 출판하다" },
  { "word": "issue", "meaning": "(잡지·신문 같은 정기 간행물의) 호; 주제" },
  { "word": "open to A", "meaning": "A가 참여할 수 있는" },
  { "word": "grade", "meaning": "학년; 품질" },
  { "word": "exceed", "meaning": "초과하다" },
  { "word": "postmark", "meaning": "우편물의 소인을 찍다" },
  { "word": "mail", "meaning": "우편으로 보내다; 우편물" }
];

var storeKey = "cutop_cheotdanchu_12";
var progressData = {};
try {
  var saved = localStorage.getItem(storeKey);
  if (saved) progressData = JSON.parse(saved);
} catch(e) {}

function saveProgress() {
  try { localStorage.setItem(storeKey, JSON.stringify(progressData)); } catch(e) {}
}

function getWordState(w) {
  var k = w.word + "|" + w.meaning;
  if (!progressData[k]) progressData[k] = { status: "", fav: false };
  return progressData[k];
}

function buildRanges(ws) {
  var r = [{ label: "전체", s: 0, e: ws.length }];
  for (var i = 0; i < ws.length; i += 50) {
    r.push({ label: (i+1) + "-" + Math.min(i+50, ws.length), s: i, e: Math.min(i+50, ws.length) });
  }
  return r;
}
var ranges = buildRanges(rawWords);

var lri = 0, fri = 0, tri = 0;
var curFilter = "all";

function esc(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function renderRangeBar(id, curIdx, setterName) {
  var html = "";
  ranges.forEach(function(r, i) {
    var cls = i === curIdx ? "rbtn active" : "rbtn";
    html += '<button class="' + cls + '" onclick="' + setterName + '(' + i + ')">' + r.label + '</button>';
  });
  document.getElementById(id).innerHTML = html;
}

function setLR(i) { lri = i; renderRangeBar("lrbar", lri, "setLR"); renderList(); }
function setFR(i) { fri = i; renderRangeBar("fcrbar", fri, "setFR"); initFC(); }
function setTR(i) { tri = i; renderRangeBar("tsrbar", tri, "setTR"); }

function setFilter(f) {
  curFilter = f;
  ["all","not","fav"].forEach(function(n) {
    document.getElementById("f-"+n).classList.toggle("active", n===f);
  });
  renderList();
}

function toggleKnown(idx) {
  var w = rawWords[idx];
  var state = getWordState(w);
  state.status = state.status === "known" ? "" : "known";
  saveProgress();
  var card = document.getElementById("wcard-"+idx);
  if (card) card.classList.toggle("known", state.status === "known");
}

function toggleFav(idx, btn) {
  var w = rawWords[idx];
  var state = getWordState(w);
  state.fav = !state.fav;
  saveProgress();
  if (btn) btn.classList.toggle("active", state.fav);
}

function renderList() {
  var container = document.getElementById("list-container");
  var query = document.getElementById("lsearch").value.toLowerCase().trim();
  var r = ranges[lri];
  var html = "";
  
  for (var i = r.s; i < r.e; i++) {
    var w = rawWords[i];
    var state = getWordState(w);
    
    if (curFilter === "not" && state.status === "known") continue;
    if (curFilter === "fav" && !state.fav) continue;
    
    if (query) {
      if (w.word.toLowerCase().indexOf(query) === -1 && w.meaning.toLowerCase().indexOf(query) === -1) {
        continue;
      }
    }
    
    var kCls = state.status === "known" ? "word-card known" : "word-card";
    var fCls = state.fav ? "ibtn btn-fav active" : "ibtn btn-fav";
    
    html += '<div class="' + kCls + '" id="wcard-' + i + '">' +
      '<div class="w-chk" onclick="toggleKnown(' + i + ')">✓</div>' +
      '<div class="w-body">' +
        '<div class="w-eng en">' + esc(w.word) + '</div>' +
        '<div class="w-kor">' + esc(w.meaning) + '</div>' +
      '</div>' +
      '<button class="ibtn" data-w="' + esc(w.word) + '" onclick="speak(this.dataset.w)">🔊</button>' +
      '<button class="' + fCls + '" onclick="toggleFav(' + i + ', this)">★</button>' +
    '</div>';
  }
  container.innerHTML = html;
}

var fcList = [], fci = 0, fcFlipped = false, fcTX = 0;
function initFC() {
  var r = ranges[fri];
  fcList = rawWords.slice(r.s, r.e);
  fci = 0;
  showFC();
}
function showFC() {
  if (fcList.length === 0) {
    document.getElementById("fcword").textContent = "단어 없음";
    document.getElementById("fcmean").textContent = "";
    return;
  }
  var w = fcList[fci];
  var origIdx = rawWords.indexOf(w);
  var state = getWordState(w);
  fcFlipped = false;
  
  var fcfav = document.getElementById("fcfav");
  fcfav.className = state.fav ? "ibtn btn-fav fc-fav-pos active" : "ibtn btn-fav fc-fav-pos";
  fcfav.onclick = function() { toggleFav(origIdx, fcfav); };
  
  document.getElementById("fcword").textContent = w.word;
  document.getElementById("fcmean").textContent = "";
}
function fcFlip() {
  if (fcFlipped || fcList.length === 0) return;
  fcFlipped = true;
  document.getElementById("fcmean").textContent = fcList[fci].meaning;
  speakFc();
}
function fcNext() { if (fcList.length===0)return; fci = (fci+1)%fcList.length; showFC(); }
function fcPrev() { if (fcList.length===0)return; fci = (fci-1+fcList.length)%fcList.length; showFC(); }

var qList = [], qi = 0, qCorIdx = 0, qScore = 0, qLocked = false;
function shuffle(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var t = a[i]; a[i] = a[j]; a[j] = t;
  }
  return a;
}
function initQuiz() {
  var pool = shuffle(rawWords);
  qList = pool.slice(0, Math.min(10, pool.length));
  qi = 0; qScore = 0; qLocked = false;
  document.getElementById("quiz-game").style.display = "block";
  document.getElementById("quiz-result").style.display = "none";
  showQuiz();
}
function showQuiz() {
  if (qi >= qList.length) {
    var pct = Math.round((qScore/qList.length)*100);
    var emo = "💪"; if(pct===100) emo="🏆"; else if(pct>=80) emo="🎉"; else if(pct>=60) emo="👍";
    document.getElementById("quiz-game").style.display = "none";
    document.getElementById("quiz-result").style.display = "block";
    document.getElementById("qres-emoji").textContent = emo;
    document.getElementById("qres-score").textContent = qScore + " / " + qList.length;
    document.getElementById("qres-pct").textContent = "점수: " + pct + "점";
    return;
  }
  qLocked = false;
  var cur = qList[qi];
  document.getElementById("qprogress").textContent = (qi+1) + " / " + qList.length;
  document.getElementById("qword").textContent = cur.word;
  
  var opts = [cur.meaning];
  var pool = rawWords.filter(function(x){ return x.meaning !== cur.meaning; });
  pool = shuffle(pool);
  for (var i=0; i<Math.min(3, pool.length); i++) opts.push(pool[i].meaning);
  opts = shuffle(opts);
  
  var html = "";
  opts.forEach(function(o) {
    var isCor = o === cur.meaning ? "1" : "0";
    html += '<button class="q-opt" data-cor="' + isCor + '" onclick="qAns(this)">' + esc(o) + '</button>';
  });
  document.getElementById("qoptions").innerHTML = html;
}
function qAns(btn) {
  if (qLocked) return;
  qLocked = true;
  var isCor = btn.dataset.cor === "1";
  if (isCor) {
    btn.classList.add("correct");
    qScore++;
    speak(qList[qi].word);
  } else {
    btn.classList.add("wrong");
    var btns = document.getElementsByClassName("q-opt");
    for (var i=0; i<btns.length; i++) {
      if (btns[i].dataset.cor === "1") btns[i].classList.add("correct");
    }
  }
  setTimeout(function() { qi++; showQuiz(); }, 1000);
}

var tList = [], ti = 0, tScore = 0, tName = "", tWrong = [], tRight = [];
function isSim(input, correct) {
  var norm = function(s) { return s.replace(/\s/g,"").replace(/[~\-·,]/g,"").toLowerCase(); };
  var a = norm(input), c = norm(correct);
  if (a === c) return true;
  if (a.length >= 2 && c.indexOf(a) >= 0) return true;
  var core = c.replace(/하다|되다|시키다|이다/g,"").trim();
  if (core.length >= 2 && a.indexOf(core) >= 0) return true;
  return false;
}
function renderSetup() {
  document.getElementById("test-setup").style.display = "block";
  document.getElementById("test-play").style.display = "none";
  document.getElementById("test-result").style.display = "none";
  
  var html = '<div class="setup-box">' +
    '<div class="form-group"><label>이름 입력</label><input type="text" id="tname" class="form-input" placeholder="이름을 입력하세요"></div>' +
    '<div class="form-group"><label>테스트 범위</label><div id="tsrbar" class="range-bar"></div></div>' +
    '<button class="btn-block" onclick="startTest()">테스트 시작 ▶</button>' +
  '</div>';
  document.getElementById("test-setup").innerHTML = html;
  renderRangeBar("tsrbar", tri, "setTR");
}
function startTest() {
  var nameIn = document.getElementById("tname").value.trim();
  if (!nameIn) { alert("이름을 입력해주세요."); return; }
  tName = nameIn;
  
  var r = ranges[tri];
  var pool = shuffle(rawWords.slice(r.s, r.e));
  tList = pool.slice(0, Math.min(50, pool.length));
  ti = 0; tScore = 0; tWrong = []; tRight = [];
  
  document.getElementById("test-setup").style.display = "none";
  document.getElementById("test-play").style.display = "block";
  showTest();
}
function showTest() {
  if (ti >= tList.length) {
    endTest();
    return;
  }
  document.getElementById("tprogress").textContent = "문제: " + (ti+1) + " / " + tList.length;
  document.getElementById("tcorrect-cnt").textContent = "✅ 맞춤수: " + tScore;
  document.getElementById("tpbar").style.width = ((ti / tList.length) * 100) + "%";
  document.getElementById("tword").textContent = tList[ti].word;
  
  var inp = document.getElementById("tinput");
  inp.value = "";
  inp.focus();
  speak(tList[ti].word);
}
function submitTest() {
  var ans = document.getElementById("tinput").value.trim();
  var cur = tList[ti];
  if (isSim(ans, cur.meaning)) {
    tScore++;
    tRight.push(cur.word);
  } else {
    tWrong.push({ word: cur.word, input: ans || "(공백)", correct: cur.meaning });
  }
  ti++;
  showTest();
}
document.getElementById("tinput").addEventListener("keydown", function(e) {
  if (e.key === "Enter") submitTest();
});
function endTest() {
  document.getElementById("test-play").style.display = "none";
  document.getElementById("test-result").style.display = "block";
  
  var pct = Math.round((tScore/tList.length)*100);
  var emo = "💪"; if(pct===100) emo="🏆"; else if(pct>=80) emo="🎉"; else if(pct>=60) emo="👍";
  
  document.getElementById("tres-emoji").textContent = emo;
  document.getElementById("tres-score").textContent = tScore + " / " + tList.length;
  document.getElementById("tres-pct").textContent = "점수: " + pct + "점";
  
  var errSec = document.getElementById("terr-section");
  var errList = document.getElementById("terr-list");
  if (tWrong.length > 0) {
    errSec.style.display = "block";
    var html = "";
    tWrong.forEach(function(x) {
      html += '<div class="err-item"><span class="err-w">' + esc(x.word) + '</span><br>ㄴ 입력: <span style="color:var(--danger);">' + esc(x.input) + '</span> / 정답: <span style="color:var(--success);">' + esc(x.correct) + '</span></div>';
    });
    errList.innerHTML = html;
  } else {
    errSec.style.display = "none";
  }
}
function copyTestResult() {
  var d = new Date();
  var dateStr = d.getFullYear() + "-" + (d.getMonth()+1) + "-" + d.getDate();
  var pct = Math.round((tScore/tList.length)*100);
  
  var t = "[씨유에탑 첫단추 12. 실용자료] 테스트 결과\n" +
          "날짜: " + dateStr + "\n" +
          "이름: " + tName + "\n" +
          "점수: " + tScore + "/" + tList.length + " (" + pct + "점)\n" +
          "─────────────────\n" +
          "❌ 틀린 단어 (" + tWrong.length + "개)\n";
          
  tWrong.forEach(function(x) {
    t += "  " + x.word + " → 입력:" + x.input + " / 정답:" + x.correct + "\n";
  });
  t += "─────────────────\n" +
       "✅ 맞은 단어: " + tRight.join(", ");
       
  var ta = document.createElement("textarea");
  ta.value = t;
  document.body.appendChild(ta);
  ta.select();
  document.execCommand("copy");
  document.body.removeChild(ta);
  alert("결과가 텍스트로 복사되었습니다. 카톡 창에 붙여넣기 하세요!");
}

function speak(t) {
  if (!("speechSynthesis" in window)) return;
  window.speechSynthesis.cancel();
  var u = new SpeechSynthesisUtterance(t);
  u.lang = "en-US";
  u.rate = 0.85;
  window.speechSynthesis.speak(u);
}
function speakFc() {
  speak(document.getElementById("fcword").textContent);
}

function switchTab(t) {
  ["list","flash","quiz","test"].forEach(function(n) {
    document.getElementById("tb-"+n).classList.toggle("active", n===t);
    document.getElementById("tab-"+n).classList.toggle("active", n===t);
  });
  if (t==="list")  { renderRangeBar("lrbar", lri, "setLR"); renderList(); }
  if (t==="flash") { renderRangeBar("fcrbar", fri, "setFR"); initFC(); }
  if (t==="quiz")  { initQuiz(); }
  if (t==="test")  { renderSetup(); }
}

(function(){
  var card = document.getElementById("fccard");
  card.addEventListener("click", function(e) {
    if (e.target.id === "fcfav") return;
    fcFlip();
  });
  card.addEventListener("touchstart", function(e) {
    fcTX = e.touches[0].clientX;
  }, {passive:true});
  card.addEventListener("touchend", function(e) {
    var dx = e.changedTouches[0].clientX - fcTX;
    if (Math.abs(dx) > 50) { if (dx < 0) fcNext(); else fcPrev(); }
  }, {passive:true});
})();

window.onload = function() {
  renderRangeBar("lrbar", lri, "setLR");
  renderList();
};
</script>
