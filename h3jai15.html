<!DOCTYPE html>
<html lang="ko">
<head>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    :root {
      --primary: #2563EB;
      --primary-dark: #1D4ED8;
      --primary-light: #EFF6FF;
      --success: #10B981;
      --danger: #EF4444;
      --warn: #F59E0B;
      --gray: #6B7280;
      --border: #E5E7EB;
      --bg: #F9FAFB;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: #f0f2f5;
      color: #1F2937;
      display: flex;
      justify-content: center;
    }
    .app-container {
      width: 100%;
      max-width: 420px;
      background: #ffffff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
      box-shadow: 0 0 10px rgba(0,0,0,0.05);
    }
    .header {
      padding: 16px;
      background: #ffffff;
      border-bottom: 1px solid var(--border);
      text-align: center;
    }
    .header-brand {
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 20px;
      color: var(--primary);
      margin-bottom: 4px;
    }
    .header-sub {
      font-size: 13px;
      color: var(--gray);
    }
    .nav-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      background: #ffffff;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .nav-tab {
      flex: 1;
      text-align: center;
      padding: 12px 0;
      font-size: 13px;
      font-weight: 500;
      color: var(--gray);
      cursor: pointer;
      border-bottom: 2px solid transparent;
    }
    .nav-tab.active {
      color: var(--primary);
      border-bottom-color: var(--primary);
      font-weight: 700;
    }
    .content-area {
      flex: 1;
      padding: 16px;
      background: var(--bg);
      padding-bottom: 40px;
    }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }
    
    .range-bar {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      padding-bottom: 8px;
      margin-bottom: 12px;
    }
    .range-bar::-webkit-scrollbar { display: none; }
    .rbtn {
      flex-shrink: 0;
      padding: 6px 12px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: #ffffff;
      font-size: 12px;
      cursor: pointer;
      color: var(--gray);
    }
    .rbtn.active {
      background: var(--primary);
      color: #ffffff;
      border-color: var(--primary);
    }
    .search-box {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      margin-bottom: 12px;
      outline: none;
    }
    .filter-bar {
      display: flex;
      gap: 6px;
      margin-bottom: 12px;
    }
    .fbtn {
      flex: 1;
      padding: 8px;
      border: 1px solid var(--border);
      background: #ffffff;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      color: var(--gray);
      text-align: center;
    }
    .fbtn.active {
      background: var(--primary-light);
      color: var(--primary);
      border-color: var(--primary);
      font-weight: 600;
    }
    
    .word-list { display: flex; flex-direction: column; gap: 8px; }
    .word-card {
      background: #ffffff;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .word-card.known { opacity: 0.35; }
    .w-chk {
      width: 20px;
      height: 20px;
      border: 2px solid var(--border);
      border-radius: 4px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      color: #ffffff;
    }
    .w-chk.checked {
      background: var(--success);
      border-color: var(--success);
    }
    .w-chk.checked::after { content: "✓"; }
    .w-info { flex: 1; }
    .w-eng { font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 16px; margin-bottom: 2px; }
    .w-kor { font-size: 14px; color: #4B5563; }
    .ibtn {
      background: none;
      border: none;
      font-size: 18px;
      cursor: pointer;
      padding: 4px;
      color: var(--gray);
    }
    .ibtn.fav.active { color: var(--warn); }
    
    .fc-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: 20px;
    }
    .fc-card {
      width: 100%;
      height: 220px;
      background: #ffffff;
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.02);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      cursor: pointer;
      padding: 20px;
      text-align: center;
    }
    .fc-fav-pos { position: absolute; top: 12px; right: 12px; }
    .fc-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    .fc-eng { font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 26px; color: var(--primary); }
    .fc-kor { font-size: 18px; color: #374151; font-weight: 500; }
    .fc-hint { font-size: 12px; color: var(--gray); margin-top: 8px; }
    .fc-nav { display: flex; width: 100%; gap: 10px; margin-top: 20px; }
    .fc-nav-btn {
      flex: 1;
      padding: 14px;
      border: none;
      border-radius: 8px;
      background: var(--primary);
      color: #ffffff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }
    .fc-nav-btn.sec { background: var(--gray); }
    
    .panel-box {
      background: #ffffff;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      text-align: center;
    }
    .btn-main {
      width: 100%;
      padding: 14px;
      background: var(--primary);
      color: #ffffff;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 12px;
    }
    .form-group { text-align: left; margin-bottom: 16px; }
    .form-label { font-size: 14px; font-weight: 600; margin-bottom: 6px; display: block; }
    .form-input {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 15px;
      outline: none;
    }
    .stat-row { display: flex; justify-content: space-between; font-size: 13px; color: var(--gray); margin-bottom: 10px; }
    .p-bar-bg { width: 100%; height: 6px; background: var(--border); border-radius: 3px; margin-bottom: 20px; overflow: hidden; }
    .p-bar-fill { height: 100%; background: var(--primary); width: 0%; transition: width 0.2s; }
    .q-word { font-family: 'Nunito', sans-serif; font-size: 26px; font-weight: 700; margin-bottom: 24px; color: #111827; }
    .q-options { display: flex; flex-direction: column; gap: 10px; }
    .q-opt {
      width: 100%;
      padding: 14px;
      border: 1px solid var(--border);
      background: #ffffff;
      border-radius: 8px;
      font-size: 15px;
      text-align: left;
      cursor: pointer;
    }
    .q-opt.correct { background: var(--success) !important; color: #ffffff; border-color: var(--success); }
    .q-opt.wrong { background: var(--danger) !important; color: #ffffff; border-color: var(--danger); }
    
    .res-emoji { font-size: 48px; margin-bottom: 10px; }
    .res-score { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
    .res-pct { font-size: 14px; color: var(--gray); margin-bottom: 20px; }
    .wrong-list { text-align: left; margin-top: 16px; border-top: 1px solid var(--border); padding-top: 16px; max-height: 240px; overflow-y: auto; }
    .wrong-title { font-size: 14px; font-weight: 700; color: var(--danger); margin-bottom: 10px; }
    .wrong-item { font-size: 13px; padding: 6px 0; border-bottom: 1px dashed var(--border); }
    .wrong-eng { font-family: 'Nunito', sans-serif; font-weight: 700; color: #111827; }
    .test-input-box {
      width: 100%;
      padding: 14px;
      border: 2px solid var(--primary);
      border-radius: 8px;
      font-size: 16px;
      text-align: center;
      outline: none;
      margin-bottom: 12px;

  </style>
</head>
<body>

<div class="app-container">
  <div class="header">
    <div class="header-brand en">씨유에탑 ✦ 영어단어장</div>
    <div class="header-sub">고3 자이 15회 어휘 · 총 401단어</div>
  </div>
  
  <div class="nav-tabs">
    <div class="nav-tab active" id="tb-list" onclick="switchTab('list')">단어목록</div>
    <div class="nav-tab" id="tb-flash" onclick="switchTab('flash')">플래시카드</div>
    <div class="nav-tab" id="tb-quiz" onclick="switchTab('quiz')">퀴즈모드</div>
    <div class="nav-tab" id="tb-test" onclick="switchTab('test')">📝 테스트</div>
  </div>
  
  <div class="content-area">
    <div class="tab-panel active" id="tab-list">
      <div class="range-bar" id="lrbar"></div>
      <input type="text" class="search-box" id="lsearch" placeholder="영어 또는 한글 뜻 검색..." oninput="renderList()">
      <div class="filter-bar">
        <div class="fbtn active" id="lf-all" onclick="setLFilter('all')">전체</div>
        <div class="fbtn" id="lf-not" onclick="setLFilter('not')">모름</div>
        <div class="fbtn" id="lf-fav" onclick="setLFilter('fav')">⭐즐겨찾기</div>
      </div>
      <div class="word-list" id="wlist-box"></div>
    </div>
    
    <div class="tab-panel" id="tab-flash">
      <div class="range-bar" id="fcrbar"></div>
      <div class="fc-container">
        <div class="fc-card" id="fccard">
          <div class="fc-fav-pos">
            <button class="ibtn fav" id="fcfav">★</button>
          </div>
          <div class="fc-content">
            <div class="fc-eng" id="fcword">-</div>
            <div class="fc-kor" id="fcmean" style="display:none;">-</div>
            <div class="fc-hint" id="fchint">탭하여 뜻 보기</div>
          </div>
        </div>
        <div class="fc-nav">
          <button class="fc-nav-btn sec" onclick="fcPrev()">◀ 이전</button>
          <button class="fc-nav-btn" style="background:var(--warn);" onclick="speakFc()">🔊</button>
          <button class="fc-nav-btn" onclick="fcNext()">다음 ▶</button>
        </div>
      </div>
    </div>
    
    <div class="tab-panel" id="tab-quiz">
      <div id="q-play" class="panel-box" style="display:none;">
        <div class="stat-row">
          <div id="q-cnt">문제: 1 / 10</div>
          <div id="q-score">맞춤: 0</div>
        </div>
        <div class="p-bar-bg"><div class="p-bar-fill" id="q-pbar"></div></div>
        <div class="q-word" id="q-wtext">-</div>
        <div class="q-options" id="q-opts"></div>
      </div>
      <div id="q-res" class="panel-box" style="display:none;"></div>
    </div>
    
    <div class="tab-panel" id="tab-test">
      <div id="t-setup" class="panel-box" style="display:none;"></div>
      <div id="t-play" class="panel-box" style="display:none;">
        <div class="stat-row">
          <div id="t-cnt">현재문제: 1/50</div>
          <div id="t-score">✅ 맞춤수: 0</div>
        </div>
        <div class="p-bar-bg"><div class="p-bar-fill" id="t-pbar"></div></div>
        <div class="q-word" id="t-wtext">-</div>
        <input type="text" class="test-input-box" id="t-input" autocomplete="off" placeholder="한글 뜻을 입력하세요">
        <button class="btn-main" onclick="submitTest()">입력 (Enter)</button>
      </div>
      <div id="t-res" class="panel-box" style="display:none;"></div>
    </div>
  </div>
</div>

var sSlug = "go3_jai_15";
var sKey = "cutop_" + sSlug;

function getStore() {
  var d = localStorage.getItem(sKey);
  return d ? JSON.parse(d) : {};
}
function saveStore(s) {
  localStorage.setItem(sKey, JSON.stringify(s));
}

function esc(s) {
  return String(s)
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;");
}

function buildRanges(ws) {
  var r = [{ label: "전체", s: 0, e: ws.length }];
  for (var i = 0; i < ws.length; i += 50) {
    r.push({ label: (i+1) + "-" + Math.min(i+50, ws.length), s: i, e: Math.min(i+50, ws.length) });
  }
  return r;
}
var ranges = buildRanges(rawWords);

var lri = 0, fri = 0;
var lf = "all";

function renderRangeBar(id, cur, fnStr) {
  var html = "";
  ranges.forEach(function(r, idx) {
    var cls = idx === cur ? "rbtn active" : "rbtn";
    html += '<button class="' + cls + '" onclick="' + fnStr + '(' + idx + ')">' + r.label + '</button>';
  });
  document.getElementById(id).innerHTML = html;
}

function setLR(i) { lri = i; renderRangeBar("lrbar", lri, "setLR"); renderList(); }
function setFR(i) { fri = i; renderRangeBar("fcrbar", fri, "setFR"); initFC(); }
function setLFilter(v) {
  lf = v;
  ["all","not","fav"].forEach(function(n) {
    document.getElementById("lf-"+n).classList.toggle("active", n===v);
  });
  renderList();
}

function renderList() {
  var store = getStore();
  var box = document.getElementById("wlist-box");
  var r = ranges[lri];
  var query = document.getElementById("lsearch").value.toLowerCase().trim();
  
  var html = "";
  for (var i = r.s; i < r.e; i++) {
    var w = rawWords[i];
    var k = w.word + "|" + w.meaning;
    var s = store[k] || { status: "", fav: false };
    
    var isK = s.status === "known";
    var isF = !!s.fav;
    
    if (lf === "not" && isK) continue;
    if (lf === "fav" && !isF) continue;
    
    if (query) {
      if (w.word.toLowerCase().indexOf(query) === -1 && w.meaning.toLowerCase().indexOf(query) === -1) {
        continue;
      }
    }
    
    var cCard = isK ? "word-card known" : "word-card";
    var cChk = isK ? "w-chk checked" : "w-chk";
    var cFav = isF ? "ibtn fav active" : "ibtn fav";
    
    html += '<div class="' + cCard + '" id="wc-' + i + '">';
    html += '  <div class="' + cChk + '" onclick="toggleKnown(' + i + ')"></div>';
    html += '  <div class="w-info">';
    html += '    <div class="w-eng">' + esc(w.word) + '</div>';
    html += '    <div class="w-kor">' + esc(w.meaning) + '</div>';
    html += '  </div>';
    html += '  <button class="ibtn" data-w="' + esc(w.word) + '" onclick="speak(this.dataset.w)">🔊</button>';
    html += '  <button class="' + cFav + '" onclick="toggleFav(' + i + ', \'list\')">★</button>';
    html += '</div>';
  }
  box.innerHTML = html;
}

function toggleKnown(i) {
  var w = rawWords[i];
  var k = w.word + "|" + w.meaning;
  var store = getStore();
  if (!store[k]) store[k] = { status: "", fav: false };
  store[k].status = (store[k].status === "known") ? "" : "known";
  saveStore(store);
  renderList();
}

function toggleFav(i, src) {
  var w = rawWords[i];
  var k = w.word + "|" + w.meaning;
  var store = getStore();
  if (!store[k]) store[k] = { status: "", fav: false };
  store[k].fav = !store[k].fav;
  saveStore(store);
  if (src === 'list') renderList();
  if (src === 'fc') updateFC();
}

function speak(t) {
  if (!("speechSynthesis" in window)) return;
  window.speechSynthesis.cancel();
  var u = new SpeechSynthesisUtterance(t);
  u.lang = "en-US";
  u.rate = 0.85;
  window.speechSynthesis.speak(u);
}
function speakFc() {
  speak(document.getElementById("fcword").textContent);
}

var fcList = [];
var fci = 0;
var fcFlipped = false;
var fcTX = 0;

function initFC() {
  var r = ranges[fri];
  fcList = [];
  for (var i = r.s; i < r.e; i++) {
    fcList.push({ idx: i, word: rawWords[i] });
  }
  fci = 0;
  updateFC();
}

function updateFC() {
  if (fcList.length === 0) {
    document.getElementById("fcword").textContent = "단어 없음";
    document.getElementById("fcmean").style.display = "none";
    document.getElementById("fchint").style.display = "none";
    return;
  }
  var cur = fcList[fci];
  var store = getStore();
  var k = cur.word.word + "|" + cur.word.meaning;
  var isF = !!(store[k] && store[k].fav);
  
  document.getElementById("fcword").textContent = cur.word.word;
  document.getElementById("fcmean").textContent = cur.word.meaning;
  
  var favBtn = document.getElementById("fcfav");
  favBtn.className = isF ? "ibtn fav active" : "ibtn fav";
  favBtn.onclick = function() { toggleFav(cur.idx, 'fc'); };
  
  fcFlipped = false;
  document.getElementById("fcmean").style.display = "none";
  document.getElementById("fchint").style.display = "block";
}

function fcFlip() {
  if (fcList.length === 0 || fcFlipped) return;
  fcFlipped = true;
  document.getElementById("fcmean").style.display = "block";
  document.getElementById("fchint").style.display = "none";
  speakFc();
}

function fcNext() { if (fcList.length === 0) return; fci = (fci + 1) % fcList.length; updateFC(); }
function fcPrev() { if (fcList.length === 0) return; fci = (fci - 1 + fcList.length) % fcList.length; updateFC(); }

var qList = [];
var qCur = 0;
var qScore = 0;
var qLocked = false;

function shuffle(arr) {
  for (var i = arr.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp;
  }
  return arr;
}

function initQuiz() {
  document.getElementById("q-res").style.display = "none";
  document.getElementById("q-play").style.display = "block";
  
  var pool = shuffle(rawWords.slice());
  var limit = Math.min(10, pool.length);
  qList = pool.slice(0, limit);
  qCur = 0;
  qScore = 0;
  showQuiz();
}

function showQuiz() {
  qLocked = false;
  var total = qList.length;
  document.getElementById("q-cnt").textContent = "문제: " + (qCur + 1) + " / " + total;
  document.getElementById("q-score").textContent = "맞춤: " + qScore;
  document.getElementById("q-pbar").style.width = ((qCur / total) * 100) + "%";
  
  var curW = qList[qCur];
  document.getElementById("q-wtext").textContent = curW.word;
  
  var corrects = [curW.meaning];
  var wrongs = [];
  rawWords.forEach(function(w) {
    if (w.meaning !== curW.meaning && wrongs.indexOf(w.meaning) === -1) {
      wrongs.push(w.meaning);
    }
  });
  shuffle(wrongs);
  var opts = [curW.meaning];
  for (var i = 0; i < Math.min(3, wrongs.length); i++) {
    opts.push(wrongs[i]);
  }
  shuffle(opts);
  
  var html = "";
  opts.forEach(function(o) {
    var isCor = (o === curW.meaning) ? "1" : "0";
    html += '<button class="q-opt" data-cor="' + isCor + '" onclick="qAns(this)">' + esc(o) + '</button>';
  });
  document.getElementById("q-opts").innerHTML = html;
}

function qAns(btn) {
  if (qLocked) return;
  qLocked = true;
  var isCor = btn.dataset.cor === "1";
  if (isCor) {
    btn.classList.add("correct");
    qScore++;
    speak(qList[qCur].word);
  } else {
    btn.classList.add("wrong");
    var btns = document.querySelectorAll("#q-opts .q-opt");
    for (var i = 0; i < btns.length; i++) {
      if (btns[i].dataset.cor === "1") {
        btns[i].classList.add("correct");
        break;
      }
    }
  }
  setTimeout(function() {
    qCur++;
    if (qCur < qList.length) {
      showQuiz();
    } else {
      finishQuiz();
    }
  }, 1000);
}

function finishQuiz() {
  document.getElementById("q-play").style.display = "none";
  var resBox = document.getElementById("q-res");
  resBox.style.display = "block";
  
  var total = qList.length;
  var pct = Math.round((qScore / total) * 100);
  var emo = "💪";
  if (pct === 100) emo = "🏆";
  else if (pct >= 80) emo = "🎉";
  else if (pct >= 60) emo = "👍";
  
  var html = "";
  html += '<div class="res-emoji">' + emo + '</div>';
  html += '<div class="res-score">' + qScore + ' / ' + total + '</div>';
  html += '<div class="res-pct">' + pct + '점</div>';
  html += '<button class="btn-main" onclick="initQuiz()">↩ 다시 풀기</button>';
  resBox.innerHTML = html;
}

var tRangeI = 0;
var tList = [];
var tCur = 0;
var tScore = 0;
var tWrongs = [];
var tRights = [];

function isSim(input, correct) {
  var norm = function(s) {
    return s.replace(/\s/g,"").replace(/[~\-·,]/g,"").toLowerCase();
  };
  var a = norm(input), c = norm(correct);
  if (a === c) return true;
  if (a.length >= 2 && c.indexOf(a) >= 0) return true;
  var core = c.replace(/하다|되다|시키다|이다/g,"").trim();
  if (core.length >= 2 && a.indexOf(core) >= 0) return true;
  return false;
}

function renderSetup() {
  document.getElementById("t-play").style.display = "none";
  document.getElementById("t-res").style.display = "none";
  var box = document.getElementById("t-setup");
  box.style.display = "block";
  
  var html = "";
  html += '<div class="form-group">';
  html += '  <label class="form-label">이름 입력</label>';
  html += '  <input type="text" class="form-input" id="t-name" placeholder="이름을 입력하세요">';
  html += '</div>';
  html += '<div class="form-group">';
  html += '  <label class="form-label">범위 선택</label>';
  html += '  <div class="range-bar" id="trbar"></div>';
  html += '</div>';
  html += '<button class="btn-main" onclick="startTest()">테스트 시작 ▶</button>';
  box.innerHTML = html;
  
  renderRangeBar("trbar", tRangeI, "setTRange");
}

function setTRange(i) { tRangeI = i; renderRangeBar("trbar", tRangeI, "setTRange"); }

function startTest() {
  var name = document.getElementById("t-name").value.trim();
  if (!name) { alert("이름을 입력해주세요."); return; }
  
  var r = ranges[tRangeI];
  var pool = [];
  for (var i = r.s; i < r.e; i++) { pool.push(rawWords[i]); }
  shuffle(pool);
  
  tList = pool.slice(0, Math.min(50, pool.length));
  tCur = 0;
  tScore = 0;
  tWrongs = [];
  tRights = [];
  
  document.getElementById("t-setup").style.display = "none";
  document.getElementById("t-play").style.display = "block";
  
  showTestItem();
}

function showTestItem() {
  var total = tList.length;
  document.getElementById("t-cnt").textContent = "현재문제: " + (tCur + 1) + " / " + total;
  document.getElementById("t-score").textContent = "✅ 맞춤수: " + tScore;
  document.getElementById("t-pbar").style.width = ((tCur / total) * 100) + "%";
  
  var curW = tList[tCur];
  document.getElementById("t-wtext").textContent = curW.word;
  
  var inp = document.getElementById("t-input");
  inp.value = "";
  inp.focus();
  
  speak(curW.word);
}

function submitTest() {
  var inp = document.getElementById("t-input");
  var val = inp.value.trim();
  var curW = tList[tCur];
  
  var isCor = isSim(val, curW.meaning);
  if (isCor) {
    tScore++;
    tRights.push(curW.word);
  } else {
    tWrongs.push({ word: curW.word, input: val ? val : "(공백)", correct: curW.meaning });
  }
  
  tCur++;
  if (tCur < tList.length) {
    showTestItem();
  } else {
    finishTest();
  }
}

function finishTest() {
  document.getElementById("t-play").style.display = "none";
  var resBox = document.getElementById("t-res");
  resBox.style.display = "block";
  
  var total = tList.length;
  var pct = Math.round((tScore / total) * 100);
  var emo = "💪";
  if (pct === 100) emo = "🏆";
  else if (pct >= 80) emo = "🎉";
  else if (pct >= 60) emo = "👍";
  
  var name = document.getElementById("t-name").value.trim();
  
  var html = "";
  html += '<div class="res-emoji">' + emo + '</div>';
  html += '<div class="res-score">' + tScore + " / " + total + '</div>';
  html += '<div class="res-pct">' + pct + '점</div>';
  
  html += '<button class="btn-main" style="background:#25D366; margin-bottom:8px;" onclick="copyKakao()">📋 카톡으로 결과 복사</button>';
  html += '<button class="btn-main" style="background:var(--gray);" onclick="renderSetup()">↩ 다시 테스트</button>';
  
  if (tWrongs.length > 0) {
    html += '<div class="wrong-list">';
    html += '  <div class="wrong-title">❌ 틀린 단어 (' + tWrongs.length + '개)</div>';
    tWrongs.forEach(function(item) {
      html += '  <div class="wrong-item">';
      html += '    <span class="wrong-eng">' + esc(item.word) + '</span> → ';
      html += '    <span style="color:var(--danger);">' + esc(item.input) + '</span> / ';
      html += '    <span style="color:var(--success);">' + esc(item.correct) + '</span>';
      html += '  </div>';
    });
    html += '</div>';
  }
  
  resBox.innerHTML = html;
}

function copyKakao() {
  var name = document.getElementById("t-name").value.trim();
  var total = tList.length;
  var pct = Math.round((tScore / total) * 100);
  
  var d = new Date();
  var dateStr = d.getFullYear() + "-" + (d.getMonth()+1) + "-" + d.getDate();
  
  var txt = "[씨유에탑 고3 자이 15회 어휘] 테스트 결과\n";
  txt += "날짜: " + dateStr + "\n";
  txt += "이름: " + name + "\n";
  txt += "점수: " + tScore + "/" + total + " (" + pct + "점)\n";
  txt += "─────────────────\n";
  txt += "❌ 틀린 단어 (" + tWrongs.length + "개)\n";
  tWrongs.forEach(function(item) {
    txt += "  " + item.word + " → 입력:" + item.input + " / 정답:" + item.correct + "\n";
  });
  txt += "─────────────────\n";
  txt += "✅ 맞은 단어: " + tRights.join(", ");
  
  var ta = document.createElement("textarea");
  ta.value = txt;
  document.body.appendChild(ta);
  ta.select();
  document.execCommand("copy");
  document.body.removeChild(ta);
  alert("결과가 복사되었습니다. 카톡 창에 붙여넣기 하세요.");
}

function switchTab(t) {
  ["list","flash","quiz","test"].forEach(function(n) {
    document.getElementById("tb-"+n).classList.toggle("active", n===t);
    document.getElementById("tab-"+n).classList.toggle("active", n===t);
  });
  if (t==="list")  { renderRangeBar("lrbar", lri, "setLR"); renderList(); }
  if (t==="flash") { renderRangeBar("fcrbar", fri, "setFR"); initFC(); }
  if (t==="quiz")  { initQuiz(); }
  if (t==="test")  { renderSetup(); }
}

(function(){
  var card = document.getElementById("fccard");
  card.addEventListener("click", function(e) {
    if (e.target.id === "fcfav") return;
    fcFlip();
  });
  card.addEventListener("touchstart", function(e) {
    fcTX = e.touches[0].clientX;
  }, {passive:true});
  card.addEventListener("touchend", function(e) {
    var dx = e.changedTouches[0].clientX - fcTX;
    if (Math.abs(dx) > 50) { if (dx < 0) fcNext(); else fcPrev(); }
  }, {passive:true});
  
  document.getElementById("t-input").addEventListener("keydown", function(e) {
    if (e.key === "Enter") { submitTest(); }
  });
  
  renderRangeBar("lrbar", lri, "setLR");
  renderList();
})();
</script>
