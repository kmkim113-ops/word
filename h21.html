<html lang="ko">

<title>씨유에탑 영어단어장 — 고2 - 1</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--primary:#2563EB;--primary-dark:#1D4ED8;--primary-light:#EFF6FF;--success:#10B981;--danger:#EF4444;--warn:#F59E0B;--gray:#6B7280;--border:#E5E7EB;--bg:#F9FAFB;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:#111827;max-width:420px;margin:0 auto;min-height:100vh;}
/* Header */
.hdr{background:var(--primary);color:#fff;padding:14px 16px 10px;position:sticky;top:0;z-index:100;}
.hdr-brand{font-family:'Nunito',sans-serif;font-weight:800;font-size:18px;}
.hdr-sub{font-size:12px;opacity:.85;margin-top:2px;}
/* Tabs */
.tabs{display:flex;background:#fff;border-bottom:2px solid var(--border);position:sticky;top:62px;z-index:99;}
.tab{flex:1;padding:10px 4px;text-align:center;font-size:12px;font-weight:600;color:var(--gray);cursor:pointer;border-bottom:3px solid transparent;transition:all .2s;}
.tab.on{color:var(--primary);border-bottom-color:var(--primary);}
/* Panels */
.panel{display:none;padding:12px;}
.panel.on{display:block;}
/* Range bar - horizontal scroll */
.range-bar{display:flex;gap:6px;overflow-x:auto;padding:0 0 8px 0;margin-bottom:8px;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.range-bar::-webkit-scrollbar{display:none;}
.rbtn{flex-shrink:0;padding:6px 12px;border-radius:20px;border:1.5px solid var(--border);background:#fff;font-size:12px;font-weight:600;color:var(--gray);cursor:pointer;white-space:nowrap;font-family:'Nunito',sans-serif;}
.rbtn.on{background:var(--primary);border-color:var(--primary);color:#fff;}
/* Controls */
.ctrl{margin-bottom:10px;}
input[type=text],input[type=number]{width:100%;padding:9px 11px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;font-family:'Noto Sans KR',sans-serif;outline:none;background:#fff;}
input:focus{border-color:var(--primary);}
.filter-row{display:flex;gap:6px;margin-bottom:10px;}
.fbtn{flex:1;padding:7px 4px;border:1.5px solid var(--border);border-radius:7px;font-size:12px;font-weight:600;background:#fff;cursor:pointer;color:var(--gray);}
.fbtn.on{background:var(--primary-light);border-color:var(--primary);color:var(--primary);}
/* Word cards */
.wcard{background:#fff;border-radius:10px;border:1px solid var(--border);padding:11px 12px;margin-bottom:8px;display:flex;align-items:center;gap:8px;transition:opacity .2s;}
.wcard.known{opacity:.35;}
.wck{width:28px;height:28px;border-radius:50%;border:2px solid var(--border);background:#fff;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.wck.on{background:var(--success);border-color:var(--success);color:#fff;}
.winfo{flex:1;min-width:0;}
.wenglish{font-family:'Nunito',sans-serif;font-weight:700;font-size:16px;color:#111827;}
.wmeaning{font-size:13px;color:#374151;margin-top:2px;}
.wactions{display:flex;gap:4px;flex-shrink:0;}
.wbtn{width:30px;height:30px;border-radius:7px;border:none;background:var(--bg);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;}
.wbtn.fav.on{color:#F59E0B;}
/* Flashcard */
.fcwrap{margin-bottom:14px;}
#fccard{width:100%;min-height:200px;border-radius:16px;background:#fff;border:2px solid var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 20px;cursor:pointer;position:relative;box-shadow:0 2px 12px rgba(0,0,0,.07);user-select:none;}
#fcnum{font-size:12px;color:var(--gray);margin-bottom:8px;font-family:'Nunito',sans-serif;}
#fcword{font-family:'Nunito',sans-serif;font-weight:800;font-size:32px;color:var(--primary);text-align:center;}
#fcmean{font-size:17px;color:#374151;margin-top:12px;text-align:center;font-weight:500;}
#fctap{font-size:12px;color:var(--gray);margin-top:10px;}
#fcfav{position:absolute;top:12px;right:14px;font-size:20px;background:none;border:none;cursor:pointer;}
.fc-nav{display:flex;gap:8px;}
.fc-nav-btn{flex:1;padding:12px;border-radius:10px;border:none;background:var(--primary);color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;}
.fc-nav-btn.sec{background:#fff;border:2px solid var(--primary);color:var(--primary);}
/* Quiz */
.qcard{background:#fff;border-radius:12px;border:1px solid var(--border);padding:18px;margin-bottom:10px;}
.qword{font-family:'Nunito',sans-serif;font-size:26px;font-weight:800;color:var(--primary);text-align:center;margin-bottom:18px;}
.qopts{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.qopt{padding:11px 8px;border-radius:9px;border:2px solid var(--border);background:#fff;font-size:13px;font-weight:600;cursor:pointer;text-align:center;transition:all .15s;font-family:'Noto Sans KR',sans-serif;}
.qopt.correct{background:#D1FAE5;border-color:var(--success);color:#065F46;}
.qopt.wrong{background:#FEE2E2;border-color:var(--danger);color:#991B1B;}
.qprog{text-align:center;font-size:13px;color:var(--gray);margin-bottom:12px;font-family:'Nunito',sans-serif;}
/* Test */
.tset{background:#fff;border-radius:12px;border:1px solid var(--border);padding:18px;}
.tset label{display:block;font-size:13px;font-weight:600;margin-bottom:5px;color:#374151;}
.tset .field{margin-bottom:14px;}
.tbtn{width:100%;padding:13px;border-radius:10px;border:none;background:var(--primary);color:#fff;font-size:16px;font-weight:700;cursor:pointer;margin-top:4px;}
.tprogbar{height:6px;background:var(--border);border-radius:3px;margin-bottom:14px;overflow:hidden;}
.tprogfill{height:100%;background:var(--primary);border-radius:3px;transition:width .3s;}
.tqword{font-family:'Nunito',sans-serif;font-size:30px;font-weight:800;color:var(--primary);text-align:center;margin:18px 0 14px;}
.tinfo{text-align:center;font-size:13px;color:var(--gray);margin-bottom:14px;}
.tres{background:#fff;border-radius:12px;border:1px solid var(--border);padding:18px;}
.tscore{text-align:center;font-size:42px;font-weight:800;color:var(--primary);font-family:'Nunito',sans-serif;}
.temoji{text-align:center;font-size:36px;margin:8px 0;}
.twrong{margin-top:14px;}
.twrong h3{font-size:14px;font-weight:700;color:var(--danger);margin-bottom:8px;}
.twitem{font-size:12px;padding:6px 0;border-bottom:1px solid var(--border);color:#374151;}
.twitem b{font-family:'Nunito',sans-serif;color:var(--primary);}
.tkok{width:100%;padding:13px;border-radius:10px;border:none;background:#25D366;color:#fff;font-size:15px;font-weight:700;cursor:pointer;margin-top:14px;}
.trestart{width:100%;padding:13px;border-radius:10px;border:2px solid var(--primary);background:#fff;color:var(--primary);font-size:15px;font-weight:700;cursor:pointer;margin-top:8px;}
.empty{text-align:center;color:var(--gray);padding:40px 0;font-size:14px;}
select{width:100%;padding:9px 11px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;font-family:'Noto Sans KR',sans-serif;outline:none;background:#fff;}
select:focus{border-color:var(--primary);}
</style>
</head>

<div class="hdr">
  <div class="hdr-brand">씨유에탑 ✦ 영어단어장</div>
  <div class="hdr-sub">고2 - 1 &middot; 총 1000단어</div>
</div>
<div class="tabs">
  <div class="tab on" onclick="showTab('words')">단어목록</div>
  <div class="tab" onclick="showTab('flash')">플래시카드</div>
  <div class="tab" onclick="showTab('quiz')">퀴즈</div>
  <div class="tab" onclick="showTab('test')">📝테스트</div>
</div>

<!-- TAB 1 -->
<div id="tab-words" class="panel on">
  <div id="wrangebar" class="range-bar"></div>
  <div class="ctrl"><input type="text" id="wsearch" placeholder="영어/한글 검색..." oninput="renderWords()"></div>
  <div class="filter-row">
    <button class="fbtn on" data-f="all" onclick="setFilter(this)">전체</button>
    <button class="fbtn" data-f="unknown" onclick="setFilter(this)">모름</button>
    <button class="fbtn" data-f="fav" onclick="setFilter(this)">⭐즐겨찾기</button>
  </div>
  <div id="wlist"></div>
</div>

<!-- TAB 2 -->
<div id="tab-flash" class="panel">
  <div id="fcrangebar" class="range-bar"></div>
  <div class="fcwrap">
    <div id="fccard">
      <button id="fcfav" onclick="fcToggleFav()">☆</button>
      <div id="fcnum">1 / 1</div>
      <div id="fcword"></div>
      <div id="fcmean"></div>
      <div id="fctap">탭하여 뜻 보기</div>
    </div>
  </div>
  <div class="fc-nav">
    <button class="fc-nav-btn sec" onclick="fcPrev()">◀ 이전</button>
    <button class="fc-nav-btn" style="background:var(--warn);" onclick="speakFc()">🔊</button>
    <button class="fc-nav-btn" onclick="fcNext()">다음 ▶</button>
  </div>
</div>

<!-- TAB 3 -->
<div id="tab-quiz" class="panel">
  <div id="qarea"></div>
</div>

<!-- TAB 4 -->
<div id="tab-test" class="panel">
  <div id="tarea"></div>
</div>

function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

function wordsForRange(v){if(!v||v==="all")return rawWords;var p=v.split("_");return rawWords.slice(parseInt(p[0]),parseInt(p[1]));}

}

function renderWords(){
  var search=document.getElementById("wsearch").value.trim().toLowerCase();
  var pool=wordsForRange(wRangeVal);
  var store=loadStore();
  var html="";
  var count=0;
  for(var i=0;i<pool.length;i++){
    var w=pool[i];
    var key=w.word+"|"+w.meaning;
    var s=store[key]||{};
    if(wFilter==="unknown"&&s.status==="known")continue;
    if(wFilter==="fav"&&!s.fav)continue;
    if(search&&w.word.toLowerCase().indexOf(search)<0&&w.meaning.indexOf(search)<0)continue;
    count++;
    var known=s.status==="known";
    var fav=!!s.fav;
    html+='<div class="wcard'+(known?" known":"")+'">';
    html+='<button class="wck'+(known?" on":"")+'" data-key="'+esc(key)+'" onclick="toggleKnown(this)">✔</button>';
    html+='<div class="winfo"><div class="wenglish">'+esc(w.word)+'</div><div class="wmeaning">'+esc(w.meaning)+'</div></div>';
    html+='<div class="wactions">';
    html+='<button class="wbtn" data-w="'+esc(w.word)+'" onclick="speak(this.dataset.w)">🔊</button>';
    html+='<button class="wbtn fav'+(fav?" on":"")+'" data-key="'+esc(key)+'" onclick="toggleFav(this)">'+(fav?"★":"☆")+'</button>';
    html+='</div></div>';
  }
  if(!count)html='<div class="empty">해당하는 단어가 없습니다.</div>';
  document.getElementById("wlist").innerHTML=html;
}
function toggleKnown(btn){var key=btn.dataset.key;var store=loadStore();if(!store[key])store[key]={};store[key].status=store[key].status==="known"?"":"known";saveStore(store);renderWords();}
function toggleFav(btn){var key=btn.dataset.key;var store=loadStore();if(!store[key])store[key]={};store[key].fav=!store[key].fav;saveStore(store);renderWords();}

buildRangeBar("wrangebar","all","wRangeClick");

var fcPool=[];
var fcIdx=0;
var fcFlipped=false;
var fcTX=0;

function fcRangeClick(btn){
  fcRangeVal=btn.dataset.v;
  var btns=document.getElementById("fcrangebar").querySelectorAll(".rbtn");
  for(var i=0;i<btns.length;i++)btns[i].classList.remove("on");
  btn.classList.add("on");
  fcPool=wordsForRange(fcRangeVal);
  fcIdx=0;fcShow();
}
function fcInit(){
  buildRangeBar("fcrangebar",fcRangeVal,"fcRangeClick");
  fcPool=wordsForRange(fcRangeVal);
  if(!fcIdx)fcIdx=0;
  fcRegisterEvents();
  fcShow();
}
function fcShow(){
  if(!fcPool.length)return;
  var w=fcPool[fcIdx];
  var store=loadStore();
  var key=w.word+"|"+w.meaning;
  var s=store[key]||{};
  document.getElementById("fcnum").textContent=(fcIdx+1)+" / "+fcPool.length;
  document.getElementById("fcword").textContent=w.word;
  document.getElementById("fcmean").textContent=w.meaning;
  document.getElementById("fcmean").style.display="none";
  document.getElementById("fctap").style.display="";
  document.getElementById("fcfav").textContent=s.fav?"★":"☆";
  fcFlipped=false;
}
function fcFlip(){
  if(fcFlipped)return;
  if(!fcPool.length)return;
  fcFlipped=true;
  var w=fcPool[fcIdx];
  document.getElementById("fcmean").style.display="block";
  document.getElementById("fctap").style.display="none";
  speak(w.word);
}
function fcNext(){if(!fcPool.length)return;fcIdx=(fcIdx+1)%fcPool.length;fcShow();}
function fcPrev(){if(!fcPool.length)return;fcIdx=(fcIdx-1+fcPool.length)%fcPool.length;fcShow();}
function fcToggleFav(){
  if(!fcPool.length)return;
  var w=fcPool[fcIdx];var key=w.word+"|"+w.meaning;
  var store=loadStore();if(!store[key])store[key]={};
  store[key].fav=!store[key].fav;saveStore(store);
  document.getElementById("fcfav").textContent=store[key].fav?"★":"☆";
}
var fcEventsRegistered=false;
function fcRegisterEvents(){
  if(fcEventsRegistered)return;
  fcEventsRegistered=true;
  var card=document.getElementById("fccard");
  card.addEventListener("click",function(e){if(e.target.id==="fcfav")return;fcFlip();});
  card.addEventListener("touchstart",function(e){fcTX=e.touches[0].clientX;},{passive:true});
  card.addEventListener("touchend",function(e){var dx=e.changedTouches[0].clientX-fcTX;if(Math.abs(dx)>50){if(dx<0)fcNext();else fcPrev();}},{passive:true});
}

// TAB3
var qQuestions=[];var qCur=0;var qScore=0;var qLocked=false;
function qInit(){
  qQuestions=[];qCur=0;qScore=0;qLocked=false;
  var pool=shuffle(rawWords).slice(0,Math.min(10,rawWords.length));
  for(var i=0;i<pool.length;i++){
    var w=pool[i];
    var wrong=shuffle(rawWords.filter(function(x){return x.meaning!==w.meaning;})).slice(0,3);
    var opts=shuffle([w].concat(wrong));
    qQuestions.push({word:w.word,answer:w.meaning,opts:opts});
  }
  qRender();
}
function qRender(){
  if(qCur>=qQuestions.length){qResult();return;}
  var q=qQuestions[qCur];
  var html='<div class="qprog">'+(qCur+1)+" / "+qQuestions.length+'</div>';
  html+='<div class="qcard"><div class="qword">'+esc(q.word)+'</div><div class="qopts">';
  for(var i=0;i<q.opts.length;i++){
    var opt=q.opts[i];
    var isCor=opt.meaning===q.answer?"1":"0";
    html+='<button class="qopt" data-cor="'+isCor+'" onclick="qAns(this)">'+esc(opt.meaning)+'</button>';
  }
  html+='</div></div>';
  document.getElementById("qarea").innerHTML=html;
  qLocked=false;
}
function qAns(btn){
  if(qLocked)return;qLocked=true;
  var correct=btn.dataset.cor==="1";
  if(correct){btn.classList.add("correct");qScore++;speak(qQuestions[qCur].word);}
  else{btn.classList.add("wrong");var opts=btn.parentNode.querySelectorAll(".qopt");for(var i=0;i<opts.length;i++){if(opts[i].dataset.cor==="1")opts[i].classList.add("correct");}}
  qCur++;setTimeout(qRender,1100);
}
function qResult(){
  var pct=Math.round(qScore/qQuestions.length*100);
  var emoji=pct===100?"🏆":pct>=80?"🎉":pct>=60?"👍":"💪";
  var html='<div class="tres"><div class="temoji">'+emoji+'</div><div class="tscore">'+qScore+"/"+qQuestions.length+'</div>';
  html+='<div style="text-align:center;font-size:15px;color:var(--gray);margin-top:4px;">'+pct+'점</div>';
  html+='<button class="tbtn" onclick="qInit()" style="margin-top:16px;">🔄 다시 풀기</button></div>';
  document.getElementById("qarea").innerHTML=html;
}

  html+='<div class="tqword">'+esc(w.word)+'</div>';
  html+='<input type="text" id="tans" placeholder="한글 뜻을 입력하세요" autocomplete="off">';
  html+='<button class="tbtn" onclick="tSubmit()" style="margin-top:10px;">확인 (Enter)</button>';
  document.getElementById("tarea").innerHTML=html;
  var ans=document.getElementById("tans");
  ans.focus();
  ans.addEventListener("keydown",function(e){if(e.key==="Enter"){e.preventDefault();tSubmit();}});
  speak(w.word);
}
function isSim(input,correct){
  var norm=function(s){return s.replace(/\s/g,"").replace(/[~\-·,]/g,"").toLowerCase();};
  var a=norm(input),c=norm(correct);
  if(a===c)return true;
  if(a.length>=2&&c.indexOf(a)>=0)return true;
  var core=c.replace(/하다|되다|시키다|이다/g,"").trim();
  if(core.length>=2&&a.indexOf(core)>=0)return true;
  return false;
}
function tSubmit(){
  var ans=document.getElementById("tans");if(!ans)return;
  var val=ans.value.trim();
  var w=tQuestions[tCur];
  if(isSim(val,w.meaning)){tCorrect++;}
  else{tWrong.push({word:w.word,input:val,correct:w.meaning});}
  tCur++;tShowQ();
}
function tResult(){
  var pct=Math.round(tCorrect/tTotalQ*100);
  var emoji=pct===100?"🏆":pct>=80?"🎉":pct>=60?"👍":"💪";
  var now=new Date();
  var dateStr=now.getFullYear()+". "+(now.getMonth()+1)+". "+now.getDate()+".";
  var html='<div class="tres">';
  html+='<div class="temoji">'+emoji+'</div>';
  html+='<div class="tscore">'+tCorrect+"/"+tTotalQ+'</div>';
  html+='<div style="text-align:center;font-size:15px;color:var(--gray);margin-top:4px;">'+pct+'점</div>';
  if(tWrong.length){
    html+='<div class="twrong"><h3>❌ 틀린 단어 ('+tWrong.length+'개)</h3>';
    for(var i=0;i<tWrong.length;i++){
      var tw=tWrong[i];
      html+='<div class="twitem"><b>'+esc(tw.word)+'</b> → 입력:'+esc(tw.input||"(없음)")+" / 정답:"+esc(tw.correct)+'</div>';
    }
    html+='</div>';
  }
  html+='<button class="tkok" onclick="tCopyResult()">📋 카톡으로 결과 복사</button>';
  html+='<button class="trestart" onclick="tSetup()">↩ 다시 테스트</button></div>';
  document.getElementById("tarea").innerHTML=html;
}
function tCopyResult(){
  var now=new Date();
  var dateStr=now.getFullYear()+". "+(now.getMonth()+1)+". "+now.getDate()+".";
  var pct=Math.round(tCorrect/tTotalQ*100);
  var lines=[];
  lines.push("[씨유에탑 "+SERIES+"] 테스트 결과");
  lines.push("날짜: "+dateStr);
  lines.push("이름: "+tName);
  lines.push("점수: "+tCorrect+"/"+tTotalQ+" ("+pct+"점)");
  lines.push("─────────────────");
  if(tWrong.length){
    lines.push("❌ 틀린 단어 ("+tWrong.length+"개)");
    for(var i=0;i<tWrong.length;i++){
      var tw=tWrong[i];
      lines.push("  "+tw.word+" → 입력:"+(tw.input||"(없음)")+" / 정답:"+tw.correct);
    }
    lines.push("─────────────────");
  }
  var correctWords=[];
  for(var i=0;i<tQuestions.length;i++){
    var found=false;
    for(var j=0;j<tWrong.length;j++){if(tWrong[j].word===tQuestions[i].word){found=true;break;}}
    if(!found)correctWords.push(tQuestions[i].word);
  }
  lines.push("✅ 맞은 단어: "+correctWords.join(", "));
  var text=lines.join("\n");
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(function(){alert("클립보드에 복사되었습니다!");}).catch(function(){alert(text);});
  }else{
    var ta=document.createElement("textarea");
    ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta);
    alert("클립보드에 복사되었습니다!");
  }
}
</script>
</body>
</html>
