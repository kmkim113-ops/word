<html lang="ko">

      --primary-dark: #1D4ED8;
      --primary-light: #EFF6FF;
      --success: #10B981;
      --danger: #EF4444;
      --warn: #F59E0B;
      --gray: #6B7280;
      --border: #E5E7EB;
      --bg: #F9FAFB;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background-color: var(--bg);
      color: #1F2937;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
    }
    .en { font-family: 'Nunito', sans-serif; }
    .app-container {
      width: 100%;
      max-width: 420px;
      background: #FFFFFF;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
    }
    .header {
      background: #FFFFFF;
      padding: 16px;
      border-bottom: 1px solid var(--border);
      text-align: center;
    }
    .header-brand {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--primary);
    }
    .header-sub {
      font-size: 0.85rem;
      color: var(--gray);
      margin-top: 4px;
    }
    .nav-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      background: #F3F4F6;
    }
    .tab-btn {
      flex: 1;
      text-align: center;
      padding: 12px 0;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--gray);
      background: none;
      border: none;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      outline: none;
    }
    .tab-btn.active {
      color: var(--primary);
      border-bottom-color: var(--primary);
      background: #FFFFFF;
      font-weight: 700;
    }
    .tab-content {
      display: none;
      flex: 1;
      padding: 16px;
    }
    .tab-content.active {
      display: block;
    }
    .range-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 12px;
    }
    .range-btn {
      padding: 6px 10px;
      font-size: 0.75rem;
      border: 1px solid var(--border);
      background: #FFFFFF;
      border-radius: 6px;
      cursor: pointer;
      color: #4B5563;
    }
    .range-btn.active {
      background: var(--primary);
      color: #FFFFFF;
      border-color: var(--primary);
    }
    .search-box {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 12px;
      font-size: 0.9rem;
      outline: none;
    }
    .search-box:focus {
      border-color: var(--primary);
    }
    .filter-bar {
      display: flex;
      gap: 6px;
      margin-bottom: 16px;
    }
    .filter-btn {
      flex: 1;
      padding: 8px;
      font-size: 0.8rem;
      border: 1px solid var(--border);
      background: #FFFFFF;
      border-radius: 6px;
      cursor: pointer;
      color: #4B5563;
    }
    .filter-btn.active {
      background: var(--primary-light);
      color: var(--primary);
      border-color: var(--primary);
      font-weight: 600;
    }
    .word-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .word-card {
      display: flex;
      align-items: center;
      padding: 12px;
      background: #FFFFFF;
      border: 1px solid var(--border);
      border-radius: 8px;
      transition: opacity 0.2s;
    }
    .word-card.known {
      opacity: 0.35;
    }
    .chk-btn {
      background: none;
      border: 1px solid var(--border);
      width: 22px;
      height: 22px;
      border-radius: 4px;
      cursor: pointer;
      margin-right: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      color: #FFFFFF;
    }
    .chk-btn.checked {
      background: var(--success);
      border-color: var(--success);
    }
    .chk-btn.checked::after {
      content: "✓";
    }
    .word-info {
      flex: 1;
    }
    .word-eng {
      font-size: 1.05rem;
      font-weight: 700;
      color: #111827;
    }
    .word-kor {
      font-size: 0.85rem;
      color: #4B5563;
      margin-top: 2px;
    }
    .ibtn {
      background: none;
      border: none;
      font-size: 1.2rem;
      cursor: pointer;
      padding: 4px;
      margin-left: 6px;
      outline: none;
    }
    .fav-btn {
      color: #D1D5DB;
    }
    .fav-btn.active {
      color: var(--warn);
    }
    .fc-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding-top: 10px;
    }
    .fc-card {
      width: 100%;
      height: 240px;
      perspective: 1000px;
      cursor: pointer;
    }
    .fc-inner {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.4s;
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
    }
    .fc-inner.flipped {
      transform: rotateY(180deg);
    }
    .fc-front, .fc-back {
      width: 100%;
      height: 100%;
      position: absolute;
      backface-visibility: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-radius: 12px;
      padding: 24px;
      background: #FFFFFF;
    }
    .fc-back {
      transform: rotateY(180deg);
      background: var(--primary-light);
    }
    .fc-front .en-word {
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--primary);
      text-align: center;
    }
    .fc-back .ko-word {
      font-size: 1.4rem;
      font-weight: 700;
      color: #1F2937;
      text-align: center;
    }
    .fc-fav-pos {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 10;
    }
    .fc-nav {
      display: flex;
      width: 100%;
      gap: 10px;
      margin-top: 8px;
    }
    .fc-nav-btn {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: var(--primary);
      color: #FFFFFF;
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
    }
    .fc-nav-btn.sec {
      background: #E5E7EB;
      color: #374151;
    }
    .quiz-card {
      background: #FFFFFF;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      margin-top: 10px;
    }
    .quiz-progress {
      font-size: 0.8rem;
      color: var(--gray);
      margin-bottom: 8px;
      text-align: right;
    }
    .quiz-q {
      font-size: 1.5rem;
      font-weight: 700;
      color: #111827;
      text-align: center;
      margin-bottom: 24px;
    }
    .quiz-options {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .quiz-opt {
      padding: 14px;
      border: 1px solid var(--border);
      background: #FFFFFF;
      border-radius: 8px;
      font-size: 0.95rem;
      text-align: left;
      cursor: pointer;
      outline: none;
      transition: background 0.2s, border-color 0.2s;
    }
    .quiz-opt.correct {
      background: #D1FAE5;
      border-color: var(--success);
      color: #065F46;
      font-weight: 600;
    }
    .quiz-opt.wrong {
      background: #FEE2E2;
      border-color: var(--danger);
      color: #991B1B;
    }
    .quiz-result, .test-result {
      text-align: center;
      padding: 24px 12px;
    }
    .result-emoji {
      font-size: 4rem;
      margin-bottom: 12px;
    }
    .result-score {
      font-size: 1.8rem;
      font-weight: 700;
      color: #111827;
    }
    .result-pct {
      font-size: 1.1rem;
      color: var(--gray);
      margin-top: 4px;
      margin-bottom: 24px;
    }

      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 8px;
      background: var(--primary);
      color: #FFFFFF;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 12px;
    }
    .setup-box {
      background: #FFFFFF;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .form-group label {
      font-size: 0.85rem;
      font-weight: 600;
      color: #4B5563;
    }
    .form-input {
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.95rem;
      outline: none;
    }
    .form-input:focus {
      border-color: var(--primary);
    }
    .test-box {
      background: #FFFFFF;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
    }
    .test-bar-container {
      width: 100%;
      height: 6px;
      background: #E5E7EB;
      border-radius: 3px;
      margin-bottom: 12px;
      overflow: hidden;
    }
    .test-bar-fill {
      height: 100%;
      background: var(--primary);
      width: 0%;
      transition: width 0.2s;
    }
    .test-meta {
      display: flex;
      justify-content: space-between;
      font-size: 0.8rem;
      color: var(--gray);
      margin-bottom: 20px;
    }
    .test-q-word {
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--primary);
      text-align: center;
      margin-bottom: 24px;
    }
    .test-wrong-list {
      text-align: left;
      margin-top: 20px;
      border-top: 1px solid var(--border);
      padding-top: 16px;
    }
    .test-wrong-title {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--danger);
      margin-bottom: 10px;
    }
    .test-wrong-item {
      font-size: 0.85rem;
      margin-bottom: 6px;
      color: #374151;
    }
    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.8);
      color: #FFFFFF;
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 0.85rem;
      z-index: 1000;
      display: none;

</head>
<body>

<div class="app-container">
  <div class="header">
    <div class="header-brand en">씨유에탑 ✦ 영어단어장</div>
    <div class="header-sub">고3 자이 9회 · 총 438단어</div>
  </div>

  <div class="nav-tabs">
    <button class="tab-btn active" id="tb-list" onclick="switchTab('list')">단어목록</button>
    <button class="tab-btn" id="tb-flash" onclick="switchTab('flash')">플래시카드</button>
    <button class="tab-btn" id="tb-quiz" onclick="switchTab('quiz')">퀴즈모드</button>
    <button class="tab-btn" id="tb-test" onclick="switchTab('test')">📝 테스트</button>
  </div>

  <!-- 탭 1: 단어목록 -->
  <div class="tab-content active" id="tab-list">
    <div class="range-bar" id="lrbar"></div>
    <input type="text" class="search-box" id="lsearch" placeholder="영어 또는 뜻으로 검색..." oninput="renderList()">
    <div class="filter-bar">
      <button class="filter-btn active" id="lf-all" onclick="setListFilter('all')">전체</button>
      <button class="filter-btn" id="lf-not" onclick="setListFilter('not')">모름</button>
      <button class="filter-btn" id="lf-fav" onclick="setListFilter('fav')">⭐즐겨찾기</button>
    </div>
    <div class="word-list" id="listContainer"></div>
  </div>

  <!-- 탭 2: 플래시카드 -->
  <div class="tab-content" id="tab-flash">
    <div class="range-bar" id="fcrbar"></div>
    <div class="fc-container">
      <div class="fc-card">
        <div class="fc-inner" id="fccard">
          <div class="fc-front">
            <button class="ibtn fav-btn fc-fav-pos" id="fcfav">★</button>
            <div class="en-word en" id="fcword">Word</div>
          </div>
          <div class="fc-back">
            <div class="ko-word" id="fcmean">뜻</div>
          </div>
        </div>
      </div>
      <div class="fc-nav">
        <button class="fc-nav-btn sec" onclick="fcPrev()">◀ 이전</button>
        <button class="fc-nav-btn" style="background:var(--warn);" onclick="speakFc()">🔊</button>
        <button class="fc-nav-btn" onclick="fcNext()">다음 ▶</button>
      </div>
    </div>
  </div>

  <!-- 탭 3: 퀴즈모드 -->
  <div class="tab-content" id="tab-quiz">
    <div id="quiz-area"></div>
  </div>

  <!-- 탭 4: 테스트 -->
  <div class="tab-content" id="tab-test">
    <div id="test-area"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

var storeSlug = "cutop_go3_jai_9";

function getStore() {
  var s = localStorage.getItem(storeSlug);
  return s ? JSON.parse(s) : {};
}
function saveStore(store) {
  localStorage.setItem(storeSlug, JSON.stringify(store));
}
function updateWordState(word, meaning, key, val) {
  var st = getStore();
  var k = word + "|" + meaning;
  if (!st[k]) st[k] = { status: "unknown", fav: false };
  st[k][key] = val;
  saveStore(st);
}

// 범위 분할 로직
function buildRanges(ws) {
  var r = [{ label: "전체", s: 0, e: ws.length }];
  for (var i = 0; i < ws.length; i += 50) {
    r.push({ label: (i+1) + "-" + Math.min(i+50, ws.length), s: i, e: Math.min(i+50, ws.length) });
  }
  return r;
}
var ranges = buildRanges(rawWords);
var lri = 0, fri = 0;
var listFilter = "all";

function esc(s) {
  return String(s)
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;");
}

function speak(t) {
  if (!("speechSynthesis" in window)) return;
  window.speechSynthesis.cancel();
  var u = new SpeechSynthesisUtterance(t);
  u.lang = "en-US";
  u.rate = 0.85;
  window.speechSynthesis.speak(u);
}
function speakFc() {
  speak(document.getElementById("fcword").textContent);
}

function renderRangeBar(containerId, activeIdx, clickFuncStr) {
  var el = document.getElementById(containerId);
  var html = "";
  ranges.forEach(function(r, idx) {
    var act = idx === activeIdx ? " active" : "";
    html += '<button class="range-btn' + act + '" onclick="' + clickFuncStr + '(' + idx + ')">' + r.label + '</button>';
  });
  el.innerHTML = html;
}

function setLR(idx) { lri = idx; renderRangeBar("lrbar", lri, "setLR"); renderList(); }
function setFR(idx) { fri = idx; renderRangeBar("fcrbar", fri, "setFR"); initFC(); }

function setListFilter(f) {
  listFilter = f;
  ["all","not","fav"].forEach(function(x) {
    document.getElementById("lf-"+x).classList.toggle("active", x===f);
  });
  renderList();
}

function toggleChk(btn, word, meaning) {
  var isChecked = btn.classList.toggle("checked");
  btn.closest(".word-card").classList.toggle("known", isChecked);
  updateWordState(word, meaning, "status", isChecked ? "known" : "unknown");
}

function toggleFav(btn, word, meaning) {
  var isFav = btn.classList.toggle("active");
  updateWordState(word, meaning, "fav", isFav);
}

function renderList() {
  var container = document.getElementById("listContainer");
  var q = document.getElementById("lsearch").value.toLowerCase().trim();
  var r = ranges[lri];
  var slice = rawWords.slice(r.s, r.e);
  var store = getStore();

  var html = "";
  slice.forEach(function(w) {
    var k = w.word + "|" + w.meaning;
    var state = store[k] || { status: "unknown", fav: false };
    
    var matchesSearch = (w.word.toLowerCase().indexOf(q) >= 0 || w.meaning.toLowerCase().indexOf(q) >= 0);
    var matchesFilter = true;
    if (listFilter === "not") matchesFilter = (state.status !== "known");
    else if (listFilter === "fav") matchesFilter = !!state.fav;

    if (matchesSearch && matchesFilter) {
      var cardClass = (state.status === "known") ? "word-card known" : "word-card";
      var chkClass = (state.status === "known") ? "chk-btn checked" : "chk-btn";
      var favClass = state.fav ? "ibtn fav-btn active" : "ibtn fav-btn";

      html += '<div class="' + cardClass + '">';
      html += '  <button class="' + chkClass + '" onclick="toggleChk(this, \'' + esc(w.word) + '\', \'' + esc(w.meaning) + '\')"></button>';
      html += '  <div class="word-info">';
      html += '    <div class="word-eng en">' + esc(w.word) + '</div>';
      html += '    <div class="word-kor">' + esc(w.meaning) + '</div>';
      html += '  </div>';
      html += '  <button class="ibtn" data-w="' + esc(w.word) + '" onclick="speak(this.dataset.w)">🔊</button>';
      html += '  <button class="' + favClass + '" onclick="toggleFav(this, \'' + esc(w.word) + '\', \'' + esc(w.meaning) + '\')">★</button>';
      html += '</div>';
    }
  });
  container.innerHTML = html;
}

var fcIdx = 0;
var fcWords = [];
var fcFlipped = false;

function initFC() {
  var r = ranges[fri];
  fcWords = rawWords.slice(r.s, r.e);
  fcIdx = 0;
  fcFlipped = false;
  document.getElementById("fccard").classList.remove("flipped");
  showFCWord();
}

function showFCWord() {
  if (fcWords.length === 0) {
    document.getElementById("fcword").textContent = "단어가 없습니다.";
    document.getElementById("fcmean").textContent = "-";
    return;
  }
  var w = fcWords[fcIdx];
  document.getElementById("fcword").textContent = w.word;
  document.getElementById("fcmean").textContent = w.meaning;

  var store = getStore();
  var state = store[w.word + "|" + w.meaning] || { status: "unknown", fav: false };
  var fbtn = document.getElementById("fcfav");
  fbtn.classList.toggle("active", !!state.fav);
}

function fcFlip() {
  if (fcFlipped) return;
  fcFlipped = true;
  document.getElementById("fccard").classList.add("flipped");
  speak(fcWords[fcIdx].word);
}

function toggleFcFav(e) {
  e.stopPropagation();
  if (fcWords.length === 0) return;
  var w = fcWords[fcIdx];
  var btn = document.getElementById("fcfav");
  var isFav = btn.classList.toggle("active");
  updateWordState(w.word, w.meaning, "fav", isFav);
}

function fcNext() {
  if (fcWords.length === 0) return;
  fcIdx = (fcIdx + 1) % fcWords.length;
  fcFlipped = false;
  document.getElementById("fccard").classList.remove("flipped");
  showFCWord();
}

var fcTX = 0;
function fcPrev() {
  if (fcWords.length === 0) return;
  fcIdx = (fcIdx - 1 + fcWords.length) % fcWords.length;
  fcFlipped = false;
  document.getElementById("fccard").classList.remove("flipped");
  showFCWord();
}

// 플래시카드 터치 및 클릭 리스너 설정
(function(){
  var card = document.getElementById("fccard");
  card.addEventListener("click", function(e) {
    if (e.target.id === "fcfav") return;
    fcFlip();
  });
  card.addEventListener("touchstart", function(e) {
    fcTX = e.touches[0].clientX;
  }, {passive:true});
  card.addEventListener("touchend", function(e) {
    var dx = e.changedTouches[0].clientX - fcTX;
    if (Math.abs(dx) > 50) { if (dx < 0) fcNext(); else fcPrev(); }
  }, {passive:true});
})();

// 탭 3 퀴즈모드
var qIdx = 0, qWords = [], qCorrectAnswers = 0, qLocked = false;

function shuffle(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
  }
  return a;
}

function initQuiz() {
  var pool = shuffle(rawWords);
  qWords = pool.slice(0, Math.min(10, pool.length));
  qIdx = 0;
  qCorrectAnswers = 0;
  qLocked = false;
  showQuizQuestion();
}

function showQuizQuestion() {
  var area = document.getElementById("quiz-area");
  if (qIdx >= qWords.length) {
    var pct = Math.round((qCorrectAnswers / qWords.length) * 100);
    var emo = pct === 100 ? "🏆" : (pct >= 80 ? "🎉" : (pct >= 60 ? "👍" : "💪"));
    
    var html = '<div class="quiz-result">';
    html += '  <div class="result-emoji">' + emo + '</div>';
    html += '  <div class="result-score">' + qCorrectAnswers + ' / ' + qWords.length + '</div>';
    html += '  <div class="result-pct">' + pct + '점</div>';
    html += '  <button class="btn-action" onclick="initQuiz()">↩ 다시 풀기</button>';
    html += '</div>';
    area.innerHTML = html;
    return;
  }

  var w = qWords[qIdx];
  // 오답 보기 풀 만들기
  var wrongPool = rawWords.filter(function(x) { return x.word !== w.word; });
  wrongPool = shuffle(wrongPool).slice(0, 3);
  
  var opts = [{ meaning: w.meaning, correct: true }];
  wrongPool.forEach(function(x) { opts.push({ meaning: x.meaning, correct: false }); });
  opts = shuffle(opts);

  var html = '<div class="quiz-card">';
  html += '  <div class="quiz-progress">' + (qIdx+1) + ' / ' + qWords.length + '</div>';
  html += '  <div class="quiz-q en">' + esc(w.word) + '</div>';
  html += '  <div class="quiz-options">';
  opts.forEach(function(o) {
    var corAttr = o.correct ? ' data-cor="1"' : ' data-cor="0"';
    html += '    <button class="quiz-opt" ' + corAttr + ' onclick="qAns(this)">' + esc(o.meaning) + '</button>';
  });
  html += '  </div>';
  html += '</div>';
  area.innerHTML = html;
  qLocked = false;
}

function qAns(btn) {
  if (qLocked) return;
  qLocked = true;
  var isCor = btn.getAttribute("data-cor") === "1";
  
  if (isCor) {
    btn.classList.add("correct");
    qCorrectAnswers++;
    speak(qWords[qIdx].word);
  } else {
    btn.classList.add("wrong");
    // 정답도 찾아 표시
    var opts = btn.parentNode.querySelectorAll(".quiz-opt");
    opts.forEach(function(b) {
      if (b.getAttribute("data-cor") === "1") b.classList.add("correct");
    });
  }

  setTimeout(function() {
    qIdx++;
    showQuizQuestion();
  }, 1000);
}

  html += '  <button class="btn-action" onclick="submitTestAns()" style="margin-top:16px;">다음</button>';
  html += '</div>';

  speak(w.word);
  document.getElementById("t-ans").focus();
}

function testKey(e) {
  if (e.keyCode === 13) {
    submitTestAns();
  }
}

function isSim(input, correct) {
  var norm = function(s) {
    return s.replace(/\s/g,"").replace(/[~\-·,]/g,"").toLowerCase();
  };
  var a = norm(input), c = norm(correct);
  if (a === c) return true;
  if (a.length >= 2 && c.indexOf(a) >= 0) return true;
  var core = c.replace(/하다|되다|시키다|이다/g,"").trim();
  if (core.length >= 2 && a.indexOf(core) >= 0) return true;
  return false;
}

function submitTestAns() {
  var inputVal = document.getElementById("t-ans").value.trim();
  var w = tPool[tIdx];

  if (isSim(inputVal, w.meaning)) {
    tScore++;
    tCorrectWords.push(w.word);
  } else {
    tWrongList.push({ word: w.word, input: inputVal || "(빈 칸)", meaning: w.meaning });
  }

  tIdx++;
  showTestQuestion();
}

function getTodayString() {
  var d = new Date();
  var y = d.getFullYear();
  var m = d.getMonth() + 1;
  var dt = d.getDate();
  return y + "년 " + (m < 10 ? "0" + m : m) + "월 " + (dt < 10 ? "0" + dt : dt) + "일";
}

function showTestResult() {
  var area = document.getElementById("test-area");
  var pct = Math.round((tScore / tPool.length) * 100);
  var emo = pct === 100 ? "🏆" : (pct >= 80 ? "🎉" : (pct >= 60 ? "👍" : "💪"));

  var html = '<div class="test-result">';
  html += '  <div class="result-emoji">' + emo + '</div>';
  html += '  <div class="result-score">' + tScore + ' / ' + tPool.length + '</div>';
  html += '  <div class="result-pct">' + pct + '점</div>';
  html += '  <button class="btn-action" style="background:#25D366; margin-bottom:12px;" onclick="copyKakao()">📋 카톡으로 결과 복사</button>';
  html += '  <button class="btn-action" style="background:var(--gray);" onclick="renderSetup()">↩ 다시 테스트</button>';

  if (tWrongList.length > 0) {
    html += '  <div class="test-wrong-list">';
    html += '    <div class="test-wrong-title">❌ 틀린 단어 목록</div>';
    tWrongList.forEach(function(item) {
      html += '    <div class="test-wrong-item"><strong>' + esc(item.word) + '</strong><br><span style="color:var(--danger)">입력: ' + esc(item.input) + '</span> / <span style="color:var(--success)">정답: ' + esc(item.meaning) + '</span></div>';
    });
    html += '  </div>';
  }
  html += '</div>';

  area.innerHTML = html;
}

function copyKakao() {
  var pct = Math.round((tScore / tPool.length) * 100);
  var txt = "[씨유에탑 고3 자이 9회] 테스트 결과\n";
  txt += "날짜: " + getTodayString() + "\n";
  txt += "이름: " + tName + "\n";
  txt += "점수: " + tScore + "/" + tPool.length + " (" + pct + "점)\n";
  txt += "─────────────────\n";
  if (tWrongList.length > 0) {
    txt += "❌ 틀린 단어 (" + tWrongList.length + "개)\n";
    tWrongList.forEach(function(item) {
      txt += "  " + item.word + " → 입력:" + item.input + " / 정답:" + item.meaning + "\n";
    });
  } else {
    txt += "❌ 틀린 단어가 없습니다! 🎉\n";
  }
  txt += "─────────────────\n";
  txt += "✅ 맞은 단어: " + tCorrectWords.join(", ");

  var ta = document.createElement("textarea");
  ta.value = txt;
  document.body.appendChild(ta);
  ta.select();
  document.execCommand("copy");
  document.body.removeChild(ta);

  showToast("결과가 클립보드에 복사되었습니다!");
}

function showToast(msg) {
  var t = document.getElementById("toast");
  t.textContent = msg;
  t.style.display = "block";
  setTimeout(function() { t.style.display = "none"; }, 2000);
}

function switchTab(t) {
  ["list","flash","quiz","test"].forEach(function(n) {
    document.getElementById("tb-"+n).classList.toggle("active", n===t);
    document.getElementById("tab-"+n).classList.toggle("active", n===t);
  });
  if (t==="list")  { renderRangeBar("lrbar", lri, "setLR"); renderList(); }
  if (t==="flash") { renderRangeBar("fcrbar", fri, "setFR"); initFC(); }
  if (t==="quiz")  { initQuiz(); }
  if (t==="test")  { renderSetup(); }
}

// 초기 로딩
window.onload = function() {
  switchTab("list");
  
  // 플래시카드 헤드에 즐겨찾기 버튼 이벤트 연결
  document.getElementById("fcfav").addEventListener("click", function(e) {
    toggleFcFav(e);
  });
};
</script>
