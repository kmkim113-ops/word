<html lang="ko">

    :root {

      --border: #E5E7EB;
      --bg: #F9FAFB;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: #F0F2F5;
      color: #1F2937;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
    }
    .en { font-family: 'Nunito', sans-serif; }
    #app {
      width: 100%;
      max-width: 420px;
      background: #ffffff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 0 20px rgba(0,0,0,0.05);
      position: relative;
    }
    .header {
      background: #ffffff;
      padding: 16px;
      border-bottom: 1px solid var(--border);
      text-align: center;
    }
    .header-brand {
      font-size: 18px;
      font-weight: 700;
      color: var(--primary);
      letter-spacing: -0.5px;
    }
    .header-sub {
      font-size: 13px;
      color: var(--gray);
      margin-top: 4px;
    }
    .nav-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      background: #ffffff;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .tab-btn {
      flex: 1;
      padding: 12px 0;
      text-align: center;
      border: none;
      background: none;
      font-size: 14px;
      font-weight: 500;
      color: var(--gray);
      cursor: pointer;
      border-bottom: 2px solid transparent;
    }
    .tab-btn.active {
      color: var(--primary);
      border-bottom-color: var(--primary);
      font-weight: 700;
    }
    .tab-content {
      flex: 1;
      display: none;
      padding: 16px;
      background: var(--bg);
    }
    .tab-content.active { display: flex; flex-direction: column; }
    
    .range-bar {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      padding-bottom: 12px;
      margin-bottom: 12px;
    }
    .range-bar::-webkit-scrollbar { display: none; }
    .range-btn {
      flex-shrink: 0;
      padding: 6px 12px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: #ffffff;
      font-size: 12px;
      color: var(--gray);
      cursor: pointer;
    }
    .range-btn.active {
      background: var(--primary);
      color: #ffffff;
      border-color: var(--primary);
    }
    
    .search-box {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      margin-bottom: 12px;
      outline: none;
    }
    .filter-bar {
      display: flex;
      gap: 6px;
      margin-bottom: 12px;
    }
    .filter-btn {
      flex: 1;
      padding: 8px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: #ffffff;
      font-size: 13px;
      color: var(--gray);
      cursor: pointer;
    }
    .filter-btn.active {
      background: var(--primary-light);
      color: var(--primary);
      border-color: var(--primary);
      font-weight: 600;
    }
    
    .word-list { display: flex; flex-direction: column; gap: 10px; }
    .word-card {
      background: #ffffff;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      display: flex;
      align-items: center;
      gap: 12px;
      position: relative;
    }
    .word-card.known { opacity: 0.35; }
    .check-btn {
      width: 22px;
      height: 22px;
      border-radius: 4px;
      border: 2px solid var(--border);
      background: #ffffff;
      color: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      cursor: pointer;
      user-select: none;
    }
    .word-card.known .check-btn {
      border-color: var(--success);
      background: var(--success);
      color: #ffffff;
    }
    .word-body { flex: 1; }
    .word-eng { font-size: 16px; font-weight: 700; color: #111827; }
    .word-kor { font-size: 14px; color: #4B5563; margin-top: 2px; }
    .ibtn {
      background: none;
      border: none;
      font-size: 18px;
      cursor: pointer;
      padding: 4px;
      color: var(--gray);
    }
    .ibtn.fav.active { color: var(--warn); }
    
    .fc-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 320px;
    }
    .fc-card {
      width: 100%;
      height: 240px;
      background: #ffffff;
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.02);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      cursor: pointer;
      padding: 20px;
      text-align: center;
    }
    .fc-fav-pos { position: absolute; top: 16px; right: 16px; font-size: 24px; }
    #fcword { font-size: 28px; font-weight: 700; color: #111827; word-break: break-all; }
    #fcmean { font-size: 18px; color: var(--primary); margin-top: 14px; min-height: 24px; }
    .fc-hint { font-size: 12px; color: var(--gray); position: absolute; bottom: 16px; }
    .fc-nav { display: flex; width: 100%; gap: 10px; margin-top: 20px; }
    .fc-nav-btn {
      flex: 1;
      padding: 12px;
      border-radius: 8px;
      border: none;
      background: var(--primary);
      color: #ffffff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }
    .fc-nav-btn.sec { background: var(--gray); }
    
    .qz-card {

      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px 16px;
      text-align: center;
      margin-bottom: 16px;

    .qz-word { font-size: 26px; font-weight: 700; color: #111827; }
    .qz-options { display: flex; flex-direction: column; gap: 10px; }
    .qz-opt {
      width: 100%;
      padding: 14px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: #ffffff;
      font-size: 15px;
      text-align: left;
      cursor: pointer;
    }
    .qz-opt.correct { background: var(--success) !important; color: #ffffff !important; border-color: var(--success) !important; }
    .qz-opt.wrong { background: var(--danger) !important; color: #ffffff !important; border-color: var(--danger) !important; }
    
    .score-view {

      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 30px 20px;
      text-align: center;
    }
    .score-emoji { font-size: 48px; margin-bottom: 10px; }
    .score-num { font-size: 24px; font-weight: 700; color: #111827; }
    .score-pct { font-size: 14px; color: var(--gray); margin-top: 4px; }
    .action-btn {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: none;
      background: var(--primary);
      color: #ffffff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 20px;
    }

    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-label { font-size: 14px; font-weight: 600; color: #374151; }
    .form-input { padding: 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 14px; outline: none; }
    
    .ts-progress-bar { height: 6px; background: var(--border); border-radius: 3px; width: 100%; margin-bottom: 12px; overflow: hidden; }
    .ts-progress-fill { height: 100%; background: var(--primary); width: 0%; transition: width 0.2s; }
    .ts-meta { display: flex; justify-content: space-between; font-size: 13px; color: var(--gray); margin-bottom: 16px; }
    .ts-qbox { background: #ffffff; border: 1px solid var(--border); border-radius: 12px; padding: 30px 16px; text-align: center; margin-bottom: 16px; }
    .ts-word { font-size: 28px; font-weight: 700; color: #111827; }
    
    .wrong-list { margin-top: 16px; text-align: left; border-top: 1px solid var(--border); padding-top: 16px; }
    .wrong-title { font-size: 14px; font-weight: 700; color: var(--danger); margin-bottom: 10px; }

</head>

<div id="app">
  <div class="header">
    <div class="header-brand en">씨유에탑 ✦ 영어단어장</div>
    <div class="header-sub">중등3-3 · 총 <span id="total-count">0</span>단어</div>
  </div>
  
  <div class="nav-tabs">
    <button class="tab-btn active" id="tb-list" onclick="switchTab('list')">단어목록</button>
    <button class="tab-btn" id="tb-flash" onclick="switchTab('flash')">플래시카드</button>
    <button class="tab-btn" id="tb-quiz" onclick="switchTab('quiz')">퀴즈모드</button>
    <button class="tab-btn" id="tb-test" onclick="switchTab('test')">📝 테스트</button>
  </div>

  <!-- 탭 1: 단어목록 -->
  <div class="tab-content active" id="tab-list">
    <div class="range-bar" id="lrbar"></div>
    <input type="text" class="search-box" id="lsearch" placeholder="영어 또는 한글 뜻 검색..." oninput="renderList()">
    <div class="filter-bar">
      <button class="filter-btn active" id="lf-all" onclick="setLFilter('all')">전체</button>
      <button class="filter-btn" id="lf-wrong" onclick="setLFilter('wrong')">모름</button>
      <button class="filter-btn" id="lf-fav" onclick="setLFilter('fav')">⭐즐겨찾기</button>
    </div>
    <div class="word-list" id="list-container"></div>
  </div>

  <!-- 탭 2: 플래시카드 -->
  <div class="tab-content" id="tab-flash">
    <div class="range-bar" id="fcrbar"></div>
    <div class="fc-container">
      <div class="fc-card" id="fccard">
        <button class="ibtn fav fc-fav-pos" id="fcfav">★</button>
        <div class="en" id="fcword"></div>
        <div id="fcmean"></div>
        <div class="fc-hint">탭하면 뜻이 나타납니다</div>
      </div>
      <div class="fc-nav">
        <button class="fc-nav-btn sec" onclick="fcPrev()">◀ 이전</button>
        <button class="fc-nav-btn" style="background:var(--warn);" onclick="speakFc()">🔊</button>
        <button class="fc-nav-btn" onclick="fcNext()">다음 ▶</button>
      </div>
    </div>
  </div>

  <!-- 탭 3: 퀴즈모드 -->
  <div class="tab-content" id="tab-quiz">
    <div id="qz-body"></div>
  </div>

  <!-- 탭 4: 테스트 -->
  <div class="tab-content" id="tab-test">
    <div id="ts-body"></div>
  </div>
</div>

  function toggleKnown(k) {
    var p = getProgress();
    if (!p[k]) p[k] = {};
    p[k].status = p[k].status === "known" ? "" : "known";
    saveProgress(p);
    renderList();
  }

  function toggleFav(k, e) {
    var p = getProgress();
    if (!p[k]) p[k] = {};
    p[k].fav = !p[k].fav;
    saveProgress(p);
    if (e.classList.contains("fc-fav-pos")) {
      e.classList.toggle("active", p[k].fav);
    } else {
      renderList();
    }

      if (lFilter === "wrong" && isK) return;
      if (lFilter === "fav" && !isF) return;
      
      if (q) {
        if (w.word.toLowerCase().indexOf(q) === -1 && w.meaning.toLowerCase().indexOf(q) === -1) return;
      }
      
      var cardClass = isK ? "word-card known" : "word-card";
      var favClass = isF ? "ibtn fav active" : "ibtn fav";

      fcTX = e.touches[0].clientX;

    card.addEventListener("touchend", function(e) {

  })();

  var qIdx = 0, qPool = [], qScore = 0, qLocked = false;
  function shuffle(arr) {
    var a = arr.slice();
    for (var i = a.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var t = a[i]; a[i] = a[j]; a[j] = t;
    }
    return a;
  }
  function initQuiz() {
    var shuf = shuffle(rawWords);
    qPool = shuf.slice(0, 10);
    qIdx = 0; qScore = 0; qLocked = false;

  function showQuiz() {
    var box = document.getElementById("qz-body");
    if (qIdx >= qPool.length) {
      var pct = Math.round((qScore/qPool.length)*100);
      var emo = pct===100?"🏆":pct>=80?"🎉":pct>=60?"👍":"💪";
      box.innerHTML = '<div class="score-view">' +
        '<div class="score-emoji">' + emo + '</div>' +
        '<div class="score-num">' + qScore + ' / ' + qPool.length + '</div>' +
        '<div class="score-pct">' + pct + '점</div>' +
        '<button class="action-btn" onclick="initQuiz()">↩ 다시 풀기</button>' +
      '</div>';
      return;
    }
    qLocked = false;
    var cur = qPool[qIdx];
    
    var wrongs = [];
    while (wrongs.length < 3) {
      var rWord = rawWords[Math.floor(Math.random() * rawWords.length)];
      if (rWord.meaning !== cur.meaning && wrongs.indexOf(rWord.meaning) === -1) {
        wrongs.push(rWord.meaning);
      }
    }
    var opts = wrongs.slice();
    opts.push(cur.meaning);
    opts = shuffle(opts);
    
    var html = '<div class="ts-meta"><div>퀴즈모드</div><div>' + (qIdx+1) + ' / ' + qPool.length + '</div></div>' +
      '<div class="qz-card"><div class="qz-word en">' + esc(cur.word) + '</div></div>' +
      '<div class="qz-options">';
      
    opts.forEach(function(o) {
      var cor = (o === cur.meaning) ? "1" : "0";
      html += '<button class="qz-opt" data-cor="' + cor + '" onclick="qAns(this)">' + esc(o) + '</button>';
    });
    html += '</div>';
    box.innerHTML = html;
  }
  function qAns(btn) {
    if (qLocked) return;
    qLocked = true;
    var isCor = btn.dataset.cor === "1";
    if (isCor) {
      btn.classList.add("correct");
      qScore++;
      speak(qPool[qIdx].word);
    } else {
      btn.classList.add("wrong");
      var opts = document.querySelectorAll(".qz-opt");
      for(var i=0; i<opts.length; i++) {
        if(opts[i].dataset.cor === "1") opts[i].classList.add("correct");
      }
    }
    setTimeout(function() {
      qIdx++;
      showQuiz();
    }, 1000);
  }

  function isSim(input, correct) {
    var norm = function(s) {
      return s.replace(/\s/g,"").replace(/[~\-·,]/g,"").toLowerCase();
    };
    var a = norm(input), c = norm(correct);
    if (a === c) return true;
    if (a.length >= 2 && c.indexOf(a) >= 0) return true;
    var core = c.replace(/하다|되다|시키다|이다/g,"").trim();
    if (core.length >= 2 && a.indexOf(core) >= 0) return true;
    return false;
  }
  
  function submitTestAns() {
    var ans = document.getElementById("ts-input").value.trim();
    var cur = tPool[tIdx];
    if (isSim(ans, cur.meaning)) {
      tScore++;
      tCorrectList.push(cur.word);
    } else {
      tWrongList.push({ word: cur.word, input: ans || "(미입력)", correct: cur.meaning });
    }
    tIdx++;
    showTest();
  }
  
  function showTestResult() {
    var box = document.getElementById("ts-body");
    var pct = Math.round((tScore / tPool.length) * 100);
    var emo = pct===100?"🏆":pct>=80?"🎉":pct>=60?"👍":"💪";
    
    var html = '<div class="score-view">' +
      '<div class="score-emoji">' + emo + '</div>' +
      '<div class="score-num">' + tScore + ' / ' + tPool.length + '</div>' +
      '<div class="score-pct">' + pct + '점</div>';
      
    if (tWrongList.length > 0) {
      html += '<div class="wrong-list"><div class="wrong-title">❌ 틀린 단어 (' + tWrongList.length + '개)</div>';
      tWrongList.forEach(function(w) {
        html += '<div class="wrong-item"><b>' + esc(w.word) + '</b> → 입력:' + esc(w.input) + ' / 정답:' + esc(w.correct) + '</div>';
      });
      html += '</div>';
    }
    
    html += '<button class="action-btn" style="background:#25D366;" onclick="copyResult()">📋 카톡으로 결과 복사</button>' +
      '<button class="action-btn sec" onclick="renderSetup()">↩ 다시 테스트</button>' +
    '</div>';
    box.innerHTML = html;
  }
  
  function copyResult() {
    var pct = Math.round((tScore / tPool.length) * 100);
    var d = new Date();
    var dateStr = d.getFullYear() + "-" + (d.getMonth()+1) + "-" + d.getDate();
    
    var txt = "[씨유에탑 중등3-3] 테스트 결과\n" +
      "날짜: " + dateStr + "\n" +
      "이름: " + tName + "\n" +
      "점수: " + tScore + "/" + tPool.length + " (" + pct + "점)\n" +
      "─────────────────\n" +
      "❌ 틀린 단어 (" + tWrongList.length + "개)\n";
      
    tWrongList.forEach(function(w) {
      txt += "  " + w.word + " → 입력:" + w.input + " / 정답:" + w.correct + "\n";
    });
    txt += "─────────────────\n" +
      "✅ 맞은 단어: " + tCorrectList.join(", ");
      
    var ta = document.createElement("textarea");
    ta.value = txt;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand("copy");
    document.body.removeChild(ta);
    alert("결과가 팝업 및 클립보드에 복사되었습니다. 카톡 창에 붙여넣기 하세요!");
  }

  window.onload = function() {
    renderRangeBar("lrbar", lri, "setLR");
    renderList();
  };
</script>
