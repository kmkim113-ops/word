<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>씨탑 24회 수능 듣기 2단계 · OMR 채점표</title>
<style>
  :root{
    --paper:#f7f4ec;
    --ink:#1f2a44;
    --ink-soft:#5b6478;
    --line:#d8d2c2;
    --accent:#2c3e6b;
    --accent-soft:#e7e9f3;
    --correct:#1f7a4d;
    --correct-bg:#e6f4ec;
    --wrong:#b3312c;
    --wrong-bg:#faeae9;
    --gold:#b98b2e;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--paper);
    background-image:
      linear-gradient(var(--line) 1px, transparent 1px),
      linear-gradient(90deg, var(--line) 1px, transparent 1px);
    background-size: 26px 26px;
    background-attachment: fixed;
    color:var(--ink);
    font-family:"Pretendard","Apple SD Gothic Neo","Malgun Gothic",sans-serif;
    -webkit-tap-highlight-color: transparent;
  }
  .wrap{
    max-width:520px;
    margin:0 auto;
    min-height:100vh;
    background:rgba(255,255,255,0.55);
    backdrop-filter: blur(2px);
    padding:0 0 40px;
  }
  header{
    padding:28px 20px 18px;
    border-bottom:2px solid var(--ink);
    position:sticky;
    top:0;
    background:var(--paper);
    z-index:10;
  }
  .eyebrow{
    font-size:11px;
    letter-spacing:.18em;
    color:var(--gold);
    font-weight:700;
    margin-bottom:4px;
  }
  h1{
    margin:0;
    font-size:21px;
    letter-spacing:-0.01em;
  }
  .sub{
    margin-top:4px;
    font-size:12.5px;
    color:var(--ink-soft);
  }

  /* ---------- HOME (round grid) ---------- */
  #home{padding:20px;}
  .grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
    margin-top:6px;
  }
  .round-btn{
    aspect-ratio:1/1;
    border:1.5px solid var(--ink);
    background:#fff;
    border-radius:10px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    position:relative;
    padding:4px;
  }
  .round-btn .n{
    font-size:17px;
    font-weight:700;
  }
  .round-btn .hoi{
    font-size:9.5px;
    color:var(--ink-soft);
    margin-top:1px;
  }
  .round-btn .score{
    margin-top:5px;
    font-size:10.5px;
    font-weight:700;
    padding:1px 6px;
    border-radius:20px;
  }
  .round-btn.done{border-color:var(--accent);}
  .round-btn.done .score{background:var(--accent-soft); color:var(--accent);}
  .round-btn.perfect{border-color:var(--gold); background:#fdf7ea;}
  .round-btn.perfect .score{background:#fdf1d6; color:var(--gold);}
  .round-btn:active{transform:scale(0.96);}

  .legend{
    margin-top:18px;
    font-size:11.5px;
    color:var(--ink-soft);
    line-height:1.7;
    border-top:1px dashed var(--line);
    padding-top:12px;
  }

  /* ---------- TEST VIEW ---------- */
  #test{display:none; padding:18px 20px 10px;}
  .backbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:14px;
  }
  .back{
    border:none;
    background:none;
    color:var(--accent);
    font-size:14px;
    font-weight:700;
    cursor:pointer;
    padding:6px 0;
  }
  .round-title{
    font-size:18px;
    font-weight:800;
  }

  .qrow{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:10px 4px;
    border-bottom:1px solid var(--line);
  }
  .qnum{
    width:30px;
    font-weight:700;
    font-size:14px;
    color:var(--ink-soft);
    flex-shrink:0;
  }
  .bubbles{
    display:flex;
    gap:7px;
    flex:1;
    justify-content:flex-end;
  }
  .bubble{
    width:34px;
    height:34px;
    border-radius:50%;
    border:1.5px solid var(--ink);
    background:#fff;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:13px;
    font-weight:700;
    color:var(--ink);
    cursor:pointer;
  }
  .bubble.sel{
    background:var(--ink);
    color:#fff;
  }
  .qrow.correct .bubble.sel{background:var(--correct); border-color:var(--correct); color:#fff;}
  .qrow.correct{background:var(--correct-bg);}
  .qrow.wrong .bubble.sel{background:var(--wrong); border-color:var(--wrong); color:#fff;}
  .qrow.wrong .bubble.answer{border-color:var(--correct); box-shadow:0 0 0 2px var(--correct-bg) inset;}
  .qrow.wrong{background:var(--wrong-bg);}

  .actionbar{
    position:sticky;
    bottom:0;
    background:var(--paper);
    border-top:2px solid var(--ink);
    padding:12px 20px 18px;
    display:flex;
    gap:8px;
    margin-top:14px;
  }
  .btn{
    flex:1;
    padding:13px 10px;
    border-radius:9px;
    border:1.5px solid var(--ink);
    background:#fff;
    font-weight:700;
    font-size:14px;
    cursor:pointer;
    color:var(--ink);
  }
  .btn.primary{
    background:var(--accent);
    border-color:var(--accent);
    color:#fff;
  }
  .btn:active{transform:scale(0.98);}
  .btn:disabled{opacity:.4;}

  .result{
    margin:18px 20px 0;
    border:1.5px solid var(--ink);
    border-radius:10px;
    background:#fff;
    padding:16px;
    display:none;
  }
  .result.show{display:block;}
  .result .score-big{
    font-size:30px;
    font-weight:800;
    color:var(--accent);
  }
  .result .score-big span{font-size:15px; color:var(--ink-soft); font-weight:600;}
  .result .wronglist{
    margin-top:6px;
    font-size:13px;
    color:var(--wrong);
  }
  .result textarea{
    width:100%;
    margin-top:12px;
    min-height:120px;
    border:1px solid var(--line);
    border-radius:8px;
    padding:10px;
    font-size:12.5px;
    font-family:inherit;
    resize:vertical;
    background:#faf9f5;
    color:var(--ink);
  }
  .copybtn{
    margin-top:8px;
    width:100%;
    padding:11px;
    border-radius:8px;
    border:1.5px solid var(--accent);
    background:var(--accent-soft);
    color:var(--accent);
    font-weight:700;
    font-size:13.5px;
    cursor:pointer;
  }
  .copybtn.copied{background:var(--correct-bg); border-color:var(--correct); color:var(--correct);}

  .note{
    margin:22px 20px 0;
    font-size:11.5px;
    line-height:1.7;
    color:var(--ink-soft);
    border-top:1px dashed var(--line);
    padding-top:14px;
  }
  .note b{color:var(--ink);}

</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="eyebrow">17차 개정판 · 고교 2학년</div>
    <h1 id="headerTitle">씨탑 24회 수능 듣기 2단계</h1>
    <div class="sub" id="headerSub">문제지는 인쇄물로, 정답 체크는 여기서</div>
  </header>

  <!-- HOME -->
  <div id="home">
    <div class="grid" id="roundGrid"></div>
    <div class="legend">
      • 점수는 이 기기에 자동 저장됩니다 (다른 기기와 공유되지 않음)<br>
      • 채점 후 결과를 복사해서 카톡·문자로 바로 보낼 수 있어요
    </div>
    <div class="note">
      이 앱은 <b>정답표 기반 자동 채점 카드</b>입니다. 문제지를 인쇄해서 QR코드로 음원을 들으며 풀고,
      정답만 이 화면에서 체크해 채점 · 결과 복사에 사용하세요.
    </div>
  </div>

  <!-- TEST -->
  <div id="test">
    <div class="backbar">
      <button class="back" onclick="goHome()">← 목록으로</button>
      <div class="round-title" id="testTitle"></div>
      <div style="width:56px"></div>
    </div>

    <div id="qlist"></div>

    <div class="actionbar">
      <button class="btn" onclick="clearRound()">초기화</button>
      <button class="btn primary" id="gradeBtn" onclick="grade()">채점하기</button>
    </div>

    <div class="result" id="resultBox">
      <div class="score-big" id="scoreBig"></div>
      <div class="wronglist" id="wrongList"></div>
      <textarea id="resultText" readonly></textarea>
      <button class="copybtn" id="copyBtn" onclick="copyResult()">결과 복사하기</button>
    </div>
  </div>

</div>

<script>
/* ---------------- 정답 데이터 (17차 개정판, 씨탑 24회 수능 듣기 2단계, 정답표 PDF 기준) ---------------- */
const ANSWER_KEY = {
  1:[4,5,4,3,3,2,3,1,3,5,1,4,4,4,4,2,2,2,2,3],
  2:[2,1,5,1,3,3,3,3,4,4,1,3,4,5,3,5,2,1,5,4],
  3:[3,3,3,5,2,4,3,4,4,2,5,3,2,5,2,2,5,4,1,4],
  4:[5,1,2,4,3,5,4,5,4,2,1,2,4,4,4,1,1,4,4,3],
  5:[4,5,4,3,1,1,2,4,2,4,3,3,4,5,2,5,5,4,2,5],
  6:[2,1,3,3,4,2,2,3,3,3,4,3,4,2,4,3,3,4,1,3],
  7:[3,3,1,2,5,1,3,3,4,4,1,4,3,3,2,4,1,3,2,4],
  8:[3,1,3,2,3,3,4,2,4,3,3,4,4,4,3,5,1,5,3,1],
  9:[5,3,2,5,1,1,3,3,4,4,1,3,4,3,4,4,5,5,4,4],
  10:[2,5,4,4,1,4,4,2,3,5,3,3,3,5,2,1,1,4,4,3],
  11:[5,4,5,5,3,1,2,1,3,1,4,2,3,5,3,1,4,4,1,4],
  12:[3,5,3,2,1,2,4,3,3,2,4,2,4,3,4,4,3,3,3,2],
  13:[3,4,5,2,5,1,3,4,3,4,3,2,4,3,3,3,2,1,3,5],
  14:[2,5,3,1,2,4,5,4,4,1,5,4,2,5,1,3,3,4,2,4],
  15:[3,5,3,2,5,3,2,5,3,1,3,4,3,4,4,2,5,3,4,3],
  16:[5,1,2,2,4,4,1,5,3,3,2,4,4,2,2,1,5,1,2,4],
  17:[4,5,1,3,3,4,3,5,2,2,3,3,4,4,3,2,2,3,3,2],
  18:[5,1,4,5,4,3,2,1,2,5,3,5,3,2,5,3,3,4,2,4],
  19:[4,3,2,4,2,3,3,5,2,5,1,3,5,4,2,5,2,3,2,2],
  20:[3,1,5,4,5,5,3,3,5,3,4,4,5,2,4,2,2,4,4,4],
  21:[2,3,1,5,2,2,1,5,4,4,2,2,4,4,5,4,5,5,2,4],
  22:[2,3,1,5,5,4,4,4,2,3,3,2,3,3,3,4,4,4,4,3],
  23:[1,1,5,3,5,3,5,5,3,3,4,3,4,4,2,3,1,5,2,4],
  24:[2,4,2,2,1,5,4,1,4,3,4,2,2,4,1,2,5,5,3,3]
};
const TOTAL_ROUNDS = 24;
const Q_PER_ROUND = 20;
const STORE_KEY = "ctop_hs2_omr_v1";

let state = loadState();
let currentRound = null;

function loadState(){
  try{
    const raw = localStorage.getItem(STORE_KEY);
    return raw ? JSON.parse(raw) : {};
  }catch(e){ return {}; }
}
function saveState(){
  try{ localStorage.setItem(STORE_KEY, JSON.stringify(state)); }catch(e){}
}
function roundState(r){
  if(!state[r]) state[r] = { answers:{}, graded:false, score:null };
  return state[r];
}

/* ---------------- HOME ---------------- */
function renderHome(){
  const grid = document.getElementById('roundGrid');
  grid.innerHTML = '';
  for(let r=1; r<=TOTAL_ROUNDS; r++){
    const rs = state[r];
    const div = document.createElement('div');
    div.className = 'round-btn';
    if(rs && rs.graded){
      div.classList.add('done');
      if(rs.score === Q_PER_ROUND) div.classList.add('perfect');
    }
    div.onclick = () => openRound(r);
    div.innerHTML = `
      <div class="n">${r}</div>
      <div class="hoi">회</div>
      ${rs && rs.graded ? `<div class="score">${rs.score}/${Q_PER_ROUND}</div>` : ''}
    `;
    grid.appendChild(div);
  }
}

function goHome(){
  document.getElementById('test').style.display = 'none';
  document.getElementById('home').style.display = 'block';
  renderHome();
}

/* ---------------- TEST VIEW ---------------- */
function openRound(r){
  currentRound = r;
  document.getElementById('home').style.display = 'none';
  document.getElementById('test').style.display = 'block';
  document.getElementById('testTitle').textContent = r + '회';
  renderQuestions();
  document.getElementById('resultBox').classList.remove('show');
}

function renderQuestions(){
  const rs = roundState(currentRound);
  const qlist = document.getElementById('qlist');
  qlist.innerHTML = '';
  for(let q=1; q<=Q_PER_ROUND; q++){
    const row = document.createElement('div');
    row.className = 'qrow';
    row.id = 'qrow-' + q;
    const qn = document.createElement('div');
    qn.className = 'qnum';
    qn.textContent = q;
    const bubbles = document.createElement('div');
    bubbles.className = 'bubbles';
    for(let c=1; c<=5; c++){
      const b = document.createElement('div');
      b.className = 'bubble';
      b.textContent = c;
      b.id = `b-${q}-${c}`;
      if(rs.answers[q] === c) b.classList.add('sel');
      b.onclick = () => selectAnswer(q, c);
      bubbles.appendChild(b);
    }
    row.appendChild(qn);
    row.appendChild(bubbles);
    qlist.appendChild(row);
  }
  if(rs.graded) applyGradedStyles();
}

function selectAnswer(q, c){
  const rs = roundState(currentRound);
  rs.answers[q] = c;
  rs.graded = false;
  saveState();
  for(let i=1;i<=5;i++){
    document.getElementById(`b-${q}-${i}`).classList.toggle('sel', i===c);
  }
  document.getElementById('qrow-'+q).classList.remove('correct','wrong');
  document.getElementById('resultBox').classList.remove('show');
}

function clearRound(){
  const rs = roundState(currentRound);
  rs.answers = {};
  rs.graded = false;
  rs.score = null;
  saveState();
  renderQuestions();
  document.getElementById('resultBox').classList.remove('show');
}

function grade(){
  const rs = roundState(currentRound);
  const key = ANSWER_KEY[currentRound];
  let score = 0;
  const wrongQs = [];
  for(let q=1; q<=Q_PER_ROUND; q++){
    if(rs.answers[q] === key[q-1]) score++;
    else wrongQs.push(q);
  }
  rs.graded = true;
  rs.score = score;
  rs.wrongQs = wrongQs;
  saveState();

  applyGradedStyles();
  showResult(score, wrongQs);
}

function applyGradedStyles(){
  const rs = roundState(currentRound);
  const key = ANSWER_KEY[currentRound];
  for(let q=1; q<=Q_PER_ROUND; q++){
    const row = document.getElementById('qrow-'+q);
    row.classList.remove('correct','wrong');
    for(let c=1;c<=5;c++){
      document.getElementById(`b-${q}-${c}`).classList.remove('answer');
    }
    if(rs.answers[q] === undefined) continue;
    if(rs.answers[q] === key[q-1]){
      row.classList.add('correct');
    } else {
      row.classList.add('wrong');
      document.getElementById(`b-${q}-${key[q-1]}`).classList.add('answer');
    }
  }
}

function showResult(score, wrongQs){
  const box = document.getElementById('resultBox');
  document.getElementById('scoreBig').innerHTML = `${score} <span>/ ${Q_PER_ROUND}점</span>`;
  document.getElementById('wrongList').textContent =
    wrongQs.length ? `오답 문항: ${wrongQs.join(', ')}번` : '전 문항 정답입니다 🎉';

  const now = new Date();
  const dateStr = `${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')}.${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

  const text =
`[씨탑 24회 수능 듣기 2단계 · 17차 개정판]
${currentRound}회 채점 결과
점수: ${score} / ${Q_PER_ROUND}점
${wrongQs.length ? '오답 문항: ' + wrongQs.join(', ') + '번' : '전 문항 정답'}
채점일시: ${dateStr}`;

  document.getElementById('resultText').value = text;
  const copyBtn = document.getElementById('copyBtn');
  copyBtn.textContent = '결과 복사하기';
  copyBtn.classList.remove('copied');
  box.classList.add('show');
}

function copyResult(){
  const ta = document.getElementById('resultText');
  ta.select();
  ta.setSelectionRange(0, 999999);
  const finish = () => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = '복사 완료 ✓';
    btn.classList.add('copied');
    setTimeout(()=>{ btn.textContent='결과 복사하기'; btn.classList.remove('copied'); }, 1800);
  };
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(ta.value).then(finish).catch(()=>{ document.execCommand('copy'); finish(); });
  } else {
    document.execCommand('copy');
    finish();
  }
}

renderHome();
</script>
</body>
</html>
