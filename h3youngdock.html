<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>씨유에탑 수능영독 단어장</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans KR',sans-serif;background:#f0f4ff;color:#1e293b;max-width:420px;margin:0 auto;min-height:100vh}
:root{--primary:#2563EB;--primary-dark:#1d4ed8;--primary-light:#eff6ff;--success:#22c55e;--danger:#ef4444;--warn:#f59e0b;--gray:#64748b;--light:#f8fafc;--border:#e2e8f0}

/* HEADER */
.header{background:linear-gradient(135deg,#1d4ed8,#2563EB);color:white;padding:18px 16px 14px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(37,99,235,.3)}
.header-brand{font-family:'Nunito',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;opacity:.85;text-transform:uppercase;margin-bottom:3px}
.header-title{font-family:'Nunito',sans-serif;font-size:20px;font-weight:800;line-height:1.2}
.header-sub{font-size:12px;opacity:.8;margin-top:3px}

/* PROGRESS */
.progress-bar{height:3px;background:rgba(255,255,255,.2);margin-top:10px;border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:white;border-radius:2px;transition:width .4s}

/* SECTION SELECTOR */
.section-bar{background:white;padding:10px 8px;border-bottom:1px solid var(--border);overflow-x:auto;white-space:nowrap;scrollbar-width:none}
.section-bar::-webkit-scrollbar{display:none}
.section-btn{display:inline-block;padding:5px 12px;border-radius:20px;border:1.5px solid var(--border);font-size:12px;font-weight:600;color:var(--gray);background:white;cursor:pointer;margin-right:5px;transition:all .2s;font-family:'Nunito',sans-serif}
.section-btn.active{background:var(--primary);color:white;border-color:var(--primary)}

/* TABS */
.tabs{display:flex;background:white;border-bottom:2px solid var(--border);position:sticky;top:80px;z-index:90}
.tab{flex:1;padding:11px 4px;text-align:center;font-size:13px;font-weight:600;color:var(--gray);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .2s}
.tab.active{color:var(--primary);border-color:var(--primary)}

/* SEARCH */
.search-wrap{padding:10px 12px;background:white;border-bottom:1px solid var(--border)}
.search-input{width:100%;padding:9px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;font-family:'Noto Sans KR',sans-serif;outline:none;transition:border .2s}
.search-input:focus{border-color:var(--primary)}

/* FILTER BAR */
.filter-bar{display:flex;gap:6px;padding:8px 12px;background:white;border-bottom:1px solid var(--border)}
.filter-btn{flex:1;padding:6px 4px;border-radius:8px;border:1.5px solid var(--border);font-size:12px;font-weight:600;color:var(--gray);background:white;cursor:pointer;transition:all .2s;font-family:'Nunito',sans-serif}
.filter-btn.active{background:var(--primary-light);color:var(--primary);border-color:var(--primary)}

/* WORD LIST */
.word-list{padding:8px 10px}
.word-card{background:white;border-radius:12px;margin-bottom:8px;padding:13px 14px;box-shadow:0 1px 4px rgba(0,0,0,.06);cursor:pointer;transition:box-shadow .2s;display:flex;align-items:center;gap:8px}
.word-card:active{box-shadow:0 2px 8px rgba(37,99,235,.15)}
.word-num{font-size:11px;color:#94a3b8;font-weight:700;min-width:26px;font-family:'Nunito',sans-serif}
.word-main{flex:1;min-width:0}
.word-en{font-family:'Nunito',sans-serif;font-size:16px;font-weight:700;color:#1e293b}
.word-ph{font-size:11px;color:#94a3b8;margin-top:1px;font-family:'Nunito',sans-serif}
.word-kr{font-size:13px;color:#475569;margin-top:3px}
.word-pos{display:inline-block;font-size:10px;background:#f1f5f9;color:#64748b;border-radius:4px;padding:1px 5px;margin-left:4px;font-family:'Nunito',sans-serif;font-weight:700}
.word-fav{font-size:18px;padding:4px;cursor:pointer}
.word-status{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;font-family:'Nunito',sans-serif}
.status-know{background:#dcfce7;color:#16a34a}
.status-dontknow{background:#fee2e2;color:#dc2626}
.status-skip{background:#fef9c3;color:#ca8a04}

/* FLASHCARD */
#view-flash{padding:12px}
.flash-wrap{min-height:260px;background:white;border-radius:16px;padding:28px 20px 20px;box-shadow:0 2px 12px rgba(0,0,0,.08);cursor:pointer;position:relative;text-align:center}
.flash-counter{font-size:12px;color:#94a3b8;font-family:'Nunito',sans-serif;font-weight:700;margin-bottom:12px}
.flash-word{font-family:'Nunito',sans-serif;font-size:28px;font-weight:800;color:#1e293b;margin-bottom:6px;word-break:break-word}
.flash-ph{font-size:13px;color:#94a3b8;font-family:'Nunito',sans-serif;margin-bottom:8px}
.flash-tap{font-size:12px;color:#cbd5e1;margin-top:16px}
.flash-meaning{background:var(--primary-light);border-radius:12px;padding:14px;margin-top:12px;display:none}
.flash-meaning.show{display:block}
.flash-meaning-text{font-size:16px;font-weight:700;color:var(--primary)}
.flash-pos-text{font-size:11px;color:#64748b;margin-top:3px;font-family:'Nunito',sans-serif}
.flash-btns{display:flex;gap:8px;margin-top:12px}
.flash-btn{flex:1;padding:10px 4px;border-radius:10px;border:none;font-size:13px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;transition:opacity .2s}
.flash-btn:active{opacity:.75}
.btn-know{background:#dcfce7;color:#16a34a}
.btn-dontknow{background:#fee2e2;color:#dc2626}
.btn-skip{background:#f1f5f9;color:#64748b}
.flash-nav{display:flex;gap:8px;margin-top:8px;align-items:center}
.nav-btn{flex:1;padding:10px;border-radius:10px;border:1.5px solid var(--border);background:white;font-size:14px;cursor:pointer;transition:all .2s;font-family:'Nunito',sans-serif;font-weight:700;color:#475569}
.nav-btn:active{background:#f1f5f9}
.speak-btn{width:40px;height:40px;border-radius:10px;border:1.5px solid var(--border);background:white;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.flash-fav{position:absolute;top:10px;right:12px;font-size:20px;cursor:pointer;background:none;border:none}

/* STATS */
.stats-row{display:flex;gap:6px;margin:0 0 10px}
.stat-box{flex:1;background:white;border-radius:10px;padding:8px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.stat-num{font-family:'Nunito',sans-serif;font-size:18px;font-weight:800;color:var(--primary)}
.stat-label{font-size:10px;color:#94a3b8;margin-top:1px}

/* QUIZ */
#view-quiz{padding:12px}
.quiz-q{background:white;border-radius:14px;padding:22px 18px;margin-bottom:12px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.07)}
.quiz-num{font-size:12px;color:#94a3b8;font-family:'Nunito',sans-serif;font-weight:700;margin-bottom:10px}
.quiz-word{font-family:'Nunito',sans-serif;font-size:26px;font-weight:800;color:#1e293b}
.quiz-ph{font-size:12px;color:#94a3b8;margin-top:4px;font-family:'Nunito',sans-serif}
.quiz-options{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.quiz-opt{padding:13px 10px;border-radius:12px;border:2px solid var(--border);background:white;font-size:13px;font-weight:600;cursor:pointer;text-align:center;transition:all .2s;line-height:1.3;font-family:'Noto Sans KR',sans-serif}
.quiz-opt:active{transform:scale(.97)}
.quiz-opt.correct{background:#dcfce7;border-color:#22c55e;color:#16a34a}
.quiz-opt.wrong{background:#fee2e2;border-color:#ef4444;color:#dc2626}
.quiz-start-btn,.quiz-next-btn{display:block;width:100%;padding:13px;border-radius:12px;border:none;background:var(--primary);color:white;font-size:15px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;margin-top:8px;transition:opacity .2s}
.quiz-start-btn:active,.quiz-next-btn:active{opacity:.85}
.quiz-result{text-align:center;background:white;border-radius:16px;padding:28px 20px;box-shadow:0 2px 12px rgba(0,0,0,.08)}
.quiz-emoji{font-size:52px;margin-bottom:10px}
.quiz-score{font-family:'Nunito',sans-serif;font-size:32px;font-weight:800;color:var(--primary)}
.quiz-score-label{font-size:14px;color:#64748b;margin-top:4px}

/* EMPTY */
.empty{text-align:center;padding:50px 20px;color:#94a3b8}
.empty-icon{font-size:40px;margin-bottom:10px}

/* HIDDEN */
.hidden{display:none!important}
</style>
</head>
<body>

<div class="header">
  <div class="header-brand">씨유에탑 ✦ 영어단어장</div>
  <div class="header-title">수능 영독</div>
  <div class="header-sub" id="header-sub">총 1424단어</div>
  <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
</div>

<!-- 강 선택 바 -->
<div class="section-bar" id="section-bar">
  <span class="section-btn active" data-sec="all" onclick="selectSection('all',this)">전체</span>
</div>

<!-- 탭 -->
<div class="tabs">
  <div class="tab active" onclick="switchTab('list',this)">단어목록</div>
  <div class="tab" onclick="switchTab('flash',this)">플래시카드</div>
  <div class="tab" onclick="switchTab('quiz',this)">퀴즈</div>
  <div class="tab" onclick="switchTab('test',this)" style="color:#E11D48;font-weight:700;">📝테스트</div>
</div>

<!-- 검색 (목록 탭만) -->
<div id="search-area">
  <div class="search-wrap">
    <input class="search-input" type="text" placeholder="🔍 영어 또는 한글로 검색" id="search-input" oninput="doSearch()" autocomplete="off" autocorrect="off" spellcheck="false">
  </div>
  <div class="filter-bar">
    <button class="filter-btn active" onclick="setFilter('all',this)">전체</button>
    <button class="filter-btn" onclick="setFilter('dontknow',this)">모르는 단어</button>
    <button class="filter-btn" onclick="setFilter('fav',this)">⭐ 즐겨찾기</button>
  </div>
</div>

<!-- 단어 목록 -->
<div id="view-list">
  <div class="stats-row" style="padding:8px 10px 0">
    <div class="stat-box"><div class="stat-num" id="stat-know">0</div><div class="stat-label">알아요</div></div>
    <div class="stat-box"><div class="stat-num" id="stat-dontknow">0</div><div class="stat-label">모름</div></div>
    <div class="stat-box"><div class="stat-num" id="stat-fav">0</div><div class="stat-label">즐겨찾기</div></div>
    <div class="stat-box"><div class="stat-num" id="stat-total">0</div><div class="stat-label">전체</div></div>
  </div>
  <div class="word-list" id="word-list"></div>
</div>

<!-- 플래시카드 -->
<div id="view-flash" class="hidden">
  <div class="stats-row">
    <div class="stat-box"><div class="stat-num" id="f-know">0</div><div class="stat-label">알아요</div></div>
    <div class="stat-box"><div class="stat-num" id="f-dontknow">0</div><div class="stat-label">모름</div></div>
    <div class="stat-box"><div class="stat-num" id="f-skip">0</div><div class="stat-label">건너뜀</div></div>
  </div>
  <div class="flash-wrap" id="flash-card" onclick="toggleMeaning()">
    <button class="flash-fav" id="flash-fav" onclick="event.stopPropagation();toggleFlashFav()">☆</button>
    <div class="flash-counter" id="flash-counter">1 / 1</div>
    <div class="flash-word" id="flash-word">-</div>
    <div class="flash-ph" id="flash-ph"></div>
    <div class="flash-tap" id="flash-tap">탭하여 뜻 보기</div>
    <div class="flash-meaning" id="flash-meaning">
      <div class="flash-meaning-text" id="flash-meaning-text"></div>
      <div class="flash-pos-text" id="flash-pos-text"></div>
    </div>
  </div>
  <div class="flash-btns">
    <button class="flash-btn btn-know" onclick="markCard('know')">✅ 알아요</button>
    <button class="flash-btn btn-dontknow" onclick="markCard('dontknow')">❌ 모름</button>
    <button class="flash-btn btn-skip" onclick="markCard('skip')">➡ 건너뜀</button>
  </div>
  <div class="flash-nav">
    <button class="nav-btn" onclick="prevCard()">◀ 이전</button>
    <button class="speak-btn" onclick="speakCurrent()">🔊</button>
    <button class="nav-btn" onclick="nextCard()">다음 ▶</button>
  </div>
</div>

<!-- 퀴즈 -->
<div id="view-quiz" class="hidden">
  <div id="quiz-start">
    <div class="quiz-result" style="margin-top:8px">
      <div class="quiz-emoji">📝</div>
      <div class="quiz-score" id="quiz-section-info" style="font-size:16px;color:#475569"></div>
      <div class="quiz-score-label">10문제 4지선다 퀴즈</div>
      <button class="quiz-start-btn" onclick="startQuiz()">퀴즈 시작</button>
    </div>
  </div>
  <div id="quiz-play" class="hidden">
    <div class="quiz-q">
      <div class="quiz-num" id="quiz-num">1 / 10</div>
      <div class="quiz-word" id="quiz-word">-</div>
      <div class="quiz-ph" id="quiz-ph"></div>
    </div>
    <div class="quiz-options" id="quiz-options"></div>
    <button class="quiz-next-btn hidden" id="quiz-next-btn" onclick="nextQuiz()">다음 문제</button>
  </div>
  <div id="quiz-result-view" class="hidden">
    <div class="quiz-result">
      <div class="quiz-emoji" id="result-emoji">🎉</div>
      <div class="quiz-score" id="result-score">10/10</div>
      <div class="quiz-score-label" id="result-label">완벽해요!</div>
      <button class="quiz-start-btn" onclick="startQuiz()" style="margin-top:16px">다시 풀기</button>
    </div>
  </div>
</div>

<script>
// ─── DATA ───────────────────────────────────────────────

// ─── STATE ──────────────────────────────────────────────
let allWords = []; // flat array with sectionIdx
let curSection = 'all';
let curTab = 'list';
let curFilter = 'all';
let searchQ = '';
let flashIdx = 0;
let flashWords = [];
let quizWords = [];
let quizIdx = 0;
let quizScore = 0;
let quizAnswered = false;
let touchStartX = 0;

// ─── INIT ────────────────────────────────────────────────
function init() {
  // 저장된 상태 로드
  const saved = localStorage.getItem('cutop_sn_en') ? JSON.parse(localStorage.getItem('cutop_sn_en')) : {};
  
  // 전체 단어 배열 구성
  let idx = 0;
  SECTIONS_RAW.forEach((sec, si) => {
    sec.words.forEach(w => {
      const key = sec.name + '|' + w.word + '|' + w.meaning;
      const s = saved[key] || {fav: false, status: ''};
      allWords.push({...w, sectionIdx: si, sectionName: sec.name, key, fav: s.fav, status: s.status, idx: idx++});
    });
  });
  
  // 섹션 버튼 생성
  const bar = document.getElementById('section-bar');
  SECTIONS_RAW.forEach((sec, si) => {
    const btn = document.createElement('span');
    btn.className = 'section-btn';
    btn.dataset.sec = si;
    btn.textContent = sec.name;
    btn.onclick = function() { selectSection(si, this); };
    bar.appendChild(btn);
  });
  
  updateStats();
  renderList();
  
  // 스와이프
  const fc = document.getElementById('flash-card');
  fc.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, {passive:true});
  fc.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - touchStartX;
    if (Math.abs(dx) > 50) { dx < 0 ? nextCard() : prevCard(); }
  }, {passive:true});
}

// ─── SAVE ────────────────────────────────────────────────
function saveState() {
  const obj = {};
  allWords.forEach(w => { obj[w.key] = {fav: w.fav, status: w.status}; });
  localStorage.setItem('cutop_sn_en', JSON.stringify(obj));
}

// ─── SECTION ─────────────────────────────────────────────
function selectSection(sec, el) {
  curSection = sec;
  document.querySelectorAll('.section-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  flashIdx = 0;
  renderList();
  if (curTab === 'flash') initFlash();
  updateQuizInfo();
}

function getFilteredWords() {
  let ws = curSection === 'all' ? allWords : allWords.filter(w => w.sectionIdx == curSection);
  if (curFilter === 'fav') ws = ws.filter(w => w.fav);
  if (curFilter === 'dontknow') ws = ws.filter(w => w.status === 'dontknow');
  if (searchQ) {
    const q = searchQ.toLowerCase();
    ws = ws.filter(w => w.word.toLowerCase().includes(q) || w.meaning.includes(q));
  }
  return ws;
}

// ─── LIST ────────────────────────────────────────────────
function renderList() {
  const ws = getFilteredWords();
  const el = document.getElementById('word-list');
  if (ws.length === 0) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">🔍</div><div>단어가 없습니다</div></div>';
    return;
  }
  el.innerHTML = ws.map((w, i) => {
    const stClass = w.status === 'know' ? 'status-know' : w.status === 'dontknow' ? 'status-dontknow' : w.status === 'skip' ? 'status-skip' : '';
    const stTxt = w.status === 'know' ? '✓' : w.status === 'dontknow' ? '✗' : w.status === 'skip' ? '→' : '';
    return `<div class="word-card" onclick="speakWord('${w.word.replace(/'/g,"\'")}')">
      <div class="word-num">${i+1}</div>
      <div class="word-main">
        <div class="word-en">${w.word}<span class="word-pos">${w.pos}</span></div>
        <div class="word-ph">${w.phonetic}</div>
        <div class="word-kr">${w.meaning}</div>
      </div>
      ${stTxt ? `<div class="word-status ${stClass}">${stTxt}</div>` : ''}
      <div class="word-fav" onclick="event.stopPropagation();toggleFav(${w.idx})">${w.fav ? '⭐' : '☆'}</div>
    </div>`;
  }).join('');
  updateStats();
}

function doSearch() {
  searchQ = document.getElementById('search-input').value;
  renderList();
}

function setFilter(f, el) {
  curFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderList();
}

function toggleFav(idx) {
  allWords[idx].fav = !allWords[idx].fav;
  saveState();
  renderList();
  if (curTab === 'flash') document.getElementById('flash-fav').textContent = allWords[idx].fav ? '⭐' : '☆';
}

function updateStats() {
  const ws = curSection === 'all' ? allWords : allWords.filter(w => w.sectionIdx == curSection);
  document.getElementById('stat-know').textContent = ws.filter(w => w.status === 'know').length;
  document.getElementById('stat-dontknow').textContent = ws.filter(w => w.status === 'dontknow').length;
  document.getElementById('stat-fav').textContent = ws.filter(w => w.fav).length;
  document.getElementById('stat-total').textContent = ws.length;
  const done = ws.filter(w => w.status !== '').length;
  const pct = ws.length ? Math.round(done / ws.length * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  
  // 헤더 서브타이틀
  const secName = curSection === 'all' ? '' : ' · ' + SECTIONS_RAW[curSection].name;
  document.getElementById('header-sub').textContent = '수능영독' + secName + ' · ' + ws.length + '단어';
}

// ─── FLASH ───────────────────────────────────────────────
function initFlash() {
  flashWords = curSection === 'all' ? allWords : allWords.filter(w => w.sectionIdx == curSection);
  if (curFilter === 'fav') flashWords = flashWords.filter(w => w.fav);
  if (curFilter === 'dontknow') flashWords = flashWords.filter(w => w.status === 'dontknow');
  flashIdx = Math.min(flashIdx, Math.max(0, flashWords.length - 1));
  renderFlash();
}

function renderFlash() {
  if (flashWords.length === 0) {
    document.getElementById('flash-word').textContent = '단어 없음';
    document.getElementById('flash-ph').textContent = '';
    document.getElementById('flash-counter').textContent = '0 / 0';
    return;
  }
  const w = flashWords[flashIdx];
  document.getElementById('flash-counter').textContent = (flashIdx+1) + ' / ' + flashWords.length;
  document.getElementById('flash-word').textContent = w.word;
  document.getElementById('flash-ph').textContent = w.phonetic;
  document.getElementById('flash-meaning').classList.remove('show');
  document.getElementById('flash-tap').style.display = 'block';
  document.getElementById('flash-fav').textContent = w.fav ? '⭐' : '☆';
  updateFlashStats();
}

function updateFlashStats() {
  const ws = curSection === 'all' ? allWords : allWords.filter(w => w.sectionIdx == curSection);
  document.getElementById('f-know').textContent = ws.filter(w => w.status === 'know').length;
  document.getElementById('f-dontknow').textContent = ws.filter(w => w.status === 'dontknow').length;
  document.getElementById('f-skip').textContent = ws.filter(w => w.status === 'skip').length;
}

function toggleMeaning() {
  if (flashWords.length === 0) return;
  const m = document.getElementById('flash-meaning');
  const w = flashWords[flashIdx];
  if (!m.classList.contains('show')) {
    document.getElementById('flash-meaning-text').textContent = w.meaning;
    document.getElementById('flash-pos-text').textContent = w.pos;
    m.classList.add('show');
    document.getElementById('flash-tap').style.display = 'none';
    speakWord(w.word);
  }
}

function markCard(status) {
  if (flashWords.length === 0) return;
  const w = flashWords[flashIdx];
  allWords[w.idx].status = status;
  saveState();
  nextCard();
}

function nextCard() {
  if (flashWords.length === 0) return;
  flashIdx = (flashIdx + 1) % flashWords.length;
  renderFlash();
}

function prevCard() {
  if (flashWords.length === 0) return;
  flashIdx = (flashIdx - 1 + flashWords.length) % flashWords.length;
  renderFlash();
}

function speakCurrent() {
  if (flashWords.length > 0) speakWord(flashWords[flashIdx].word);
}

function toggleFlashFav() {
  if (flashWords.length === 0) return;
  const w = flashWords[flashIdx];
  allWords[w.idx].fav = !allWords[w.idx].fav;
  saveState();
  document.getElementById('flash-fav').textContent = allWords[w.idx].fav ? '⭐' : '☆';
}

// ─── QUIZ ────────────────────────────────────────────────
function updateQuizInfo() {
  const ws = curSection === 'all' ? allWords : allWords.filter(w => w.sectionIdx == curSection);
  const secName = curSection === 'all' ? '전체' : SECTIONS_RAW[curSection].name;
  document.getElementById('quiz-section-info').textContent = secName + ' (' + ws.length + '단어)';
}

function startQuiz() {
  let ws = curSection === 'all' ? allWords : allWords.filter(w => w.sectionIdx == curSection);
  if (ws.length < 4) { alert('단어가 4개 이상 필요합니다.'); return; }
  const shuffled = [...ws].sort(() => Math.random() - 0.5);
  quizWords = shuffled.slice(0, Math.min(10, shuffled.length));
  quizIdx = 0;
  quizScore = 0;
  document.getElementById('quiz-start').classList.add('hidden');
  document.getElementById('quiz-result-view').classList.add('hidden');
  document.getElementById('quiz-play').classList.remove('hidden');
  renderQuiz();
}

function renderQuiz() {
  const w = quizWords[quizIdx];
  document.getElementById('quiz-num').textContent = (quizIdx+1) + ' / ' + quizWords.length;
  document.getElementById('quiz-word').textContent = w.word;
  document.getElementById('quiz-ph').textContent = w.phonetic;
  speakWord(w.word);
  
  // 오답 3개
  let pool = allWords.filter(x => x.meaning !== w.meaning);
  const shuffledPool = pool.sort(() => Math.random() - 0.5).slice(0, 3);
  const opts = [...shuffledPool.map(x => x.meaning), w.meaning].sort(() => Math.random() - 0.5);
  
  document.getElementById('quiz-next-btn').classList.add('hidden');
  quizAnswered = false;
  const optEl = document.getElementById('quiz-options');
  optEl.innerHTML = opts.map(o => `<button class="quiz-opt" onclick="answerQuiz(this,'${o.replace(/'/g,"\'")}','${w.meaning.replace(/'/g,"\'")}')"> ${o}</button>`).join('');
}

function answerQuiz(el, chosen, correct) {
  if (quizAnswered) return;
  quizAnswered = true;
  document.querySelectorAll('.quiz-opt').forEach(b => {
    if (b.textContent.trim() === correct) b.classList.add('correct');
    else if (b === el) b.classList.add('wrong');
    b.style.pointerEvents = 'none';
  });
  if (chosen === correct) quizScore++;
  document.getElementById('quiz-next-btn').classList.remove('hidden');
}

function nextQuiz() {
  quizIdx++;
  if (quizIdx >= quizWords.length) {
    showQuizResult();
  } else {
    renderQuiz();
  }
}

function showQuizResult() {
  document.getElementById('quiz-play').classList.add('hidden');
  document.getElementById('quiz-result-view').classList.remove('hidden');
  const total = quizWords.length;
  const pct = Math.round(quizScore / total * 100);
  document.getElementById('result-score').textContent = quizScore + ' / ' + total;
  let emoji = '😢', label = '다시 도전해봐요!';
  if (pct >= 90) { emoji = '🏆'; label = '완벽해요!'; }
  else if (pct >= 70) { emoji = '🎉'; label = '잘했어요!'; }
  else if (pct >= 50) { emoji = '👍'; label = '조금 더 노력해요!'; }
  document.getElementById('result-emoji').textContent = emoji;
  document.getElementById('result-label').textContent = label;
}

// ─── SPEECH ──────────────────────────────────────────────
function speakWord(word) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(word);
  u.lang = 'en-US';
  u.rate = 0.9;
  speechSynthesis.speak(u);
}

// ─── TABS ────────────────────────────────────────────────
function switchTab(tab, el) {
  curTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('view-list').classList.toggle('hidden', tab !== 'list');
  document.getElementById('view-flash').classList.toggle('hidden', tab !== 'flash');
  document.getElementById('view-quiz').classList.toggle('hidden', tab !== 'quiz');
  document.getElementById('view-test').classList.toggle('hidden', tab !== 'test');
  document.getElementById('search-area').classList.toggle('hidden', tab !== 'list');
  if (tab === 'flash') initFlash();
  if (tab === 'quiz') updateQuizInfo();
  if (tab === 'test') initTestUI();
}

// ─── 📝 테스트 모드 ──────────────────────────────────────
let tCount = 50, tRangeIdx = -1; // -1 = 전체
let tWords = [], tIdx = 0, tCorrect = 0;
let tResults = [], tChecked = false, tName = '';

function initTestUI() {
  const row = document.getElementById('t-range-row');
  if (row.children.length > 0) return; // 이미 생성됨
  // 전체 버튼
  const btnAll = makeRangeBtn('전체', true, () => { tRangeIdx = -1; setActiveRangeBtn(btnAll); });
  row.appendChild(btnAll);
  // 강별 버튼
  SECTIONS_RAW.forEach((sec, i) => {
    const b = makeRangeBtn(sec.name, false, () => { tRangeIdx = i; setActiveRangeBtn(b); });
    row.appendChild(b);
  });
}

function makeRangeBtn(label, active, cb) {
  const b = document.createElement('button');
  b.innerText = label;
  b.onclick = cb;
  b.style.cssText = 'padding:5px 11px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;' +
    (active ? 'border:2px solid #2563EB;background:#2563EB;color:#fff;'
             : 'border:1.5px solid #e2e8f0;background:#fff;color:#64748b;');
  return b;
}

function setActiveRangeBtn(btn) {
  document.querySelectorAll('#t-range-row button').forEach(b => {
    b.style.background = '#fff'; b.style.color = '#64748b'; b.style.border = '1.5px solid #e2e8f0';
  });
  btn.style.background = '#2563EB'; btn.style.color = '#fff'; btn.style.border = '2px solid #2563EB';
}

function selTC(n) {
  tCount = n;
}

function startTest() {
  const name = document.getElementById('t-name').value.trim();
  if (!name) { alert('이름을 입력해주세요!'); return; }
  tName = name;

  let pool = tRangeIdx === -1
    ? [...allWords]
    : allWords.filter(w => w.sectionIdx === tRangeIdx);

  if (pool.length < 4) { alert('단어가 부족해요. (최소 4개)'); return; }
  tWords = [...pool].sort(() => Math.random() - 0.5).slice(0, Math.min(tCount, pool.length));
  tIdx = 0; tCorrect = 0; tResults = []; tChecked = false;

  document.getElementById('test-setup').style.display = 'none';
  document.getElementById('test-play').style.display = 'block';
  document.getElementById('test-result').style.display = 'none';
  loadTQ();
}

function loadTQ() {
  tChecked = false;
  const w = tWords[tIdx];
  document.getElementById('t-eng').innerText = w.word;
  document.getElementById('t-pho').innerText = w.phonetic || '';
  document.getElementById('t-qnum').innerText = (tIdx+1) + ' / ' + tWords.length;
  document.getElementById('t-correct').innerText = '맞춤: ' + tCorrect;
  document.getElementById('t-prog').style.width = (tIdx / tWords.length * 100) + '%';
  const inp = document.getElementById('t-ans');
  inp.value = ''; inp.disabled = false;
  inp.style.border = '2px solid #e2e8f0'; inp.style.background = '#fff';
  document.getElementById('t-reveal').innerText = '';
  document.getElementById('t-next-btn').innerText = '확인 →';
  setTimeout(() => inp.focus(), 50);
  speak(w.word);
}

function tSimilar(input, correct) {
  const n = s => s.replace(/\s/g,'').replace(/[~\-·,]/g,'').toLowerCase();
  const a = n(input), c = n(correct);
  if (a === c) return true;
  if (a.length >= 2 && c.includes(a)) return true;
  const core = c.replace(/하다|되다|시키다|이다|이며|하며/g,'').trim();
  if (core.length >= 2 && a.includes(core)) return true;
  return false;
}

function nextTQ() {
  const inp = document.getElementById('t-ans');
  const reveal = document.getElementById('t-reveal');
  const w = tWords[tIdx];
  if (!tChecked) {
    tChecked = true;
    const ans = inp.value.trim();
    const ok = ans && tSimilar(ans, w.meaning);
    inp.disabled = true;
    if (ok) {
      inp.style.border = '2px solid #22c55e'; inp.style.background = '#f0fdf4';
      reveal.style.color = '#16a34a';
      reveal.innerText = '✅ 정답! (' + w.meaning + ')';
      tCorrect++;
    } else {
      inp.style.border = '2px solid #ef4444'; inp.style.background = '#fef2f2';
      reveal.style.color = '#dc2626';
      reveal.innerText = '❌ 정답: ' + w.meaning;
    }
    document.getElementById('t-correct').innerText = '맞춤: ' + tCorrect;
    tResults.push({ word: w.word, meaning: w.meaning, ans: ans || '(미입력)', ok });
    document.getElementById('t-next-btn').innerText = tIdx < tWords.length - 1 ? '다음 →' : '결과 보기 →';
  } else {
    tIdx++;
    if (tIdx < tWords.length) loadTQ();
    else showTResult();
  }
}

function showTResult() {
  document.getElementById('test-play').style.display = 'none';
  document.getElementById('test-result').style.display = 'block';
  const pct = Math.round(tCorrect / tWords.length * 100);
  document.getElementById('t-res-score').innerText = tCorrect + ' / ' + tWords.length;
  document.getElementById('t-res-pct').innerText = pct + '점';
  document.getElementById('t-res-emoji').innerText = pct===100?'🏆':pct>=80?'🎉':pct>=60?'👍':'💪';
  const wrongs = tResults.filter(r => !r.ok);
  const wb = document.getElementById('t-wrong-box');
  if (wrongs.length) {
    wb.style.display = 'block';
    document.getElementById('t-wrong-items').innerHTML = wrongs.map(r =>
      '<div style="display:flex;justify-content:space-between;align-items:flex-start;font-size:12px;padding:5px 0;border-bottom:1px solid #fecaca;">' +
      '<b style="font-family:Nunito,sans-serif;color:#1e293b;">' + r.word + '</b>' +
      '<span style="text-align:right;color:#64748b;line-height:1.5;">입력: ' + r.ans + '<br>정답: ' + r.meaning + '</span></div>'
    ).join('');
  } else { wb.style.display = 'none'; }
}

function copyTResult() {
  const pct = Math.round(tCorrect / tWords.length * 100);
  const today = new Date().toLocaleDateString('ko-KR');
  const wrongs = tResults.filter(r => !r.ok);
  const corrects = tResults.filter(r => r.ok);
  let txt = '[씨유에탑 수능영독] 테스트 결과\n';
  txt += '날짜: ' + today + '\n';
  txt += '이름: ' + tName + '\n';
  txt += '점수: ' + tCorrect + '/' + tWords.length + ' (' + pct + '점)\n';
  txt += '─────────────────\n';
  if (wrongs.length) {
    txt += '❌ 틀린 단어 (' + wrongs.length + '개)\n';
    wrongs.forEach(r => txt += '  ' + r.word + ' → 입력:' + r.ans + ' / 정답:' + r.meaning + '\n');
  } else { txt += '❌ 틀린 단어 없음 🎉\n'; }
  txt += '─────────────────\n';
  txt += '✅ 맞은 단어: ' + corrects.map(r => r.word).join(', ');

  const showToast = () => {
    const t = document.getElementById('copy-toast');
    t.style.opacity = '1';
    setTimeout(() => t.style.opacity = '0', 3000);
  };
  if (navigator.clipboard) {
    navigator.clipboard.writeText(txt).then(showToast).catch(() => {
      const ta = document.createElement('textarea');
      ta.value = txt; document.body.appendChild(ta); ta.select();
      document.execCommand('copy'); document.body.removeChild(ta); showToast();
    });
  } else {
    const ta = document.createElement('textarea');
    ta.value = txt; document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta); showToast();
  }
}

function resetTest() {
  document.getElementById('test-setup').style.display = 'block';
  document.getElementById('test-play').style.display = 'none';
  document.getElementById('test-result').style.display = 'none';
}

init();
</script>
<!-- 📝 테스트 -->
<div id="view-test" class="hidden" style="padding:14px;">

  <!-- 설정 화면 -->
  <div id="test-setup">
    <h2 style="font-size:15px;font-weight:700;margin-bottom:14px;">📝 오늘의 단어 테스트</h2>
    <label style="font-size:12px;font-weight:600;color:#64748b;display:block;margin-bottom:5px;">이름 입력</label>
    <input type="text" id="t-name" placeholder="이름을 입력하세요"
      style="width:100%;padding:11px 14px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:15px;outline:none;margin-bottom:14px;font-family:'Noto Sans KR',sans-serif;">
    <label style="font-size:12px;font-weight:600;color:#64748b;display:block;margin-bottom:6px;">문제 수</label>
    <div style="display:flex;gap:8px;margin-bottom:14px;">
      <button id="tc-50" onclick="selTC(50)"
        style="flex:1;padding:10px;border:2px solid #2563EB;background:#2563EB;color:#fff;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;">50단어</button>
    </div>
    <label style="font-size:12px;font-weight:600;color:#64748b;display:block;margin-bottom:6px;">범위 선택</label>
    <div id="t-range-row" style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:18px;"></div>
    <button onclick="startTest()"
      style="width:100%;padding:14px;background:#E11D48;color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer;">테스트 시작 →</button>
  </div>

  <!-- 진행 화면 -->
  <div id="test-play" style="display:none;">
    <div style="background:#e2e8f0;border-radius:99px;height:5px;margin-bottom:5px;">
      <div id="t-prog" style="height:5px;background:#2563EB;border-radius:99px;width:0%;transition:width .3s;"></div>
    </div>
    <div style="display:flex;justify-content:space-between;font-size:12px;color:#64748b;font-weight:600;margin-bottom:14px;">
      <span id="t-qnum">1 / 20</span><span id="t-correct">맞춤: 0</span>
    </div>
    <div style="background:#fff;border:2px solid #e2e8f0;border-radius:14px;padding:26px 16px;text-align:center;margin-bottom:12px;">
      <div id="t-eng" style="font-size:28px;font-weight:800;color:#2563EB;font-family:'Nunito',sans-serif;"></div>
      <div id="t-pho" style="font-size:12px;color:#94a3b8;font-family:'Nunito',sans-serif;margin-top:4px;"></div>
    </div>
    <input type="text" id="t-ans" placeholder="한글 뜻을 입력하세요"
      style="width:100%;padding:13px 14px;border:2px solid #e2e8f0;border-radius:10px;font-size:16px;outline:none;text-align:center;margin-bottom:8px;font-family:'Noto Sans KR',sans-serif;"
      onkeydown="if(event.key==='Enter') nextTQ()">
    <div id="t-reveal" style="font-size:14px;font-weight:600;text-align:center;min-height:20px;margin-bottom:12px;"></div>
    <button id="t-next-btn" onclick="nextTQ()"
      style="width:100%;padding:13px;background:#2563EB;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;">확인 →</button>
  </div>

  <!-- 결과 화면 -->
  <div id="test-result" style="display:none;">
    <div style="text-align:center;padding:22px;background:#eff6ff;border-radius:14px;margin-bottom:14px;">
      <div id="t-res-score" style="font-size:50px;font-weight:800;color:#2563EB;font-family:'Nunito',sans-serif;"></div>
      <div id="t-res-pct" style="font-size:18px;font-weight:700;color:#1e293b;"></div>
      <div id="t-res-emoji" style="font-size:26px;margin-top:6px;"></div>
    </div>
    <div id="t-wrong-box" style="background:#fff5f5;border:1px solid #fecaca;border-radius:10px;padding:14px;margin-bottom:14px;display:none;">
      <div style="font-size:13px;font-weight:700;color:#dc2626;margin-bottom:8px;">❌ 틀린 단어</div>
      <div id="t-wrong-items"></div>
    </div>
    <button onclick="copyTResult()"
      style="width:100%;padding:15px;background:#25D366;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;margin-bottom:10px;">📋 카톡으로 결과 복사</button>
    <button onclick="resetTest()"
      style="width:100%;padding:12px;background:#fff;color:#2563EB;border:2px solid #2563EB;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;">↩ 다시 테스트</button>
  </div>

</div>

<div id="copy-toast" style="position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;padding:10px 20px;border-radius:99px;font-size:14px;font-weight:600;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999;white-space:nowrap;">
  복사 완료! 카톡에 붙여넣기 하세요 📲
</div>

</body>
</html>
