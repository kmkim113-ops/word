<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>씨유에탑 영어단어장</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #2563EB;
  --primary-dark: #1D4ED8;
  --primary-light: #EFF6FF;
  --success: #10B981;
  --danger: #EF4444;
  --warn: #F59E0B;
  --gray: #6B7280;
  --border: #E5E7EB;
  --bg: #F9FAFB;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Noto Sans KR', sans-serif; background: #f0f2f5; color: #1f2937; display: flex; justify-content: center; }
#app-container { width: 100%; max-width: 420px; background: var(--bg); min-height: 100vh; display: flex; flex-direction: column; position: relative; box-shadow: 0 0 20px rgba(0,0,0,0.05); }
.header { background: #fff; padding: 16px; border-bottom: 1px solid var(--border); text-align: center; }
.header-brand { font-family: 'Nunito', sans-serif; font-size: 18px; font-weight: 700; color: var(--primary); margin-bottom: 4px; }
.header-sub { font-size: 13px; color: var(--gray); font-weight: 500; }
.nav-tabs { display: flex; background: #fff; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 10; }
.nav-tab { flex: 1; text-align: center; padding: 12px 0; font-size: 13px; font-weight: 500; color: var(--gray); border-bottom: 2px solid transparent; cursor: pointer; }
.nav-tab.active { color: var(--primary); border-bottom-color: var(--primary); font-weight: 700; }
.tab-content { flex: 1; padding: 16px; display: none; }
.tab-content.active { display: block; }
.range-bar { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 8px; margin-bottom: 12px; scrollbar-width: none; }
.range-bar::-webkit-scrollbar { display: none; }
.range-btn { flex-shrink: 0; padding: 6px 12px; font-family: 'Nunito', sans-serif; font-size: 12px; font-weight: 600; background: #fff; border: 1px solid var(--border); border-radius: 20px; color: var(--gray); cursor: pointer; }
.range-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }
.search-box { display: flex; background: #fff; border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; margin-bottom: 12px; }
.search-input { border: none; outline: none; width: 100%; font-size: 14px; background: transparent; }
.filter-bar { display: flex; gap: 6px; margin-bottom: 12px; }
.filter-btn { flex: 1; padding: 8px 0; font-size: 12px; font-weight: 500; background: #fff; border: 1px solid var(--border); border-radius: 6px; color: var(--gray); cursor: pointer; }
.filter-btn.active { background: var(--primary-light); color: var(--primary); border-color: var(--primary); font-weight: 600; }
.word-list { display: flex; flex-direction: column; gap: 10px; }
.word-card { background: #fff; border: 1px solid var(--border); border-radius: 10px; padding: 14px; display: flex; align-items: center; justify-content: space-between; transition: opacity 0.2s; }
.word-card.known { opacity: 0.35; }
.wc-left { display: flex; align-items: center; gap: 12px; flex: 1; }
.chk-btn { width: 22px; height: 22px; border: 2px solid var(--border); border-radius: 4px; display: flex; align-items: center; justify-content: center; cursor: pointer; background: #fff; font-size: 12px; color: transparent; user-select: none; }
.word-card.known .chk-btn { border-color: var(--success); background: var(--success); color: #fff; }
.wc-info { display: flex; flex-direction: column; gap: 2px; }
.wc-eng { font-family: 'Nunito', sans-serif; font-size: 16px; font-weight: 700; color: #111827; }
.wc-kor { font-size: 14px; color: #4b5563; }
.wc-right { display: flex; align-items: center; gap: 4px; }
.ibtn { background: none; border: none; width: 32px; height: 32px; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; border-radius: 50%; }
.ibtn:active { background: #f3f4f6; }
.fav-star { color: #d1d5db; }
.fav-star.active { color: var(--warn); }
.fc-container { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 320px; }
.fc-card { width: 100%; height: 220px; background: #fff; border: 1px solid var(--border); border-radius: 16px; position: relative; box-shadow: 0 4px 6px rgba(0,0,0,0.02); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; text-align: center; cursor: pointer; user-select: none; margin-bottom: 24px; }
.fc-fav-pos { position: absolute; top: 12px; right: 12px; z-index: 2; }
.fc-word { font-family: 'Nunito', sans-serif; font-size: 28px; font-weight: 700; color: #111827; margin-bottom: 12px; word-break: break-all; }
.fc-mean { font-size: 18px; color: var(--primary); font-weight: 500; min-height: 27px; }
.fc-hint { font-size: 12px; color: var(--gray); position: absolute; bottom: 12px; }
.fc-nav { display: flex; width: 100%; gap: 10px; }
.fc-nav-btn { flex: 1; padding: 12px 0; font-size: 15px; font-weight: 600; border: none; border-radius: 8px; cursor: pointer; text-align: center; background: var(--primary); color: #fff; }
.fc-nav-btn.sec { background: #e5e7eb; color: #374151; }
.qz-container, .ts-container { background: #fff; border: 1px solid var(--border); border-radius: 12px; padding: 20px; min-height: 300px; display: flex; flex-direction: column; }
.qz-progress, .ts-progress { height: 6px; background: #e5e7eb; border-radius: 3px; margin-bottom: 16px; overflow: hidden; }
.qz-bar, .ts-bar { height: 100%; width: 0%; background: var(--primary); transition: width 0.2s; }
.qz-status, .ts-status { display: flex; justify-content: space-between; font-size: 12px; color: var(--gray); margin-bottom: 20px; font-weight: 500; }
.qz-word { font-family: 'Nunito', sans-serif; font-size: 24px; font-weight: 700; text-align: center; margin-bottom: 24px; color: #111827; }
.qz-options { display: flex; flex-direction: column; gap: 10px; }
.qz-opt { width: 100%; padding: 14px; text-align: left; font-size: 14px; background: #fff; border: 1px solid var(--border); border-radius: 8px; cursor: pointer; font-weight: 500; color: #374151; }
.qz-opt.correct { background: var(--success); color: #fff; border-color: var(--success); }
.qz-opt.wrong { background: var(--danger); color: #fff; border-color: var(--danger); }
.res-container { text-align: center; padding: 24px 0; }
.res-emoji { font-size: 48px; margin-bottom: 12px; }
.res-score { font-size: 24px; font-weight: 700; color: #111827; margin-bottom: 4px; }
.res-pct { font-size: 14px; color: var(--gray); margin-bottom: 24px; }
.btn-block { width: 100%; padding: 12px 0; font-size: 15px; font-weight: 600; border: none; border-radius: 8px; cursor: pointer; text-align: center; background: var(--primary); color: #fff; margin-top: 12px; }
.ts-setup { display: flex; flex-direction: column; gap: 16px; }
.form-group { display: flex; flex-direction: column; gap: 6px; }
.form-label { font-size: 14px; font-weight: 600; color: #374151; }
.form-input { padding: 10px 12px; font-size: 14px; border: 1px solid var(--border); border-radius: 8px; outline: none; }
.ts-word { font-family: 'Nunito', sans-serif; font-size: 24px; font-weight: 700; text-align: center; margin-bottom: 20px; color: #111827; }
.ts-input-box { width: 100%; padding: 12px; font-size: 15px; border: 1px solid var(--border); border-radius: 8px; outline: none; text-align: center; margin-bottom: 16px; }
.ts-input-box:focus { border-color: var(--primary); }
.wrong-list { text-align: left; margin-top: 20px; border-top: 1px solid var(--border); padding-top: 16px; }
.wrong-title { font-size: 14px; font-weight: 700; color: var(--danger); margin-bottom: 10px; }
.wrong-item { font-size: 13px; padding: 6px 0; border-bottom: 1px dashed var(--border); color: #4b5563; }
.wrong-item .w-eng { font-family: 'Nunito', sans-serif; font-weight: 700; color: #111827; }
</style>
</head>
<body>

<div id="app-container">
  <div class="header">
    <div class="header-brand en">씨유에탑 ✦ 영어단어장</div>
    <div class="header-sub" id="hdr-sub">씨유에탑 중등3-9 · 총 0단어</div>
  </div>

    <div class="nav-tab" id="tb-flash" onclick="switchTab('flash')">플래시카드</div>
    <div class="nav-tab" id="tb-quiz" onclick="switchTab('quiz')">퀴즈모드</div>
    <div class="nav-tab" id="tb-test" onclick="switchTab('test')">📝 테스트</div>

  <!-- 탭 1: 단어목록 -->
  <div class="tab-content active" id="tab-list">

    <div class="filter-bar">

      <button class="filter-btn" id="f-not" onclick="setLF('not')">모름</button>
      <button class="filter-btn" id="f-fav" onclick="setLF('fav')">⭐즐겨찾기</button>
    </div>
    <div class="word-list" id="wlist-box"></div>
  </div>

  <!-- 탭 2: 플래시카드 -->
  <div class="tab-content" id="tab-flash">
    <div class="range-bar" id="fcrbar"></div>
    <div class="fc-container">
      <div class="fc-card" id="fccard">
        <button class="ibtn fc-fav-pos" id="fcfav">★</button>
        <div class="fc-word" id="fcword">-</div>
        <div class="fc-mean" id="fcmean"></div>
        <div class="fc-hint" id="fchint">탭하여 뜻 보기</div>
      </div>
      <div class="fc-nav">
        <button class="fc-nav-btn sec" onclick="fcPrev()">◀ 이전</button>
        <button class="fc-nav-btn" style="background:var(--warn);" onclick="speakFc()">🔊</button>
        <button class="fc-nav-btn" onclick="fcNext()">다음 ▶</button>
      </div>
    </div>
  </div>

  <!-- 탭 3: 퀴즈모드 -->
  <div class="tab-content" id="tab-quiz">
    <div class="qz-container" id="qz-box"></div>
  </div>

  <!-- 탭 4: 테스트 -->
  <div class="tab-content" id="tab-test">
    <div class="ts-container" id="ts-box"></div>
  </div>
</div>

var seriesName = "씨유에탑 중등3-9";
var storageKey = "cutop_jungdeung3_9";

function buildRanges(ws) {
  var r = [{ label: "전체", s: 0, e: ws.length }];
  for (var i = 0; i < ws.length; i += 50) {
    r.push({ label: (i+1) + "-" + Math.min(i+50, ws.length), s: i, e: Math.min(i+50, ws.length) });
  }
  return r;
}
var ranges = buildRanges(rawWords);

var lri = 0, fri = 0, tri = 0;
var currentFilter = "all"; 
var localData = {};

function loadData() {
  var saved = localStorage.getItem(storageKey);
  if (saved) {
    try { localData = JSON.parse(saved); } catch(e) { localData = {}; }
  }
}
function saveData() {
  localStorage.setItem(storageKey, JSON.stringify(localData));
}
function getWordKey(w) {
  return w.word + "|" + w.meaning;
}

function esc(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function speak(t) {
  if (!("speechSynthesis" in window)) return;
  window.speechSynthesis.cancel();
  var u = new SpeechSynthesisUtterance(t);
  u.lang = "en-US";
  u.rate = 0.85;
  window.speechSynthesis.speak(u);
}
function speakFc() {
  speak(document.getElementById("fcword").textContent);
}

function renderRangeBar(id, curIdx, callbackName) {
  var bar = document.getElementById(id);
  var html = "";
  ranges.forEach(function(r, idx) {
    var cls = idx === curIdx ? "range-btn active" : "range-btn";
    html += '<button class="' + cls + '" onclick="' + callbackName + '(' + idx + ')">' + r.label + '</button>';
  });
  bar.innerHTML = html;
}

function setLR(i) { lri = i; renderRangeBar("lrbar", lri, "setLR"); renderList(); }
function setFR(i) { fri = i; renderRangeBar("fcrbar", fri, "setFR"); initFC(); }
function setTR(i) { tri = i; renderRangeBar("tsrbar", tri, "setTR"); }

function setLF(f) {
  currentFilter = f;
  ["all","not","fav"].forEach(function(n) {
    document.getElementById("f-"+n).classList.toggle("active", n===f);
  });
  renderList();
}

function toggleKnown(wkey, idx) {
  if (!localData[wkey]) localData[wkey] = {};
  localData[wkey].status = localData[wkey].status === "known" ? "" : "known";
  saveData();
  var card = document.getElementById("wc-" + idx);
  if (card) card.classList.toggle("known", localData[wkey].status === "known");
}

function toggleFav(wkey, idx) {
  if (!localData[wkey]) localData[wkey] = {};
  localData[wkey].fav = !localData[wkey].fav;
  saveData();
  var btn = document.getElementById("wfav-" + idx);
  if (btn) btn.classList.toggle("active", localData[wkey].fav);
}

function renderList() {
  var container = document.getElementById("wlist-box");
  var q = document.getElementById("lsearch").value.toLowerCase().trim();
  var rng = ranges[lri];
  var html = "";

  for (var i = rng.s; i < rng.e; i++) {
    var w = rawWords[i];
    var k = getWordKey(w);
    var d = localData[k] || {};

    if (currentFilter === "not" && d.status === "known") continue;
    if (currentFilter === "fav" && !d.fav) continue;

    if (q) {
      if (w.word.toLowerCase().indexOf(q) === -1 && w.meaning.toLowerCase().indexOf(q) === -1) continue;
    }

    var isK = d.status === "known";
    var isF = !!d.fav;

    html += '<div class="word-card' + (isK?' known':'') + '" id="wc-' + i + '">';
    html += '  <div class="wc-left">';
    html += '    <div class="chk-btn" onclick="toggleKnown(\'' + esc(k) + '\', ' + i + ')">✓</div>';
    html += '    <div class="wc-info">';
    html += '      <div class="wc-eng">' + esc(w.word) + '</div>';
    html += '      <div class="wc-kor">' + esc(w.meaning) + '</div>';
    html += '    </div>';
    html += '  </div>';
    html += '  <div class="wc-right">';
    html += '    <button class="ibtn" data-w="' + esc(w.word) + '" onclick="speak(this.dataset.w)">🔊</button>';
    html += '    <button class="ibtn fav-star' + (isF?' active':'') + '" id="wfav-' + i + '" onclick="toggleFav(\'' + esc(k) + '\', ' + i + ')">★</button>';
    html += '  </div>';
    html += '</div>';
  }
  container.innerHTML = html;
}

var fcList = [], fci = 0, fcFlipped = false;
function initFC() {
  var rng = ranges[fri];
  fcList = rawWords.slice(rng.s, rng.e);
  fci = 0;
  showFC();
}
function showFC() {
  if (fcList.length === 0) {
    document.getElementById("fcword").textContent = "단어 없음";
    document.getElementById("fcmean").textContent = "";
    return;
  }
  var w = fcList[fci];
  var k = getWordKey(w);
  var d = localData[k] || {};
  
  document.getElementById("fcword").textContent = w.word;
  document.getElementById("fcmean").textContent = "";
  document.getElementById("fchint").textContent = "탭하여 뜻 보기";
  var f = document.getElementById("fcfav");
  f.classList.toggle("active", !!d.fav);
  f.setAttribute("data-k", k);
  fcFlipped = false;
}
function fcFlip() {
  if (fcFlipped || fcList.length === 0) return;
  fcFlipped = true;
  var w = fcList[fci];
  document.getElementById("fcmean").textContent = w.meaning;
  document.getElementById("fchint").textContent = "다음 카드는 스와이프 하세요";
  speak(w.word);
}
function fcNext() { if(fcList.length===0)return; fci = (fci+1)%fcList.length; showFC(); }
function fcPrev() { if(fcList.length===0)return; fci = (fci-1+fcList.length)%fcList.length; showFC(); }

var qPool = [], qIdx = 0, qCorrects = 0, qLocked = false;
function initQuiz() {
  qPool = rawWords.slice(0);
  qPool.sort(function(){ return Math.random()-0.5; });
  qPool = qPool.slice(0, 10);
  qIdx = 0; qCorrects = 0; qLocked = false;
  nextQuiz();
}
function nextQuiz() {
  qLocked = false;
  var box = document.getElementById("qz-box");
  if (qIdx >= qPool.length) {
    var pct = Math.round((qCorrects/qPool.length)*100);
    var emo = pct===100?'🏆':(pct>=80?'🎉':(pct>=60?'👍':'💪'));
    var html = '<div class="res-container">';
    html += '<div class="res-emoji">' + emo + '</div>';
    html += '<div class="res-score">' + qCorrects + ' / ' + qPool.length + '</div>';
    html += '<div class="res-pct">' + pct + '점 완료!</div>';
    html += '<button class="btn-block" onclick="initQuiz()">↩ 다시 풀기</button>';
    html += '</div>';
    box.innerHTML = html;
    return;
  }
  var w = qPool[qIdx];
  var opts = [w.meaning];
  while (opts.length < 4) {
    var rw = rawWords[Math.floor(Math.random()*rawWords.length)].meaning;
    if (opts.indexOf(rw) === -1) opts.push(rw);
  }
  opts.sort(function(){ return Math.random()-0.5; });

  var pct = Math.round((qIdx/qPool.length)*100);
  var html = '<div class="qz-progress"><div class="qz-bar" style="width:'+pct+'%"></div></div>';
  html += '<div class="qz-status"><span>문제 '+(qIdx+1)+'/'+qPool.length+'</span><span>✅ 맞춘수: '+qCorrects+'</span></div>';
  html += '<div class="qz-word">' + esc(w.word) + '</div>';
  html += '<div class="qz-options">';
  opts.forEach(function(o) {
    var isCor = o === w.meaning ? "1" : "0";
    html += '<button class="qz-opt" data-cor="' + isCor + '" onclick="qAns(this)">' + esc(o) + '</button>';
  });
  html += '</div>';
  box.innerHTML = html;
}
function qAns(btn) {
  if (qLocked) return;
  qLocked = true;
  var isCor = btn.getAttribute("data-cor") === "1";
  if (isCor) {
    btn.classList.add("correct");
    qCorrects++;
    speak(qPool[qIdx].word);
  } else {
    btn.classList.add("wrong");
    var opts = document.getElementsByClassName("qz-opt");
    for(var i=0; i<opts.length; i++) {
      if(opts[i].getAttribute("data-cor") === "1") opts[i].classList.add("correct");
    }
  }
  setTimeout(function(){
    qIdx++;
    nextQuiz();
  }, 1000);
}

      });

    }
    html += '</div>';
    box.innerHTML = html;
    return;
  }
  
  var w = tPool[tIdx];
  var pct = Math.round((tIdx/tPool.length)*100);
  
  var html = '<div class="ts-progress"><div class="ts-bar" style="width:'+pct+'%"></div></div>';
  html += '<div class="ts-status"><span>문제 '+(tIdx+1)+'/'+tPool.length+'</span><span>✅ 맞춤수: '+tCorrects+'</span></div>';
  html += '<div class="ts-word">' + esc(w.word) + '</div>';
  html += '<input type="text" id="ts-input" class="ts-input-box" autocomplete="off" placeholder="뜻을 입력하고 Enter" onkeydown="tsKey(event)">';
  html += '<button class="btn-block" onclick="submitTest()">확인</button>';
  
  box.innerHTML = html;
  speak(w.word);
  setTimeout(function(){ var inp = document.getElementById("ts-input"); if(inp)inp.focus(); }, 100);
}
function tsKey(e) { if (e.keyCode === 13) submitTest(); }

function isSim(input, correct) {
  var norm = function(s) {
    return s.replace(/\s/g,"").replace(/[~\-·,]/g,"").toLowerCase();
  };
  var a = norm(input), c = norm(correct);
  if (a === c) return true;
  if (a.length >= 2 && c.indexOf(a) >= 0) return true;
  var core = c.replace(/하다|되다|시키다|이다/g,"").trim();
  if (core.length >= 2 && a.indexOf(core) >= 0) return true;
  return false;
}

function submitTest() {
  var inp = document.getElementById("ts-input");
  if (!inp) return;
  var val = inp.value.trim();
  var w = tPool[tIdx];
  
  if (isSim(val, w.meaning)) {
    tCorrects++;
  } else {
    tWrongs.push({ w: w, input: val });
  }
  tIdx++;
  nextTest();
}

function copyResult() {
  var dStr = new Date().toISOString().slice(0,10);
  var pct = Math.round((tCorrects/tPool.length)*100);
  
  var t = "[" + seriesName + "] 테스트 결과\n";
  t += "날짜: " + dStr + "\n";
  t += "이름: " + tName + "\n";
  t += "점수: " + tCorrects + "/" + tPool.length + " (" + pct + "점)\n";
  t += "─────────────────\n";
  if (tWrongs.length > 0) {
    t += "❌ 틀린 단어 (" + tWrongs.length + "개)\n";
    tWrongs.forEach(function(x) {
      t += "  " + x.w.word + " → 입력:" + (x.input || "(빈칸)") + " / 정답:" + x.w.meaning + "\n";
    });
  } else {
    t += "❌ 틀린 단어 없음! 퍼펙트! 🎉\n";
  }
  t += "─────────────────\n";
  
  var rights = [];
  tPool.forEach(function(p) {
    var isW = false;
    for(var i=0; i<tWrongs.length; i++) {
      if(tWrongs[i].w.word === p.word && tWrongs[i].w.meaning === p.meaning) { isW = true; break; }
    }
    if(!isW) rights.push(p.word);
  });
  
  t += "✅ 맞은 단어: " + rights.join(", ");
  
  var dummy = document.createElement("textarea");
  document.body.appendChild(dummy);
  dummy.value = t;
  dummy.select();
  document.execCommand("copy");
  document.body.removeChild(dummy);
  alert("결과가 클립보드에 복사되었습니다. 카톡 창에 붙여넣기 하세요!");
}

function switchTab(t) {
  ["list","flash","quiz","test"].forEach(function(n) {
    document.getElementById("tb-"+n).classList.toggle("active", n===t);
    document.getElementById("tab-"+n).classList.toggle("active", n===t);
  });
  if (t==="list")  { renderRangeBar("lrbar", lri, "setLR"); renderList(); }
  if (t==="flash") { renderRangeBar("fcrbar", fri, "setFR"); initFC(); }
  if (t==="quiz")  { initQuiz(); }
  if (t==="test")  { renderSetup(); }
}

(function(){
  loadData();
  document.getElementById("hdr-sub").textContent = seriesName + " · 총 " + rawWords.length + "단어";
  renderRangeBar("lrbar", lri, "setLR");
  renderList();

  var card = document.getElementById("fccard");
  card.addEventListener("click", function(e) {
    if (e.target.id === "fcfav") return;
    fcFlip();
  });
  
  var fcTX = 0;
  card.addEventListener("touchstart", function(e) {
    fcTX = e.touches[0].clientX;
  }, {passive:true});
  card.addEventListener("touchend", function(e) {
    var dx = e.changedTouches[0].clientX - fcTX;
    if (Math.abs(dx) > 50) { if (dx < 0) fcNext(); else fcPrev(); }
  }, {passive:true});

  document.getElementById("fcfav").addEventListener("click", function(e) {
    var k = this.getAttribute("data-k");
    if (!k) return;
    if (!localData[k]) localData[k] = {};
    localData[k].fav = !localData[k].fav;
    saveData();
    this.classList.toggle("active", localData[k].fav);
  });
})();
</script>
